<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- OBS: задайте ширину/высоту источника под макет; при сужении обрежется край, текст не уменьшается -->
    <title>Копилка золота — РазБЛОГировка 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            font-family: 'Exo 2', sans-serif;
            color: #fff;
        }
        .wrap {
            display: inline-block;
            width: fit-content;
            max-width: none;
            padding: 16px 20px;
            background: rgba(8, 8, 16, 0.72);
            border: 1px solid rgba(255, 200, 80, 0.18);
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .title {
            font-size: 13px;
            letter-spacing: 0.18em;
            white-space: nowrap;
            text-transform: uppercase;
            color: rgba(255, 215, 100, 0.85);
            margin-bottom: 6px;
            text-shadow: 0 0 12px rgba(255, 200, 50, 0.4);
        }
        .total-box {
            position: relative;
            margin-bottom: 16px;
        }
        .total-value {
            font-family: 'Orbitron', monospace;
            font-size: 48px;
            font-weight: 900;
            line-height: 1.1;
            white-space: nowrap;
            background: linear-gradient(180deg, #fff6c8 0%, #ffd54a 40%, #c9a227 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 18px rgba(255, 200, 50, 0.55));
            transition: transform 0.35s ease, filter 0.35s ease;
        }
        .total-value.bump {
            transform: scale(1.06);
            filter: drop-shadow(0 0 28px rgba(255, 220, 80, 0.9));
        }
        .total-label {
            font-size: 15px;
            font-weight: 600;
            color: rgba(255, 245, 220, 0.92);
            letter-spacing: 0.14em;
            text-transform: uppercase;
            margin-top: 6px;
            white-space: nowrap;
            text-shadow: 0 0 10px rgba(255, 230, 180, 0.35);
        }
        .stats-line {
            display: flex;
            flex-wrap: nowrap;
            align-items: baseline;
            gap: 16px;
        }
        .stat-item {
            display: inline-flex;
            align-items: baseline;
            gap: 8px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .stat-label {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.85);
        }
        .stat-value {
            font-family: 'Orbitron', monospace;
            font-size: 34px;
            font-weight: 900;
            line-height: 1;
            color: #ffe082;
            text-shadow: 0 0 16px rgba(255, 200, 50, 0.45);
        }
        .stat-item--minor .stat-label {
            font-size: 10px;
            letter-spacing: 0.04em;
        }
        .stat-item--minor .stat-value {
            font-size: 18px;
        }
        .stat-item--minor .stat-value.win-rate-value {
            font-size: 28px;
        }
        #winRateItem .stat-label {
            font-size: 14px;
        }
        .stat-value--damage {
            color: rgba(255, 248, 235, 0.95);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.25);
        }
        .win-rate-value.wr-below {
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        .win-rate-value.wr-green {
            color: #7dff8a;
            text-shadow: 0 0 12px rgba(80, 220, 100, 0.45);
        }
        .win-rate-value.wr-blue {
            color: #82b4ff;
            text-shadow: 0 0 12px rgba(90, 160, 255, 0.45);
        }
        .win-rate-value.wr-purple {
            color: #c48bff;
            text-shadow: 0 0 12px rgba(180, 100, 255, 0.5);
        }
        .footer-row {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            width: fit-content;
        }
        .footer-box {
            padding: 11px 16px;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 200, 80, 0.28);
            border-radius: 8px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 4px 16px rgba(0, 0, 0, 0.35);
        }
        .footer-note {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: rgba(255, 252, 245, 0.98);
            white-space: nowrap;
            text-align: center;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5), 0 0 14px rgba(255, 240, 200, 0.4);
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="title">РазБЛОГировка 2026</div>
        <div class="total-box">
            <div class="total-value" id="totalGold">0</div>
            <div class="total-label">раздал золота игрокам</div>
        </div>
        <div class="stats-line">
            <span class="stat-item">
                <span class="stat-label">Боёв</span>
                <span class="stat-value" id="battlesCount">0</span>
            </span>
            <span class="stat-item stat-item--minor" id="winRateItem" style="display:none;">
                <span class="stat-label">% побед</span>
                <span class="stat-value win-rate-value wr-below" id="winRateValue">0%</span>
            </span>
            <span class="stat-item stat-item--minor" id="avgDamageItem" style="display:none;">
                <span class="stat-label">Ср. урон</span>
                <span class="stat-value stat-value--damage" id="avgDamageValue">0</span>
            </span>
        </div>
        <div class="footer-row">
            <div class="footer-box">
                <div class="footer-note">РЕЖИМ : ПРЕВОСХОДСТВО</div>
            </div>
            <div class="footer-box">
                <div class="footer-note">СЕРВЕР: RU_C0</div>
            </div>
        </div>
    </div>
    <script>
        (function() {
            const totalEl = document.getElementById('totalGold');
            const battlesEl = document.getElementById('battlesCount');
            const winRateItem = document.getElementById('winRateItem');
            const winRateValue = document.getElementById('winRateValue');
            const avgDamageItem = document.getElementById('avgDamageItem');
            const avgDamageValue = document.getElementById('avgDamageValue');
            let displayedTotal = 0;

            function formatGold(n) {
                return Number(n || 0).toLocaleString('ru-RU');
            }

            function animateTotal(target) {
                const from = displayedTotal;
                const to = Number(target) || 0;
                if (from === to) {
                    totalEl.textContent = formatGold(to);
                    return;
                }
                totalEl.classList.add('bump');
                const start = performance.now();
                const dur = 700;
                function frame(now) {
                    const t = Math.min(1, (now - start) / dur);
                    const eased = 1 - Math.pow(1 - t, 3);
                    const val = Math.round(from + (to - from) * eased);
                    totalEl.textContent = formatGold(val);
                    if (t < 1) requestAnimationFrame(frame);
                    else {
                        displayedTotal = to;
                        setTimeout(function() { totalEl.classList.remove('bump'); }, 200);
                    }
                }
                requestAnimationFrame(frame);
            }

            function winRateTierClass(percent) {
                var p = Number(percent) || 0;
                if (p < 50) return 'wr-below';
                if (p < 60) return 'wr-green';
                if (p < 70) return 'wr-blue';
                return 'wr-purple';
            }

            function applyWinRateStyle(percent) {
                winRateValue.className = 'stat-value win-rate-value ' + winRateTierClass(percent);
            }

            function render(data) {
                if (!data) return;
                animateTotal(data.totalGold);
                battlesEl.textContent = data.battlesCount || 0;

                if (data.widgetShowWinRate) {
                    winRateItem.style.display = '';
                    var wr = data.winRatePercent != null ? data.winRatePercent : 0;
                    winRateValue.textContent = wr + '%';
                    applyWinRateStyle(wr);
                } else {
                    winRateItem.style.display = 'none';
                }

                if (data.widgetShowAvgDamage) {
                    avgDamageItem.style.display = '';
                    avgDamageValue.textContent = formatGold(data.avgDamage || 0);
                } else {
                    avgDamageItem.style.display = 'none';
                }
            }

            function load() {
                fetch(window.location.origin + '/api/razblogirovka/gold-bank')
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.success !== false) render(data);
                    })
                    .catch(function() {});
            }

            load();
            setInterval(load, 15000);

            var ws = new WebSocket((location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws');
            ws.onmessage = function(ev) {
                try {
                    var msg = JSON.parse(ev.data);
                    if (msg.type === 'RAZBLOGIROVKA_GOLD_UPDATE' && msg.data) render(msg.data);
                } catch (_) {}
            };
        })();
    </script>
</body>
</html>
