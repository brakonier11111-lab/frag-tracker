Header:
    version: 171
ImportedPackages:
- "~res:/UI/Screens/Common/LoadingSpinner.yaml"
- "~res:/UI/Screens/Common/PlayerNameWithTag.yaml"
- "~res:/UI/Screens/Lobby/Common/Resource/PlayerAvatar.yaml"
- "~res:/UI/Screens3/Battle/GunMark/GunMarkIconForBattle.yaml"
Prototypes:
-   class: "UIControl"
    name: "table-cell"
    size: [491.000000, 40.000000]
    input: false
    classes: "table-cell"
    components:
        LinearLayout:
            padding: "8;4"
        SizePolicy:
            horizontalPolicy: "PercentOfParent"
            verticalPolicy: "FixedSize"
            verticalValue: 48.000000
        UIActionComponent:
            actionsPath: "~res:/UI/Screens/Battle/BattleLoadingScreen.actions"
        StyleSheet:
            styles: "~res:/UI/Screens/Battle/Styles/BattleLoadingScreenStyles.style"
    children:
    -   class: "UIControl"
        name: "Bg"
        input: false
        components:
            Background:
                drawType: "DRAW_FILL"
                color: [0.000000, 0.000000, 0.000000, 1.000000]
            UIOpacityComponent:
                opacity: 0.500000
            IgnoreLayout: {}
            SizePolicy:
                horizontalPolicy: "PercentOfParent"
                verticalPolicy: "PercentOfParent"
    -   class: "UIControl"
        name: "BgPlayer"
        input: false
        components:
            Background:
                drawType: "DRAW_FILL"
                color: [0.956863, 0.956863, 0.956863, 0.149020]
            UIOpacityComponent: {}
            IgnoreLayout: {}
            SizePolicy:
                horizontalPolicy: "PercentOfParent"
                verticalPolicy: "PercentOfParent"
    -   class: "UIControl"
        name: "SquadWrapper"
        input: false
        components:
            SizePolicy:
                horizontalPolicy: "FixedSize"
                horizontalValue: 18.000000
                verticalPolicy: "PercentOfParent"
        children:
        -   class: "UIControl"
            name: "Squad"
            input: false
            classes: "squad squadType=squad1 squadMy"
            components:
                Background:
                    drawType: "DRAW_SCALE_PROPORTIONAL_ONE"
                Anchor:
                    hCenterAnchorEnabled: true
                    vCenterAnchorEnabled: true
                IgnoreLayout: {}
                SizePolicy:
                    horizontalPolicy: "FixedSize"
                    horizontalValue: 16.000000
                    verticalPolicy: "FixedSize"
                    verticalValue: 18.000000
                StyleSheet:
                    styles: "~res:/UI/Screens/Battle/Styles/BattleLoadingScreenStyles.style"
    -   class: "UIControl"
        name: "spacer1"
        input: false
        components:
            SizePolicy:
                horizontalPolicy: "FixedSize"
                horizontalValue: 2.000000
                verticalPolicy: "PercentOfParent"
    -   prototype: "PlayerAvatar/PlayerAvatar"
        name: "PlayerAvatar"
        classes: "avatar-type=grade-rare size-38"
        components:
            Anchor:
                vCenterAnchorEnabled: true
            UIDataParamsComponent:
                eventActions:
                - ["AVATAR_IMAGE_LOADED", "AVATAR_IMAGE_LOADED", ""]
        children:
        -   path: "GradeTeamPanel"
            input: false
    -   class: "UIControl"
        name: "spacer"
        input: false
        components:
            SizePolicy:
                horizontalPolicy: "FixedSize"
                horizontalValue: 6.000000
                verticalPolicy: "PercentOfParent"
    -   prototype: "PlayerNameWithTag/PlayerNameWithTag"
        name: "name"
        classes: "name-with-tag"
        components:
            Anchor:
                vCenterAnchorEnabled: true
            SizePolicy:
                horizontalPolicy: "PercentOfParent"
                verticalPolicy: "PercentOfMaxChild"
            StyleSheet:
                styles: "~res:/UI/Styles/Clans/ClansStyles.style;~res:/UI/Screens/Battle/Styles/BattleLoadingScreenStyles.style"
        children:
        -   path: "name"
            classes: "t-caption regular"
            components:
                UITextComponent:
                    text: "LoooooooongPlayerName"
                SizePolicy:
                    verticalPolicy: "PercentOfContent"
                StyleSheet:
                    styles: "~res:/UI/Styles/Clans/ClansStyles.style;~res:/UI/Screens3/Font.style"
        -   path: "tag"
            classes: "t-caption regular"
            components:
                SizePolicy:
                    verticalPolicy: "PercentOfContent"
                StyleSheet:
                    styles: "~res:/UI/Styles/Clans/ClansStyles.style;~res:/UI/Screens3/Font.style"
    -   class: "UIControl"
        name: "spacer"
        input: false
        components:
            SizePolicy:
                horizontalPolicy: "PercentOfParent"
                horizontalMax: 22.000000
                verticalPolicy: "PercentOfParent"
    -   class: "UIControl"
        name: "tank-name"
        input: false
        classes: "t-caption regular"
        components:
            UITextComponent:
                text: "Long Tank NameLong Tank Name"
                colorInheritType: "COLOR_IGNORE_PARENT"
                fitting: "FITTING_POINTS"
                align: ["RIGHT", "VCENTER"]
            Anchor:
                vCenterAnchorEnabled: true
            SizePolicy:
                horizontalPolicy: "Formula"
                horizontalFormula: "min (142, min(parentRest, content))"
                verticalPolicy: "PercentOfContent"
            StyleSheet:
                styles: "~res:/UI/Screens3/Font.style;~res:/UI/Screens/Battle/Styles/BattleLoadingScreenStyles.style"
    -   class: "UIControl"
        name: "spacer"
        visible: true
        input: false
        components:
            SizePolicy:
                horizontalPolicy: "PercentOfParent"
                horizontalMax: 8.000000
                verticalPolicy: "PercentOfParent"
    -   class: "UIControl"
        name: "RankWrapper"
        input: false
        components:
            Anchor:
                vCenterAnchorEnabled: true
                vCenterAnchor: 3.000000
            SizePolicy:
                horizontalPolicy: "FixedSize"
                horizontalValue: 24.000000
                verticalPolicy: "FixedSize"
                verticalValue: 24.000000
        children:
        -   class: "UIControl"
            name: "RankIcon"
            input: false
            classes: "grade-color=white-wild-sand-bg"
            components:
                Background:
                    drawType: "DRAW_SCALE_PROPORTIONAL"
                    sprite: "~res:/Gfx/Shared/backgrounds/rank"
                Anchor:
                    hCenterAnchorEnabled: true
                    vCenterAnchorEnabled: true
                SizePolicy:
                    horizontalPolicy: "FixedSize"
                    horizontalValue: 23.000000
                    verticalPolicy: "FixedSize"
                    verticalValue: 23.000000
                StyleSheet:
                    styles: "~res:/UI/Screens3/Color.style;~res:/UI/Screens3/Lobby/Inventory/TankProgress/TankRankSmall.style"
            children:
            -   class: "UIControl"
                name: "RankShadow"
                input: false
                classes: "grade-color=white-wild-sand-bg"
                components:
                    Background:
                        drawType: "DRAW_SCALE_PROPORTIONAL"
                        sprite: "~res:/Gfx/Shared/backgrounds/rank_shadow"
                    SizePolicy:
                        horizontalPolicy: "PercentOfParent"
                        verticalPolicy: "PercentOfParent"
        -   class: "UIControl"
            name: "Rank"
            input: false
            classes: "t-child bold"
            components:
                UITextComponent:
                    text: "10"
                UIShadowComponent:
                    radius: 3
                    color: [0.000000, 0.000000, 0.152941, 0.700000]
                    canBeDelayed: true
                Anchor:
                    hCenterAnchorEnabled: true
                    vCenterAnchorEnabled: true
                    vCenterAnchor: -1.000000
                SizePolicy:
                    horizontalPolicy: "PercentOfContent"
                    verticalPolicy: "PercentOfContent"
                StyleSheet:
                    styles: "~res:/UI/Screens/Battle/Styles/HUDLayerUITeamPanelStyles.style;~res:/UI/Screens3/Font.style"
    -   class: "UIControl"
        name: "spacer"
        visible: true
        input: false
        components:
            SizePolicy:
                horizontalPolicy: "FixedSize"
                horizontalValue: 8.000000
                verticalPolicy: "PercentOfParent"
    -   class: "UIControl"
        name: "tank-icon"
        input: false
        components:
            Background:
                sprite: "~res:/Gfx/UI/BattleScreenHUD/SmallTankIcons/_default"
                align: ["LEFT", "VCENTER"]
            Anchor:
                vCenterAnchorEnabled: true
            SizePolicy:
                horizontalPolicy: "FixedSize"
                horizontalValue: 78.000000
                verticalPolicy: "PercentOfContent"
        children:
        -   class: "UIControl"
            name: "tank-level"
            size: [76.000000, 15.000000]
            input: false
            components:
                Background:
                    sprite: "~res:/Gfx/UI/BattleScreenHUD/Levels"
                    perPixelAccuracy: "PER_PIXEL_ACCURACY_ENABLED"
                SizePolicy:
                    horizontalPolicy: "FixedSize"
                    horizontalValue: 76.000000
        -   prototype: "GunMarkIconForBattle/GunMarksWrapper"
            name: "GunMarksWrapper"
            classes: "gun-marks gun-marks-level=none"
            components:
                Anchor:
                    rightAnchorEnabled: true
                    vCenterAnchorEnabled: true
-   class: "UIControl"
    name: "table-cell-empty"
    size: [450.000000, 40.000000]
    input: false
    refreshStylesOnInteract: false
    components:
        Background:
            drawType: "DRAW_FILL"
            color: [0.000000, 0.000000, 0.000000, 1.000000]
        UIOpacityComponent:
            opacity: 0.500000
        SizePolicy:
            horizontalPolicy: "PercentOfParent"
            verticalPolicy: "FixedSize"
            verticalValue: 48.000000
        StyleSheet:
            styles: "~res:/UI/Screens/Battle/Styles/BattleLoadingScreenStyles.style"
-   class: "UIControl"
    name: "battle-info"
    input: false
    components:
        SizePolicy:
            horizontalPolicy: "Formula"
            horizontalFormula: "lastChild + 8"
            verticalPolicy: "FixedSize"
            verticalValue: 16.000000
    children:
    -   class: "UIControl"
        name: "bg"
        input: false
        classes: "grey-shark-bg"
        refreshStylesOnInteract: false
        components:
            Background: {}
            UIOpacityComponent:
                opacity: 0.700000
            SizePolicy:
                horizontalPolicy: "PercentOfParent"
                verticalPolicy: "PercentOfParent"
            StyleSheet:
                styles: "~res:/UI/Screens3/Color.style"
    -   class: "UIControl"
        name: "value"
        input: false
        classes: "t-baby bold white-1000-text"
        refreshStylesOnInteract: false
        components:
            UITextComponent: {}
            Anchor:
                hCenterAnchorEnabled: true
                vCenterAnchorEnabled: true
            SizePolicy:
                horizontalPolicy: "PercentOfContent"
                verticalPolicy: "PercentOfContent"
            StyleSheet:
                styles: "~res:/UI/Screens3/Font.style"
-   class: "UIControl"
    name: "battle-loading-screen"
    size: [960.000000, 640.000000]
    input: false
    refreshStylesOnInteract: false
    components:
        SizePolicy:
            horizontalPolicy: "FixedSize"
            verticalPolicy: "FixedSize"
        UIDataParamsComponent:
            params:
            - ["bool", "isTournament", "false", "true"]
            - ["eGameMode", "gameMode", "eGameMode.Regular", "eGameMode.Lunar"]
            - ["eArenaGameplayType", "gameType", "eArenaGameplayType.unknown", "eArenaGameplayType.supremacy"]
            - ["BattleLoadingViewModel", "model", "{ \"leftTeamCount\" = 0; \"rightTeamCount\" = 0; }", "{ \"leftTeamCount\" = 7; \"rightTeamCount\" = 7; }"]
        UIDataLocalVarsComponent:
            data:
            - ["string", "gameModeIconSprite", "str(gameMode, eGameMode, \"iconSprite\")"]
            - ["string", "gameModeText", "when gameMode == eGameMode.Regular -> \"ratingBattles/battleType/regular\", gameMode == eGameMode.Training -> \"#battle_results:TrainingRoom/ScreenName\", gameMode == eGameMode.Tutorial -> \"battleResults/Footer/Tutorial\", gameMode == eGameMode.NewbieTutorialNeo -> \"battleResults/Footer/Tutorial\", gameMode == eGameMode.Rating -> \"ratingBattles/battleType/rating\", gameMode == eGameMode.Arcade -> \"madGamesEvent/battleType/madGames\", gameMode == eGameMode.Scuffle -> \"battleType/ScuffleBattle\", gameMode == eGameMode.HellGames -> \"hangar/battleType/hellgamesHeader\", gameMode == eGameMode.Lunar -> \"hangar/battleType/moonFightHeader\", gameMode == eGameMode.NanoMaps -> \"hangar/battleType/nanomapsHeader\", gameMode == eGameMode.Vampiric -> \"hangar/battleType/vampiricHeader\", gameMode == eGameMode.BossMode -> \"hangar/battleType/bossmodeHeader\", gameMode == eGameMode.Gravitizing -> \"hangar/battleType/gravitizingHeader\", gameMode == eGameMode.TenToTen -> \"hangar/battleType/tentotenHeader\", gameMode == eGameMode.BattleRoyale -> \"battleType/battle-royale\", \"\""]
            - ["string", "gameTypeText", "when gameType == eArenaGameplayType.domination -> \"battleType/EncounterBattle\", gameType == eArenaGameplayType.supremacy -> \"#arenas:type/supremacy/name\", \"\""]
            - ["string", "missionText", "when gameMode == eGameMode.Vampiric or gameMode == eGameMode.BattleRoyale -> \"#arenas:type/noBase/description\", gameType == eArenaGameplayType.supremacy -> (when gameMode == eGameMode.BossMode -> \"#arenas:type/bossmode/description\", \"#arenas:type/supremacy/description\"), \"COMBAT_MISSION\""]
    bindings:
    - ["SizePolicy.horizontalValue", "screenWidth"]
    - ["SizePolicy.verticalValue", "screenHeight"]
    children:
    -   class: "UIControl"
        name: "LevelImage"
        pivot: [0.500000, 0.500000]
        input: false
        components:
            Background:
                drawType: "DRAW_SCALE_PROPORTIONAL_ONE"
            Anchor:
                hCenterAnchorEnabled: true
                vCenterAnchorEnabled: true
            SizePolicy:
                horizontalPolicy: "PercentOfParent"
                verticalPolicy: "PercentOfParent"
    -   class: "UIControl"
        name: "Fade"
        input: false
        components:
            SizePolicy:
                horizontalPolicy: "PercentOfParent"
                verticalPolicy: "PercentOfParent"
        children:
        -   class: "UIControl"
            name: "FadeQuarterTopLeft"
            input: false
            components:
                Background:
                    drawType: "DRAW_SCALE_TO_RECT"
                    sprite: "~res:/Gfx/Lobby/backgrounds/bg_radial-gradient_quarter"
                    spriteModification: ["FLIP_HORIZONTAL", "FLIP_VERTICAL"]
                    color: [0.000000, 0.000000, 0.000000, 0.470588]
                Anchor:
                    leftAnchorEnabled: true
                    topAnchorEnabled: true
                SizePolicy:
                    horizontalPolicy: "PercentOfParent"
                    horizontalValue: 50.000000
                    verticalPolicy: "PercentOfParent"
                    verticalValue: 50.000000
        -   class: "UIControl"
            name: "FadeTopLeft"
            input: false
            components:
                Background:
                    drawType: "DRAW_SCALE_TO_RECT"
                    sprite: "~res:/Gfx/Lobby/backgrounds/bg_radial-gradient_quarter"
                    spriteModification: ["FLIP_HORIZONTAL"]
                    color: [0.000000, 0.000000, 0.000000, 0.470588]
                Anchor:
                    leftAnchorEnabled: true
                    topAnchorEnabled: true
                SizePolicy:
                    horizontalPolicy: "PercentOfParent"
                    horizontalValue: 50.000000
                    verticalPolicy: "PercentOfParent"
                    verticalValue: 32.000000
        -   class: "UIControl"
            name: "FadeQuarterTopRight"
            input: false
            components:
                Background:
                    drawType: "DRAW_SCALE_TO_RECT"
                    sprite: "~res:/Gfx/Lobby/backgrounds/bg_radial-gradient_quarter"
                    spriteModification: ["FLIP_VERTICAL"]
                    color: [0.000000, 0.000000, 0.000000, 0.470588]
                Anchor:
                    rightAnchorEnabled: true
                    topAnchorEnabled: true
                SizePolicy:
                    horizontalPolicy: "PercentOfParent"
                    horizontalValue: 50.000000
                    verticalPolicy: "PercentOfParent"
                    verticalValue: 50.000000
        -   class: "UIControl"
            name: "FadeTopRight"
            input: false
            components:
                Background:
                    drawType: "DRAW_SCALE_TO_RECT"
                    sprite: "~res:/Gfx/Lobby/backgrounds/bg_radial-gradient_quarter"
                    color: [0.000000, 0.000000, 0.000000, 0.470588]
                Anchor:
                    rightAnchorEnabled: true
                    topAnchorEnabled: true
                SizePolicy:
                    horizontalPolicy: "PercentOfParent"
                    horizontalValue: 50.000000
                    verticalPolicy: "PercentOfParent"
                    verticalValue: 32.000000
        -   class: "UIControl"
            name: "FadeQuarterBottomLeft"
            input: false
            components:
                Background:
                    drawType: "DRAW_SCALE_TO_RECT"
                    sprite: "~res:/Gfx/Lobby/backgrounds/bg_radial-gradient_quarter"
                    spriteModification: ["FLIP_HORIZONTAL"]
                    color: [0.000000, 0.000000, 0.000000, 0.470588]
                Anchor:
                    leftAnchorEnabled: true
                    bottomAnchorEnabled: true
                SizePolicy:
                    horizontalPolicy: "PercentOfParent"
                    horizontalValue: 50.000000
                    verticalPolicy: "PercentOfParent"
                    verticalValue: 50.000000
        -   class: "UIControl"
            name: "FadeQuarterBottomRight"
            input: false
            components:
                Background:
                    drawType: "DRAW_SCALE_TO_RECT"
                    sprite: "~res:/Gfx/Lobby/backgrounds/bg_radial-gradient_quarter"
                    color: [0.000000, 0.000000, 0.000000, 0.470588]
                Anchor:
                    rightAnchorEnabled: true
                    bottomAnchorEnabled: true
                SizePolicy:
                    horizontalPolicy: "PercentOfParent"
                    horizontalValue: 50.000000
                    verticalPolicy: "PercentOfParent"
                    verticalValue: 50.000000
    -   class: "UIControl"
        name: "content"
        position: [360.000000, 0.000000]
        input: false
        components:
            Anchor:
                hCenterAnchorEnabled: true
                vCenterAnchorEnabled: true
            LinearLayout:
                orientation: "TopDown"
                dynamicPadding: true
                dynamicSpacing: true
            SizePolicy:
                horizontalPolicy: "Formula"
                horizontalFormula: "min (1200, parent - 60)"
                verticalPolicy: "PercentOfParent"
        children:
        -   class: "UIControl"
            name: "header"
            input: false
            components:
                LinearLayout:
                    orientation: "TopDown"
                    spacing: 4.000000
                SizePolicy:
                    horizontalPolicy: "PercentOfParent"
                    verticalPolicy: "PercentOfChildrenSum"
            children:
            -   class: "UIControl"
                name: "map-logo"
                input: false
                components:
                    Background:
                        drawType: "DRAW_SCALE_PROPORTIONAL"
                        perPixelAccuracy: "PER_PIXEL_ACCURACY_ENABLED"
                    Anchor:
                        hCenterAnchorEnabled: true
                    SizePolicy:
                        horizontalPolicy: "FixedSize"
                        horizontalValue: 80.000000
                        verticalPolicy: "FixedSize"
                        verticalValue: 80.000000
                bindings:
                - ["visible", "when gameMode == eGameMode.TenToTen -> (when screenHeight >= 900 -> true, false), true"]
                - ["Background.sprite", "gameModeIconSprite"]
            -   class: "UIControl"
                name: "map-name"
                input: false
                classes: "t-title bold white-1000-text"
                refreshStylesOnInteract: false
                components:
                    UITextComponent:
                        text: "Map Name"
                    Anchor:
                        hCenterAnchorEnabled: true
                    SizePolicy:
                        horizontalPolicy: "PercentOfContent"
                        verticalPolicy: "PercentOfContent"
                    StyleSheet:
                        styles: "~res:/UI/Screens3/Font.style"
            -   class: "UIControl"
                name: "battle-type-container"
                input: false
                components:
                    Anchor:
                        hCenterAnchorEnabled: true
                    LinearLayout:
                        spacing: 4.000000
                    SizePolicy:
                        horizontalPolicy: "PercentOfChildrenSum"
                        verticalPolicy: "PercentOfMaxChild"
                children:
                -   prototype: "battle-info"
                    name: "TournamentNote"
                    components:
                        Anchor:
                            hCenterAnchorEnabled: true
                    bindings:
                    - ["visible", "isTournament"]
                    children:
                    -   path: "value"
                        position: [4.000000, 0.000000]
                        components:
                            UITextComponent: {}
                        bindings:
                        - ["UITextComponent.text", "capitalize(localize(\"battleResults/Footer/Tournament\"))"]
                -   prototype: "battle-info"
                    name: "GameMode"
                    bindings:
                    - ["visible", "not (gameMode == eGameMode.Tournament) and not (gameMode == eGameMode.Clan)"]
                    children:
                    -   path: "value"
                        position: [4.000000, 0.000000]
                        components:
                            UITextComponent: {}
                        bindings:
                        - ["UITextComponent.text", "capitalize(localize(gameModeText))"]
                -   prototype: "battle-info"
                    name: "GameType"
                    bindings:
                    - ["visible", "gameMode != eGameMode.BattleRoyale and (gameType == eArenaGameplayType.domination or gameType == eArenaGameplayType.supremacy)"]
                    children:
                    -   path: "value"
                        components:
                            UITextComponent: {}
                        bindings:
                        - ["UITextComponent.text", "capitalize(localize(gameTypeText))"]
        -   class: "UIControl"
            name: "table"
            input: false
            components:
                Anchor:
                    hCenterAnchorEnabled: true
                LinearLayout:
                    orientation: "TopDown"
                    skipInvisible: false
                SizePolicy:
                    horizontalPolicy: "Formula"
                    horizontalFormula: "when gameMode == eGameMode.BattleRoyale -> 770, parent"
                    verticalPolicy: "PercentOfChildrenSum"
            bindings:
            - ["LinearLayout.spacing", "when gameMode != eGameMode.BattleRoyale -> 4, 16"]
            children:
            -   class: "UIControl"
                name: "table-header"
                input: false
                components:
                    LinearLayout:
                        spacing: 3.000000
                    SizePolicy:
                        horizontalPolicy: "PercentOfParent"
                        verticalPolicy: "FixedSize"
                        verticalValue: 28.000000
                children:
                -   class: "UIControl"
                    name: "Left"
                    input: false
                    components:
                        SizePolicy:
                            horizontalPolicy: "PercentOfParent"
                            verticalPolicy: "FixedSize"
                            verticalValue: 28.000000
                    children:
                    -   class: "UIControl"
                        name: "bg"
                        input: false
                        classes: "lime-600-bg"
                        components:
                            Background:
                                drawType: "DRAW_STRETCH_HORIZONTAL"
                                sprite: "~res:/Gfx/UI/BattleLoadingScreen/bg_teams-ears_r6"
                                leftRightStretchCap: 6.000000
                            SizePolicy:
                                horizontalPolicy: "PercentOfParent"
                                verticalPolicy: "FixedSize"
                                verticalValue: 28.000000
                            StyleSheet:
                                styles: "~res:/UI/Screens3/Color.style"
                        bindings:
                        - ["visible", "gameMode != eGameMode.BattleRoyale"]
                    -   class: "UIControl"
                        name: "title-left"
                        input: false
                        classes: "t-body bold white-1000-text"
                        components:
                            UITextComponent:
                                text: "#battle_results:TeamEffectiveness/MyTeam"
                            Anchor:
                                leftAnchorEnabled: true
                                leftAnchor: 73.000000
                                vCenterAnchorEnabled: true
                            SizePolicy:
                                horizontalPolicy: "PercentOfContent"
                                verticalPolicy: "PercentOfContent"
                            StyleSheet:
                                styles: "~res:/UI/Screens3/Font.style"
                        bindings:
                        - ["visible", "gameMode != eGameMode.BattleRoyale"]
                    -   class: "UIControl"
                        name: "Gradient"
                        input: false
                        components:
                            Background:
                                drawType: "DRAW_FILL"
                            UIGradientComponent:
                                finishColor: [1.000000, 1.000000, 1.000000, 0.000000]
                                orientation: "RightToLeft"
                            Anchor:
                                rightAnchorEnabled: true
                                rightAnchor: 12.000000
                                vCenterAnchorEnabled: true
                            SizePolicy:
                                horizontalPolicy: "FixedSize"
                                horizontalValue: 320.000000
                                verticalPolicy: "FixedSize"
                                verticalValue: 1.000000
                        bindings:
                        - ["visible", "gameMode == eGameMode.BattleRoyale"]
