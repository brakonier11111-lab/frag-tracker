Header:
    version: 142
ImportedPackages:
- "~res:/UI/Screens3/Battle/BattleHints/Debug/DebugInfoBlock.yaml"
Prototypes:
-   class: "UIControl"
    name: "BattleHintsDebugInfo"
    input: false
    classes: "grey-shark-90-bg"
    components:
        Background: {}
        UIOpacityComponent:
            opacity: 0.800000
        Anchor:
            leftAnchorEnabled: true
            leftAnchor: 100.000000
            vCenterAnchorEnabled: true
        LinearLayout:
            padding: "30; 10"
            spacing: 20.000000
        SizePolicy:
            horizontalPolicy: "PercentOfChildrenSum"
            verticalPolicy: "PercentOfMaxChild"
        UIDataParamsComponent:
            params:
            - ["BattleHintsDebugInfo", "info", "{ }", "{ }"]
        StyleSheet:
            styles: "~res:/UI/Screens3/Color.style"
    children:
    -   class: "UIControl"
        name: "LeftPart"
        size: [32.000000, 32.000000]
        input: false
        components:
            LinearLayout:
                orientation: "TopDown"
                padding: "16"
                spacing: 16.000000
            SizePolicy:
                horizontalPolicy: "PercentOfMaxChild"
                verticalPolicy: "PercentOfChildrenSum"
        children:
        -   class: "UIControl"
            name: "Title"
            size: [200.000000, 20.000000]
            input: false
            classes: "t-subtitle bold white-wild-sand-text align-left"
            components:
                UITextComponent:
                    text: "Game stats"
                StyleSheet:
                    styles: "~res:/UI/Screens3/Font.style"
        -   prototype: "DebugInfoBlock/DebugInfoBlock"
            name: "GeneralInfo"
            position: [0.000000, 52.000000]
            components:
                UIDataParamsComponent:
                    args:
                        "values": "{ \"SniperMode\" = int(info.inSniperMode); \"HangInSniperMode\" = int(info.hangInSniperMode); \"Tutorial\" = int(info.isTutorial); \"Discovered\" = int(info.isDiscovered); \"Burning\" = int(info.isBurning); \"Alive\" = int(info.isAlive);}"
        -   prototype: "DebugInfoBlock/DebugInfoBlock"
            name: "AimInfo"
            components:
                UIDataParamsComponent:
                    args:
                        "values": "{ \"aimVehicle\" = info.aimVehicle; \"aimOnEnemy\" = int(info.aimOnEnemy); \"longTimeNoAimOnEnemy\" = int(info.longTimeNoAimOnEnemy); }"
        -   prototype: "DebugInfoBlock/DebugInfoBlock"
            name: "BattlesInfo"
            components:
                UIDataParamsComponent:
                    args:
                        "values": "{ \"totalBattlesCount\" = info.totalBattlesCount; \"dossierBattlesCount\" = info.dossierBattlesCount; }"
        -   prototype: "DebugInfoBlock/DebugInfoBlock"
            name: "HitsInfo"
            components:
                UIDataParamsComponent:
                    args:
                        "values": "{ \"ricochetSeriesCount\" = info.ricochetSeriesCount; \"notPiercedSeriesCount\" = info.notPiercedSeriesCount; \"ricochetTotal\" = info.ricochetTotal; \"notPiercedTotal\" = info.notPiercedTotal; \"arcadeModeMisses\" = info.arcadeModeMisses; \"arcadeModeMissesTotal\" = info.arcadeModeMissesTotal; \"playerArmorProtectionsCount\" = info.playerArmorProtectionsCount; }"
    -   class: "UIControl"
        name: "RightPart"
        size: [32.000000, 32.000000]
        input: false
        components:
            Anchor:
                leftAnchorEnabled: true
                leftAnchor: 20.000000
            LinearLayout:
                orientation: "TopDown"
                padding: "16"
                spacing: 16.000000
            SizePolicy:
                horizontalPolicy: "PercentOfMaxChild"
                verticalPolicy: "PercentOfChildrenSum"
        children:
        -   class: "UIControl"
            name: "Title"
            size: [200.000000, 20.000000]
            input: false
            classes: "t-subtitle bold white-wild-sand-text align-left"
            components:
                UITextComponent:
                    text: "Hints"
                StyleSheet:
                    styles: "~res:/UI/Screens3/Font.style"
        -   prototype: "DebugInfoBlock/DebugInfoBlock"
            name: "HintsShowCounts"
            components:
                UIDataParamsComponent:
                    args:
                        "values": "info.hintsShowCount"
