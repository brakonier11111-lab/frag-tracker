            horizontalPolicy: "PercentOfParent"
            verticalPolicy: "PercentOfParent"
    children:
    -   class: "UIControl"
        name: "Bg"
        input: false
        components:
            Background:
                sprite: "~res:/Gfx/Lobby/backgrounds/back_gunmark"
                perPixelAccuracy: "PER_PIXEL_ACCURACY_ENABLED"
            Anchor:
                leftAnchorEnabled: true
                topAnchorEnabled: true
                topAnchor: -80.000000
            IgnoreLayout: {}
            SizePolicy:
                horizontalPolicy: "PercentOfContent"
                verticalPolicy: "PercentOfContent"
    -   class: "UIControl"
        name: "MainContentHolder"
        input: false
        components:
            UIOpacityComponent:
                opacity: 1.000000
            SizePolicy:
                horizontalPolicy: "PercentOfParent"
                verticalPolicy: "PercentOfParent"
            UIChildComponent0:
                childType: "kControl"
                condition: "isMainContent"
                control: "MainContent"
    -   class: "UIControl"
        name: "InfoContentHolder"
        input: false
        components:
            UIOpacityComponent:
                opacity: 0.000000
            SizePolicy:
                horizontalPolicy: "PercentOfParent"
                verticalPolicy: "PercentOfParent"
            UIChildComponent0:
                childType: "kControl"
                condition: "not isMainContent"
                control: "InfoContent"
