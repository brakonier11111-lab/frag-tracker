Prototypes:
-   class: "UIControl"
    name: "GunMarkOverlay"
    size: [1024.000000, 768.000000]
    input: false
    components:
        SizePolicy:
            horizontalPolicy: "PercentOfParent"
            verticalPolicy: "PercentOfParent"
        UIDataParamsComponent:
            params:
            - ["int", "topPercentile", "0", "25"]
            - ["bool", "animateInfoIcon", "true", "true"]
            events:
            - "BACK_EVENT"
        UIDataLocalVarsComponent:
            data:
            - ["bool", "isMainContent", "true"]
        UIChildComponent0:
            prototypePath: "~res:/UI/Screens3/Lobby/Common/Overlay/OverlayBasic.yaml"
            args:
                "closeButtonIcon": "when isMainContent -> \"~res:/Gfx/Lobby/icons/icon_cross_m\", \"~res:/Gfx/Lobby/icons/icon_arrow-back\""
                "contentHeight": "576"
                "rightCornerContent": "when isMainContent -> RightCornerContent, null"
                "hasCustomBg": "true"
                "wasPushed": "true"
                "content": "Content"
                "manualCloseEnabled": "false"
                "customCloseEventEnabled": "true"
            eventActions:
            - ["OnCustomClose", "OnButtonClose", ""]
            - ["KEY_CLOSE_REQUESTED", "OnButtonClose", ""]
            - ["BACK_EVENT", "BACK_EVENT", ""]
        UIActionComponent:
            actionsPath: "~res:/UI/Screens3/Lobby/GunMark/GunMarkOverlay.actions"
Slots:
-   class: "UIControl"
    name: "RightCornerContent"
    input: false
    components:
        Anchor:
            rightAnchorEnabled: true
            topAnchorEnabled: true
            topAnchor: 16.000000
        SizePolicy:
            horizontalPolicy: "FixedSize"
            horizontalValue: 48.000000
            verticalPolicy: "FixedSize"
            verticalValue: 48.000000
    children:
    -   prototype: "InfoIcon/InfoIcon"
        name: "InfoIcon"
        components:
            UIDataParamsComponent:
                args:
                    "animate": "animateInfoIcon"
                eventActions:
                - ["ON_CLICK_BUTTON", "MoreInfoClick", ""]
-   class: "UIControl"
    name: "Content"
    size: [960.000000, 496.000000]
