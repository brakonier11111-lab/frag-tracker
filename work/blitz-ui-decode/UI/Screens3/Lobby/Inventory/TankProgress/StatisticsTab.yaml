                                            "name": "localize(\"#achievementScreen:Stats/WasDestroyed\")"
                                            "valueStyle": "\"t-child bold white-500-text\""
                                            "value": "when not isNull(dossier) -> str1000Separated(dossier.battlesCount - dossier.survivedBattles), \"\""
