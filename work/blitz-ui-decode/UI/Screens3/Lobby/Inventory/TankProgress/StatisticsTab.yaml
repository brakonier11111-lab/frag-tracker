Header:
    version: 168
Prototypes:
-   class: "UIControl"
    name: "StatisticsTab"
    size: [872.000000, 592.000000]
    input: false
    components:
        LinearLayout:
            orientation: "TopDown"
        SizePolicy:
            horizontalPolicy: "PercentOfParent"
            verticalPolicy: "PercentOfParent"
        UIDataParamsComponent:
            params:
            - ["VehicleDossier", "dossier", "null", "{ \"gunMarks\" = { \"isAvailable\" = true; \"topPercentile\" = 10; \"currentAverageDamage\" = 1589; \"requiredAverageDamage\" = 4609; }; }"]
            events:
            - "OnGunMarkAverageDamageInfoClicked"
            - "OnGunMarkInfoClicked(int topPercentile)"
    children:
    -   class: "UIScrollView"
        name: "ScrollArea"
        autoUpdate: true
        centerContent: true
        components:
            SizePolicy:
                horizontalPolicy: "PercentOfParent"
                verticalPolicy: "PercentOfParent"
        children:
        -   class: "UIScrollViewContainer"
            name: "scrollContainerControl"
            scrollDirection: "kVertical"
            components:
                SizePolicy:
                    horizontalPolicy: "PercentOfParent"
                    verticalPolicy: "PercentOfFirstChild"
            children:
            -   class: "UIControl"
                name: "Content"
                input: false
                components:
                    LinearLayout:
                        orientation: "TopDown"
                        padding: "0; 35"
                    SizePolicy:
                        horizontalPolicy: "PercentOfParent"
                        verticalPolicy: "PercentOfChildrenSum"
                children:
                -   class: "UIControl"
                    name: "TankStatWrapper"
                    input: false
                    components:
                        Anchor:
                            hCenterAnchorEnabled: true
                        LinearLayout:
                            orientation: "TopDown"
                            padding: "12; 24"
                        SizePolicy:
                            horizontalPolicy: "PercentOfParent"
                            verticalPolicy: "PercentOfMaxChild"
                    children:
                    -   class: "UIControl"
                        name: "TankStatPanel"
                        size: [800.000000, 116.000000]
                        input: false
                        components:
                            Background: {}
                            Anchor:
                                hCenterAnchorEnabled: true
                            LinearLayout:
                                spacing: 24.000000
                            SizePolicy:
                                horizontalPolicy: "PercentOfChildrenSum"
                                verticalPolicy: "PercentOfMaxChild"
                        children:
                        -   class: "UIControl"
                            name: "BattlesCount"
                            input: false
                            components:
                                SizePolicy:
                                    horizontalPolicy: "PercentOfChildrenSum"
                                    verticalPolicy: "PercentOfChildrenSum"
                                UIChildComponent0:
                                    prototypePath: "~res:/UI/Screens3/Lobby/Profile/Common/Statistic/StatsLogo.yaml"
                                    args:
                                        "iconPath": "\"~res:/Gfx/Lobby/icons/profile-widget/icon_fights_l\""
                                        "label": "localize(\"profile/Brief/TotalBattles\")"
                                        "stat": "when not isNull(dossier) -> (str1000Separated(dossier.battlesCount + dossier.ratingBattlesCount + dossier.tournamentBattlesCount + dossier.supremacyBattlesCount)), \"\""
                        -   class: "UIControl"
                            name: "Wins"
                            input: false
                            components:
                                SizePolicy:
                                    horizontalPolicy: "PercentOfChildrenSum"
                                    verticalPolicy: "PercentOfChildrenSum"
                                UIChildComponent0:
                                    prototypePath: "~res:/UI/Screens3/Lobby/Profile/Common/Statistic/StatsLogo.yaml"
                                    args:
                                        "valueColor": "when not isNull(dossier) and dossier.winsRate >= 70.000000 -> \"purple-lite-old-text\", not isNull(dossier) and dossier.winsRate >= 60.000000 -> \"blue-old-text\", not isNull(dossier) and dossier.winsRate >= 50.000000 -> \"green-old-text\", \"white-wild-sand-text\""
                                        "iconPath": "\"~res:/Gfx/Lobby/icons/profile-widget/icon_victory_l\""
                                        "label": "localize(\"profile/Brief/TotalVictories\")"
                                        "stat": "when not isNull(dossier) -> percent(dossier.winsRate, 2), \"\""
                        -   class: "UIControl"
                            name: "AvgDamage"
                            position: [408.000000, 0.000000]
                            input: false
                            components:
                                SizePolicy:
                                    horizontalPolicy: "PercentOfChildrenSum"
                                    verticalPolicy: "PercentOfChildrenSum"
                                UIChildComponent0:
                                    prototypePath: "~res:/UI/Screens3/Lobby/Profile/Common/Statistic/StatsLogo.yaml"
