                                            "value": "when not isNull(dossier) -> (str(when dossier.battlesCount - dossier.survivedBattles > 0 -> float(dossier.frags) / float(dossier.battlesCount - dossier.survivedBattles), float(dossier.frags), 2)), \"\""
