<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- OBS: задайте источнику Браузер нужный размер сразу, без растягивания -->
    <title>Параметр от донатов — ср. урон</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: geometricPrecision;
            image-rendering: -webkit-optimize-contrast;
        }
        html, body {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            min-width: 100vw;
            overflow: hidden;
        }
        body {
            font-family: 'Exo 2', sans-serif;
            background: transparent;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .widget-scale-wrapper {
            transform-origin: center;
            transform: scale(var(--widget-scale, 1));
            flex-shrink: 0;
        }
        .widget {
            text-align: center;
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform: translateZ(0);
            backface-visibility: hidden;
        }
        .widget-header {
            font-size: clamp(1rem, 5vmin, 1.8rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #fff;
            margin-bottom: clamp(8px, 2.4vmin, 20px);
            text-shadow: 0 0 20px rgba(255, 60, 80, 0.8), 0 2px 0 rgba(0,0,0,0.5);
        }
        .widget-window {
            background: linear-gradient(160deg, rgba(10,10,15, var(--widget-bg-opacity, 1)) 0%, rgba(18,18,26, var(--widget-bg-opacity, 1)) 50%, rgba(12,12,18, var(--widget-bg-opacity, 1)) 100%);
            border: 2px solid rgba(255, 60, 80, 0.5);
            border-radius: 4px;
            padding: clamp(16px, 6vmin, 36px) clamp(20px, 6vmin, 32px);
            box-shadow:
                0 0 30px rgba(255, 60, 80, 0.25),
                inset 0 0 40px rgba(0,0,0,0.5),
                0 4px 0 rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
            width: 100%;
        }
        .widget-window::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, rgba(255, 60, 80, 0.9), transparent);
        }
        .goal-text {
            font-size: clamp(1rem, 4.4vmin, 1.76rem);
            font-weight: 700;
            color: rgba(255,255,255,0.95);
            margin-bottom: clamp(8px, 2.4vmin, 20px);
            line-height: 1.3;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .value-box {
            background: rgba(0,0,0,0.65);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 4px;
            padding: clamp(10px, 3.5vmin, 20px) clamp(20px, 5vmin, 32px);
            margin-bottom: clamp(12px, 3vmin, 24px);
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
            transition: transform 0.15s ease, filter 0.15s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(2px, 0.8vmin, 6px);
        }
        .value {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 8vmin, 4.2rem);
            font-weight: 900;
            line-height: 1.1;
            transition: color 0.25s ease, text-shadow 0.25s ease;
            letter-spacing: 0;
            white-space: nowrap;
            display: flex;
            justify-content: center;
            align-items: baseline;
            width: 90%;
            margin-left: auto;
            margin-right: auto;
            gap: 0;
        }
        .value .value-inner {
            display: inline-block;
            min-width: 5ch;
            max-width: 100%;
            text-align: center;
        }
        .value.value-green {
            color: #00ff47;
            text-shadow: 0 0 17px rgba(0, 255, 71, 0.63), 0 0 35px rgba(0, 255, 71, 0.28);
        }
        .value.value-blue {
            color: #00aaff;
            text-shadow: 0 0 17px rgba(0, 170, 255, 0.63), 0 0 35px rgba(0, 170, 255, 0.28);
        }
        .value.value-purple {
            color: #d066ff;
            text-shadow: 0 0 17px rgba(208, 102, 255, 0.63), 0 0 35px rgba(208, 102, 255, 0.28);
        }
        .value.value-default {
            color: #ff4444;
            text-shadow: 0 0 17px rgba(255, 68, 68, 0.63), 0 0 35px rgba(255, 68, 68, 0.28);
        }
        .value.value-at-cap {
            color: #e040ff;
            text-shadow: 0 0 21px rgba(224, 64, 255, 0.67), 0 0 42px rgba(224, 64, 255, 0.35);
        }
        .value-box.cap-pulse {
            animation: capPulse 0.5s ease-out;
        }
        @keyframes capPulse {
            0% {
                transform: scale(1);
                filter: brightness(1);
                box-shadow: inset 0 2px 8px rgba(0,0,0,0.5), 0 0 0 0 rgba(255, 60, 80, 0);
                border-color: rgba(255,255,255,0.15);
            }
            25% {
                transform: scale(1.08);
                filter: brightness(1.3);
                box-shadow: inset 0 2px 8px rgba(0,0,0,0.5), 0 0 40px 8px rgba(255, 50, 50, 0.7), 0 0 80px 4px rgba(255, 80, 80, 0.4);
                border-color: rgba(255, 80, 80, 0.9);
            }
            100% {
                transform: scale(1);
                filter: brightness(1);
                box-shadow: inset 0 2px 8px rgba(0,0,0,0.5), 0 0 0 0 rgba(255, 60, 80, 0);
                border-color: rgba(255,255,255,0.15);
            }
        }
        .value .unit-inline {
            font-size: 1em;
            font-weight: 900;
            color: inherit;
            text-shadow: inherit;
            vertical-align: baseline;
        }
        .value .value-number {
            display: inline;
            vertical-align: baseline;
        }
        .value .value-number-session,
        .value .value-slash-session {
            font-size: 0.66em;
            opacity: 0.9;
            vertical-align: baseline;
            white-space: nowrap;
        }
        .value .value-number-session {
            margin-right: 0.01em;
        }
        .value .value-slash-session {
            margin-right: 0.01em;
            color: rgba(255,255,255,0.8);
            text-shadow: 0 0 8px rgba(0,0,0,0.7);
        }
        .value-number-session.session-green {
            color: #00ff47;
            text-shadow: 0 0 17px rgba(0, 255, 71, 0.63), 0 0 35px rgba(0, 255, 71, 0.28);
        }
        .value-number-session.session-blue {
            color: #00aaff;
            text-shadow: 0 0 17px rgba(0, 170, 255, 0.63), 0 0 35px rgba(0, 170, 255, 0.28);
        }
        .value-number-session.session-purple {
            color: #d066ff;
            text-shadow: 0 0 17px rgba(208, 102, 255, 0.63), 0 0 35px rgba(208, 102, 255, 0.28);
        }
        .value-number-session.session-default {
            color: #ff4444;
            text-shadow: 0 0 17px rgba(255, 68, 68, 0.63), 0 0 35px rgba(255, 68, 68, 0.28);
        }
        .target-label {
            margin-top: clamp(0px, 0.4vmin, 4px);
            font-size: clamp(0.7rem, 2vmin, 1.0rem);
            font-weight: 600;
            color: rgba(255,255,255,0.8);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            width: 90%;
            margin-left: auto;
            margin-right: auto;
            white-space: nowrap;
        }
        .info-block {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: clamp(8px, 3vmin, 16px) clamp(16px, 4vmin, 28px);
            margin-bottom: clamp(8px, 2.4vmin, 20px);
            font-size: clamp(1.177rem, 4.71vmin, 2rem);
            font-weight: 700;
            letter-spacing: 0.06em;
            color: rgba(255,255,255,0.65);
        }
        .info-item {
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(255, 60, 80, 0.4);
            border-radius: 2px;
            padding: clamp(8px, 3vmin, 20px) clamp(12px, 4vmin, 28px);
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.4);
        }
        .info-item .info-num {
            font-family: 'Exo 2', sans-serif;
            font-size: 1.177em;
            color: #fff;
            font-weight: 900;
            text-shadow: 0 0 12px rgba(255,255,255,0.3);
        }
        .limit-block {
            font-size: clamp(1rem, 4vmin, 1.76rem);
            font-weight: 700;
            color: rgba(255,255,255,0.7);
            padding-top: clamp(8px, 2.4vmin, 20px);
            border-top: 1px solid rgba(255,255,255,0.15);
            letter-spacing: 0.05em;
        }
        .limit-block .limit-num {
            font-family: 'Exo 2', sans-serif;
            font-size: 1.236em;
            color: #fff;
            font-weight: 900;
            text-shadow: 0 0 12px rgba(255,255,255,0.25);
        }
        .timer-block {
            font-size: clamp(1.35rem, 5.4vmin, 2.35rem);
            font-weight: 700;
            color: #e6a020;
            padding-top: clamp(6px, 1.8vmin, 14px);
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.35em;
            min-height: 1.2em;
            width: fit-content;
            max-width: 100%;
            margin-left: auto;
            margin-right: auto;
            padding-left: 4em;
            transform: translateX(-3.5%);
            box-sizing: border-box;
        }
        .timer-block .timer-label {
            flex-shrink: 0;
            width: 9ch;
            min-width: 9ch;
            display: inline-block;
            text-align: left;
            overflow: hidden;
            text-transform: uppercase;
            font-size: 0.85em;
        }
        .timer-block .timer-value {
            font-family: 'Orbitron', 'Consolas', 'Monaco', monospace;
            font-variant-numeric: tabular-nums;
            width: 9ch;
            min-width: 9ch;
            max-width: 9ch;
            flex-shrink: 0;
            text-align: left;
            display: inline-block;
            overflow: hidden;
            color: #ffb347;
            font-weight: 900;
            text-shadow: 0 0 11px rgba(255, 179, 71, 0.45), 0 0 18px rgba(230, 160, 32, 0.26);
        }
        .widget-fallback {
            margin-top: clamp(8px, 2vmin, 14px);
            width: 100%;
            background: linear-gradient(160deg, rgba(18,18,28,0.85) 0%, rgba(22,22,35,0.8) 50%, rgba(14,14,22,0.85) 100%);
            border: 1px solid rgba(255, 60, 80, 0.3);
            border-radius: 4px;
            padding: clamp(12px, 3vmin, 20px) clamp(16px, 4vmin, 24px);
            box-shadow: 0 0 16px rgba(255, 60, 80, 0.12), inset 0 0 24px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        .widget-fallback::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 60, 80, 0.5), transparent);
        }
        .widget-fallback-title {
            font-size: clamp(1.15rem, 4.37vmin, 1.725rem);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 14px rgba(255,255,255,0.4);
            letter-spacing: 0.06em;
            text-align: center;
            margin-bottom: clamp(6px, 1.5vmin, 12px);
            line-height: 1.25;
        }
        .widget-fallback-text {
            font-size: clamp(1.15rem, 4.14vmin, 1.67rem);
            font-weight: 700;
            color: rgba(255,255,255,0.9);
            line-height: 1.4;
            letter-spacing: 0.04em;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="widget-scale-wrapper" id="widgetScaleWrapper">
    <div class="widget">
        <div class="widget-header" id="widgetHeader">Цель по донатам — ср. урон</div>
        <div class="widget-window" id="widgetWindow">
            <div class="goal-text" id="goalText"></div>
            <div class="value-box" id="valueBox">
                <div class="value" id="value">
                    <span class="value-inner">
                        <span class="value-number-session" id="valueNumberSession" style="display:none;">0</span>
                        <span class="value-slash-session" id="valueSlashSession" style="display:none;">/</span>
                        <span class="value-number" id="valueNumber">—</span>
                        <span class="unit-inline" id="unitInline">урона</span>
                    </span>
                </div>
                <div class="target-label" id="targetLabel">ЦЕЛЕВОЙ СР. УРОН</div>
            </div>
            <div class="info-block">
                <div class="info-item" id="costBlock"><span class="info-num" id="costAmount">—</span><span class="info-num">р</span> → <span class="info-num">+</span><span class="info-num" id="addAmount">—</span></div>
            </div>
            <div class="limit-block" id="limitBlock">Лимит: <span class="limit-num" id="limitValue">—</span></div>
            <div class="timer-block" id="timerBlock" style="display: none;">
                <span class="timer-label">ОСТАЛОСЬ:</span>
                <span class="timer-value" id="timerValue">0:00</span>
            </div>
        </div>
        <div class="widget-fallback" id="widgetFallback" style="display: none;">
            <div class="widget-fallback-title" id="fallbackTitle"></div>
            <div class="widget-fallback-text" id="fallbackText"></div>
        </div>
    </div>
    </div>
    <script>
        (function() {
            const goalEl = document.getElementById('goalText');
            const valueEl = document.getElementById('value');
            const valueNumberEl = document.getElementById('valueNumber');
            const unitInlineEl = document.getElementById('unitInline');
            const valueNumberSessionEl = document.getElementById('valueNumberSession');
            const valueSlashSessionEl = document.getElementById('valueSlashSession');
            const targetLabelEl = document.getElementById('targetLabel');
            const headerEl = document.getElementById('widgetHeader');
            const costAmountEl = document.getElementById('costAmount');
            const addAmountEl = document.getElementById('addAmount');
            const limitValueEl = document.getElementById('limitValue');
            const valueBoxEl = document.getElementById('valueBox');
            const fallbackEl = document.getElementById('widgetFallback');
            const fallbackTitleEl = document.getElementById('fallbackTitle');
            const fallbackTextEl = document.getElementById('fallbackText');
            const widgetWindowEl = document.getElementById('widgetWindow');
            const timerBlockEl = document.getElementById('timerBlock');
            const timerValueEl = document.getElementById('timerValue');

            let displayedValue = null;
            let animationId = null;
            let timerIntervalId = null;
            let timerEndMs = null;
            let lastTimerDurationSec = null;
            let displayedSessionValue = null;
            let sessionAnimationId = null;

            var DESIGN_W = 700;
            var DESIGN_H = 560;
            function updateScale() {
                var w = window.innerWidth;
                var h = window.innerHeight;
                var scale = Math.min(w / DESIGN_W, h / DESIGN_H, 1);
                document.getElementById('widgetScaleWrapper').style.setProperty('--widget-scale', scale);
            }
            updateScale();
            window.addEventListener('resize', updateScale);

            function formatNum(n) {
                const x = Number(n);
                if (Number.isInteger(x)) return String(x);
                return x.toFixed(2).replace(/\.?0+$/, '');
            }

            function formatValueDisplay(n) {
                const x = Number(n);
                if (isNaN(x)) return '—';
                return x.toFixed(0);
            }

            function applyColorClass(el, val, capValue) {
                const cap = capValue != null && !isNaN(capValue) ? Number(capValue) : null;
                if (cap != null && val >= cap) {
                    el.className = 'value value-at-cap';
                    return;
                }
                if (val >= 80000) el.className = 'value value-purple';
                else if (val >= 60000) el.className = 'value value-blue';
                else if (val >= 40000) el.className = 'value value-green';
                else el.className = 'value value-default';
            }

            function applySessionColorClass(span, val) {
                if (!span) return;
                span.classList.remove('session-green', 'session-blue', 'session-purple', 'session-default');
                if (val >= 80000) span.classList.add('session-purple');
                else if (val >= 60000) span.classList.add('session-blue');
                else if (val >= 40000) span.classList.add('session-green');
                else span.classList.add('session-default');
            }

            function animateSessionValue(fromVal, toVal, durationMs) {
                if (!valueNumberSessionEl) return;
                if (sessionAnimationId) cancelAnimationFrame(sessionAnimationId);
                const startTime = performance.now();
                function easeOutCubic(t) {
                    return 1 - Math.pow(1 - t, 3);
                }
                function tick(now) {
                    const elapsed = now - startTime;
                    const t = Math.min(elapsed / durationMs, 1);
                    const eased = easeOutCubic(t);
                    const current = fromVal + (toVal - fromVal) * eased;
                    const text = formatValueDisplay(current);
                    valueNumberSessionEl.textContent = text;
                    applySessionColorClass(valueNumberSessionEl, current);
                    if (t < 1) {
                        sessionAnimationId = requestAnimationFrame(tick);
                    } else {
                        sessionAnimationId = null;
                        displayedSessionValue = toVal;
                        const finalText = formatValueDisplay(toVal);
                        valueNumberSessionEl.textContent = finalText;
                        applySessionColorClass(valueNumberSessionEl, toVal);
                    }
                }
                valueNumberSessionEl.style.display = 'inline';
                valueSlashSessionEl.style.display = 'inline';
                sessionAnimationId = requestAnimationFrame(tick);
            }

            function animateValue(fromVal, toVal, unit, widget, durationMs) {
                if (animationId) cancelAnimationFrame(animationId);
                const capValue = widget.cap_value != null ? Number(widget.cap_value) : null;
                const cap = capValue != null && !isNaN(capValue) ? capValue : null;
                const clampedTo = cap != null ? Math.min(toVal, cap) : toVal;
                const startTime = performance.now();
                function easeOutCubic(t) {
                    return 1 - Math.pow(1 - t, 3);
                }
                function tick(now) {
                    const elapsed = now - startTime;
                    const t = Math.min(elapsed / durationMs, 1);
                    const eased = easeOutCubic(t);
                    let current = fromVal + (clampedTo - fromVal) * eased;
                    if (cap != null && current > cap) current = cap;
                    valueNumberEl.textContent = formatValueDisplay(current);
                    applyColorClass(valueEl, current, cap);
                    if (t < 1) {
                        animationId = requestAnimationFrame(tick);
                    } else {
                        animationId = null;
                        displayedValue = clampedTo;
                        valueNumberEl.textContent = formatValueDisplay(clampedTo);
                        applyColorClass(valueEl, clampedTo, cap);
                    }
                }
                animationId = requestAnimationFrame(tick);
            }

            function playCapPulse() {
                if (!valueBoxEl) return;
                valueBoxEl.classList.remove('cap-pulse');
                valueBoxEl.offsetHeight;
                valueBoxEl.classList.add('cap-pulse');
                setTimeout(function() {
                    valueBoxEl.classList.remove('cap-pulse');
                }, 500);
            }

            function formatTimer(secondsLeft) {
                if (secondsLeft <= 0) return '0:00';
                var h = Math.floor(secondsLeft / 3600);
                var m = Math.floor((secondsLeft % 3600) / 60);
                var s = Math.floor(secondsLeft % 60);
                var pad = function(n) { return n < 10 ? '0' + n : String(n); };
                if (h >= 1) return h + ':' + pad(m) + ':' + pad(s);
                return m + ':' + pad(s);
            }
            function updateTimerDisplay() {
                if (!timerValueEl || timerEndMs == null) return;
                var left = (timerEndMs - Date.now()) / 1000;
                timerValueEl.textContent = formatTimer(Math.max(0, left));
            }
            function startTimer(durationSeconds) {
                var sec = parseInt(durationSeconds, 10);
                if (isNaN(sec) || sec < 1) sec = 300;
                lastTimerDurationSec = sec;
                timerEndMs = Date.now() + sec * 1000;
                if (timerIntervalId) clearInterval(timerIntervalId);
                timerIntervalId = setInterval(updateTimerDisplay, 100);
                updateTimerDisplay();
                if (timerBlockEl) timerBlockEl.style.display = 'flex';
            }
            function stopTimer() {
                if (timerIntervalId) {
                    clearInterval(timerIntervalId);
                    timerIntervalId = null;
                }
                timerEndMs = null;
                lastTimerDurationSec = null;
                if (timerBlockEl) timerBlockEl.style.display = 'none';
                if (timerValueEl) timerValueEl.textContent = '0:00';
            }

            function setState(widget, options) {
                options = options || {};
                const fromRealtime = options.fromRealtime === true;
                goalEl.textContent = widget.goal_text || '';
                goalEl.style.display = (widget.goal_text && widget.goal_text.trim()) ? 'block' : 'none';
                const capValue = widget.cap_value != null ? Number(widget.cap_value) : null;
                const cap = capValue != null && !isNaN(capValue) ? capValue : null;
                let targetVal = Number(widget.current_value ?? widget.start_value ?? 0);
                if (cap != null && targetVal > cap) targetVal = cap;
                const unit = widget.unit_label || 'урона';
                unitInlineEl.textContent = unit;

                if (displayedValue === null || isNaN(displayedValue)) {
                    displayedValue = targetVal;
                    valueNumberEl.textContent = formatValueDisplay(targetVal);
                    applyColorClass(valueEl, targetVal, cap);
                } else if (targetVal > displayedValue) {
                    animateValue(displayedValue, targetVal, unit, widget, 700);
                } else {
                    if (cap != null && targetVal >= cap && displayedValue >= cap && fromRealtime) {
                        playCapPulse();
                    }
                    displayedValue = targetVal;
                    valueNumberEl.textContent = formatValueDisplay(targetVal);
                    applyColorClass(valueEl, targetVal, cap);
                }

                const capStr = widget.cap_value != null ? formatNum(widget.cap_value) : '—';
                const u = widget.unit_label || 'урона';
                limitValueEl.textContent = capStr + ' ' + u;
                const per = widget.per_amount != null ? widget.per_amount : '—';
                const add = widget.add_value != null ? formatNum(widget.add_value) : '—';
                const u2 = widget.unit_label || 'урона';
                costAmountEl.textContent = per;
                addAmountEl.textContent = add + ' ' + u2;

                // Сессионный средний урон Lesta — формат session/target внутри большого числа
                if (valueNumberSessionEl && valueSlashSessionEl) {
                    const hasSession = widget.lesta_session_started_at && widget.lesta_session_started_at > 0;
                    if (hasSession && typeof widget.lesta_session_avg_damage === 'number') {
                        const sDmg = Number(widget.lesta_session_avg_damage) || 0;
                        if (displayedSessionValue === null || isNaN(displayedSessionValue)) {
                            displayedSessionValue = sDmg;
                            const text = formatValueDisplay(sDmg);
                            valueNumberSessionEl.textContent = text;
                            valueNumberSessionEl.style.display = 'inline';
                            valueSlashSessionEl.style.display = 'inline';
                            applySessionColorClass(valueNumberSessionEl, sDmg);
                        } else if (sDmg !== displayedSessionValue) {
                            animateSessionValue(displayedSessionValue, sDmg, 700);
                        }
                    } else {
                        if (sessionAnimationId) cancelAnimationFrame(sessionAnimationId);
                        sessionAnimationId = null;
                        displayedSessionValue = null;
                        valueNumberSessionEl.style.display = 'none';
                        valueSlashSessionEl.style.display = 'none';
                    }
                }
                if (widget.name != null && String(widget.name).trim() !== '') {
                    headerEl.textContent = String(widget.name).trim();
                    headerEl.style.display = 'block';
                } else {
                    headerEl.textContent = '';
                    headerEl.style.display = 'none';
                }

                var bgOpacity = 1;
                if (widget.widget_bg_opacity != null) {
                    var v = parseFloat(widget.widget_bg_opacity);
                    if (!isNaN(v)) bgOpacity = Math.min(1, Math.max(0, v));
                }
                document.documentElement.style.setProperty('--widget-bg-opacity', String(bgOpacity));
                if (widgetWindowEl) widgetWindowEl.style.setProperty('--widget-bg-opacity', String(bgOpacity));

                var rawFallback = (widget.fallback_text != null ? String(widget.fallback_text) : '') || (widget.fallbackText != null ? String(widget.fallbackText) : '');
                var sep = rawFallback.indexOf('|||');
                var fallbackTitle = (sep >= 0 ? rawFallback.slice(0, sep).trim() : '');
                var fallbackText = (sep >= 0 ? rawFallback.slice(sep + 3).trim() : rawFallback.trim());
                if (fallbackTitleEl) {
                    fallbackTitleEl.innerText = fallbackTitle;
                    fallbackTitleEl.style.display = fallbackTitle ? 'block' : 'none';
                }
                if (fallbackTextEl) fallbackTextEl.textContent = fallbackText;
                var infoWindowEnabled = widget.info_window_enabled !== 0;
                if (fallbackEl) {
                    if (infoWindowEnabled) fallbackEl.style.display = 'block';
                    else fallbackEl.style.display = 'none';
                }
                var timerEnabled = widget.timer_enabled === 1 || widget.timer_enabled === true;
                if (timerEnabled) {
                    var dur = widget.timer_duration_seconds != null ? parseInt(widget.timer_duration_seconds, 10) : 300;
                    var sec = isNaN(dur) || dur < 1 ? 300 : dur;
                    if (lastTimerDurationSec !== sec) startTimer(sec);
                    else if (timerBlockEl) timerBlockEl.style.display = 'flex';
                } else {
                    stopTimer();
                }

            }

            fetch(window.location.origin + '/api/donation-driven-widget-damage')
                .then(r => r.json())
                .then(setState)
                .catch(() => { valueNumberEl.textContent = '?'; valueEl.className = 'value value-default'; });

            const ws = new WebSocket((location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws');
            ws.onmessage = function(ev) {
                try {
                    const msg = JSON.parse(ev.data);
                    if (msg.type === 'DONATION_DRIVEN_DAMAGE_UPDATE' && msg.widget) setState(msg.widget, { fromRealtime: true });
                } catch (_) {}
            };

            setInterval(function poll() {
                fetch(window.location.origin + '/api/donation-driven-widget-damage')
                    .then(r => r.json())
                    .then(setState)
                    .catch(function() {});
            }, 2000);
        })();
    </script>
</body>
</html>
