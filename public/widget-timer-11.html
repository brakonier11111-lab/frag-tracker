<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пульсирующий Органик</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-green: #00ff47;
            --neon-purple: #b300ff;
            --neon-red: #ff003c;
            --neon-yellow: #ffff00;
            --neon-orange: #ff6600;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: transparent;
            color: white;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .organic-widget {
            width: 400px;
            height: 400px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .organic-container {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, 
                rgba(0, 255, 71, 0.1) 0%,
                rgba(0, 0, 0, 0.9) 70%
            );
            border: 3px solid var(--neon-green);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            animation: organicPulse 4s ease-in-out infinite;
            box-shadow: 
                0 0 40px var(--neon-green),
                inset 0 0 40px rgba(0, 255, 71, 0.1);
        }

        .organic-container.discount-active {
            border-color: var(--neon-orange);
            background: radial-gradient(circle, 
                rgba(255, 102, 0, 0.1) 0%,
                rgba(0, 0, 0, 0.9) 70%
            );
            box-shadow: 
                0 0 40px var(--neon-orange),
                inset 0 0 40px rgba(255, 102, 0, 0.1);
        }

        .organic-container.slowdown-active {
            border-color: var(--neon-red);
            background: radial-gradient(circle, 
                rgba(255, 0, 60, 0.1) 0%,
                rgba(0, 0, 0, 0.9) 70%
            );
            box-shadow: 
                0 0 40px var(--neon-red),
                inset 0 0 40px rgba(255, 0, 60, 0.1);
        }

        @keyframes organicPulse {
            0%, 100% { 
                transform: scale(1);
                border-radius: 50%;
            }
            25% { 
                transform: scale(1.05);
                border-radius: 40% 60% 50% 50%;
            }
            50% { 
                transform: scale(1.1);
                border-radius: 60% 40% 50% 50%;
            }
            75% { 
                transform: scale(1.05);
                border-radius: 50% 50% 40% 60%;
            }
        }

        .organic-veins {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .vein {
            position: absolute;
            background: linear-gradient(45deg, 
                transparent 0%,
                var(--neon-green) 50%,
                transparent 100%
            );
            border-radius: 50px;
            animation: veinPulse 3s ease-in-out infinite;
        }

        .vein.horizontal {
            width: 200px;
            height: 4px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .vein.vertical {
            width: 4px;
            height: 200px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .vein.diagonal-1 {
            width: 280px;
            height: 4px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
        }

        .vein.diagonal-2 {
            width: 280px;
            height: 4px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
        }

        @keyframes veinPulse {
            0%, 100% { 
                opacity: 0.3;
                transform: translate(-50%, -50%) scale(1);
            }
            50% { 
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        .organic-container.discount-active .vein {
            background: linear-gradient(45deg, 
                transparent 0%,
                var(--neon-orange) 50%,
                transparent 100%
            );
        }

        .organic-container.slowdown-active .vein {
            background: linear-gradient(45deg, 
                transparent 0%,
                var(--neon-red) 50%,
                transparent 100%
            );
        }

        .timer-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid var(--neon-green);
        }

        .timer-numbers {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--neon-green);
            text-shadow: 0 0 15px var(--neon-green);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .timer-label {
            font-size: 0.8rem;
            color: #ffffff;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cost-display {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
            font-weight: 600;
        }

        .organic-cells {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .cell {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--neon-green);
            border-radius: 50%;
            animation: cellFloat 6s linear infinite;
        }

        @keyframes cellFloat {
            0% {
                transform: translateY(100%) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
                transform: scale(1);
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100%) scale(0);
                opacity: 0;
            }
        }

        .organic-container.discount-active .cell {
            background: var(--neon-orange);
        }

        .organic-container.slowdown-active .cell {
            background: var(--neon-red);
        }

        @keyframes timeAddedGlow {
            0% {
                text-shadow: 0 0 15px var(--neon-green);
                transform: scale(1);
            }
            50% {
                text-shadow: 0 0 30px var(--neon-blue);
                transform: scale(1.1);
                color: var(--neon-blue);
            }
            100% {
                text-shadow: 0 0 15px var(--neon-green);
                transform: scale(1);
            }
        }

        .timer-numbers.time-added {
            animation: timeAddedGlow 2s ease-out;
        }

        .organic-container.time-added {
            animation: organicPulse 4s ease-in-out infinite, organicSplash 2s ease-out;
        }

        @keyframes organicSplash {
            0% { transform: scale(1); }
            25% { transform: scale(1.2); }
            50% { transform: scale(0.9); }
            75% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="organic-widget" id="organicWidget">
        <div class="organic-container" id="organicContainer">
            <div class="organic-veins">
                <div class="vein horizontal"></div>
                <div class="vein vertical"></div>
                <div class="vein diagonal-1"></div>
                <div class="vein diagonal-2"></div>
            </div>
            
            <div class="organic-cells" id="organicCells"></div>
            
            <div class="timer-display">
                <div class="timer-numbers" id="timerNumbers">01:00:00</div>
                <div class="timer-label" id="timerLabel">ДО КОНЦА СТРИМА</div>
            </div>
            
            <div class="cost-display" id="costText">1 минута = 50₽</div>
        </div>
    </div>

    <script>
        // Состояние виджета
        let currentState = {
            timer_seconds: 3600,
            cost_per_minute: 50,
            timer_discount: 0,
            timer_discount_until_ts: 0,
            timer_slowdown_active: false,
            timer_slowdown_factor: 1.0,
            timer_slowdown_until_ts: 0
        };

        let timerInterval = null;
        let lastUpdateTime = Date.now();

        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🎨 Виджет "Пульсирующий Органик" загружен');
            createCells();
            updateDisplay();
            startTimer();
            
            // Уведомляем родительскую страницу о загрузке
            if (window.parent !== window) {
                window.parent.postMessage({ type: 'WIDGET_LOADED' }, '*');
            }
        });

        // Обработка сообщений от родительской страницы
        window.addEventListener('message', function(event) {
            switch(event.data.type) {
                case 'UPDATE_STATE':
                    updateState(event.data);
                    break;
                case 'SET_MODE':
                    setMode(event.data.mode, event.data);
                    break;
                case 'TEST_DONATION':
                    triggerTimeAddedAnimation(60);
                    break;
            }
        });

        function updateState(newState) {
            Object.assign(currentState, newState);
            updateDisplay();
        }

        function setMode(mode, data) {
            const container = document.getElementById('organicContainer');
            container.classList.remove('discount-active', 'slowdown-active');
            
            switch(mode) {
                case 'discount':
                    container.classList.add('discount-active');
                    currentState.timer_discount = parseInt(data.discount) || 20;
                    currentState.timer_discount_until_ts = Date.now() + 300000;
                    break;
                case 'slowdown':
                    container.classList.add('slowdown-active');
                    currentState.timer_slowdown_active = true;
                    currentState.timer_slowdown_factor = parseFloat(data.slowdown) || 0.5;
                    currentState.timer_slowdown_until_ts = Date.now() + 300000;
                    break;
                default:
                    currentState.timer_discount = 0;
                    currentState.timer_slowdown_active = false;
                    currentState.timer_slowdown_factor = 1.0;
            }
            
            updateDisplay();
        }

        function createCells() {
            const cellsContainer = document.getElementById('organicCells');
            
            setInterval(() => {
                if (Math.random() < 0.3) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.style.left = Math.random() * 100 + '%';
                    cell.style.animationDelay = Math.random() * 2 + 's';
                    cell.style.animationDuration = (4 + Math.random() * 4) + 's';
                    
                    cellsContainer.appendChild(cell);
                    
                    setTimeout(() => {
                        if (cell.parentNode) {
                            cell.parentNode.removeChild(cell);
                        }
                    }, 8000);
                }
            }, 400);
        }

        function updateDisplay() {
            updateTimerDisplay();
            updateCostDisplay();
        }

        function updateTimerDisplay() {
            const totalSeconds = currentState.timer_seconds;
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            
            const timeString = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('timerNumbers').textContent = timeString;
        }

        function updateCostDisplay() {
            const baseCost = currentState.cost_per_minute;
            const discount = currentState.timer_discount || 0;
            const actualCost = Math.max(1, baseCost - discount);
            
            if (discount > 0) {
                document.getElementById('costText').innerHTML = `
                    <span style="text-decoration: line-through; opacity: 0.6;">${baseCost}₽</span> 
                    <span style="color: var(--neon-orange);">${actualCost}₽</span>
                `;
            } else {
                document.getElementById('costText').textContent = `1 минута = ${actualCost}₽`;
            }
        }

        function startTimer() {
            if (timerInterval) return;
            
            timerInterval = setInterval(() => {
                if (currentState.timer_seconds > 0) {
                    const factor = currentState.timer_slowdown_active ? 
                        Math.max(0.1, currentState.timer_slowdown_factor) : 1.0;
                    const currentTime = Date.now();
                    const elapsedMs = currentTime - lastUpdateTime;
                    const msPerLogicalSecond = 1000 * factor;
                    
                    if (elapsedMs >= msPerLogicalSecond) {
                        currentState.timer_seconds--;
                        lastUpdateTime = currentTime;
                        updateDisplay();
                    }
                }
            }, 100);
        }

        function triggerTimeAddedAnimation(timeEarned) {
            console.log(`🎬 Анимация добавления времени: ${timeEarned} секунд`);
            
            const timerNumbers = document.getElementById('timerNumbers');
            const container = document.getElementById('organicContainer');
            
            timerNumbers.classList.add('time-added');
            container.classList.add('time-added');
            
            setTimeout(() => {
                timerNumbers.classList.remove('time-added');
                container.classList.remove('time-added');
            }, 2000);
        }
    </script>
</body>
</html>
