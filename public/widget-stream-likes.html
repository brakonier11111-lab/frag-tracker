<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Лайки — виджет</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body {
			width: 100%;
			height: 100%;
			overflow: hidden;
		}
		body {
			background: transparent;
			color: #fff;
			display: flex;
			align-items: center;
			justify-content: center;
			font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
		}

		.widget {
			display: inline-flex;
			align-items: center;
			gap: 14px;
			padding: 8px 14px;
			border-radius: 999px;
			background: radial-gradient(circle at 0% 0%, rgba(0,255,163,0.25), transparent 55%),
			            radial-gradient(circle at 100% 100%, rgba(255,99,132,0.25), transparent 55%),
			            rgba(5,8,15,0.9);
			border: 1px solid rgba(255,255,255,0.2);
			box-shadow:
				0 0 24px rgba(0,0,0,0.8),
				0 0 18px rgba(0,255,163,0.4);
		}

		/* Окно для гифок: статичная по умолчанию, анимированная при росте лайков — в исходном размере */
		.gif-window {
			position: relative;
			display: none;
			line-height: 0;
		}
		.widget.gif-mode .gif-window { display: block; }
		.widget.gif-mode .tank-like-wrap,
		.widget.gif-mode .status-text { display: none !important; }
		.widget.gif-mode {
			padding: 0;
			background: transparent;
			border: none;
			box-shadow: none;
		}
		/* В тестовом режиме показываем танчик/счётчик даже при gif-mode,
		   чтобы анимации было видно всегда (а не только GIF). */
		.widget.test-mode.gif-mode .tank-like-wrap { display: inline-flex !important; }
		.widget.test-mode.gif-mode .status-text { display: block !important; }
		.gif-window img {
			width: auto;
			height: auto;
			max-width: none;
			max-height: none;
			display: block;
			vertical-align: top;
		}
		/* Статичная гифка задаёт размер контейнера; анимированная поверх неё */
		.gif-window .gif-static { position: relative; }
		.gif-window .gif-animated { position: absolute; top: 0; left: 0; }
		.gif-window .gif-static { z-index: 1; }
		.gif-window .gif-animated { z-index: 2; visibility: hidden; }
		.gif-window.playing .gif-static { visibility: hidden; }
		/* Только слой с классом anim-show — два img чередуются, чтобы смена src не обрывала прошлый кадр */
		.gif-window.playing .gif-animated.anim-show { visibility: visible; }

		.tank-like-wrap {
			display: inline-flex;
			align-items: center;
			gap: 10px;
			position: relative;
		}

		/* Танчик слева */
		.tank {
			position: relative;
			width: 58px;
			height: 32px;
		}
		.tank-body {
			position: absolute;
			bottom: 0;
			left: 0;
			width: 52px;
			height: 18px;
			background: linear-gradient(135deg,#1bce6f,#0b8f4e);
			border-radius: 6px;
			box-shadow: 0 0 10px rgba(0,255,163,0.6);
		}
		.tank-top {
			position: absolute;
			bottom: 14px;
			left: 10px;
			width: 26px;
			height: 12px;
			background: linear-gradient(135deg,#0b8f4e,#06663a);
			border-radius: 6px;
		}
		.tank-barrel {
			position: absolute;
			bottom: 19px;
			left: 30px;
			width: 28px;
			height: 4px;
			background: #0fffb0;
			border-radius: 3px;
			transform-origin: 0% 50%;
		}
		.tank-track {
			position: absolute;
			bottom: -4px;
			left: 2px;
			width: 48px;
			height: 10px;
			background: rgba(0,0,0,0.9);
			border-radius: 8px;
			display: flex;
			align-items: center;
			justify-content: space-evenly;
		}
		.tank-wheel {
			width: 7px;
			height: 7px;
			border-radius: 50%;
			background: #2f3542;
			box-shadow: inset 0 0 4px rgba(0,0,0,0.9);
		}

		/* Значок лайка справа */
		.like-wrap {
			position: relative;
			display: inline-flex;
			align-items: center;
			gap: 6px;
		}
		.like-icon {
			width: 30px;
			height: 30px;
			border-radius: 50%;
			background: radial-gradient(circle at 30% 30%, #fff 0, #ff3b6b 35%, #b0003c 80%);
			box-shadow:
				0 0 14px rgba(255,59,107,0.9),
				0 0 26px rgba(255,255,255,0.6);
			mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="white" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') center/70% no-repeat;
		}
		.likes-count {
			font-family: 'Orbitron', sans-serif;
			font-size: 22px;
			font-weight: 700;
			text-shadow:
				0 0 12px rgba(255,59,107,0.9),
				0 0 24px rgba(255,255,255,0.5);
		}

		/* Анимации выстрела */
		.widget.shoot .tank-barrel {
			animation: barrel-kick 0.4s ease-out;
		}
		.widget.shoot .tank-body {
			animation: tank-recoil 0.4s ease-out;
		}
		.widget.shoot .like-icon {
			animation: like-hit 0.45s ease-out;
		}
		.widget.shoot .likes-count {
			animation: likes-pop 0.4s ease-out;
		}

		@keyframes barrel-kick {
			0% { transform: translateX(0); opacity: 1; }
			20% { transform: translateX(4px); }
			60% { transform: translateX(-2px); opacity: 1; }
			100% { transform: translateX(0); opacity: 1; }
		}
		@keyframes tank-recoil {
			0% { transform: translateX(0); }
			20% { transform: translateX(-3px); }
			100% { transform: translateX(0); }
		}
		@keyframes like-hit {
			0% { transform: scale(1) translateX(0); filter: brightness(1); }
			20% { transform: scale(1.1) translateX(2px); filter: brightness(1.4); }
			60% { transform: scale(0.95) translateX(-1px); filter: brightness(1.2); }
			100% { transform: scale(1) translateX(0); filter: brightness(1); }
		}
		@keyframes likes-pop {
			0% { transform: scale(1); }
			25% { transform: scale(1.2); }
			100% { transform: scale(1); }
		}

		.status-text {
			font-size: 10px;
			color: rgba(255,255,255,0.6);
			margin-top: 2px;
			text-align: right;
		}

		/* Режим «только цифры»: только число лайков, без танка, иконки и подписи */
		.widget.numbers-only-mode .gif-window,
		.widget.numbers-only-mode .tank,
		.widget.numbers-only-mode .like-icon,
		.widget.numbers-only-mode .status-text { display: none !important; }
		.widget.numbers-only-mode {
			padding: 0;
			background: transparent;
			border: none;
			box-shadow: none;
		}
		.widget.numbers-only-mode .tank-like-wrap { gap: 0; }
		.widget.numbers-only-mode .like-wrap { gap: 0; }
	</style>
</head>
<body>
	<div class="widget" id="widget-root">
		<!-- Окно загрузки гиф: статичная (по умолчанию) и анимированная (1 лайк = 1 проигрывание) -->
		<div class="gif-window" id="gif-window">
			<img class="gif-static" id="gif-static" alt="">
			<img class="gif-animated" id="gif-animated-a" alt="">
			<img class="gif-animated" id="gif-animated-b" alt="">
		</div>
		<div class="tank-like-wrap">
			<div class="tank">
				<div class="tank-body"></div>
				<div class="tank-top"></div>
				<div class="tank-barrel"></div>
				<div class="tank-track">
					<div class="tank-wheel"></div>
					<div class="tank-wheel"></div>
					<div class="tank-wheel"></div>
					<div class="tank-wheel"></div>
				</div>
			</div>
			<div class="like-wrap">
				<div class="like-icon"></div>
				<div class="likes-count" id="likes-total">—</div>
			</div>
		</div>
		<div class="status-text" id="status-text">ожидание данных...</div>
	</div>

	<script>
		const params = new URLSearchParams(window.location.search);
		const staticUrl = params.get('static') || '';
		const animatedUrl = params.get('animated') || '';
		// Дефолт 1.7 c — типичная длина одного цикла likes-animated.gif (51 кадр); задайте в URL точнее под свою гифку.
		const animatedDurationSec = Math.max(0.5, parseFloat(params.get('animatedDuration')) || 1.7);
		// Запас на хвост гифки (прозрачность, последние кадры)
		const animatedPadSec = Math.max(0, parseFloat(params.get('animatedPad')) || 0.22);
		// Пауза на статичный кадр между проигрываниями (мс), чтобы не «рвало» подряд и браузер успевал отрисовать
		const likeSettleMs = Math.max(0, parseInt(String(params.get('likeSettleMs') || '180'), 10) || 180);
		const gifMode = staticUrl && animatedUrl;
		const numbersOnly = params.get('numbersOnly') === '1' || params.get('only') === 'numbers';
		const testMode = params.get('test') === '1' || params.get('testLike') === '1';
		const autoTest = params.get('autoTest') === '1' || params.get('autoLike') === '1';

		const rootEl = document.getElementById('widget-root');
		const totalEl = document.getElementById('likes-total');
		const statusEl = document.getElementById('status-text');

		let displayedLikes = null;
		/** Последний total с API, который уже «разложен» в очередь (без учёта ещё не показанных анимаций). */
		let serverAckTotal = null;
		let desiredLikes = null;
		let likeQueue = 0;
		let queueRunning = false;
		/** Чередование двух <img> для анимированной гифки */
		let gifLayerFlip = 0;

		let testLikes = 0; // in testMode: "real" likes target (used for parent updates)
		if (testMode) {
			if (rootEl) rootEl.classList.add('test-mode');
			const startLikesRaw = params.get('startLikes');
			const startLikes = Number.parseInt(startLikesRaw || '0', 10);
			testLikes = Number.isFinite(startLikes) ? startLikes : 0;
			displayedLikes = testLikes;
			serverAckTotal = testLikes;
			desiredLikes = testLikes;
			totalEl.textContent = displayedLikes;

			// Диагностика: сообщаем родителю, что тестовый обработчик сообщений активен
			if (statusEl) statusEl.textContent = 'тестовый режим (готов)';
			try {
				if (window.parent && window.parent !== window) {
					window.parent.postMessage({ type: 'TEST_WIDGET_READY' }, '*');
				}
			} catch (_) {}

			// Удобно для ручной проверки: открыли URL с test=1 и кликаем по виджету.
			if (rootEl) {
				rootEl.style.cursor = 'pointer';
				rootEl.title = 'TEST_LIKE: клик добавляет +1 лайк';
				rootEl.addEventListener('click', () => triggerTestLike(1));
			}
		}

		if (numbersOnly) {
			document.getElementById('widget-root').classList.add('numbers-only-mode');
		} else if (gifMode) {
			const root = document.getElementById('widget-root');
			const gifWindow = document.getElementById('gif-window');
			const imgStatic = document.getElementById('gif-static');
			const imgAnimA = document.getElementById('gif-animated-a');
			const imgAnimB = document.getElementById('gif-animated-b');
			const w = params.get('width') || params.get('w');
			const h = params.get('height') || params.get('h');
			if (w) gifWindow.style.width = (isNaN(Number(w)) ? w : w + 'px');
			if (h) gifWindow.style.height = (isNaN(Number(h)) ? h : h + 'px');
			root.classList.add('gif-mode');
			imgStatic.src = staticUrl;
			if (imgAnimA) imgAnimA.src = animatedUrl;
			if (imgAnimB) imgAnimB.src = animatedUrl;
		}

		function triggerShot() {
			const root = document.getElementById('widget-root');
			if (!root) return;
			root.classList.remove('shoot');
			void root.offsetWidth;
			root.classList.add('shoot');

			if (testMode) {
				try {
					if (window.parent && window.parent !== window) {
						window.parent.postMessage({ type: 'TEST_SHOT_TRIGGERED' }, '*');
					}
				} catch (_) {}
			}

			setTimeout(() => root.classList.remove('shoot'), 500);
		}

		function getGifCycleWallClockMs() {
			return animatedDurationSec * 1000 + animatedPadSec * 1000 + likeSettleMs;
		}

		function playAnimatedGifOne() {
			// Один полный цикл: загрузка → показ слоя → таймер ≥ длины гифки → пауза на статику → следующий лайк.
			// Два <img> чередуются: смена src не рвёт декодирование предыдущего проигрывания.
			return new Promise((resolve) => {
				if (!gifMode) return resolve();
				const gifWindow = document.getElementById('gif-window');
				const imgA = document.getElementById('gif-animated-a');
				const imgB = document.getElementById('gif-animated-b');
				if (!gifWindow || !imgA || !imgB) return resolve();

				const layer = (gifLayerFlip++ % 2) === 0 ? imgA : imgB;
				const durationMs = animatedDurationSec * 1000 + animatedPadSec * 1000;
				const bust = animatedUrl + (animatedUrl.indexOf('?') >= 0 ? '&' : '?') + 't=' + Date.now();

				let playStarted = false;

				const finish = () => {
					gifWindow.classList.remove('playing');
					imgA.classList.remove('anim-show');
					imgB.classList.remove('anim-show');
					requestAnimationFrame(() => requestAnimationFrame(() => {
						setTimeout(resolve, likeSettleMs);
					}));
				};

				const startVisiblePlay = () => {
					if (playStarted) return;
					playStarted = true;
					imgA.classList.remove('anim-show');
					imgB.classList.remove('anim-show');
					layer.classList.add('anim-show');
					gifWindow.classList.add('playing');
					if (testMode) {
						try {
							if (window.parent && window.parent !== window) {
								window.parent.postMessage({ type: 'TEST_GIF_START', times: 1 }, '*');
							}
						} catch (_) {}
					}
					setTimeout(finish, durationMs);
				};

				const onLoad = () => {
					layer.removeEventListener('load', onLoad);
					layer.removeEventListener('error', onError);
					startVisiblePlay();
				};

				const onError = () => {
					layer.removeEventListener('load', onLoad);
					layer.removeEventListener('error', onError);
					finish();
				};

				layer.addEventListener('load', onLoad);
				layer.addEventListener('error', onError);
				layer.src = bust;

				requestAnimationFrame(() => {
					if (layer.complete && layer.naturalWidth > 0) {
						layer.removeEventListener('load', onLoad);
						layer.removeEventListener('error', onError);
						startVisiblePlay();
					}
				});
			});
		}

		function getStepDurationMs() {
			// numbersOnly: тот же полный цикл, что и гиф + пауза (см. getGifCycleWallClockMs)
			if (numbersOnly) return getGifCycleWallClockMs();
			if (gifMode) return getGifCycleWallClockMs();
			return 500;
		}

		function coerceIntDelta(delta) {
			const n = Number(delta);
			if (!Number.isFinite(n)) return 0;
			return Math.max(0, Math.floor(n));
		}

		function enqueueLikes(delta) {
			const inc = coerceIntDelta(delta);
			if (inc <= 0) return;

			if (displayedLikes === null) displayedLikes = 0;
			if (desiredLikes === null) desiredLikes = displayedLikes;

			desiredLikes += inc;
			likeQueue += inc;

			if (!queueRunning) processLikeQueue();
		}

		function processLikeQueue() {
			if (queueRunning) return;
			if (likeQueue <= 0) return;
			queueRunning = true;

			(async () => {
				// Строго: один слот очереди = сначала полностью анимация, потом +1 к цифре.
				// Следующая гифка/шаг не стартует, пока не resolve предыдущий await (анимация не обрывается).
				while (likeQueue > 0) {
					likeQueue -= 1;

					if (gifMode) {
						if (gifMode && !numbersOnly) {
							await playAnimatedGifOne();
						} else {
							triggerShot();
							await new Promise(r => setTimeout(r, getStepDurationMs()));
						}
					} else {
						triggerShot();
						await new Promise(r => setTimeout(r, getStepDurationMs()));
					}

					displayedLikes = (displayedLikes ?? 0) + 1;
					if (totalEl) totalEl.textContent = displayedLikes;
				}
				queueRunning = false;
			})();
		}

		function triggerTestLike(delta) {
			const inc = coerceIntDelta(delta);
			if (inc <= 0) return;
			testLikes += inc;
			enqueueLikes(inc);

			if (statusEl) statusEl.textContent = 'TEST_LIKE: +' + inc;
			setTimeout(() => {
				if (statusEl) statusEl.textContent = 'тестовый режим';
			}, 900);

			// Сообщаем родителю (например, page для теста)
			try {
				if (window.parent && window.parent !== window) {
					window.parent.postMessage({ type: 'TEST_LIKE_UPDATED', likes: testLikes }, '*');
				}
			} catch (_) {}
		}

		async function refreshLikes() {
			try {
				const [ytRes, vkRes] = await Promise.all([
					fetch('/integrations/youtube/status').then(r => r.json()).catch(() => null),
					fetch('/integrations/vkplay/status').then(r => r.json()).catch(() => null)
				]);

				const ytConnected = ytRes && ytRes.connected;
				const vkConnected = vkRes && vkRes.connected;

				const ytLikesRaw = ytConnected && ytRes && typeof ytRes.likes !== 'undefined' ? ytRes.likes : 0;
				const vkLikesRaw = vkConnected && vkRes && typeof vkRes.likes !== 'undefined' ? vkRes.likes : 0;
				// Приводим к числу, чтобы исключить ситуации со строками ("10" > "2").
				const ytLikes = Number.isFinite(Number(ytLikesRaw)) ? Number(ytLikesRaw) : 0;
				const vkLikes = Number.isFinite(Number(vkLikesRaw)) ? Number(vkLikesRaw) : 0;
				const total = ytLikes + vkLikes;

				if (ytConnected || vkConnected) {
					// Идём через очередь: пока не проиграли все инкременты — число не прыгает на итог.
					if (displayedLikes === null) {
						displayedLikes = total;
						serverAckTotal = total;
						desiredLikes = total;
						likeQueue = 0;
						totalEl.textContent = displayedLikes;
					} else {
						if (total < displayedLikes || (serverAckTotal !== null && total < serverAckTotal)) {
							// Меньше, чем на экране / чем уже учли с API — сброс (смена эфира, откат счётчика).
							displayedLikes = total;
							serverAckTotal = total;
							desiredLikes = total;
							likeQueue = 0;
							queueRunning = false;
							totalEl.textContent = displayedLikes;
						} else if (serverAckTotal !== null && total > serverAckTotal) {
							// Только НОВЫЕ лайки с момента прошлого опроса — строго 1 в очередь = 1 проигрыш + 1 к цифре.
							const delta = total - serverAckTotal;
							serverAckTotal = total;
							enqueueLikes(delta);
						}
					}

					if (ytConnected && vkConnected) {
						statusEl.textContent = 'YouTube + VK Play';
					} else if (ytConnected) {
						statusEl.textContent = 'Только YouTube';
					} else if (vkConnected) {
						statusEl.textContent = 'Только VK Play';
					} else {
						statusEl.textContent = 'интеграции не подключены';
					}
				} else {
					statusEl.textContent = 'интеграции не подключены';
					totalEl.textContent = '—';
					displayedLikes = null;
					serverAckTotal = null;
					desiredLikes = null;
					likeQueue = 0;
					queueRunning = false;
				}
			} catch (e) {
				console.warn('Ошибка виджета лайков:', e);
				statusEl.textContent = 'ошибка';
				totalEl.textContent = '—';
				displayedLikes = null;
				serverAckTotal = null;
				desiredLikes = null;
				likeQueue = 0;
				queueRunning = false;
			}
		}

		if (!testMode) {
			refreshLikes();
			setInterval(refreshLikes, 5000);
		} else {
			if (statusEl) statusEl.textContent = 'тестовый режим';
			if (totalEl) totalEl.textContent = testLikes;

			// Диагностика: если включен autoTest, делаем +1 сразу после загрузки.
			if (autoTest) {
				const autoDelta = coerceIntDelta(params.get('autoTestDelta') ?? 1);
				setTimeout(() => triggerTestLike(autoDelta > 0 ? autoDelta : 1), 350);
			}

			window.addEventListener('message', (ev) => {
				const data = ev && ev.data;
				if (!data || typeof data !== 'object') return;
				if (data.type === 'TEST_LIKE') {
					triggerTestLike(data.delta ?? 1);
				} else if (data.type === 'TEST_LIKE_SET') {
					// Позволяет сбросить значение, если понадобится
					const n = Number(data.likes);
					testLikes = Number.isFinite(n) ? Math.max(0, Math.floor(n)) : 0;
					displayedLikes = testLikes;
					serverAckTotal = testLikes;
					desiredLikes = testLikes;
					likeQueue = 0;
					queueRunning = false;
					if (totalEl) totalEl.textContent = displayedLikes;
					try {
						if (window.parent && window.parent !== window) {
							window.parent.postMessage({ type: 'TEST_LIKE_UPDATED', likes: testLikes }, '*');
						}
					} catch (_) {}
				}
			});
		}
	</script>
</body>
