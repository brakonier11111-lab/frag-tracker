<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tank Queue OBS Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
/* Единый стиль с widget-boss-orders: нейтральный графит, один тёплый акцент (золото),
   зелёный — для высокого приоритета/топ-1. Табличные цифры, геометрический гротеск. */
:root{
    --bg:#131417;--bg-2:#1a1b1f;--line:rgba(255,255,255,.09);--line-gold:rgba(217,180,101,.35);
    --gold:#d9b465;--gold-soft:rgba(217,180,101,.4);
    --text:#f5f6f8;--text-dim:#9a9ea8;--text-mut:#686c76;
    --green:#5fe3a3;--green-soft:rgba(95,227,163,.35);
    --red:#ff6b6b;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;min-height:100vh;overflow:hidden;}
body{font-family:'Manrope',sans-serif;background:transparent;color:var(--text);
    display:flex;align-items:flex-end;justify-content:center;-webkit-font-smoothing:antialiased;}

.scale{width:100%;transform-origin:bottom center;transform:scale(var(--s,1));padding-bottom:6px;}
.stage{width:100%;max-width:420px;padding:0 12px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:9px;}

/* заголовок — плашка как у boss-orders, с числом в очереди */
.title-pill{display:inline-flex;align-items:center;gap:12px;
    padding:13px 28px;border-radius:999px;max-width:100%;
    background:rgba(19,20,23,0.92);border:1px solid var(--line-gold);
    box-shadow:0 10px 26px rgba(0,0,0,0.45),0 0 26px rgba(217,180,101,.1);}
.title-pill .tx{font-size:1.1rem;font-weight:800;letter-spacing:.04em;color:var(--text);white-space:normal;text-align:center;text-shadow:2px 2px 0 rgba(0,0,0,.7);}
.title-pill .cnt{color:var(--gold);font-weight:900;}

.board{position:relative;width:100%;display:flex;flex-direction:column;gap:8px;}

/* ===== строка очереди ===== */
.q-item{position:relative;z-index:1;border-radius:13px;overflow:hidden;
    background:linear-gradient(150deg,var(--bg),var(--bg-2));border:1px solid var(--line);
    box-shadow:0 10px 26px rgba(0,0,0,0.4);}
.q-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--text-mut);z-index:2;}

/* ===== появление и исчезновение карточки в очереди ===== */
.q-item.q-item-enter{animation:qEnter .5s cubic-bezier(.16,1,.3,1);}
@keyframes qEnter{from{opacity:0;transform:translateY(16px) scale(.94);}to{opacity:1;transform:none;}}

/* Приоритетный заказ — солидно: ровная золотая полоска и лёгкая статичная подсветка, без анимации */
.q-item.priority{border-color:rgba(217,180,101,.32);}
.q-item.priority::before{background:var(--gold);}
.q-item.priority::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
    background:linear-gradient(120deg,rgba(217,180,101,.12) 0%,rgba(217,180,101,.03) 65%);}
.q-item.priority .price{color:#e9d5a3;}

/* Мегаприоритет — аккуратный золотой отлив: мягкий, медленный перелив по всей карточке */
.q-item.mega{border-color:rgba(217,180,101,.5);box-shadow:0 10px 26px rgba(0,0,0,.4),0 0 22px rgba(217,180,101,.14);}
.q-item.mega::before{background:linear-gradient(180deg,#f3d999,var(--gold) 55%,#b8924c);}
.q-item.mega::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
    background:linear-gradient(120deg,
        rgba(217,180,101,.06) 0%,
        rgba(246,223,163,.26) 50%,
        rgba(217,180,101,.06) 100%);
    background-size:260% 260%;
    animation:goldFlow 9s ease-in-out infinite alternate;}
@keyframes goldFlow{0%{background-position:0% 50%;}100%{background-position:100% 50%;}}
.q-item.mega .name{color:#fbeecb;}
.q-item.mega .price{color:#f0d488;text-shadow:2px 2px 0 rgba(0,0,0,.7),0 0 10px rgba(217,180,101,.45);}

.q-row{position:relative;z-index:1;display:flex;flex-wrap:wrap;align-items:center;row-gap:4px;column-gap:10px;
    padding:11px 14px 11px 16px;}
.rank{flex:none;width:20px;height:20px;border-radius:6px;display:grid;place-items:center;
    font-size:.68rem;font-weight:800;color:var(--bg);background:var(--gold);}
.who{flex:1 1 150px;min-width:150px;}
.who .name-line{display:flex;align-items:baseline;gap:7px;min-width:0;}
.who .name{flex:1;min-width:0;font-weight:800;font-size:1.1rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:2px 2px 0 rgba(0,0,0,.7);}
.who .cond{margin-top:2px;font-size:.86rem;font-weight:600;color:var(--text-dim);line-height:1.3;
    display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;font-style:italic;text-shadow:1px 1px 0 rgba(0,0,0,.7);}
/* Когда карточке не хватает ширины на строку целиком, цена переносится на отдельную
   строку и прижимается вправо — а не сжимается вместе с текстом. */
.price-wrap{flex:none;margin-left:auto;display:flex;align-items:baseline;gap:5px;}
.price-wrap .pre{font-size:.78rem;font-weight:600;color:var(--text-dim);white-space:nowrap;text-shadow:1px 1px 0 rgba(0,0,0,.7);}
.price{font-weight:900;font-size:1.02rem;color:var(--text);font-variant-numeric:tabular-nums;white-space:nowrap;text-shadow:2px 2px 0 rgba(0,0,0,.7);}

/* ===== заглушка пустой очереди ===== */
.waiting{position:relative;width:100%;border-radius:16px;overflow:hidden;padding:20px 22px;text-align:center;
    background:linear-gradient(150deg,var(--bg),var(--bg-2));border:1px solid var(--line-gold);
    box-shadow:0 12px 30px rgba(0,0,0,0.4),0 0 0 1px rgba(217,180,101,.05) inset;
    animation:qEnter .5s cubic-bezier(.16,1,.3,1);}
.waiting::before{content:'';position:absolute;inset:-40%;background:radial-gradient(circle at 50% 30%,rgba(217,180,101,.16),transparent 60%);
    animation:waitGlow 3.2s ease-in-out infinite;}
@keyframes waitGlow{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
.waiting-inner{position:relative;z-index:1;}
.waiting .wicon{width:30px;height:30px;margin:0 auto 9px;animation:waitBreathe 2.4s ease-in-out infinite;}
@keyframes waitBreathe{0%,100%{transform:scale(1);filter:drop-shadow(0 0 4px var(--gold-soft))}50%{transform:scale(1.14);filter:drop-shadow(0 0 12px var(--gold-soft))}}
.waiting .wtitle{font-size:1.08rem;font-weight:800;letter-spacing:.02em;color:var(--text);text-shadow:2px 2px 0 rgba(0,0,0,.7);}

/* ===== цены/инфо — компактные плашки под доской ===== */
.price-panel{width:100%;display:flex;flex-direction:column;gap:6px;align-items:center;}
.price-pill{display:inline-flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:6px 12px;
    padding:14px 28px;border-radius:999px;max-width:100%;
    background:rgba(19,20,23,0.92);border:1px solid var(--line-gold);
    box-shadow:0 10px 26px rgba(0,0,0,0.45),0 0 26px rgba(217,180,101,.1);}
.price-pill .lbl{font-size:1.05rem;font-weight:800;color:var(--text);letter-spacing:.03em;text-shadow:1px 1px 0 rgba(0,0,0,.7);}
.price-pill .val{font-size:1.28rem;font-weight:900;color:#f0d488;font-variant-numeric:tabular-nums;text-shadow:1px 1px 0 rgba(0,0,0,.7),0 0 10px rgba(217,180,101,.45);}
.price-pill.fade{animation:priceFade .35s ease;}
@keyframes priceFade{from{opacity:.35;transform:translateY(4px)}to{opacity:1;transform:none}}
.info-text{max-width:100%;text-align:center;font-size:.78rem;font-weight:600;color:var(--text-dim);
    line-height:1.5;white-space:pre-line;text-shadow:1px 1px 0 rgba(0,0,0,.7);}
</style>
</head>
<body>
<div class="scale" id="scale">
    <div class="stage">
        <div class="title-pill">
            <span class="tx">ОЧЕРЕДЬ ТАНКОВ<span id="cntWrap" style="display:none"> · <span class="cnt" id="cnt">0</span></span></span>
        </div>
        <div class="board" id="queueList"></div>
        <div class="price-panel" id="pricePanel">
            <div class="price-pill" id="mainPricePill">
                <span class="lbl" id="mainPriceLabel">Заказ танка</span>
                <span class="val" id="mainPriceValue">0р</span>
            </div>
            <div class="price-pill" id="top1PricePill" style="display:none">
                <span class="lbl" id="top1PriceLabel"></span>
                <span class="val" id="top1PriceValue"></span>
            </div>
            <div class="info-text" id="priceInfoEl" style="display:none"></div>
        </div>
    </div>
</div>

<script>
const DESIGN_W = 460;
let tanks = [];
let currentTankIndex = -1;
let orderPrice = 0;
let orderPriceTop1 = 0;
let orderPricePriority = 0;
let orderPriceMega = 0;
let priceInfo = '';
let orderPriceLabel = 'Заказ танка';
let orderPriceTop1Label = 'Заказ танка до топ 1';
let orderPricePriorityLabel = 'Приоритетный заказ';
let orderPriceMegaLabel = 'Мегаприоритет';
let orderPriceEnabled = true;
let orderPriceTop1Enabled = true;
let orderPricePriorityEnabled = true;
let orderPriceMegaEnabled = true;
let priceCarouselInterval = 15;
let currentCarouselIndex = 0;
let carouselTimer = null;
let lastMainPriceSignature = '';
let lastKeys = null;

document.addEventListener('DOMContentLoaded', () => { scale(); addEventListener('resize', scale); loadData(); });
function scale(){
    // Увеличиваем виджет только на широких канвасах; на узких ширина и раскладка
    // подстраиваются самой вёрсткой (clamp/flex), а не общим уменьшением масштаба.
    const s = innerWidth > DESIGN_W ? Math.min(innerWidth / DESIGN_W, 1.3) : 1;
    document.getElementById('scale').style.setProperty('--s', s);
}
function esc(s){ const d = document.createElement('div'); d.textContent = String(s == null ? '' : s); return d.innerHTML; }

async function loadData(){
    try {
        const res = await fetch(`/api/tank-queue?lite=1&t=${Date.now()}`);
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Ошибка загрузки данных');

        tanks = Array.isArray(data.tanks) ? data.tanks : [];
        currentTankIndex = data.currentTankIndex !== undefined ? data.currentTankIndex : -1;
        orderPrice = data.orderPrice !== undefined ? data.orderPrice : 0;
        orderPriceTop1 = data.orderPriceTop1 !== undefined ? data.orderPriceTop1 : 0;
        orderPricePriority = data.orderPricePriority !== undefined ? data.orderPricePriority : 0;
        orderPriceMega = data.orderPriceMega !== undefined ? data.orderPriceMega : 0;
        priceInfo = data.priceInfo !== undefined ? data.priceInfo : '';
        orderPriceLabel = data.orderPriceLabel || 'Заказ танка';
        orderPriceTop1Label = data.orderPriceTop1Label || 'Заказ танка до топ 1';
        orderPricePriorityLabel = data.orderPricePriorityLabel || 'Приоритетный заказ';
        orderPriceMegaLabel = data.orderPriceMegaLabel || 'Мегаприоритет';
        orderPriceEnabled = data.orderPriceEnabled !== undefined ? (data.orderPriceEnabled === 1 || data.orderPriceEnabled === true) : true;
        orderPriceTop1Enabled = data.orderPriceTop1Enabled !== undefined ? (data.orderPriceTop1Enabled === 1 || data.orderPriceTop1Enabled === true) : true;
        orderPricePriorityEnabled = data.orderPricePriorityEnabled !== undefined ? (data.orderPricePriorityEnabled === 1 || data.orderPricePriorityEnabled === true) : true;
        orderPriceMegaEnabled = data.orderPriceMegaEnabled !== undefined ? (data.orderPriceMegaEnabled === 1 || data.orderPriceMegaEnabled === true) : true;
        priceCarouselInterval = data.priceCarouselInterval !== undefined ? (parseInt(data.priceCarouselInterval, 10) || 15) : 15;

        syncPricePanel();
        renderQueue();
    } catch (err) {
        console.error('Error loading data:', err);
        const queueList = document.getElementById('queueList');
        if (queueList) queueList.innerHTML = `<div class="waiting"><div class="waiting-inner">
            <div class="wtitle">Ошибка загрузки данных</div>
        </div></div>`;
    }
}

function getMainPriceSlides(){
    const slides = [];
    if (orderPriceEnabled) slides.push({ label: orderPriceLabel, price: orderPrice });
    if (orderPricePriorityEnabled) slides.push({ label: orderPricePriorityLabel, price: orderPricePriority });
    if (orderPriceMegaEnabled) slides.push({ label: orderPriceMegaLabel, price: orderPriceMega });
    return slides;
}

function updatePricePanelView(){
    const slides = getMainPriceSlides();
    const mainPill = document.getElementById('mainPricePill');
    const mainLbl = document.getElementById('mainPriceLabel');
    const mainVal = document.getElementById('mainPriceValue');
    const top1Pill = document.getElementById('top1PricePill');
    const top1Lbl = document.getElementById('top1PriceLabel');
    const top1Val = document.getElementById('top1PriceValue');
    const infoEl = document.getElementById('priceInfoEl');

    if (slides.length && mainPill && mainLbl && mainVal) {
        const s = slides[currentCarouselIndex % slides.length];
        mainPill.style.display = 'inline-flex';
        mainPill.classList.remove('fade');
        void mainPill.offsetWidth;
        mainPill.classList.add('fade');
        mainLbl.textContent = s.label;
        mainVal.textContent = s.price + 'р';
    } else if (mainPill) {
        mainPill.style.display = 'none';
    }

    if (top1Pill && top1Lbl && top1Val) {
        if (orderPriceTop1Enabled) {
            top1Pill.style.display = 'inline-flex';
            top1Lbl.textContent = orderPriceTop1Label;
            top1Val.textContent = orderPriceTop1 + 'р';
        } else {
            top1Pill.style.display = 'none';
        }
    }

    if (infoEl) {
        if (priceInfo) {
            infoEl.textContent = priceInfo;
            infoEl.style.display = '';
        } else {
            infoEl.style.display = 'none';
        }
    }
}

function stopPriceCarousel(){
    if (carouselTimer) {
        clearInterval(carouselTimer);
        carouselTimer = null;
    }
}

function startPriceCarousel(){
    stopPriceCarousel();
    const slides = getMainPriceSlides();
    if (slides.length <= 1) return;
    const ms = Math.max(1000, (priceCarouselInterval || 15) * 1000);
    carouselTimer = setInterval(() => {
        const count = getMainPriceSlides().length;
        if (count <= 1) { stopPriceCarousel(); return; }
        currentCarouselIndex = (currentCarouselIndex + 1) % count;
        updatePricePanelView();
    }, ms);
}

function syncPricePanel(){
    const slides = getMainPriceSlides();
    const signature = JSON.stringify(slides) + '|' + priceCarouselInterval + '|' + orderPriceTop1Enabled + '|' + orderPriceTop1 + '|' + orderPriceTop1Label;

    if (signature !== lastMainPriceSignature) {
        currentCarouselIndex = 0;
        if (currentCarouselIndex >= slides.length) currentCarouselIndex = 0;
        lastMainPriceSignature = signature;
        updatePricePanelView();
        stopPriceCarousel();
        if (slides.length > 1) startPriceCarousel();
    }
}

function sortTanks(list){ return [...list].sort((a, b) => b.price - a.price); }

function priorityTier(tank){
    if (tank.priority === 2) return 'mega';
    if (tank.priority === 1) return 'priority';
    return '';
}

function tankKey(t){ return (t.addedAt != null ? t.addedAt : '') + '|' + t.name + '|' + t.price; }

function buildItemEl(tank, index){
    const tier = priorityTier(tank);
    const el = document.createElement('div');
    el.className = 'q-item' + (tier ? ' ' + tier : '');
    el.dataset.key = tankKey(tank);
    el.innerHTML = `<div class="q-row">
        <div class="rank">${index + 1}</div>
        <div class="who">
            <div class="name-line"><span class="name"></span></div>
        </div>
        <div class="price-wrap"><span class="pre">за</span><span class="price"></span></div>
    </div>`;
    updateItemContent(el, tank, index);
    return el;
}

function updateItemContent(el, tank, index){
    const tier = priorityTier(tank);
    el.className = 'q-item' + (tier ? ' ' + tier : '');
    el.querySelector('.rank').textContent = index + 1;
    el.querySelector('.name').textContent = tank.name || '';
    const who = el.querySelector('.who');
    let condEl = who.querySelector('.cond');
    if (tank.conditions) {
        if (!condEl) { condEl = document.createElement('div'); condEl.className = 'cond'; who.appendChild(condEl); }
        condEl.textContent = tank.conditions;
    } else if (condEl) {
        condEl.remove();
    }
    el.querySelector('.price').textContent = tank.price + 'р';
}

/* Плавное исчезновение карточки: снимаем её с потока (FLIP), она уезжает в сторону и тает,
   а соседние карточки сами занимают освободившееся место. */
function animateItemOut(el){
    if (el.dataset.leaving) return;
    el.dataset.leaving = '1';
    const rect = el.getBoundingClientRect();
    const parentRect = el.parentElement.getBoundingClientRect();
    el.style.position = 'absolute';
    el.style.left = (rect.left - parentRect.left) + 'px';
    el.style.top = (rect.top - parentRect.top) + 'px';
    el.style.width = rect.width + 'px';
    el.style.margin = '0';
    el.style.zIndex = '0';
    el.style.transition = 'opacity .32s ease, transform .32s cubic-bezier(.4,0,.2,1)';
    void el.offsetHeight;
    el.style.opacity = '0';
    el.style.transform = 'translateX(26px) scale(.94)';
    el.addEventListener('transitionend', () => el.remove(), { once: true });
}

function renderQueue(){
    const queueList = document.getElementById('queueList');
    const cntWrap = document.getElementById('cntWrap');
    const cnt = document.getElementById('cnt');
    if (!queueList) return;

    const sorted = sortTanks(tanks);
    const queueTanks = sorted.filter((_, i) => i !== currentTankIndex);

    if (queueTanks.length > 5) {
        cnt.textContent = queueTanks.length;
        cntWrap.style.display = 'inline';
    } else {
        cntWrap.style.display = 'none';
    }

    const visible = queueTanks.slice(0, 5);
    const keys = visible.map(t => tankKey(t) + ':' + (t.conditions || '') + ':' + (t.priority || 0)).join(',');
    if (keys === lastKeys) return;
    lastKeys = keys;

    const waitingEl = queueList.querySelector('.waiting');

    if (!visible.length) {
        queueList.querySelectorAll(':scope > .q-item:not([data-leaving])').forEach(animateItemOut);
        if (!waitingEl) {
            const w = document.createElement('div');
            w.className = 'waiting';
            w.innerHTML = `<div class="waiting-inner">
                <div class="wtitle">Очередь пуста</div>
            </div>`;
            queueList.appendChild(w);
        }
        return;
    }

    if (waitingEl) waitingEl.remove();

    const existing = new Map();
    queueList.querySelectorAll(':scope > .q-item:not([data-leaving])').forEach(el => existing.set(el.dataset.key, el));
    const firstRects = new Map();
    existing.forEach((el, key) => firstRects.set(key, el.getBoundingClientRect()));

    const newKeys = new Set(visible.map(tankKey));
    existing.forEach((el, key) => { if (!newKeys.has(key)) animateItemOut(el); });

    let prevEl = null;
    const entering = [];
    visible.forEach((tank, i) => {
        const key = tankKey(tank);
        let el = existing.get(key);
        if (el) {
            updateItemContent(el, tank, i);
        } else {
            el = buildItemEl(tank, i);
            entering.push(el);
        }
        if (prevEl) prevEl.after(el); else queueList.prepend(el);
        prevEl = el;
    });

    // FLIP: карточки, которые остались в очереди, плавно доезжают на новое место при сортировке/сдвиге
    existing.forEach((el, key) => {
        if (!newKeys.has(key)) return;
        const first = firstRects.get(key);
        const last = el.getBoundingClientRect();
        const dx = first.left - last.left;
        const dy = first.top - last.top;
        if (dx || dy) {
            el.style.transition = 'none';
            el.style.transform = `translate(${dx}px, ${dy}px)`;
            requestAnimationFrame(() => {
                el.style.transition = 'transform .38s cubic-bezier(.4,0,.2,1)';
                el.style.transform = '';
            });
        }
    });

    entering.forEach(el => {
        el.classList.add('q-item-enter');
        el.addEventListener('animationend', () => el.classList.remove('q-item-enter'), { once: true });
    });
}

setInterval(loadData, 2000);
</script>
</body>
</html>
