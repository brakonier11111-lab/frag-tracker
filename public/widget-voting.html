<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voting Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#ffce46;--gold-rgb:255,206,70;--text-shadow:0 2px 3px rgba(0,0,0,.9),0 0 3px rgba(0,0,0,.8);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;min-height:100vh;overflow:hidden;background:transparent;}
body{font-family:'Exo 2',sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;text-shadow:var(--text-shadow);}

.idle{display:none;text-align:center;padding:24px;font-size:1rem;font-weight:800;color:rgba(255,255,255,.55);
    background:rgba(8,10,19,.6);border-radius:16px;border:1.5px solid rgba(255,255,255,.1);}
.idle.show{display:block;}

.card{display:none;background:linear-gradient(165deg,rgba(13,16,28,.94),rgba(8,10,19,.94));
    border-radius:1.2rem;padding:1.2rem 1.3rem;border:1.5px solid rgba(255,255,255,.12);
    box-shadow:0 18px 44px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.06);}
.card.show{display:block;animation:cardIn .35s ease;}
@keyframes cardIn{from{opacity:0;transform:scale(.96) translateY(6px);}to{opacity:1;transform:scale(1) translateY(0);}}
.card.vertical{width:25rem;}
.card.horizontal{width:43rem;}

.title{font-size:1.15rem;font-weight:900;margin-bottom:1rem;text-align:center;letter-spacing:.01em;}

.options{display:flex;gap:.65rem;margin-bottom:.9rem;}
.options.vertical{flex-direction:column;}
.options.horizontal{flex-direction:row;align-items:stretch;}

.opt{position:relative;border-top:3px solid var(--accent,#4be0ff);background:rgba(255,255,255,.04);
    border-radius:.2rem .2rem .8rem .8rem;transition:box-shadow .35s,transform .35s,background .35s;}

.avatar{display:flex;align-items:center;justify-content:center;font-weight:900;color:#04121a;
    background:var(--accent,#4be0ff);flex:none;text-shadow:none;}

.crown{position:absolute;font-size:1rem;filter:drop-shadow(0 2px 2px rgba(0,0,0,.6));}

/* Вертикальный вариант (по умолчанию) — карточки друг под другом: картинка/аватар
   слева, справа от неё название и сразу под названием процент; количество
   голосов и подсказка с ключевым словом — мелким текстом ниже. */
.vertical .opt{display:flex;align-items:center;gap:.75rem;padding:.65rem .85rem;border-top:none;border-left:3px solid var(--accent,#4be0ff);border-radius:.2rem .8rem .8rem .2rem;}
.vertical .opt img,.vertical .opt .avatar{width:2.7rem;height:2.7rem;border-radius:.6rem;object-fit:cover;flex:none;}
.vertical .opt .avatar{font-size:1.15rem;}
.vertical .opt-main{flex:1;min-width:0;}
.vertical .opt-name{font-weight:800;font-size:1.02rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.vertical .opt-pct{font-weight:900;font-size:1.2rem;font-family:Consolas,monospace;color:rgba(255,255,255,.94);margin-top:.1rem;}
.vertical .opt-sub{font-size:.78rem;color:rgba(255,255,255,.75);margin-top:.15rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.vertical .crown{top:-.5rem;left:-.5rem;}

/* Горизонтальный вариант — 1-й вариант слева, 2-й справа (и далее, если их больше) */
.horizontal .opt{flex:1;display:flex;flex-direction:column;align-items:center;gap:.35rem;padding:.9rem .6rem;}
.horizontal .opt img,.horizontal .opt .avatar{width:3.7rem;height:3.7rem;border-radius:.7rem;object-fit:cover;}
.horizontal .opt .avatar{font-size:1.5rem;}
.horizontal .opt-name{font-weight:800;font-size:.98rem;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}
.horizontal .opt-count{font-weight:900;font-size:1.35rem;font-family:Consolas,monospace;color:rgba(255,255,255,.94);}
.horizontal .opt-count small{font-weight:700;font-size:.78rem;color:rgba(255,255,255,.55);font-family:'Exo 2',sans-serif;margin-left:.3rem;}
.horizontal .opt-hint{font-size:.82rem;color:rgba(255,255,255,.85);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}
.horizontal .crown{top:-.6rem;left:50%;transform:translateX(-50%);}

.opt.leader{background:rgba(var(--gold-rgb),.08);box-shadow:0 0 18px 1px rgba(var(--gold-rgb),.5);}
.opt.leader .opt-name,.opt.leader .opt-count,.opt.leader .opt-pct{color:var(--gold);}

/* Общая перетягивающая шкала — сегмент на вариант, ширина = доля голосов от общего
   числа; двигается плавно при каждом новом голосе, граница между сегментами
   сдвигается в сторону варианта с меньшим числом голосов (как в "Стример vs
   Зритель"), вместо отдельного бара на каждый вариант. */
.tug{display:flex;width:100%;height:1.35rem;border-radius:.75rem;overflow:hidden;
    background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.12);box-shadow:inset 0 1px 3px rgba(0,0,0,.4);}
.tug-seg{height:100%;transition:flex-basis .6s cubic-bezier(.16,1,.3,1);flex:0 0 auto;
    border-right:1px solid rgba(0,0,0,.35);box-shadow:inset 0 1px 0 rgba(255,255,255,.18);}
.tug-seg:last-child{border-right:none;}

.footer{margin-top:.7rem;text-align:center;font-size:.76rem;color:rgba(255,255,255,.6);letter-spacing:.02em;}
</style>
</head>
<body>
<div class="idle" id="idle">Голосование не активно</div>
<div class="card" id="card">
    <div class="title" id="pollTitle"></div>
    <div class="options" id="optionsBox"></div>
    <div class="tug" id="tugBar"></div>
    <div class="footer" id="footer"></div>
</div>

<script>
const params = new URLSearchParams(location.search);
const pinnedPollId = params.get('poll') ? Number(params.get('poll')) : null;
const layout = params.get('layout') === 'horizontal' ? 'horizontal' : 'vertical';
// Для ровно 2 вариантов — фирменные синий/красный (как в "Стример vs Зритель"),
// для 3+ — циклический набор цветов.
const PALETTE = ['#4be0ff', '#ff2a45', '#ffce46', '#36f5a0', '#b388ff', '#ff8a3d'];
let currentPoll = null;

function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

document.getElementById('card').classList.add(layout);
document.getElementById('optionsBox').classList.add(layout);

function render(poll) {
    const idle = document.getElementById('idle');
    const card = document.getElementById('card');
    if (!poll || poll.status !== 'active') {
        idle.classList.add('show');
        card.classList.remove('show');
        return;
    }
    idle.classList.remove('show');
    card.classList.add('show');

    document.getElementById('pollTitle').textContent = poll.title;

    const box = document.getElementById('optionsBox');
    box.innerHTML = '';
    poll.options.forEach((o, i) => {
        const color = PALETTE[i % PALETTE.length];
        const el = document.createElement('div');
        el.className = 'opt' + (o.isLeader ? ' leader' : '');
        el.style.setProperty('--accent', color);
        const media = o.imageUrl
            ? `<img src="${esc(o.imageUrl)}">`
            : `<div class="avatar">${esc((o.label || '?').trim().charAt(0).toUpperCase())}</div>`;
        const crown = o.isLeader ? `<span class="crown">👑</span>` : '';
        el.innerHTML = layout === 'vertical' ? `
            ${crown}${media}
            <div class="opt-main">
                <div class="opt-name">${esc(o.label)}</div>
                <div class="opt-pct">${o.pct}%</div>
                <div class="opt-sub">${o.votes} голосов · Напишите «${esc(o.keyword)}»</div>
            </div>
        ` : `
            ${crown}${media}
            <span class="opt-name">${esc(o.label)}</span>
            <span class="opt-count">${o.votes}<small>${o.pct}%</small></span>
            <span class="opt-hint">Напишите «${esc(o.keyword)}»</span>
        `;
        box.appendChild(el);
    });

    const tug = document.getElementById('tugBar');
    tug.innerHTML = '';
    poll.options.forEach((o, i) => {
        const seg = document.createElement('div');
        seg.className = 'tug-seg';
        seg.style.background = PALETTE[i % PALETTE.length];
        seg.style.flexBasis = (poll.totalVotes > 0 ? o.pct : (100 / poll.options.length)) + '%';
        tug.appendChild(seg);
    });

    document.getElementById('footer').textContent = `Всего проголосовало: ${poll.totalVotes}`;
}

async function loadInitial() {
    try {
        const r = await fetch('/api/voting/polls');
        const d = await r.json();
        if (!d.success) return;
        let poll = null;
        if (pinnedPollId) {
            poll = d.polls.find((p) => p.id === pinnedPollId) || null;
        } else {
            poll = d.polls.filter((p) => p.status === 'active').sort((a, b) => b.id - a.id)[0] || null;
        }
        currentPoll = poll;
        render(poll);
    } catch (e) { /* noop */ }
}

function connectWS() {
    const ws = new WebSocket((location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws?type=widget');
    ws.onmessage = (ev) => {
        try {
            const m = JSON.parse(ev.data);
            if (m.type === 'VOTING_UPDATE' && m.poll) {
                if (pinnedPollId ? m.poll.id === pinnedPollId : (!currentPoll || m.poll.status === 'active')) {
                    currentPoll = m.poll;
                    render(m.poll);
                }
            } else if (m.type === 'VOTING_CLOSED' && m.poll) {
                if (currentPoll && currentPoll.id === m.poll.id) {
                    currentPoll = m.poll;
                    render(m.poll);
                }
            } else if (m.type === 'VOTING_DELETED') {
                if (currentPoll && currentPoll.id === m.pollId) {
                    currentPoll = null;
                    render(null);
                }
            }
        } catch (e) { /* noop */ }
    };
    ws.onclose = () => setTimeout(connectWS, 3000);
    ws.onerror = () => ws.close();
}

loadInitial();
connectWS();
</script>
</body>
</html>
