<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-red: #ff003c;
            --neon-blue: #00f0ff;
            --neon-purple: #b300ff;
            --neon-green: #00ff47;
            --neon-yellow: #ffff00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: transparent;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .roulette-container {
            width: 100%;
            max-width: 800px;
            position: relative;
        }

        .roulette-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--neon-yellow);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 
                0 0 10px rgba(255, 255, 0, 0.8),
                0 0 20px rgba(255, 255, 0, 0.6);
            margin-bottom: 15px;
            text-align: center;
        }

        .roulette-progress-container {
            position: relative;
            width: 100%;
            height: 70px;
            background: linear-gradient(135deg, 
                rgba(5, 5, 15, 0.95) 0%,
                rgba(8, 8, 20, 0.95) 50%,
                rgba(12, 12, 25, 0.95) 100%
            );
            border: 2px solid var(--neon-yellow);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 
                0 0 15px rgba(255, 255, 0, 0.3),
                inset 0 0 10px rgba(255, 255, 0, 0.1),
                inset 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .roulette-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, 
                rgba(255, 255, 0, 0.4) 0%,
                rgba(255, 255, 0, 0.6) 50%,
                rgba(255, 255, 0, 0.4) 100%
            );
            width: 0%;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            position: relative;
            box-shadow: 
                0 0 20px rgba(255, 255, 0, 0.5),
                0 0 40px rgba(255, 255, 0, 0.3),
                inset 0 0 15px rgba(255, 255, 0, 0.2);
        }

        .roulette-progress-bar::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: -10px;
            height: 20px;
            background: linear-gradient(to bottom,
                rgba(255, 255, 0, 0.3) 0%,
                rgba(255, 255, 0, 0.15) 50%,
                transparent 100%
            );
            box-shadow: 
                0 5px 20px rgba(255, 255, 0, 0.3),
                0 10px 40px rgba(255, 255, 0, 0.2),
                0 15px 60px rgba(255, 255, 0, 0.1);
            pointer-events: none;
            border-radius: 0 0 10px 10px;
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                opacity: 0.6;
                box-shadow: 
                    0 5px 20px rgba(255, 255, 0, 0.3),
                    0 10px 40px rgba(255, 255, 0, 0.2),
                    0 15px 60px rgba(255, 255, 0, 0.1);
            }
            50% {
                opacity: 1;
                box-shadow: 
                    0 5px 30px rgba(255, 255, 0, 0.5),
                    0 10px 50px rgba(255, 255, 0, 0.4),
                    0 15px 70px rgba(255, 255, 0, 0.3);
            }
        }

        .roulette-current-amount {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            font-weight: 700;
            font-family: 'Rajdhani', sans-serif;
            color: #ffffff;
            z-index: 2;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            white-space: nowrap;
            letter-spacing: 1px;
        }

        .roulette-current-amount .amount-number {
            font-size: 2rem;
            font-weight: 800;
        }

        .roulette-target-amount {
            margin-top: 8px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--neon-yellow);
            text-shadow: 
                0 0 15px rgba(255, 255, 0, 0.9),
                0 2px 4px rgba(0, 0, 0, 0.8);
            white-space: nowrap;
            letter-spacing: 1px;
        }

        .roulette-accumulated {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3rem;
            font-weight: 900;
            font-family: 'Orbitron', monospace;
            color: var(--neon-yellow);
            text-shadow: 
                0 0 6px rgba(255, 255, 0, 0.8),
                0 0 12px rgba(255, 255, 0, 0.6),
                0 0 18px rgba(255, 255, 0, 0.4),
                0 2px 4px rgba(0, 0, 0, 0.9);
            z-index: 2;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--neon-yellow);
            box-shadow: 
                0 0 15px rgba(255, 255, 0, 0.3),
                inset 0 0 10px rgba(255, 255, 0, 0.1);
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="roulette-container">
        <div class="roulette-title">КРУТИТЬ БАРАБАН</div>
        <div class="roulette-progress-container">
            <div class="roulette-progress-bar" id="rouletteProgressBar">
                <div class="roulette-current-amount" id="rouletteCurrentAmount">0₽</div>
            </div>
            <div class="roulette-accumulated" id="rouletteAccumulated" style="display: none;">×0</div>
        </div>
        <div class="roulette-target-amount" id="rouletteTargetAmount">1000₽</div>
    </div>

    <script>
        let rouletteState = {
            is_active: 0,
            target_amount: 1000,
            current_amount: 0,
            accumulated_roulettes: 0
        };

        const progressBar = document.getElementById('rouletteProgressBar');
        const currentAmountEl = document.getElementById('rouletteCurrentAmount');
        const targetAmountEl = document.getElementById('rouletteTargetAmount');
        const accumulatedEl = document.getElementById('rouletteAccumulated');

        function updateUI() {
            const current = parseFloat(rouletteState.current_amount || 0);
            const target = parseFloat(rouletteState.target_amount || 1000);
            const accumulated = parseInt(rouletteState.accumulated_roulettes || 0);
            
            const percent = target > 0 ? Math.min(100, (current / target) * 100) : 0;
            progressBar.style.width = percent + '%';
            
            currentAmountEl.innerHTML = '<span class="amount-number">' + Math.round(current) + '</span>₽';
            targetAmountEl.textContent = Math.round(target) + '₽';
            
            if (accumulated > 0) {
                accumulatedEl.textContent = '×' + accumulated;
                accumulatedEl.style.display = 'block';
            } else {
                accumulatedEl.style.display = 'none';
            }
        }

        // WebSocket подключение
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}`;
        let ws = null;

        function connectWebSocket() {
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    console.log('✅ WebSocket подключен для рулетки');
                    ws.send(JSON.stringify({ type: 'CLIENT_TYPE', clientType: 'WIDGET' }));
                };

                ws.onmessage = (event) => {
                    try {
                        const message = JSON.parse(event.data);
                        if (message.type === 'ROULETTE_UPDATE') {
                            rouletteState = message.state;
                            updateUI();
                        } else if (message.type === 'ROULETTE_COMPLETE') {
                            rouletteState = message.state;
                            updateUI();
                        }
                    } catch (e) {
                        console.error('Ошибка парсинга сообщения:', e);
                    }
                };

                ws.onerror = (error) => {
                    console.error('❌ WebSocket ошибка:', error);
                };

                ws.onclose = () => {
                    console.log('⚠️ WebSocket отключен, переподключение через 3 секунды...');
                    setTimeout(connectWebSocket, 3000);
                };
            } catch (error) {
                console.error('❌ Ошибка подключения WebSocket:', error);
                setTimeout(connectWebSocket, 3000);
            }
        }

        // Загрузка начального состояния
        async function loadState() {
            try {
                const response = await fetch('/api/roulette/state');
                const data = await response.json();
                if (data.success && data.state) {
                    rouletteState = data.state;
                    updateUI();
                }
            } catch (error) {
                console.error('❌ Ошибка загрузки состояния рулетки:', error);
            }
        }

        // Инициализация
        loadState();
        connectWebSocket();
        
        // Обновление каждые 2 секунды (fallback)
        setInterval(loadState, 2000);
    </script>
</body>
</html>
