<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Frag Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/styles/global.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { font-family: 'Inter', sans-serif; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            padding: 20px 30px;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card { padding: 25px; }

        .stat-card h3 {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .stat-change {
            font-size: 14px;
            margin-top: 8px;
        }

        .stat-change.positive {
            color: #10b981;
        }

        .stat-change.negative {
            color: #ef4444;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card { padding: 25px; }

        .chart-card h2 {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        .chart-container.large {
            height: 400px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .refresh-btn { padding: 10px 20px; }

        .period-selector {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        /* Period buttons используют стили из global.css */
    </style>
</head>
<body class="theme-neon">
    <div class="container">
        <div class="header">
            <h1>📊 Dashboard - Аналитика в реальном времени</h1>
            <div class="period-selector">
                <button class="period-btn active" data-period="1d">24 часа</button>
                <button class="period-btn" data-period="7d">7 дней</button>
                <button class="period-btn" data-period="30d">30 дней</button>
                <button class="period-btn" data-period="all">Всё время</button>
                <button class="refresh-btn" onclick="loadDashboard()">🔄 Обновить</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Всего донатов</h3>
                <div class="stat-value" id="total-donations">-</div>
                <div class="stat-change positive" id="donations-change"></div>
            </div>
            <div class="stat-card">
                <h3>Сумма донатов</h3>
                <div class="stat-value" id="total-amount">- ₽</div>
                <div class="stat-change positive" id="amount-change"></div>
            </div>
            <div class="stat-card">
                <h3>Средний донат</h3>
                <div class="stat-value" id="avg-donation">- ₽</div>
            </div>
            <div class="stat-card">
                <h3>Уникальных донатеров</h3>
                <div class="stat-value" id="unique-donors">-</div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h2>📈 Динамика донатов по времени</h2>
                <div class="chart-container">
                    <canvas id="donationsChart"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <h2>💰 Распределение по сумме</h2>
                <div class="chart-container">
                    <canvas id="amountChart"></canvas>
                </div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h2>🏆 Топ 10 донатеров</h2>
                <div class="chart-container large">
                    <canvas id="topDonorsChart"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <h2>⏰ Активность по часам</h2>
                <div class="chart-container large">
                    <canvas id="hourlyChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPeriod = '1d';
        let charts = {};

        // Подключение к WebSocket для обновлений в реальном времени
        const ws = new WebSocket('ws://localhost:3000/ws');
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'donation') {
                // Обновляем dashboard при новом донате
                loadDashboard();
            }
        };

        // Выбор периода
        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPeriod = btn.dataset.period;
                loadDashboard();
            });
        });

        async function loadDashboard() {
            try {
                // Загружаем статистику
                const statsRes = await fetch(`/api/donations/stats?period=${currentPeriod}`);
                const statsData = await statsRes.json();
                
                if (statsData.success) {
                    updateStats(statsData.data);
                }

                // Загружаем топ донатеров
                const topDonorsRes = await fetch('/api/donations/top-donors?limit=10');
                const topDonorsData = await topDonorsRes.json();
                
                if (topDonorsData.success) {
                    updateTopDonorsChart(topDonorsData.data);
                }

                // Загружаем данные по времени (mock - нужно добавить API)
                updateChartsWithMockData();

            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        function updateStats(stats) {
            document.getElementById('total-donations').textContent = stats.total_count || 0;
            document.getElementById('total-amount').textContent = `${(stats.total_amount || 0).toFixed(2)} ₽`;
            document.getElementById('avg-donation').textContent = `${(stats.avg_amount || 0).toFixed(2)} ₽`;
            document.getElementById('unique-donors').textContent = stats.unique_donors || 0;
        }

        function updateTopDonorsChart(topDonors) {
            const ctx = document.getElementById('topDonorsChart');
            
            if (charts.topDonors) {
                charts.topDonors.destroy();
            }

            charts.topDonors = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: topDonors.map(d => d.username),
                    datasets: [{
                        label: 'Сумма донатов (₽)',
                        data: topDonors.map(d => d.total_amount),
                        backgroundColor: 'rgba(102, 126, 234, 0.8)',
                        borderColor: 'rgba(102, 126, 234, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });
        }

        function updateChartsWithMockData() {
            // Динамика донатов
            const donationsCtx = document.getElementById('donationsChart');
            if (charts.donations) charts.donations.destroy();
            
            charts.donations = new Chart(donationsCtx, {
                type: 'line',
                data: {
                    labels: ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'],
                    datasets: [{
                        label: 'Количество донатов',
                        data: [12, 19, 15, 25, 22, 30, 28],
                        borderColor: 'rgba(102, 126, 234, 1)',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });

            // Распределение по сумме
            const amountCtx = document.getElementById('amountChart');
            if (charts.amount) charts.amount.destroy();
            
            charts.amount = new Chart(amountCtx, {
                type: 'doughnut',
                data: {
                    labels: ['< 50₽', '50-100₽', '100-500₽', '> 500₽'],
                    datasets: [{
                        data: [30, 45, 20, 5],
                        backgroundColor: [
                            'rgba(239, 68, 68, 0.8)',
                            'rgba(251, 191, 36, 0.8)',
                            'rgba(16, 185, 129, 0.8)',
                            'rgba(102, 126, 234, 0.8)'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });

            // Активность по часам
            const hourlyCtx = document.getElementById('hourlyChart');
            if (charts.hourly) charts.hourly.destroy();
            
            const hours = Array.from({length: 24}, (_, i) => `${i}:00`);
            const hourlyData = [2, 1, 0, 0, 1, 3, 5, 8, 12, 15, 18, 20, 22, 25, 28, 30, 32, 28, 24, 20, 15, 10, 6, 3];
            
            charts.hourly = new Chart(hourlyCtx, {
                type: 'bar',
                data: {
                    labels: hours,
                    datasets: [{
                        label: 'Донаты по часам',
                        data: hourlyData,
                        backgroundColor: 'rgba(16, 185, 129, 0.8)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });
        }

        // Загружаем при старте
        loadDashboard();

        // Автообновление каждые 30 секунд
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
