<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature WebM Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        .webm-widget {
            position: relative;
            width: auto;
            height: auto;
            border-radius: 15px;
            overflow: visible;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .webm-widget.show {
            opacity: 1;
            transform: scale(1);
        }

        /* WebM видео фон с поддержкой альфа-канала */
        .webm-background {
            position: relative;
            width: auto;
            height: auto;
            max-width: none;
            max-height: none;
            object-fit: none;
            z-index: 1;
            /* Поддержка альфа-канала */
            mix-blend-mode: screen;
            background: transparent;
            /* Убираем все ограничения размера */
            min-width: 0;
            min-height: 0;
            /* Улучшение качества */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            filter: contrast(1.05) brightness(1.02);
        }

        /* Fallback контент */
        .fallback-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 200px;
            background: linear-gradient(135deg, 
                rgba(5, 5, 15, 0.95) 0%, 
                rgba(8, 8, 20, 0.9) 50%, 
                rgba(12, 12, 25, 0.85) 100%
            );
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ff4400;
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 68, 0, 0.8);
            z-index: 2;
            text-align: center;
            padding: 20px;
            border-radius: 15px;
        }

        .fallback-content.hidden {
            display: none;
        }

        .fallback-title {
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .fallback-info {
            font-size: 1.2rem;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }

        /* Анимация для fallback */
        .fallback-content {
            animation: fallbackGlow 2s ease-in-out infinite alternate;
        }

        @keyframes fallbackGlow {
            0% {
                box-shadow: inset 0 0 20px rgba(255, 68, 0, 0.3);
            }
            100% {
                box-shadow: inset 0 0 40px rgba(255, 68, 0, 0.6);
            }
        }
    </style>
</head>
<body>
    <div class="webm-widget" id="webmWidget">
        <!-- Fallback контент -->
        <div class="fallback-content" id="fallbackContent">
            <div class="fallback-title">ПЕРЕГРЕВ ТАЙМЕРА</div>
            <div class="fallback-info">
                Режим температуры активен<br>
                WebM видео загружается...
            </div>
        </div>
        
        <!-- WebM видео -->
        <video class="webm-background" id="webmElement" autoplay muted loop playsinline preload="auto">
            <source src="/assets/aFTER.webm" type="video/webm">
            <source src="/assets/Widget Peregrev.webm" type="video/webm">
            <!-- Fallback если WebM не поддерживается -->
            <div style="background: linear-gradient(135deg, rgba(5, 5, 15, 0.95) 0%, rgba(8, 8, 20, 0.9) 50%, rgba(12, 12, 25, 0.85) 100%); width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.2rem;">
                WebM не поддерживается
            </div>
        </video>
    </div>

    <script>
        let temperatureMode = {
            active: false,
            currentAmount: 0,
            targetAmount: 10000,
            coolingRate: 50,
            peakRewardMinutes: 5
        };

        let ws = null;
        let webmLoaded = false;

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws?type=widget`;
            
            console.log('🔗 Connecting to WebSocket:', wsUrl);
            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                console.log('✅ WebSocket connected');
            };

            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    console.log('📨 WebSocket message received:', data);
                    
                    switch(data.type) {
                        case 'INIT_STATE':
                            console.log('🔄 Initial state received:', data.state);
                            updateTemperatureMode(data.state.temperatureMode || temperatureMode);
                            break;
                        case 'temperature_mode_toggle':
                            temperatureMode.active = data.active;
                            temperatureMode.currentAmount = data.currentAmount || 0;
                            temperatureMode.targetAmount = data.targetAmount || 10000;
                            temperatureMode.coolingRate = data.coolingRate || 50;
                            temperatureMode.peakRewardMinutes = data.peakRewardMinutes || 5;
                            updateTemperatureMode(temperatureMode);
                            break;
                        case 'temperature_update':
                            temperatureMode.currentAmount = data.currentAmount;
                            temperatureMode.targetAmount = data.targetAmount || temperatureMode.targetAmount;
                            temperatureMode.coolingRate = data.coolingRate || temperatureMode.coolingRate;
                            temperatureMode.peakRewardMinutes = data.peakRewardMinutes || temperatureMode.peakRewardMinutes;
                            updateTemperatureMode(temperatureMode);
                            break;
                        case 'temperature_peak':
                            showTemperaturePeak(data);
                            break;
                        default:
                            console.log('📨 Other WebSocket message type:', data.type);
                    }
                } catch (e) {
                    console.error('Error parsing WebSocket message:', e);
                }
            };

            ws.onclose = function() {
                console.log('❌ WebSocket disconnected');
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = function(error) {
                console.error('❌ WebSocket error:', error);
            };
        }

        function updateTemperatureMode(data) {
            temperatureMode.active = data.active;
            temperatureMode.currentAmount = data.currentAmount || 0;
            temperatureMode.targetAmount = data.targetAmount || 10000;
            temperatureMode.coolingRate = data.coolingRate || 50;
            temperatureMode.peakRewardMinutes = data.peakRewardMinutes || 5;
            
            const webmWidgetEl = document.getElementById('webmWidget');
            const fallbackContent = document.getElementById('fallbackContent');
            
            if (temperatureMode.active) {
                // Показываем виджет при включении режима температуры
                webmWidgetEl.classList.add('show');
                console.log('🎬 WebM widget activated - temperature mode ON');
                
                // Скрываем fallback контент если WebM загружен
                if (webmLoaded) {
                    fallbackContent.classList.add('hidden');
                }
                
                // Обновляем информацию в fallback
                updateFallbackInfo();
            } else {
                // Скрываем виджет при выключении режима температуры
                webmWidgetEl.classList.remove('show');
                console.log('🎬 WebM widget deactivated - temperature mode OFF');
            }
        }

        function updateFallbackInfo() {
            const fallbackInfo = document.querySelector('.fallback-info');
            if (fallbackInfo) {
                const heatPercentage = (temperatureMode.currentAmount / temperatureMode.targetAmount) * 100;
                const clampedPercentage = Math.min(100, heatPercentage);
                const temperatureCelsius = Math.round(clampedPercentage);
                
                fallbackInfo.innerHTML = `
                    Температура: ${temperatureCelsius}°C<br>
                    Прогресс: ${Math.round(clampedPercentage)}%<br>
                    До перегрева: ${Math.round(Math.max(0, temperatureMode.targetAmount - temperatureMode.currentAmount))}₽
                `;
            }
        }

        function showTemperaturePeak(data) {
            console.log('🔥 Temperature peak reached!', data);
        }

        // Подключаемся к WebSocket при загрузке страницы
        connectWebSocket();

        // Обработчики событий для WebM
        document.addEventListener('DOMContentLoaded', function() {
            const webmElement = document.getElementById('webmElement');
            const fallbackContent = document.getElementById('fallbackContent');
            
            if (webmElement) {
                webmElement.addEventListener('loadedmetadata', function() {
                    console.log('📐 WebM метаданные загружены');
                    console.log('📐 Исходные размеры видео:', webmElement.videoWidth + 'x' + webmElement.videoHeight);
                    
                    // Устанавливаем размеры виджета равными размерам видео (1:1)
                    const webmWidget = document.getElementById('webmWidget');
                    webmWidget.style.width = webmElement.videoWidth + 'px';
                    webmWidget.style.height = webmElement.videoHeight + 'px';
                    
                    console.log('📐 Размеры виджета установлены:', webmElement.videoWidth + 'x' + webmElement.videoHeight);
                });
                
                webmElement.addEventListener('loadeddata', function() {
                    console.log('✅ WebM видео загружено успешно');
                    webmLoaded = true;
                    fallbackContent.classList.add('hidden');
                });
                
                webmElement.addEventListener('error', function(e) {
                    console.error('❌ Ошибка загрузки WebM:', e);
                    webmLoaded = false;
                    fallbackContent.classList.remove('hidden');
                });
                
                webmElement.addEventListener('play', function() {
                    console.log('▶️ WebM видео начало воспроизводиться');
                    fallbackContent.classList.add('hidden');
                });
                
                webmElement.addEventListener('pause', function() {
                    console.log('⏸️ WebM видео поставлено на паузу');
                });
                
                webmElement.addEventListener('ended', function() {
                    console.log('🔄 WebM видео закончилось, перезапускаем');
                    webmElement.currentTime = 0;
                    webmElement.play().catch(error => {
                        console.error('❌ Ошибка перезапуска WebM:', error);
                    });
                });
                
                // Принудительно пытаемся запустить WebM при загрузке страницы
                setTimeout(() => {
                    webmElement.play().catch(error => {
                        console.error('❌ Не удалось запустить WebM при загрузке:', error);
                        fallbackContent.classList.remove('hidden');
                    });
                }, 500);
            }
        });
    </script>
</body>
</html>
