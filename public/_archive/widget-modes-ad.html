<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реклама режимов - Минималистичный виджет</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-green: #00ff88;
            --neon-yellow: #ffff00;
            --neon-purple: #ff00ff;
            --neon-red: #ff0040;
            --neon-orange: #ff8800;
            --bg-dark: #0a0a0a;
            --text-light: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: transparent;
            color: var(--text-light);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        .ad-widget {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, 
                rgba(10, 10, 10, 0.95) 0%,
                rgba(20, 20, 20, 0.9) 100%
            );
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .ad-widget::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.03), transparent);
            animation: shimmer 4s infinite;
            pointer-events: none;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .mode-display {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
        }

        .mode-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            animation: iconPulse 2s ease-in-out infinite alternate;
        }

        @keyframes iconPulse {
            0% { transform: scale(1); filter: brightness(1); }
            100% { transform: scale(1.1); filter: brightness(1.2); }
        }

        .mode-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .mode-description {
            font-size: 0.9rem;
            opacity: 0.8;
            max-width: 200px;
            line-height: 1.3;
        }

        .mode-indicators {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
        }

        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .indicator.active {
            background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .cta-text {
            font-size: 0.8rem;
            opacity: 0.7;
            text-align: center;
            margin-top: 10px;
            font-style: italic;
        }

        /* Цветовые схемы для режимов */
        .mode-normal .mode-title { color: var(--neon-blue); }
        .mode-normal .indicator.active { background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }

        .mode-discount .mode-title { color: var(--neon-yellow); }
        .mode-discount .indicator.active { background: var(--neon-yellow); box-shadow: 0 0 10px var(--neon-yellow); }

        .mode-slowdown .mode-title { color: var(--neon-purple); }
        .mode-slowdown .indicator.active { background: var(--neon-purple); box-shadow: 0 0 10px var(--neon-purple); }

        .mode-temperature .mode-title { color: var(--neon-red); }
        .mode-temperature .indicator.active { background: var(--neon-red); box-shadow: 0 0 10px var(--neon-red); }

        /* Анимации появления */
        .mode-display {
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            0% { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            100% { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        /* Адаптивность */
        @media (max-width: 400px) {
            .mode-icon { font-size: 2.5rem; }
            .mode-title { font-size: 1.2rem; }
            .mode-description { font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="ad-widget" id="adWidget">
        <div class="mode-display">
            <div class="mode-icon" id="modeIcon">⏰</div>
            <div class="mode-title" id="modeTitle">ОБЫЧНЫЙ РЕЖИМ</div>
            <div class="mode-description" id="modeDescription">
                Классический таймер обратного отсчета
            </div>
            
            <div class="mode-indicators">
                <div class="indicator active" data-mode="normal"></div>
                <div class="indicator" data-mode="discount"></div>
                <div class="indicator" data-mode="slowdown"></div>
                <div class="indicator" data-mode="temperature"></div>
            </div>
            
            <div class="cta-text">
                Донатьте для активации режимов!
            </div>
        </div>
    </div>

    <script>
        const modes = [
            {
                id: 'normal',
                icon: '⏰',
                title: 'ОБЫЧНЫЙ РЕЖИМ',
                description: 'Классический таймер обратного отсчета',
                color: '#00d4ff'
            },
            {
                id: 'discount',
                icon: '🎁',
                title: 'РЕЖИМ СКИДКИ',
                description: 'Временные скидки на цену',
                color: '#ffff00'
            },
            {
                id: 'slowdown',
                icon: '🐢',
                title: 'ЗАМЕДЛЕНИЕ',
                description: 'Замедление времени в 2-10 раз',
                color: '#ff00ff'
            },
            {
                id: 'temperature',
                icon: '🔥',
                title: 'ПЕРЕГРЕВ',
                description: 'Система температуры с бонусами',
                color: '#ff0040'
            }
        ];

        let currentModeIndex = 0;
        let modeInterval;

        function updateModeDisplay(modeIndex) {
            const mode = modes[modeIndex];
            const widget = document.getElementById('adWidget');
            
            // Обновляем класс виджета
            widget.className = `ad-widget mode-${mode.id}`;
            
            // Обновляем содержимое
            document.getElementById('modeIcon').textContent = mode.icon;
            document.getElementById('modeTitle').textContent = mode.title;
            document.getElementById('modeDescription').textContent = mode.description;
            
            // Обновляем индикаторы
            document.querySelectorAll('.indicator').forEach((indicator, index) => {
                indicator.classList.toggle('active', index === modeIndex);
            });
            
            // Анимация появления
            const display = document.querySelector('.mode-display');
            display.style.animation = 'none';
            setTimeout(() => {
                display.style.animation = 'fadeInUp 0.8s ease-out';
            }, 10);
        }

        function startModeRotation() {
            modeInterval = setInterval(() => {
                currentModeIndex = (currentModeIndex + 1) % modes.length;
                updateModeDisplay(currentModeIndex);
            }, 4000); // Смена каждые 4 секунды
        }

        function stopModeRotation() {
            if (modeInterval) {
                clearInterval(modeInterval);
                modeInterval = null;
            }
        }

        // Обработка кликов по индикаторам
        document.querySelectorAll('.indicator').forEach((indicator, index) => {
            indicator.addEventListener('click', () => {
                currentModeIndex = index;
                updateModeDisplay(currentModeIndex);
                stopModeRotation();
                
                // Перезапускаем ротацию через 10 секунд
                setTimeout(startModeRotation, 10000);
            });
        });

        // Обработка hover для паузы
        const widget = document.getElementById('adWidget');
        widget.addEventListener('mouseenter', stopModeRotation);
        widget.addEventListener('mouseleave', startModeRotation);

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            updateModeDisplay(0);
            startModeRotation();
        });

        // Обработка видимости страницы (пауза при скрытии)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                stopModeRotation();
            } else {
                startModeRotation();
            }
        });
    </script>
</body>
</html>
