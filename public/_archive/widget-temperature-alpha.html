<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Alpha Video Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .alpha-widget {
            position: relative;
            width: 300px;
            height: 420px;
            border-radius: 15px;
            overflow: hidden;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s ease-out;
            /* Прозрачный фон для альфа-канала */
            background: transparent;
        }

        .alpha-widget.show {
            opacity: 1;
            transform: scale(1);
        }

        /* WebM видео с альфа-каналом */
        .alpha-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            /* Поддержка альфа-канала */
            background: transparent;
        }

        /* Fallback контент */
        .fallback-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, 
                rgba(5, 5, 15, 0.95) 0%, 
                rgba(8, 8, 20, 0.9) 50%, 
                rgba(12, 12, 25, 0.85) 100%
            );
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ff4400;
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 68, 0, 0.8);
            z-index: 2;
            text-align: center;
            padding: 20px;
        }

        .fallback-content.hidden {
            display: none;
        }

        .fallback-title {
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .fallback-info {
            font-size: 1.2rem;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }

        /* Анимация для fallback */
        .fallback-content {
            animation: fallbackGlow 2s ease-in-out infinite alternate;
        }

        @keyframes fallbackGlow {
            0% {
                box-shadow: inset 0 0 20px rgba(255, 68, 0, 0.3);
            }
            100% {
                box-shadow: inset 0 0 40px rgba(255, 68, 0, 0.6);
            }
        }

        /* Дополнительные стили для альфа-канала */
        .alpha-video::-webkit-media-controls {
            display: none !important;
        }

        .alpha-video::-webkit-media-controls-panel {
            display: none !important;
        }

        .alpha-video::-webkit-media-controls-play-button {
            display: none !important;
        }

        .alpha-video::-webkit-media-controls-timeline {
            display: none !important;
        }

        .alpha-video::-webkit-media-controls-current-time-display {
            display: none !important;
        }

        .alpha-video::-webkit-media-controls-time-remaining-display {
            display: none !important;
        }

        .alpha-video::-webkit-media-controls-mute-button {
            display: none !important;
        }

        .alpha-video::-webkit-media-controls-volume-slider {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="alpha-widget" id="alphaWidget">
        <!-- Fallback контент -->
        <div class="fallback-content" id="fallbackContent">
            <div class="fallback-title">ПЕРЕГРЕВ ТАЙМЕРА</div>
            <div class="fallback-info">
                Режим температуры активен<br>
                Альфа-видео загружается...
            </div>
        </div>
        
        <!-- WebM видео с альфа-каналом -->
        <video class="alpha-video" id="alphaVideo" autoplay muted loop playsinline preload="auto">
            <source src="/assets/aFTER.webm" type="video/webm">
            <!-- Fallback если WebM не поддерживается -->
            <div style="background: linear-gradient(135deg, rgba(5, 5, 15, 0.95) 0%, rgba(8, 8, 20, 0.9) 50%, rgba(12, 12, 25, 0.85) 100%); width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.2rem;">
                Альфа-видео не поддерживается
            </div>
        </video>
    </div>

    <script>
        let temperatureMode = {
            active: false,
            currentAmount: 0,
            targetAmount: 10000,
            coolingRate: 50,
            peakRewardMinutes: 5
        };

        let ws = null;
        let alphaVideoLoaded = false;

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws?type=widget`;
            
            console.log('🔗 Connecting to WebSocket:', wsUrl);
            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                console.log('✅ WebSocket connected');
            };

            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    console.log('📨 WebSocket message received:', data);
                    
                    switch(data.type) {
                        case 'INIT_STATE':
                            console.log('🔄 Initial state received:', data.state);
                            updateTemperatureMode(data.state.temperatureMode || temperatureMode);
                            break;
                        case 'temperature_mode_toggle':
                            temperatureMode.active = data.active;
                            temperatureMode.currentAmount = data.currentAmount || 0;
                            temperatureMode.targetAmount = data.targetAmount || 10000;
                            temperatureMode.coolingRate = data.coolingRate || 50;
                            temperatureMode.peakRewardMinutes = data.peakRewardMinutes || 5;
                            updateTemperatureMode(temperatureMode);
                            break;
                        case 'temperature_update':
                            temperatureMode.currentAmount = data.currentAmount;
                            temperatureMode.targetAmount = data.targetAmount || temperatureMode.targetAmount;
                            temperatureMode.coolingRate = data.coolingRate || temperatureMode.coolingRate;
                            temperatureMode.peakRewardMinutes = data.peakRewardMinutes || temperatureMode.peakRewardMinutes;
                            updateTemperatureMode(temperatureMode);
                            break;
                        case 'temperature_peak':
                            showTemperaturePeak(data);
                            break;
                        default:
                            console.log('📨 Other WebSocket message type:', data.type);
                    }
                } catch (e) {
                    console.error('Error parsing WebSocket message:', e);
                }
            };

            ws.onclose = function() {
                console.log('❌ WebSocket disconnected');
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = function(error) {
                console.error('❌ WebSocket error:', error);
            };
        }

        function updateTemperatureMode(data) {
            temperatureMode.active = data.active;
            temperatureMode.currentAmount = data.currentAmount || 0;
            temperatureMode.targetAmount = data.targetAmount || 10000;
            temperatureMode.coolingRate = data.coolingRate || 50;
            temperatureMode.peakRewardMinutes = data.peakRewardMinutes || 5;
            
            const alphaWidgetEl = document.getElementById('alphaWidget');
            const fallbackContent = document.getElementById('fallbackContent');
            
            if (temperatureMode.active) {
                // Показываем виджет при включении режима температуры
                alphaWidgetEl.classList.add('show');
                console.log('🎬 Alpha video widget activated - temperature mode ON');
                
                // Скрываем fallback контент если альфа-видео загружено
                if (alphaVideoLoaded) {
                    fallbackContent.classList.add('hidden');
                }
                
                // Обновляем информацию в fallback
                updateFallbackInfo();
            } else {
                // Скрываем виджет при выключении режима температуры
                alphaWidgetEl.classList.remove('show');
                console.log('🎬 Alpha video widget deactivated - temperature mode OFF');
            }
        }

        function updateFallbackInfo() {
            const fallbackInfo = document.querySelector('.fallback-info');
            if (fallbackInfo) {
                const heatPercentage = (temperatureMode.currentAmount / temperatureMode.targetAmount) * 100;
                const clampedPercentage = Math.min(100, heatPercentage);
                const temperatureCelsius = Math.round(clampedPercentage);
                
                fallbackInfo.innerHTML = `
                    Температура: ${temperatureCelsius}°C<br>
                    Прогресс: ${Math.round(clampedPercentage)}%<br>
                    До перегрева: ${Math.round(Math.max(0, temperatureMode.targetAmount - temperatureMode.currentAmount))}₽
                `;
            }
        }

        function showTemperaturePeak(data) {
            console.log('🔥 Temperature peak reached!', data);
        }

        // Подключаемся к WebSocket при загрузке страницы
        connectWebSocket();

        // Обработчики событий для альфа-видео
        document.addEventListener('DOMContentLoaded', function() {
            const alphaVideo = document.getElementById('alphaVideo');
            const fallbackContent = document.getElementById('fallbackContent');
            
            if (alphaVideo) {
                alphaVideo.addEventListener('loadeddata', function() {
                    console.log('✅ Альфа-видео загружено успешно');
                    alphaVideoLoaded = true;
                    fallbackContent.classList.add('hidden');
                });
                
                alphaVideo.addEventListener('error', function(e) {
                    console.error('❌ Ошибка загрузки альфа-видео:', e);
                    alphaVideoLoaded = false;
                    fallbackContent.classList.remove('hidden');
                });
                
                alphaVideo.addEventListener('play', function() {
                    console.log('▶️ Альфа-видео начало воспроизводиться');
                    fallbackContent.classList.add('hidden');
                });
                
                alphaVideo.addEventListener('pause', function() {
                    console.log('⏸️ Альфа-видео поставлено на паузу');
                });
                
                alphaVideo.addEventListener('ended', function() {
                    console.log('🔄 Альфа-видео закончилось, перезапускаем');
                    alphaVideo.currentTime = 0;
                    alphaVideo.play().catch(error => {
                        console.error('❌ Ошибка перезапуска альфа-видео:', error);
                    });
                });
                
                // Принудительно пытаемся запустить альфа-видео при загрузке страницы
                setTimeout(() => {
                    alphaVideo.play().catch(error => {
                        console.error('❌ Не удалось запустить альфа-видео при загрузке:', error);
                        fallbackContent.classList.remove('hidden');
                    });
                }, 500);
            }
        });
    </script>
</body>
</html>
