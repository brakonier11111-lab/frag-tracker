<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест DonatePay API</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --neon-red: #ff003c;
            --neon-blue: #00f0ff;
            --neon-purple: #b300ff;
            --neon-green: #00ff47;
            --neon-yellow: #ffff00;
            --dark: #0a0a14;
            --darker: #050508;
            --light: #f5f5f5;
            --widget-bg-opacity: 0.95;
        }

        body {
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            color: var(--light);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: linear-gradient(135deg, 
                rgba(5, 5, 15, var(--widget-bg-opacity)) 0%,
                rgba(8, 8, 20, calc(var(--widget-bg-opacity) * 0.9)) 50%,
                rgba(12, 12, 25, calc(var(--widget-bg-opacity) * 0.85)) 100%
            );
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 12px;
            padding: 30px;
            backdrop-filter: blur(15px);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                0 0 20px rgba(0, 240, 255, 0.1);
            position: relative;
            overflow: visible;
        }

        .container::before,
        .container::after {
            content: '';
            position: absolute;
            left: 8px;
            right: 8px;
            height: 4px;
            background:
                radial-gradient(12px 2px at left center, var(--neon-blue), rgba(0,0,0,0) 70%),
                linear-gradient(90deg, var(--neon-blue), var(--neon-blue)),
                radial-gradient(12px 2px at right center, var(--neon-blue), rgba(0,0,0,0) 70%);
            background-repeat: no-repeat;
            background-size: 12px 100%, calc(100% - 24px) 100%, 12px 100%;
            background-position: left center, center, right center;
        }
        .container::before { top: 6px; }
        .container::after { bottom: 6px; }
        
        h1 {
            font-family: 'Orbitron', monospace;
            font-size: 2.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--neon-red), var(--neon-blue));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(255, 0, 60, 0.5);
            text-align: center;
        }

        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .test-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--neon-green);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn {
            background: rgba(0, 240, 255, 0.2);
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        
        .btn:hover {
            background: rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .btn-success {
            border-color: var(--neon-green);
            color: var(--neon-green);
        }

        .btn-success:hover {
            background: rgba(0, 255, 71, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 71, 0.3);
        }

        .btn-danger {
            border-color: var(--neon-red);
            color: var(--neon-red);
        }

        .btn-danger:hover {
            background: rgba(255, 0, 60, 0.2);
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.3);
        }
        
        .result {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            white-space: pre-wrap;
            font-family: 'Orbitron', monospace;
            font-size: 0.9rem;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .success { 
            border-left: 4px solid var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 255, 71, 0.2);
        }
        
        .error { 
            border-left: 4px solid var(--neon-red);
            box-shadow: 0 0 10px rgba(255, 0, 60, 0.2);
        }

        .loading {
            border-left: 4px solid var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--neon-purple);
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: var(--neon-blue);
        }

        .api-key-input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: var(--light);
            font-family: 'Orbitron', monospace;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .btn {
                display: block;
                width: 100%;
                margin: 5px 0;
            }
        }
    </style>
</head>
<body>
    <a href="/" class="back-link">← НАЗАД</a>
    
    <div class="container">
        <h1>💰 Тест DonatePay API</h1>
        
        <div class="test-section">
            <div class="test-title">🔑 Настройка API ключа</div>
            <input type="text" id="apiKey" class="api-key-input" placeholder="Введите API ключ DonatePay" value="u0NsXcZXdNXrWoBwHFQ7QM50PUJiPRyj4Fwn0MYwYQUCNY9rqrRXwBvU7Cmg">
            <button class="btn btn-success" onclick="saveApiKey()">💾 Сохранить ключ</button>
        </div>
        
        <div class="test-section">
            <div class="test-title">🧪 Тестирование API</div>
            <button class="btn" onclick="testUser()">👤 Тест /user</button>
            <button class="btn" onclick="testTransactions()">💳 Тест /transactions</button>
            <button class="btn" onclick="testWidget()">🎨 Тест виджета</button>
            <button class="btn" onclick="testLastEvents()">📋 Тест last-events</button>
            <button class="btn btn-danger" onclick="clearResults()">🗑️ Очистить</button>
        </div>
        
        <div id="results"></div>
    </div>

    <script>
        let currentApiKey = '';

        function saveApiKey() {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) {
                alert('Введите API ключ');
                return;
            }
            
            currentApiKey = apiKey;
            addResult('💾 API ключ', `Ключ сохранен: ${apiKey.substring(0, 10)}...`, 'success');
        }

        function addResult(title, content, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = `<strong>${title}</strong>\n${content}`;
            results.appendChild(div);
            results.scrollTop = results.scrollHeight;
        }

        function testUser() {
            if (!currentApiKey) {
                alert('Сначала сохраните API ключ');
                return;
            }

            addResult('👤 Тест /user', 'Запрос информации о пользователе...', 'loading');

            fetch(`https://donatepay.ru/api/v1/user?access_token=${currentApiKey}`)
                .then(response => response.json())
                .then(data => {
                    if (data.data) {
                        addResult('✅ /user успешно', 
                            `ID: ${data.data.id}\n` +
                            `Имя: ${data.data.name}\n` +
                            `Баланс: ${data.data.balance}₽\n` +
                            `Выведено: ${data.data.cashout_sum}₽\n` +
                            `Аватар: ${data.data.avatar || 'Нет'}`, 
                            'success'
                        );
                    } else {
                        addResult('❌ Ошибка /user', `Ошибка: ${data.message || 'Неизвестная ошибка'}`, 'error');
                    }
                })
                .catch(error => {
                    addResult('❌ Ошибка запроса /user', `Ошибка: ${error.message}`, 'error');
                });
        }

        function testTransactions() {
            if (!currentApiKey) {
                alert('Сначала сохраните API ключ');
                return;
            }

            addResult('💳 Тест /transactions', 'Запрос транзакций...', 'loading');

            fetch(`https://donatepay.ru/api/v1/transactions?access_token=${currentApiKey}&limit=10&type=donation&status=success&order=DESC`)
                .then(response => response.json())
                .then(data => {
                    if (data.data && Array.isArray(data.data)) {
                        let result = `Найдено транзакций: ${data.data.length}\n\n`;
                        
                        data.data.forEach((transaction, index) => {
                            result += `${index + 1}. ID: ${transaction.id}\n`;
                            result += `   Имя: ${transaction.what || 'Аноним'}\n`;
                            result += `   Сумма: ${transaction.sum}₽\n`;
                            result += `   Комментарий: ${transaction.comment || 'Нет'}\n`;
                            result += `   Дата: ${transaction.created_at}\n`;
                            result += `   Статус: ${transaction.status}\n\n`;
                        });
                        
                        addResult('✅ /transactions успешно', result, 'success');
                    } else {
                        addResult('❌ Ошибка /transactions', `Ошибка: ${data.message || 'Неизвестная ошибка'}`, 'error');
                    }
                })
                .catch(error => {
                    addResult('❌ Ошибка запроса /transactions', `Ошибка: ${error.message}`, 'error');
                });
        }

        function testWidget() {
            const widgetUrl = 'https://widget.donatepay.ru/alert-box/widget/e0d7682d3705124aee044aa487192762f004dab90ed6e9e6633adee15bfdbcff';
            
            addResult('🎨 Тест виджета', 'Запрос виджета...', 'loading');

            // Используем прокси через наш сервер для обхода CORS
            fetch('/api/test-widget', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    widgetUrl: widgetUrl
                })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        addResult('✅ Виджет получен', 
                            `HTML длина: ${data.htmlLength} символов\n` +
                            `Найдено элементов: ${data.elementsCount}\n` +
                            `Текст виджета:\n${data.text.substring(0, 500)}...`, 
                            'success'
                        );
                    } else {
                        addResult('❌ Ошибка виджета', `Ошибка: ${data.error}`, 'error');
                    }
                })
                .catch(error => {
                    addResult('❌ Ошибка запроса виджета', `Ошибка: ${error.message}`, 'error');
                });
        }

        function testLastEvents() {
            const widgetToken = 'e0d7682d3705124aee044aa487192762f004dab90ed6e9e6633adee15bfdbcff';
            const lastEventsUrl = `https://widget.donatepay.ru/last-events?token=${widgetToken}`;
            
            addResult('📋 Тест last-events', 'Запрос последних событий...', 'loading');

            // Используем прокси через наш сервер для обхода CORS
            fetch('/api/test-last-events', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    lastEventsUrl: lastEventsUrl
                })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        let result = `Найдено событий: ${data.eventsCount}\n\n`;
                        
                        if (data.events && data.events.length > 0) {
                            data.events.forEach((event, index) => {
                                result += `${index + 1}. ID: ${event.id}\n`;
                                result += `   Тип: ${event.type}\n`;
                                result += `   Имя: ${event.what || 'Аноним'}\n`;
                                result += `   Сумма: ${event.sum}₽\n`;
                                result += `   Комментарий: ${event.comment || 'Нет'}\n`;
                                result += `   Дата: ${event.created_at}\n`;
                                result += `   Статус: ${event.status}\n\n`;
                            });
                        }
                        
                        addResult('✅ Last-events получены', result, 'success');
                    } else {
                        addResult('❌ Ошибка last-events', `Ошибка: ${data.error}`, 'error');
                    }
                })
                .catch(error => {
                    addResult('❌ Ошибка запроса last-events', `Ошибка: ${error.message}`, 'error');
                });
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            addResult('ℹ️ Информация', 
                'Добро пожаловать в тест DonatePay API!\n\n' +
                'Этот инструмент позволяет протестировать различные функции DonatePay API.\n\n' +
                'Доступные тесты:\n' +
                '• Тест /user - получение информации о пользователе\n' +
                '• Тест /transactions - получение списка транзакций\n' +
                '• Тест виджета - считывание HTML виджета\n\n' +
                'Используйте тестовый API ключ или свой собственный.', 
                'info'
            );
        });
    </script>
</body>
</html>
