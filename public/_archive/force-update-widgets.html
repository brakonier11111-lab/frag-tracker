<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Принудительное обновление виджетов</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: white;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .widget-section {
            background: #333;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        button {
            background: #ff0040;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover { background: #ff0066; }
        .success { color: #00ff88; }
        .error { color: #ff4444; }
        .info { color: #00d4ff; }
        .widget-frame {
            width: 100%;
            height: 200px;
            border: 2px solid #00d4ff;
            border-radius: 10px;
            margin: 20px 0;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Принудительное обновление виджетов</h1>
        
        <div class="widget-section">
            <h2>📱 Основной виджет</h2>
            <button onclick="updateMainWidget()">🔄 Обновить основной виджет</button>
            <div class="widget-frame">
                <iframe id="mainWidget" src="/widget-mode2.html"></iframe>
            </div>
            <div id="mainResult"></div>
        </div>
        
        <div class="widget-section">
            <h2>📱 Копия виджета</h2>
            <button onclick="updateCopyWidget()">🔄 Обновить копию виджета</button>
            <div class="widget-frame">
                <iframe id="copyWidget" src="/widget-mode2-copy.html"></iframe>
            </div>
            <div id="copyResult"></div>
        </div>
        
        <div class="widget-section">
            <h2>🔧 Общие действия</h2>
            <button onclick="updateAllWidgets()">🔄 Обновить все виджеты</button>
            <button onclick="checkDonationAmount()">📊 Проверить сумму донатов</button>
            <div id="generalResult"></div>
        </div>
    </div>

    <script>
        function log(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            const div = document.createElement('div');
            div.className = type;
            div.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
            element.appendChild(div);
            console.log(message);
        }

        async function updateMainWidget() {
            log('mainResult', '🔄 Обновляем основной виджет...', 'info');
            
            try {
                const iframe = document.getElementById('mainWidget');
                const widgetWindow = iframe.contentWindow;
                
                if (widgetWindow && typeof widgetWindow.forceUpdateState === 'function') {
                    await widgetWindow.forceUpdateState();
                    log('mainResult', '✅ Основной виджет обновлен', 'success');
                } else {
                    log('mainResult', '❌ Функция forceUpdateState не найдена', 'error');
                }
            } catch (error) {
                log('mainResult', `❌ Ошибка обновления: ${error.message}`, 'error');
            }
        }

        async function updateCopyWidget() {
            log('copyResult', '🔄 Обновляем копию виджета...', 'info');
            
            try {
                const iframe = document.getElementById('copyWidget');
                const widgetWindow = iframe.contentWindow;
                
                if (widgetWindow && typeof widgetWindow.forceUpdateState === 'function') {
                    await widgetWindow.forceUpdateState();
                    log('copyResult', '✅ Копия виджета обновлена', 'success');
                } else {
                    log('copyResult', '❌ Функция forceUpdateState не найдена', 'error');
                }
            } catch (error) {
                log('copyResult', `❌ Ошибка обновления: ${error.message}`, 'error');
            }
        }

        async function updateAllWidgets() {
            log('generalResult', '🔄 Обновляем все виджеты...', 'info');
            
            await updateMainWidget();
            await updateCopyWidget();
            
            log('generalResult', '✅ Все виджеты обновлены', 'success');
        }

        async function checkDonationAmount() {
            log('generalResult', '📊 Проверяем сумму донатов...', 'info');
            
            try {
                // Проверяем API
                const apiResponse = await fetch('/api/donations-stats');
                const apiData = await apiResponse.json();
                
                if (apiData.success) {
                    log('generalResult', `📊 API сумма: ${apiData.totalAmount.toLocaleString()} RUB`, 'success');
                    
                    // Проверяем состояние сервера
                    const stateResponse = await fetch('/api/state');
                    const stateData = await stateResponse.json();
                    
                    if (stateData.success) {
                        const serverTotal = Math.round(stateData.state.total_donated || 0);
                        log('generalResult', `📊 Сервер сумма: ${serverTotal.toLocaleString()} RUB`, 'info');
                        
                        if (apiData.totalAmount === serverTotal) {
                            log('generalResult', '✅ Суммы синхронизированы!', 'success');
                        } else {
                            log('generalResult', '❌ Суммы не синхронизированы!', 'error');
                        }
                    }
                } else {
                    log('generalResult', `❌ Ошибка API: ${apiData.error}`, 'error');
                }
            } catch (error) {
                log('generalResult', `❌ Ошибка проверки: ${error.message}`, 'error');
            }
        }

        // Автоматическая проверка при загрузке
        window.addEventListener('load', () => {
            setTimeout(checkDonationAmount, 2000);
        });
    </script>
</body>
</html>
