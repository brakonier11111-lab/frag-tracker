<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест управления донатами</title>
    <style>
        body {
            background: #0a0a14;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .test-section {
            background: rgba(20, 20, 30, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .btn {
            background: rgba(255, 0, 60, 0.2);
            border: 1px solid rgba(255, 0, 60, 0.5);
            color: #ff003c;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }
        .btn:hover {
            background: rgba(255, 0, 60, 0.3);
        }
        .btn-warning {
            background: rgba(255, 193, 7, 0.2);
            border: 1px solid rgba(255, 193, 7, 0.5);
            color: #ffc107;
        }
        .btn-warning:hover {
            background: rgba(255, 193, 7, 0.3);
        }
        .status {
            margin: 10px 0;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }
        .success { color: #00ff47; }
        .error { color: #ff003c; }
        .info { color: #00f0ff; }
    </style>
</head>
<body>
    <h1>🧪 Тест управления донатами</h1>
    
    <div class="test-section">
        <h2>📊 Текущая статистика</h2>
        <div id="currentStats" class="status">Загрузка...</div>
        <button class="btn" onclick="loadStats()">🔄 Обновить статистику</button>
    </div>
    
    <div class="test-section">
        <h2>🎯 Тест API endpoints</h2>
        <button class="btn" onclick="testDonationsStats()">📊 /api/donations-stats</button>
        <button class="btn" onclick="testResetCount()">🗑️ /api/reset-donations-count</button>
        <button class="btn" onclick="testFixTotal()">🔧 /api/fix-total-donated</button>
        <div id="apiResults" class="status"></div>
    </div>
    
    <div class="test-section">
        <h2>🎮 Тест функций из режима фрагов</h2>
        <button class="btn" onclick="testResetDonationTotal()">🔄 Обнулить сумму и количество</button>
        <button class="btn btn-warning" onclick="testSetStartingAmount()">💰 Установить стартовую сумму</button>
        <div id="functionResults" class="status"></div>
    </div>
    
    <div class="test-section">
        <h2>🌐 Виджеты</h2>
        <button class="btn" onclick="openWidget('mode1-frag-tracker.html')">📊 Режим фрагов</button>
        <button class="btn" onclick="openWidget('widget-mode2.html')">⏰ Основной виджет</button>
        <button class="btn" onclick="openWidget('widget-mode2-copy.html')">⏰ Копия виджета</button>
    </div>

    <script>
        // Загрузить статистику
        async function loadStats() {
            try {
                const response = await fetch('/api/donations-stats');
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('currentStats').innerHTML = `
                        <div class="success">✅ Статистика загружена</div>
                        <div>💰 Сумма: ${data.totalAmount.toLocaleString()} RUB</div>
                        <div>📊 Количество: ${data.totalCount} донатов</div>
                    `;
                } else {
                    document.getElementById('currentStats').innerHTML = `
                        <div class="error">❌ Ошибка: ${data.error}</div>
                    `;
                }
            } catch (error) {
                document.getElementById('currentStats').innerHTML = `
                    <div class="error">❌ Ошибка запроса: ${error.message}</div>
                `;
            }
        }
        
        // Тест API donations-stats
        async function testDonationsStats() {
            try {
                const response = await fetch('/api/donations-stats');
                const data = await response.json();
                document.getElementById('apiResults').innerHTML = `
                    <div class="success">✅ /api/donations-stats работает</div>
                    <div>Ответ: ${JSON.stringify(data, null, 2)}</div>
                `;
            } catch (error) {
                document.getElementById('apiResults').innerHTML = `
                    <div class="error">❌ Ошибка /api/donations-stats: ${error.message}</div>
                `;
            }
        }
        
        // Тест API reset-donations-count
        async function testResetCount() {
            if (!confirm('❓ Вы уверены что хотите обнулить все донаты?')) {
                return;
            }
            
            try {
                const response = await fetch('/api/reset-donations-count', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                document.getElementById('apiResults').innerHTML = `
                    <div class="success">✅ /api/reset-donations-count выполнен</div>
                    <div>Ответ: ${JSON.stringify(data, null, 2)}</div>
                `;
                // Обновляем статистику
                loadStats();
            } catch (error) {
                document.getElementById('apiResults').innerHTML = `
                    <div class="error">❌ Ошибка /api/reset-donations-count: ${error.message}</div>
                `;
            }
        }
        
        // Тест API fix-total-donated
        async function testFixTotal() {
            try {
                const response = await fetch('/api/fix-total-donated', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                document.getElementById('apiResults').innerHTML = `
                    <div class="success">✅ /api/fix-total-donated выполнен</div>
                    <div>Ответ: ${JSON.stringify(data, null, 2)}</div>
                `;
                // Обновляем статистику
                loadStats();
            } catch (error) {
                document.getElementById('apiResults').innerHTML = `
                    <div class="error">❌ Ошибка /api/fix-total-donated: ${error.message}</div>
                `;
            }
        }
        
        // Тест функции resetDonationTotal
        async function testResetDonationTotal() {
            if (!confirm('❓ Вы уверены что хотите обнулить сумму и количество донатов?')) {
                return;
            }
            
            try {
                const resetResponse = await fetch('/api/reset-donations-count', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (resetResponse.ok) {
                    document.getElementById('functionResults').innerHTML = `
                        <div class="success">✅ Сумма и количество донатов обнулены</div>
                    `;
                    loadStats();
                } else {
                    document.getElementById('functionResults').innerHTML = `
                        <div class="error">❌ Ошибка обнуления донатов</div>
                    `;
                }
            } catch (error) {
                document.getElementById('functionResults').innerHTML = `
                    <div class="error">❌ Ошибка обнуления: ${error.message}</div>
                `;
            }
        }
        
        // Тест функции setStartingAmount
        async function testSetStartingAmount() {
            const input = prompt('💰 Установить стартовую сумму донатов (₽):', '1000');
            
            if (input === null) return; // Отменено
            
            const newAmount = Math.max(0, Math.floor(Number(input)) || 0);
            
            try {
                const response = await fetch('/api/state', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ total_donated: newAmount })
                });
                
                if (response.ok) {
                    document.getElementById('functionResults').innerHTML = `
                        <div class="success">✅ Стартовая сумма установлена: ${newAmount.toLocaleString()}₽</div>
                    `;
                    loadStats();
                } else {
                    document.getElementById('functionResults').innerHTML = `
                        <div class="error">❌ Ошибка установки суммы</div>
                    `;
                }
            } catch (error) {
                document.getElementById('functionResults').innerHTML = `
                    <div class="error">❌ Ошибка установки суммы: ${error.message}</div>
                `;
            }
        }
        
        // Открыть виджет
        function openWidget(url) {
            window.open(`http://localhost:3000/${url}`, '_blank');
        }
        
        // Инициализация
        loadStats();
    </script>
</body>
</html>
