<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест DonationAlerts</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .config { background: #e7f3ff; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>🔍 Тест DonationAlerts</h1>
    
    <div class="config">
        <h3>📋 Конфигурация</h3>
        <p><strong>Client ID:</strong> 16225</p>
        <p><strong>Client Secret:</strong> 0VJ2dMRax8cJrQqAYQJ7dLnFCMPKOFZdjCHkU4Lw</p>
        <p><strong>Redirect URI:</strong> http://localhost:3000/auth/callback</p>
    </div>
    
    <div class="test-section">
        <h3>1. Проверка статуса системы</h3>
        <button onclick="checkSystemStatus()">Проверить статус</button>
        <div id="statusResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>2. Тест OAuth авторизации</h3>
        <button onclick="testOAuth()">Тест OAuth</button>
        <div id="oauthResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>3. Тест API донатов</h3>
        <button onclick="testDonationsAPI()">Тест API</button>
        <div id="apiResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>4. Тест виджета</h3>
        <button onclick="testWidget()">Тест виджета</button>
        <div id="widgetResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>5. Диагностика донатов</h3>
        <button onclick="debugDonations()">Диагностика</button>
        <div id="debugResult" class="result"></div>
    </div>

    <script>
        function showResult(elementId, success, data, error = null) {
            const element = document.getElementById(elementId);
            if (success) {
                element.className = 'result success';
                element.innerHTML = '<strong>✅ Успех:</strong><br><pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } else {
                element.className = 'result error';
                element.innerHTML = '<strong>❌ Ошибка:</strong><br>' + (error || JSON.stringify(data, null, 2));
            }
        }

        async function checkSystemStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                showResult('statusResult', response.ok, data);
            } catch (error) {
                showResult('statusResult', false, null, error.message);
            }
        }

        async function testOAuth() {
            try {
                const response = await fetch('/api/da-oauth-test');
                const data = await response.json();
                showResult('oauthResult', response.ok, data);
            } catch (error) {
                showResult('oauthResult', false, null, error.message);
            }
        }

        async function testDonationsAPI() {
            try {
                const response = await fetch('/api/da-api-test');
                const data = await response.json();
                showResult('apiResult', response.ok, data);
            } catch (error) {
                showResult('apiResult', false, null, error.message);
            }
        }

        async function testWidget() {
            const token = prompt('Введите токен DonationAlerts для тестирования виджета:');
            if (!token) return;
            
            try {
                const response = await fetch('/api/test-widget-da', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token: token })
                });
                const data = await response.json();
                showResult('widgetResult', response.ok, data);
            } catch (error) {
                showResult('widgetResult', false, null, error.message);
            }
        }

        async function debugDonations() {
            try {
                const response = await fetch('/api/debug-donations');
                const data = await response.json();
                showResult('debugResult', response.ok, data);
            } catch (error) {
                showResult('debugResult', false, null, error.message);
            }
        }
    </script>
</body>
</html>
