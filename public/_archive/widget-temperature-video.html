<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Video Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff47;
            --neon-blue: #00f0ff;
            --neon-orange: #ff4400;
            --neon-yellow: #ffff00;
            --neon-purple: #ff00ff;
            --neon-red: #ff0000;
            --widget-bg-opacity: 0.95;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: transparent;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .temperature-widget {
            position: relative;
            width: 300px;
            height: 420px;
            border-radius: 15px;
            overflow: hidden;
            opacity: 0;
            transform: scale(0.8) translateX(-100px);
            transition: all 0.5s ease-out;
        }

        .temperature-widget.show {
            opacity: 1;
            transform: scale(1) translateX(0);
        }

        /* Видео фон */
        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* Контент поверх видео */
        .widget-content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 18px;
            background: linear-gradient(135deg, 
                rgba(0, 0, 0, 0.3) 0%,
                rgba(0, 0, 0, 0.2) 50%,
                rgba(0, 0, 0, 0.3) 100%
            );
        }

        .temperature-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .temperature-title {
            color: #ff4400;
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 8px;
            text-shadow: 0 0 16px rgba(255, 68, 0, 0.85);
            letter-spacing: 0.5px;
            white-space: nowrap;
            text-align: center;
        }

        .temperature-progress-container {
            position: relative;
            width: 100%;
            margin: 8px auto 20px auto;
        }

        .temperature-progress-bar {
            position: relative;
            width: 100%;
            height: 35px;
            background: linear-gradient(90deg, 
                rgba(0, 0, 0, 0.4) 0%,
                rgba(0, 0, 0, 0.3) 50%,
                rgba(0, 0, 0, 0.4) 100%
            );
            border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 
                inset 0 0 15px rgba(0, 0, 0, 0.3),
                0 0 25px rgba(255, 68, 0, 0.4);
        }

        .temperature-progress-fill {
            height: 100%;
            background: var(--current-heat-gradient);
            transition: width 0.5s ease, background-color 0.5s ease;
            width: 0%;
            border-radius: 34px;
            box-shadow: 
                inset 0 0 40px rgba(255, 255, 255, 0.4),
                0 0 45px rgba(255, 68, 0, 0.6);
            position: relative;
            overflow: hidden;
        }

        .temperature-progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                transparent 0%,
                rgba(255, 255, 255, 0.3) 50%,
                transparent 100%
            );
            border-radius: 34px;
        }

        /* Анимация нагрева и огня */
        .temperature-progress-fill.heating {
            animation: heatGlow 1s ease-in-out infinite alternate;
        }

        @keyframes heatGlow {
            0% {
                box-shadow: 
                    inset 0 0 40px rgba(255, 255, 255, 0.4),
                    0 0 45px rgba(255, 68, 0, 0.6);
            }
            100% {
                box-shadow: 
                    inset 0 0 50px rgba(255, 255, 255, 0.6),
                    0 0 60px rgba(255, 0, 0, 0.8),
                    0 0 80px rgba(255, 68, 0, 0.4);
            }
        }

        /* Анимация пара при охлаждении */
        .temperature-progress-fill.cooling::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 0;
            right: 0;
            height: 20px;
            background: linear-gradient(90deg, 
                transparent 0%,
                rgba(255, 255, 255, 0.3) 20%,
                rgba(255, 255, 255, 0.5) 50%,
                rgba(255, 255, 255, 0.3) 80%,
                transparent 100%
            );
            animation: steamRise 2s ease-in-out infinite;
        }

        @keyframes steamRise {
            0% {
                opacity: 0.3;
                transform: translateY(0px);
            }
            50% {
                opacity: 0.7;
                transform: translateY(-5px);
            }
            100% {
                opacity: 0.1;
                transform: translateY(-15px);
            }
        }

        .temperature-progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 
                0 0 10px rgba(0, 0, 0, 0.9),
                0 0 20px rgba(255, 68, 0, 0.7);
            z-index: 10;
        }

        .temperature-display {
            position: relative;
            top: 0;
            left: 0;
            transform: none;
            color: #ff6600;
            font-size: 1.5rem;
            font-weight: 900;
            text-shadow: 
                0 0 15px rgba(255, 102, 0, 0.8),
                0 0 25px rgba(255, 102, 0, 0.4),
                0 2px 4px rgba(0, 0, 0, 0.9);
            background: rgba(0, 0, 0, 0.4);
            padding: 3px 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 102, 0, 0.4);
            z-index: 10;
            width: max-content;
            margin: 2px auto 8px auto;
        }

        .temperature-scale-labels {
            position: absolute;
            bottom: -20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
        }

        .temperature-scale-label {
            color: #ffffff;
            font-size: 1rem;
            font-weight: bold;
            text-shadow: 
                0 0 8px rgba(0, 0, 0, 0.8),
                0 0 15px rgba(255, 68, 0, 0.5);
        }

        .temperature-scale-label.left {
            text-align: left;
        }

        .temperature-scale-label.right {
            text-align: right;
        }

        /* Стили для информации о температуре */
        .temperature-info {
            background: rgba(255, 68, 0, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin-top: 18px;
        }

        .temperature-info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .temperature-info-item:last-child {
            margin-bottom: 0;
        }

        .temperature-info-label {
            color: #ffffff;
            font-weight: 500;
        }

        .temperature-info-value {
            color: #ff6600;
            font-weight: bold;
            text-shadow: 
                0 0 10px rgba(255, 102, 0, 0.8),
                0 0 20px rgba(255, 102, 0, 0.4),
                0 2px 4px rgba(0, 0, 0, 0.8);
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid rgba(255, 102, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="temperature-widget" id="temperatureWidget">
        <!-- Видео фон -->
        <video class="video-background" autoplay muted loop>
            <source src="/assets/Widget Peregrev.mov" type="video/quicktime">
            <source src="C:\Users\ixacy\Downloads\Рабочая если что\Рабочая резерв — копия\assets\Widget Peregrev.mov" type="video/quicktime">
            <!-- Fallback для браузеров, которые не поддерживают видео -->
            <div style="background: linear-gradient(135deg, rgba(5, 5, 15, 0.95) 0%, rgba(8, 8, 20, 0.9) 50%, rgba(12, 12, 25, 0.85) 100%); width: 100%; height: 100%;"></div>
        </video>

        <!-- Контент поверх видео -->
        <div class="widget-content">
            <div class="temperature-header">
                <div class="temperature-title">ПЕРЕГРЕВ ТАЙМЕРА</div>
            </div>

            <div class="temperature-progress-container">
                <!-- Отображение температуры сверху -->
                <div class="temperature-display" id="temperatureDisplay">0°C</div>
                
                <div class="temperature-progress-bar">
                    <div class="temperature-progress-fill" id="temperatureProgressFill">
                        <div class="temperature-progress-text" id="temperatureProgressText">0%</div>
                    </div>
                </div>
                
                <!-- Разметка градусов снизу -->
                <div class="temperature-scale-labels">
                    <div class="temperature-scale-label left">0°</div>
                    <div class="temperature-scale-label right">100°</div>
                </div>
            </div>
            
            <!-- Информация о температуре -->
            <div class="temperature-info">
                <div class="temperature-info-item">
                    <span class="temperature-info-label">Перегреть таймер:</span>
                    <span class="temperature-info-value" id="targetAmountValue">10000₽</span>
                </div>
                <div class="temperature-info-item">
                    <span class="temperature-info-label">Скорость охлаждения:</span>
                    <span class="temperature-info-value" id="coolingRateValue">-50₽/сек</span>
                </div>
                <div class="temperature-info-item">
                    <span class="temperature-info-label">До перегрева:</span>
                    <span class="temperature-info-value" id="amountToPeak">10000₽</span>
                </div>
                <div class="temperature-info-item">
                    <span class="temperature-info-label">Награда при перегреве:</span>
                    <span class="temperature-info-value" id="peakReward">+5 минут к таймеру</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let temperatureMode = {
            active: false,
            currentAmount: 0,
            targetAmount: 10000,
            coolingRate: 50,
            peakRewardMinutes: 5
        };

        let ws = null;

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws?type=widget`;
            
            console.log('🔗 Connecting to WebSocket:', wsUrl);
            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                console.log('✅ WebSocket connected');
            };

            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    console.log('📨 WebSocket message received:', data);
                    
                    switch(data.type) {
                        case 'INIT_STATE':
                            console.log('🔄 Initial state received:', data.state);
                            updateTemperatureMode(data.state.temperatureMode || temperatureMode);
                            break;
                        case 'temperature_mode_toggle':
                            temperatureMode.active = data.active;
                            temperatureMode.currentAmount = data.currentAmount || 0;
                            temperatureMode.targetAmount = data.targetAmount || 10000;
                            temperatureMode.coolingRate = data.coolingRate || 50;
                            temperatureMode.peakRewardMinutes = data.peakRewardMinutes || 5;
                            updateTemperatureMode(temperatureMode);
                            break;
                        case 'temperature_update':
                            temperatureMode.currentAmount = data.currentAmount;
                            temperatureMode.targetAmount = data.targetAmount || temperatureMode.targetAmount;
                            temperatureMode.coolingRate = data.coolingRate || temperatureMode.coolingRate;
                            temperatureMode.peakRewardMinutes = data.peakRewardMinutes || temperatureMode.peakRewardMinutes;
                            updateTemperatureMode(temperatureMode);
                            break;
                        case 'temperature_peak':
                            showTemperaturePeak(data);
                            break;
                        default:
                            console.log('📨 Other WebSocket message type:', data.type);
                    }
                } catch (e) {
                    console.error('Error parsing WebSocket message:', e);
                }
            };

            ws.onclose = function() {
                console.log('❌ WebSocket disconnected');
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = function(error) {
                console.error('❌ WebSocket error:', error);
            };
        }

        function updateTemperatureMode(data) {
            temperatureMode.active = data.active;
            temperatureMode.currentAmount = data.currentAmount || 0;
            temperatureMode.targetAmount = data.targetAmount || 10000;
            temperatureMode.coolingRate = data.coolingRate || 50;
            temperatureMode.peakRewardMinutes = data.peakRewardMinutes || 5;
            
            const temperatureWidgetEl = document.getElementById('temperatureWidget');
            const temperatureProgressFillEl = document.getElementById('temperatureProgressFill');
            const temperatureProgressTextEl = document.getElementById('temperatureProgressText');
            const temperatureDisplayEl = document.getElementById('temperatureDisplay');
            
            if (temperatureMode.active) {
                temperatureWidgetEl.classList.add('show');
                
                // Обновляем полоску прогресса
                const heatPercentage = (temperatureMode.currentAmount / temperatureMode.targetAmount) * 100;
                const clampedPercentage = Math.min(100, heatPercentage);
                
                // Обновляем заполнение полоски
                temperatureProgressFillEl.style.width = clampedPercentage + '%';
                
                // Динамическое изменение цвета полоски
                const color = getColorForPercentage(clampedPercentage);
                temperatureProgressFillEl.style.background = color;

                // Обновляем текст процентов
                temperatureProgressTextEl.textContent = Math.round(clampedPercentage) + '%';
                
                // Обновляем отображение температуры (0-100 градусов)
                const temperatureCelsius = Math.round(clampedPercentage);
                temperatureDisplayEl.textContent = temperatureCelsius + '°C';
                
                // Убираем старые классы анимации
                temperatureProgressFillEl.classList.remove('heating', 'cooling');
                
                // Добавляем анимации в зависимости от состояния
                if (clampedPercentage > 70) {
                    temperatureProgressFillEl.classList.add('heating');
                } else if (clampedPercentage < 30 && clampedPercentage > 0) {
                    temperatureProgressFillEl.classList.add('cooling');
                }
                
                // Обновляем информацию о температуре
                updateTemperatureInfo();
            } else {
                temperatureWidgetEl.classList.remove('show');
                temperatureProgressFillEl.classList.remove('heating', 'cooling');
            }
        }

        function getColorForPercentage(percentage) {
            let color;
            if (percentage < 25) {
                // От синего к зеленовато-голубому
                const p = percentage / 25;
                color = `linear-gradient(90deg, 
                    #00aaff ${0 * (1-p) + 0 * p}%, 
                    #00ff88 ${0 * (1-p) + 100 * p}%
                )`;
            } else if (percentage < 50) {
                // От зеленовато-голубого к желтому
                const p = (percentage - 25) / 25;
                color = `linear-gradient(90deg, 
                    #00ff88 ${0 * (1-p) + 0 * p}%, 
                    #ffff00 ${0 * (1-p) + 100 * p}%
                )`;
            } else if (percentage < 75) {
                // От желтого к оранжевому
                const p = (percentage - 50) / 25;
                color = `linear-gradient(90deg, 
                    #ffff00 ${0 * (1-p) + 0 * p}%, 
                    #ff8800 ${0 * (1-p) + 100 * p}%
                )`;
            } else {
                // От оранжевого к красному
                const p = (percentage - 75) / 25;
                color = `linear-gradient(90deg, 
                    #ff8800 ${0 * (1-p) + 0 * p}%, 
                    #ff0000 ${0 * (1-p) + 100 * p}%
                )`;
            }
            return color;
        }

        function updateTemperatureInfo() {
            // Обновляем целевую сумму (теперь "Перегреть таймер")
            document.getElementById('targetAmountValue').textContent = Math.round(temperatureMode.targetAmount) + '₽';
            
            // Обновляем скорость охлаждения
            document.getElementById('coolingRateValue').textContent = '-' + Math.round(temperatureMode.coolingRate) + '₽/сек';
            
            // Обновляем информацию о награде
            const amountToPeak = temperatureMode.targetAmount - temperatureMode.currentAmount;
            document.getElementById('amountToPeak').textContent = Math.round(Math.max(0, amountToPeak)) + '₽';
            document.getElementById('peakReward').textContent = '+' + temperatureMode.peakRewardMinutes + ' минут к таймеру';
        }

        function showTemperaturePeak(data) {
            console.log('🔥 Temperature peak reached!', data);
            // Можно добавить дополнительную анимацию пика
        }

        // Подключаемся к WebSocket при загрузке страницы
        connectWebSocket();
    </script>
</body>
</html>
