<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Яндекс Музыка — OBS</title>
<style>
:root {
  --bg: rgba(8, 8, 12, 0.62);
  --line: rgba(255, 255, 255, 0.1);
  --ym: #ffcc00;
  --bar-h: 68px;
  --text-band-h: calc(var(--bar-h) * 0.42);
  --text-hard-shadow: 1px 1px 0 rgba(0, 0, 0, 0.85);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
}
body {
  font-family: system-ui, Segoe UI, sans-serif;
  color: #fff;
  display: flex;
  align-items: flex-end;
}
.widget {
  display: flex;
  align-items: center;
  gap: 16px;
  width: 100%;
  height: var(--bar-h);
  min-height: var(--bar-h);
  max-height: var(--bar-h);
  flex: 0 0 var(--bar-h);
  padding: 0 16px;
  background: var(--bg);
  border-top: 1px solid var(--line);
  opacity: 1;
  transition: opacity 0.35s ease;
}
.widget.hidden {
  opacity: 0;
  pointer-events: none;
}
.badge {
  font-size: calc(var(--bar-h) * 0.2);
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255, 204, 0, 0.98);
  text-shadow: var(--text-hard-shadow);
  height: var(--text-band-h);
  line-height: var(--text-band-h);
  white-space: nowrap;
  flex: 0 0 auto;
}
.text-wrap {
  height: var(--text-band-h);
  min-width: 0;
  flex: 1 1 auto;
  overflow: hidden;
  transition: opacity 0.32s ease, transform 0.32s ease;
}
.text-wrap.swap-out {
  opacity: 0;
  transform: translateX(-12px);
}
.text-wrap.swap-in {
  opacity: 0;
  transform: translateX(12px);
}
.line {
  display: flex;
  align-items: center;
  gap: 16px;
  height: var(--text-band-h);
  min-width: 0;
  flex: 1 1 auto;
}
.track {
  display: flex;
  align-items: center;
  gap: 12px;
  height: var(--text-band-h);
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
}
.title {
  font-size: calc(var(--bar-h) * 0.35);
  font-weight: 600;
  height: var(--text-band-h);
  line-height: var(--text-band-h);
  color: rgba(255, 255, 255, 0.90);
  text-shadow: var(--text-hard-shadow);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1 1 auto;
  min-width: 0;
}
.sep {
  display: block;
  width: calc(var(--bar-h) * 0.16);
  min-width: 10px;
  height: calc(var(--bar-h) * 0.07);
  min-height: 4px;
  background: rgba(255, 255, 255, 0.92);
  border-radius: 1px;
  box-shadow: 1px 1px 0 rgba(0, 0, 0, 0.85);
  flex: 0 0 auto;
  flex-shrink: 0;
}
.artist {
  font-size: calc(var(--bar-h) * 0.42);
  font-weight: 700;
  height: var(--text-band-h);
  line-height: var(--text-band-h);
  color: rgba(255, 255, 255, 0.84);
  text-shadow: var(--text-hard-shadow);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 0 1 auto;
  min-width: 0;
}
.eq {
  display: flex;
  align-items: center;
  gap: 4px;
  height: var(--text-band-h);
  flex: 0 0 auto;
  opacity: 0;
  transition: opacity 0.25s ease;
}
.eq.on { opacity: 1; }
.eq span {
  display: block;
  width: 4px;
  height: 6px;
  border-radius: 2px;
  background: var(--ym);
  animation: bar 0.85s ease-in-out infinite;
}
.eq span:nth-child(2) { animation-delay: 0.12s; }
.eq span:nth-child(3) { animation-delay: 0.24s; }
.eq span:nth-child(4) { animation-delay: 0.36s; }
@keyframes bar {
  0%, 100% { height: 6px; opacity: 0.45; }
  50% { height: calc(var(--text-band-h) * 0.9); opacity: 1; }
}
</style>
</head>
<body>
  <div class="widget hidden" id="widget">
    <div class="line">
      <div class="badge" id="badge">Сейчас играет</div>
      <div class="text-wrap" id="textWrap">
        <div class="track">
          <div class="artist" id="artist">—</div>
          <span class="sep" id="sep" aria-hidden="true"></span>
          <div class="title" id="title">—</div>
        </div>
      </div>
    </div>
    <div class="eq" id="eq" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
    </div>
  </div>
<script>
const params = new URLSearchParams(location.search);
const barH = Math.max(52, Math.min(100, Number(params.get('h')) || 68));
document.documentElement.style.setProperty('--bar-h', barH + 'px');

const widget = document.getElementById('widget');
const badge = document.getElementById('badge');
const eq = document.getElementById('eq');
const sep = document.getElementById('sep');
const textWrap = document.getElementById('textWrap');
const titleEl = document.getElementById('title');
const artistEl = document.getElementById('artist');

let lastTrackKey = '';
let lastPlaying = null;
let swapping = false;

function buildTrackKey(data) {
  return [data.title, data.artist].join('|');
}

function updatePlaybackUi(data) {
  if (data.playing) {
    badge.textContent = 'Сейчас играет';
    eq.classList.add('on');
  } else if (data.paused) {
    badge.textContent = 'Пауза';
    eq.classList.remove('on');
  } else {
    badge.textContent = 'Яндекс Музыка';
    eq.classList.remove('on');
  }
  lastPlaying = Boolean(data.playing);
}

function applyText(data) {
  titleEl.textContent = data.title || 'Без названия';
  artistEl.textContent = data.artist || 'Неизвестный исполнитель';
  sep.style.display = data.artist ? '' : 'none';
}

function animateTextChange(data) {
  if (swapping) return;
  swapping = true;
  textWrap.classList.add('swap-out');
  setTimeout(() => {
    applyText(data);
    textWrap.classList.remove('swap-out');
    textWrap.classList.add('swap-in');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        textWrap.classList.remove('swap-in');
        swapping = false;
      });
    });
  }, 280);
}

function render(data) {
  const playing = Boolean(data && data.playing);

  if (!playing) {
    widget.classList.add('hidden');
    lastPlaying = false;
    return;
  }

  widget.classList.remove('hidden');

  const trackKey = buildTrackKey(data);
  const textChanged = trackKey !== lastTrackKey;

  if (textChanged) {
    if (lastTrackKey) animateTextChange(data);
    else applyText(data);
    lastTrackKey = trackKey;
  }

  if (textChanged || data.playing !== lastPlaying) {
    updatePlaybackUi(data);
  }
}

async function poll() {
  try {
    const r = await fetch('/api/yandex-music/now-playing', { cache: 'no-store' });
    const j = await r.json();
    if (j.success) render(j.data);
  } catch (_) { /* noop */ }
}

poll();
setInterval(poll, 1400);
</script>
</body>
</html>
