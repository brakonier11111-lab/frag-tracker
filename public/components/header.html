<!-- Верхняя панель -->
<header class="app-header">
    <div class="header-left">
        <button class="header-menu-toggle" id="mobileMenuToggle" aria-label="Меню">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M3 12H21M3 6H21M3 18H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
        <div class="header-breadcrumb" id="breadcrumb">
            <span class="breadcrumb-item">Главная</span>
        </div>
    </div>
    
    <div class="header-right">
        <div class="header-auth">
            <a href="/admin.html" class="header-login-btn" id="headerLoginBtn" title="Админ-панель">
                <span class="header-login-icon">🔧</span>
                <span class="header-login-text">Админка</span>
            </a>
        </div>
        <div class="header-stats" id="headerStats" style="display: none;">
            <div class="stat-badge">
                <span class="stat-label">Донаты</span>
                <span class="stat-value" id="headerDonations">0</span>
            </div>
            <div class="stat-badge">
                <span class="stat-label">Фраги</span>
                <span class="stat-value" id="headerFrags">0</span>
            </div>
        </div>
    </div>
</header>

<button type="button" class="page-copy-btn" id="copyPageContextBtn"
    onclick="(function(btn){
        var text = document.title + ' — ' + window.location.href;
        var done = function(){
            var label = btn.querySelector('.page-copy-text');
            var original = label.textContent;
            label.textContent = 'Скопировано!';
            btn.classList.add('copied');
            setTimeout(function(){ label.textContent = original; btn.classList.remove('copied'); }, 1500);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(done).catch(done);
        } else {
            var ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy'); } catch (e) {}
            document.body.removeChild(ta);
            done();
        }
    })(this)">
    <span>📋</span>
    <span class="page-copy-text">Скопировать страницу</span>
</button>

<script>
(function() {
    // Обновление хлебных крошек
    const breadcrumb = document.getElementById('breadcrumb');
    const pageTitles = {
        'index': 'Главная',
        'mode1-frag-tracker': 'Фраг-трекер',
        'mode2-timer': 'Таймер',
        'donation-management': 'Управление донатами',
        'donation-driven-widget': 'Параметр от донатов',
        'donation-goal': 'Сбор донатов',
        'donations-dashboard': 'Дашборд донатов',
        'stats': 'Статистика фрагов',
        'lesta': 'Lesta Games',
        'analytics': 'Аналитика',
        'admin': 'Админ-панель',
        'tank-queue': 'Очередь танков',
        'schedule': 'Расписание',
        'donor-achievements': 'Достижения',
        'tournament': 'Турнир',
        'archive': 'Архив'
    };

    const currentPage = window.location.pathname.split('/').pop().replace('.html', '') || 'index';
    if (breadcrumb && pageTitles[currentPage]) {
        breadcrumb.innerHTML = `<span class="breadcrumb-item">${pageTitles[currentPage]}</span>`;
    }

    // Мобильное меню
    const mobileMenuToggle = document.getElementById('mobileMenuToggle');
    const sidebar = document.getElementById('sidebar');
    
    if (mobileMenuToggle && sidebar) {
        mobileMenuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('mobile-open');
        });

        // Закрытие при клике вне меню
        document.addEventListener('click', (e) => {
            if (window.innerWidth < 768 && 
                !sidebar.contains(e.target) && 
                !mobileMenuToggle.contains(e.target) &&
                sidebar.classList.contains('mobile-open')) {
                sidebar.classList.remove('mobile-open');
            }
        });
    }

    // Загрузка статистики для хедера
    async function loadHeaderStats() {
        try {
            const response = await fetch('/api/stats');
            if (response.ok) {
                const data = await response.json();
                const statsContainer = document.getElementById('headerStats');
                if (statsContainer && (data.totalDonations || data.totalFrags)) {
                    statsContainer.style.display = 'flex';
                    if (data.totalDonations) {
                        document.getElementById('headerDonations').textContent = data.totalDonations;
                    }
                    if (data.totalFrags) {
                        document.getElementById('headerFrags').textContent = data.totalFrags;
                    }
                }
            }
        } catch (error) {
            console.error('Ошибка загрузки статистики:', error);
        }
    }

    // Загружаем статистику после отрисовки меню, чтобы не тормозить открытие страницы
    if (document.getElementById('headerStats')) {
        setTimeout(loadHeaderStats, 300);
        setInterval(loadHeaderStats, 30000);
    }

    // Кнопка «Админка» — обычная ссылка на /admin.html (обработчик не нужен)
})();
</script>
