<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Очередь танков</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700;800&family=Orbitron:wght@400;700;900&family=Archivo+Black:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-red: #ff003c;
      --neon-blue: #00f0ff;
      --neon-purple: #b300ff;
      --neon-green: #00ff47;
      --neon-yellow: #ffff00;
      --bg-dark: rgba(10, 10, 20, 0.95);
      --bg-light: rgba(20, 25, 35, 0.9);
      --text: #ffffff;
      --text-secondary: #cccccc;
      --border: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    img {
      border: none !important;
      outline: none !important;
      background: transparent !important;
      background-color: transparent !important;
      background-image: none !important;
      box-shadow: none !important;
      -webkit-box-shadow: none !important;
      -moz-box-shadow: none !important;
    }

    #streamerPhoto {
      border: none !important;
      outline: none !important;
      background: transparent !important;
      background-color: transparent !important;
      background-image: none !important;
      padding: 0 !important;
      margin: 0 !important;
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: transparent;
      color: var(--text);
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .widget-container {
      max-width: 680px; /* Увеличено с 650px до 680px для большей ширины окон */
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      overflow: hidden; /* Убираем полосы прокрутки */
    }

    /* Текущий бой - сочный цвет для первого танка */
    .current-battle {
      background: linear-gradient(135deg, 
        rgba(0, 255, 71, 0.3) 0%,
        rgba(0, 240, 255, 0.3) 50%,
        rgba(179, 0, 255, 0.3) 100%
      );
      border: 3px solid var(--neon-green);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 
        0 0 50px rgba(0, 255, 71, 0.7),
        0 0 80px rgba(0, 255, 71, 0.4),
        inset 0 0 40px rgba(0, 255, 71, 0.2);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
      animation: pulse-glow 2s ease-in-out infinite;
      flex-shrink: 0;
      order: 1;
    }

    @keyframes pulse-glow {
      0%, 100% {
        box-shadow: 
          0 0 50px rgba(0, 255, 71, 0.7),
          0 0 80px rgba(0, 255, 71, 0.4),
          inset 0 0 40px rgba(0, 255, 71, 0.2);
      }
      50% {
        box-shadow: 
          0 0 70px rgba(0, 255, 71, 0.9),
          0 0 100px rgba(0, 255, 71, 0.6),
          inset 0 0 50px rgba(0, 255, 71, 0.3);
      }
    }

    .current-battle::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, 
        transparent,
        rgba(255, 255, 255, 0.2),
        transparent
      );
      animation: shine 3s infinite;
    }

    @keyframes shine {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .current-battle-label {
      font-size: 1.1rem;
      color: var(--neon-green);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 15px;
      font-weight: 800;
      text-shadow: 
        0 0 20px var(--neon-green),
        0 0 35px var(--neon-green);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .current-battle-label::before {
      content: '⚔️';
      font-size: 1.5rem;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .current-tank {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .current-tank-info {
      flex: 1;
      min-width: 200px;
    }

    .current-tank-name {
      font-family: 'Orbitron', monospace;
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--neon-green);
      text-shadow: 
        0 0 30px var(--neon-green),
        0 0 50px var(--neon-green);
      margin-bottom: 10px;
      letter-spacing: 2px;
      line-height: 1.2;
    }

    .current-tank-details {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .current-tank-price {
      color: var(--neon-yellow);
      font-weight: 800;
      font-size: 1.6rem;
      font-family: 'Orbitron', monospace;
      font-variant-numeric: normal; /* Убираем диагональную полоску в нулях */
      font-feature-settings: "zero" 0; /* Отключаем slashed zero */
      text-shadow: 
        0 0 20px var(--neon-yellow),
        0 0 35px var(--neon-yellow);
    }

    .current-tank-conditions {
      font-size: 1.1rem;
      color: var(--text-secondary);
      font-style: italic;
      padding: 5px 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .battle-badge {
      background: linear-gradient(135deg, var(--neon-green), #00ff88);
      color: var(--bg-dark);
      padding: 12px 24px;
      border-radius: 25px;
      font-weight: 900;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      animation: pulse-badge 2s infinite;
      box-shadow: 
        0 0 30px rgba(0, 255, 71, 0.8),
        inset 0 0 20px rgba(255, 255, 255, 0.3);
      white-space: nowrap;
    }

    @keyframes pulse-badge {
      0%, 100% { 
        transform: scale(1); 
        box-shadow: 0 0 30px rgba(0, 255, 71, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.3);
      }
      50% { 
        transform: scale(1.05); 
        box-shadow: 0 0 40px rgba(0, 255, 71, 1), inset 0 0 25px rgba(255, 255, 255, 0.4);
      }
    }

    /* Очередь - показываем только если больше 5 танков */
    .queue-section {
      background: linear-gradient(135deg, 
        rgba(5, 5, 15, 0.95) 0%,
        rgba(8, 8, 20, 0.9) 50%,
        rgba(12, 12, 25, 0.85) 100%
      );
      border: 2px solid var(--border);
      border-radius: 20px;
      padding: 25px 5px 25px 10px; /* Уменьшен правый отступ до 5px для удлинения окон справа */
      margin-bottom: 25px;
      backdrop-filter: blur(15px);
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      display: none; /* По умолчанию скрыто */
      flex-shrink: 0;
      order: 2;
    }

    .queue-section {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94), transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .queue-section.visible {
      display: block;
      animation: fadeInQueue 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes fadeInQueue {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Надпись "ОЧЕРЕДЬ ТАНКОВ" - более светлый цвет, слабее свечение */
    .queue-title {
      font-family: 'Orbitron', monospace;
      font-size: 2rem; /* Увеличено с 1.6rem */
      color: #e0e0e0; /* Более светлый цвет */
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 20px;
      font-weight: 800;
      text-shadow: 
        0 0 8px rgba(224, 224, 224, 0.5), /* Слабее свечение */
        0 0 15px rgba(224, 224, 224, 0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 15px;
    }

    .queue-title span:first-child {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .queue-count {
      font-size: 1.2rem;
      color: var(--text-secondary);
      font-weight: 600;
      background: rgba(179, 0, 255, 0.1);
      padding: 8px 16px;
      border-radius: 12px;
      border: 1px solid rgba(179, 0, 255, 0.3);
      display: none; /* По умолчанию скрыто */
      flex-direction: column;
      align-items: center;
      text-align: center;
      line-height: 1.3;
    }

    .queue-count-line1 {
      display: block;
    }

    .queue-count-line2 {
      display: block;
      font-size: 0.9rem;
      opacity: 0.9;
    }

    .queue-count-number {
      color: #e0e0e0; /* Чуть ярче чем основной текст */
      font-weight: 700;
      font-size: 1.25rem; /* Чуть больше размер */
      display: inline; /* Остается в одной строке */
    }

    .queue-count.visible {
      display: flex; /* Показываем только когда танков больше 5 */
    }

    .tank-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 500px;
      overflow-y: auto;
      padding-right: 8px;
    }

    .tank-list::-webkit-scrollbar {
      width: 8px;
    }

    .tank-list::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 4px;
    }

    .tank-list::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, var(--neon-blue), var(--neon-purple));
      border-radius: 4px;
      box-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
    }

    /* Стили для танков по местам: 1 место самое красивое, дальше проще */
    .tank-item {
      background: var(--bg-light);
      border-left: 5px solid;
      border-right: 3px solid rgba(0, 255, 71, 0.6); /* Зеленая рамка справа по умолчанию */
      border-radius: 12px;
      padding: 15px 8px 15px 50px; /* Уменьшен правый отступ с 10px до 8px */
      position: relative;
      transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px; /* Уменьшен с 15px до 12px */
      backdrop-filter: blur(5px);
      overflow: visible; /* Разрешаем свечению выходить за границы */
      box-shadow: inset -3px 0 10px rgba(0, 255, 71, 0.15); /* Свечение правой рамки */
    }

    /* Градиентное свечение от правой рамки влево - зеленое по умолчанию */
    .tank-item::before {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 120px; /* Ширина градиента (увеличено на 20%) */
      background: linear-gradient(to left, 
        var(--price-color, rgba(0, 255, 71, 0.25)) 0%,
        var(--price-color-fade-1, rgba(0, 255, 71, 0.15)) 20%,
        var(--price-color-fade-2, rgba(0, 255, 71, 0.08)) 40%,
        var(--price-color-fade-3, rgba(0, 255, 71, 0.04)) 60%,
        var(--price-color-fade-4, rgba(0, 255, 71, 0)) 100%
      );
      pointer-events: none;
      z-index: 0; /* Под содержимым, но над фоном */
      border-radius: 12px;
    }

    /* 1 место (1-й танк в очереди) - ЗОЛОТОЙ */
    .tank-item.position-1 {
      border-left-color: #ffd700;
      background: linear-gradient(to right, 
        rgba(255, 215, 0, 0.3) 0%,
        rgba(255, 215, 0, 0.2) 30%,
        rgba(255, 215, 0, 0.1) 50%,
        rgba(0, 0, 0, 0.6) 65%,
        rgba(0, 0, 0, 0.9) 100%
      );
      border-left-width: 4px;
    }

    /* 2 место (2-й танк) - СЕРЕБРЯНЫЙ */
    .tank-item.position-2 {
      border-left-color: #c0c0c0;
      background: linear-gradient(to right, 
        rgba(192, 192, 192, 0.25) 0%,
        rgba(192, 192, 192, 0.18) 30%,
        rgba(192, 192, 192, 0.1) 50%,
        rgba(0, 0, 0, 0.6) 65%,
        rgba(0, 0, 0, 0.9) 100%
      );
      border-left-width: 3px;
    }

    /* 3 место (3-й танк) - БРОНЗОВЫЙ */
    .tank-item.position-3 {
      border-left-color: #cd7f32;
      background: linear-gradient(to right, 
        rgba(205, 127, 50, 0.2) 0%,
        rgba(205, 127, 50, 0.15) 30%,
        rgba(205, 127, 50, 0.08) 50%,
        rgba(0, 0, 0, 0.6) 65%,
        rgba(0, 0, 0, 0.9) 100%
      );
      border-left-width: 3px;
    }

    /* 4 место (4-й танк) - обычный */
    .tank-item.position-4 {
      border-left-color: var(--text-secondary);
      background: linear-gradient(to right, 
        var(--bg-light) 0%,
        var(--bg-light) 50%,
        rgba(0, 0, 0, 0.6) 65%,
        rgba(0, 0, 0, 0.9) 100%
      );
      border-left-width: 2px;
    }

    /* 5 место (5-й танк) - обычный */
    .tank-item.position-5 {
      border-left-color: var(--text-secondary);
      background: linear-gradient(to right, 
        var(--bg-light) 0%,
        var(--bg-light) 50%,
        rgba(0, 0, 0, 0.6) 65%,
        rgba(0, 0, 0, 0.9) 100%
      );
      border-left-width: 2px;
    }

    .tank-item:hover {
      transform: translateX(8px) scale(1.02);
    }

    /* Цифры места - дизайн по крутости */
    .tank-number {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1rem;
      font-family: 'Orbitron', monospace;
      border: 2px solid;
      z-index: 2; /* Поверх градиента */
      box-shadow: inset 0 0 8px rgba(255, 255, 255, 0.2);
    }

    /* 1 место - ЗОЛОТОЙ */
    .tank-item.position-1 .tank-number {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.5), rgba(255, 223, 0, 0.4));
      border-color: #ffd700;
      color: #ffd700;
      width: 36px;
      height: 36px;
      font-size: 1.155rem; /* Увеличено на 5% (1.1 * 1.05) */
    }

    /* 2 место - СЕРЕБРЯНЫЙ */
    .tank-item.position-2 .tank-number {
      background: linear-gradient(135deg, rgba(192, 192, 192, 0.4), rgba(192, 192, 192, 0.3));
      border-color: #c0c0c0;
      color: #c0c0c0;
      width: 34px;
      height: 34px;
      font-size: 1.1025rem; /* Увеличено на 5% (1.05 * 1.05) */
    }

    /* 3 место - БРОНЗОВЫЙ */
    .tank-item.position-3 .tank-number {
      background: linear-gradient(135deg, rgba(205, 127, 50, 0.35), rgba(205, 127, 50, 0.25));
      border-color: #cd7f32;
      color: #cd7f32;
      width: 32px;
      height: 32px;
      font-size: 1.05rem; /* Увеличено на 5% (1 * 1.05) */
    }

    /* 4 место - обычный */
    .tank-item.position-4 .tank-number {
      background: rgba(20, 25, 35, 0.8);
      border-color: var(--text-secondary);
      color: var(--text-secondary);
      width: 30px;
      height: 30px;
      font-size: 0.9975rem; /* Увеличено на 5% (0.95 * 1.05) */
    }

    /* 5 место - обычный */
    .tank-item.position-5 .tank-number {
      background: rgba(20, 25, 35, 0.8);
      border-color: var(--text-secondary);
      color: var(--text-secondary);
      width: 30px;
      height: 30px;
      font-size: 0.9975rem; /* Увеличено на 5% (0.95 * 1.05) */
    }

    .tank-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 10px; /* Смещаем правее */
      padding-top: 3px; /* Опускаем ниже для вертикального центрирования */
      position: relative;
      z-index: 1; /* Поверх градиента */
    }

    .tank-name {
      font-weight: 700;
      font-size: 2.2rem; /* Увеличено с 1.8rem */
      color: var(--text);
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
      font-variant-numeric: normal; /* Одинаковый размер для цифр и букв */
      font-feature-settings: normal; /* Отключаем специальные настройки шрифта */
      line-height: 1.2; /* Обеспечиваем одинаковую высоту строки */
      letter-spacing: 0.5px; /* Небольшой межбуквенный интервал для лучшей читаемости */
    }

    .tank-conditions {
      font-size: 1rem;
      color: var(--text-secondary);
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .tank-conditions::before {
      content: '📝';
      font-size: 0.75rem;
    }

    .tank-price {
      font-weight: 400; /* Archivo Black имеет только один вес */
      font-size: 1.5rem;
      color: var(--neon-green);
      white-space: nowrap;
      font-family: 'Archivo Black', sans-serif; /* Грубый угловой шрифт без полосок в нулях */
      letter-spacing: 0.5px;
      display: flex;
      align-items: baseline;
      gap: 4px;
      position: relative;
      z-index: 1; /* Поверх градиента */
    }

    /* Приоритетный заказ - желтый цвет цены, свечение от полоски влево */
    .tank-item.priority-1 .tank-price {
      color: var(--neon-yellow);
    }

    .tank-item.priority-1 {
      position: relative;
      overflow: visible; /* Разрешаем свечению выходить за границы */
      border-right-color: rgba(255, 255, 0, 0.6); /* Желтая рамка справа */
      box-shadow: inset -3px 0 10px rgba(255, 255, 0, 0.15); /* Свечение правой рамки */
    }


    /* Свечение от полоски влево для приоритетного заказа */
    .tank-item.priority-1::after {
      content: '';
      position: absolute;
      left: -30px; /* Начинается левее полоски */
      top: 0;
      bottom: 0;
      width: 30px; /* Ширина свечения */
      background: linear-gradient(to right, 
        rgba(255, 255, 0, 0.8) 0%,
        rgba(255, 255, 0, 0.5) 30%,
        rgba(255, 255, 0, 0.2) 60%,
        rgba(255, 255, 0, 0) 100%
      );
      pointer-events: none;
      z-index: -1; /* Под полоской */
    }


    /* Мегаприоритет - фиолетовый цвет цены, свечение от полоски влево */
    .tank-item.priority-2 .tank-price {
      color: var(--neon-purple);
    }

    .tank-item.priority-2 {
      position: relative;
      overflow: visible; /* Разрешаем свечению выходить за границы */
      border-right-color: rgba(179, 0, 255, 0.6); /* Фиолетовая рамка справа */
      box-shadow: inset -3px 0 10px rgba(179, 0, 255, 0.15); /* Свечение правой рамки */
    }


    /* Свечение от полоски влево для мегаприоритета */
    .tank-item.priority-2::after {
      content: '';
      position: absolute;
      left: -30px; /* Начинается левее полоски */
      top: 0;
      bottom: 0;
      width: 30px; /* Ширина свечения */
      background: linear-gradient(to right, 
        rgba(179, 0, 255, 0.8) 0%,
        rgba(179, 0, 255, 0.5) 30%,
        rgba(179, 0, 255, 0.2) 60%,
        rgba(179, 0, 255, 0) 100%
      );
      pointer-events: none;
      z-index: -1; /* Под полоской */
    }


    .tank-price-prefix {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem; /* Увеличено с 0.8rem */
      font-weight: 500; /* Увеличено с 400 */
      color: #d0d0d0; /* Светлее чем var(--text-secondary) */
      opacity: 0.9; /* Увеличено с 0.7 для большей яркости */
      letter-spacing: 0.5px;
    }

    .empty-queue {
      text-align: center;
      padding: 50px 20px;
      color: var(--text-secondary);
      font-size: 1.1rem;
    }

    .empty-queue-icon {
      font-size: 4rem;
      margin-bottom: 15px;
      opacity: 0.6;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Анимации - максимально плавные */
    @keyframes slideIn {
      0% {
        opacity: 0;
        transform: translateY(-20px) scale(0.98);
        box-shadow: 
          0 0 10px rgba(0, 255, 71, 0.3),
          0 0 20px rgba(0, 255, 71, 0.2),
          0 0 30px rgba(0, 255, 71, 0.1);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        box-shadow: 
          0 0 20px rgba(0, 255, 71, 0.5),

        transform: translateY(0) scale(1);
        box-shadow: 
          0 0 20px rgba(255, 0, 60, 0.6),
          0 0 40px rgba(255, 0, 60, 0.4),

      }
      100% {

        box-shadow: 
          0 0 10px rgba(255, 0, 60, 0.2),
          0 0 20px rgba(255, 0, 60, 0.15),

    }

    .tank-item {
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), 
                  opacity 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  box-shadow 0.6s ease-out;
      will-change: transform, opacity;
      overflow: hidden;
    }

    .tank-item.slide-in {
      animation: slideIn 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
      border-left-color: rgba(0, 255, 71, 0.8) !important;
      position: relative;
    }
    
    .tank-item.slide-in::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, 
        rgba(0, 255, 71, 0.12) 0%,
        rgba(0, 255, 71, 0.12) 50%,
        rgba(0, 255, 71, 0.12) 100%
      );
      border-radius: 12px;
      opacity: 0;
      animation: fadeInOutGreen 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      pointer-events: none;
      z-index: -1;
    }
    
    @keyframes fadeInOutGreen {
      0% {
        opacity: 0;
      }
      40% {
        opacity: 0.8;
      }
      100% {
        opacity: 0;
      }
    }

    .tank-item.slide-out {
      animation: slideOut 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      pointer-events: none;
      z-index: 10;
      border-left-color: rgba(255, 0, 60, 0.8) !important;
      position: relative;
    }
    
    .tank-item.slide-out::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, 
        rgba(255, 0, 60, 0.12) 0%,
        rgba(255, 0, 60, 0.12) 50%,
        rgba(255, 0, 60, 0.12) 100%
      );
      border-radius: 12px;
      opacity: 0;
      animation: fadeInOutRed 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      pointer-events: none;
      z-index: -1;
    }
    
    @keyframes fadeInOutRed {
      0% {
        opacity: 0;
      }
      40% {
        opacity: 0.8;
      }
      100% {
        opacity: 0;
      }
    }

    .tank-item.slide-up {
      animation: slideUp 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    /* Задержка для каждого элемента для эффекта каскада - максимально плавная */
    .tank-item.slide-in:nth-child(1) { animation-delay: 0.05s; }
    .tank-item.slide-in:nth-child(2) { animation-delay: 0.1s; }
    .tank-item.slide-in:nth-child(3) { animation-delay: 0.15s; }
    .tank-item.slide-in:nth-child(4) { animation-delay: 0.2s; }
    .tank-item.slide-in:nth-child(5) { animation-delay: 0.25s; }

    /* Формат с ценой (текст сверху, цена снизу) */

<body>

    <!-- Окно пустой очереди (отключено, но не удалено) -->

      <div class="empty-queue-content">
        <div class="empty-queue-photo-wrapper">
          <img src="" alt="Стример" class="empty-queue-photo" id="streamerPhoto" style="background: transparent !important; background-color: transparent !important; border: none !important; outline: none !important; padding: 0 !important; margin: 0 !important;">
        </div>
        <div class="empty-queue-text">
          <div class="empty-queue-title">
            <div class="empty-queue-title-line">Очередь</div>

        </div>

    <!-- Третье фото (окно пустой очереди) -->
    <div class="third-photo-section" id="thirdPhotoSection" style="display: none;">
      <img src="" alt="Окно пустой очереди" class="third-photo" id="thirdPhoto">
    </div>

    <!-- Цена за заказ -->
    <div class="price-info">
      <div class="price-carousel-container">
        <div class="price-carousel-item active" id="priceCarouselItem">
          <div class="price-label" id="priceCarouselLabel">💰 Цена за заказ танка</div>
          <div class="price-value" id="priceCarouselValue">0₽</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Функция для правильного склонения слова "танк"
    function getTankWord(count) {
      const lastDigit = count % 10;
      const lastTwoDigits = count % 100;
      
      // Исключения для 11, 12, 13, 14
      if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
        return 'танков';
      }
      
      // 1, 21, 31, 41... - танк
      if (lastDigit === 1) {
        return 'танк';
      }
      
      // 2, 3, 4, 22, 23, 24... - танка
      if (lastDigit >= 2 && lastDigit <= 4) {
        return 'танка';
      }
      
      // 5, 6, 7, 8, 9, 0, 10, 20... - танков
      return 'танков';
    }

    let tanks = [];
    let currentTankIndex = -1;
    let orderPrice = 0;
    let priceCarousel = [];
    let priceCarouselInterval = 15; // Время смены в секундах
    let currentCarouselIndex = 0;
    let carouselInterval = null;
    let lastQueueEmptyState = null; // нужно, чтобы не перезапускать/обновлять текст при пустой очереди каждую проверку
    let lastPriceCarouselSignature = ''; // чтобы обновлять текст при реальном изменении настроек карусели
    let streamerPhoto = null;
    let secondPhoto = null;
    let thirdPhoto = null;
    let lastNotifiedTankId = null; // Для отслеживания последнего показанного танка

    const currentBattle = document.getElementById('currentBattle');
    const currentTankName = document.getElementById('currentTankName');
    const currentTankPrice = document.getElementById('currentTankPrice');
    const currentTankConditions = document.getElementById('currentTankConditions');
    const tankList = document.getElementById('tankList');
    const queueCount = document.getElementById('queueCount');
    const priceCarouselItem = document.getElementById('priceCarouselItem');
    const priceCarouselLabel = document.getElementById('priceCarouselLabel');
    const priceCarouselValue = document.getElementById('priceCarouselValue');
    const priceInfo = document.querySelector('.price-info');
    const queueSection = document.getElementById('queueSection');
    const emptyQueueSection = document.getElementById('emptyQueueSection');
    const streamerPhotoEl = document.getElementById('streamerPhoto');
    const secondPhotoEl = document.getElementById('secondPhoto');
    const thirdPhotoSection = document.getElementById('thirdPhotoSection');
    const thirdPhotoEl = document.getElementById('thirdPhoto');

    function updateStreamerPhoto(photoData) {
      if (streamerPhotoEl) {
        if (photoData && photoData.trim() !== '') {
          streamerPhotoEl.src = photoData;
          streamerPhotoEl.classList.add('loaded');
          streamerPhoto = photoData;
          // Принудительно обновляем отображение
          streamerPhotoEl.onload = function() {
            console.log('Streamer photo loaded successfully');
          };
          streamerPhotoEl.onerror = function() {
            console.error('Error loading streamer photo');
            streamerPhotoEl.classList.remove('loaded');
          };
        } else {
          streamerPhotoEl.classList.remove('loaded');
          streamerPhotoEl.src = '';
          streamerPhoto = null;
        }
      }
    }

    function updateSecondPhoto(photoData) {
      if (secondPhotoEl) {
        if (photoData && photoData.trim() !== '') {
          console.log('Updating second photo, length:', photoData.length);
          secondPhoto = photoData;
          secondPhotoEl.src = photoData;
          // Ждем загрузки изображения
          secondPhotoEl.onload = function() {
            console.log('Second photo loaded successfully');
            secondPhotoEl.classList.add('loaded');
            // Устанавливаем обработчики анимации для управления z-index
            setupSecondPhotoAnimation();
          };
          secondPhotoEl.onerror = function() {
            console.error('Error loading second photo');
            secondPhotoEl.classList.remove('loaded');
            secondPhotoEl.src = '';
          };
          // Если изображение уже загружено (из кеша), добавляем класс сразу
          if (secondPhotoEl.complete && secondPhotoEl.naturalWidth > 0) {
            console.log('Second photo already loaded (from cache)');
            secondPhotoEl.classList.add('loaded');
          }
        } else {
          console.log('No second photo data');
          secondPhotoEl.classList.remove('loaded');
          secondPhotoEl.src = '';
          secondPhoto = null;
        }
      } else {
        console.error('secondPhotoEl is null');
      }
    }

    // Функция для управления z-index второго фото во время анимации
    function setupSecondPhotoAnimation() {
      if (!secondPhotoEl) return;
      
      // Второе фото появляется в правой части, всегда поверх первого
      secondPhotoEl.style.zIndex = '3';
    }

    function updateThirdPhoto(photoData) {
      if (thirdPhotoEl) {
        if (photoData && photoData.trim() !== '') {
          console.log('Updating third photo, length:', photoData.length);
          thirdPhoto = photoData;
          thirdPhotoEl.src = photoData;
          // Ждем загрузки изображения
          thirdPhotoEl.onload = function() {
            console.log('Third photo loaded successfully');
            thirdPhotoEl.classList.add('loaded');
            // Обновляем отображение после загрузки фото
            if (tanks.length === 0) {
              renderQueue();
            }
          };
          thirdPhotoEl.onerror = function() {
            console.error('Error loading third photo');
            thirdPhotoEl.classList.remove('loaded');
            thirdPhotoEl.src = '';
            thirdPhoto = null;
          };
          // Если изображение уже загружено (из кеша), добавляем класс сразу
          if (thirdPhotoEl.complete && thirdPhotoEl.naturalWidth > 0) {
            console.log('Third photo already loaded (from cache)');
            thirdPhotoEl.classList.add('loaded');
            // Обновляем отображение если очередь пуста
            if (tanks.length === 0) {
              renderQueue();
            }
          }
        } else {
          console.log('No third photo data');
          thirdPhotoEl.classList.remove('loaded');
          thirdPhotoEl.src = '';
          thirdPhoto = null;
        }
      } else {
        console.error('thirdPhotoEl is null');
      }
    }

    async function loadData() {
      try {
        // Загружаем данные с сервера (как в OBS виджете)
        const res = await fetch(`/api/tank-queue?t=${Date.now()}`);
        const data = await res.json();
        
        if (data.success) {
          tanks = Array.isArray(data.tanks) ? data.tanks : [];
          currentTankIndex = data.currentTankIndex !== undefined ? data.currentTankIndex : -1;
          orderPrice = data.orderPrice !== undefined ? data.orderPrice : 0;
          
          // Загружаем карусель
          if (data.priceCarousel && Array.isArray(data.priceCarousel)) {
            priceCarousel = data.priceCarousel;
            console.log('📺 Карусель загружена с сервера:', priceCarousel);
          } else {
            // Дефолтные значения если карусель не загружена
            priceCarousel = [];
            console.log('⚠️ Карусель не загружена или пуста');
          }
          
          // Загружаем интервал карусели
          if (data.priceCarouselInterval !== undefined) {
            priceCarouselInterval = parseInt(data.priceCarouselInterval) || 15;
            console.log('⏱️ Интервал карусели загружен:', priceCarouselInterval, 'сек');
          }
          
          // Загружаем фото стримера
          updateStreamerPhoto(data.streamerPhoto || null);
          
          // Загружаем второе фото
          console.log('Loading data, secondPhoto:', data.secondPhoto ? `exists (${data.secondPhoto.length} chars)` : 'null');
          updateSecondPhoto(data.secondPhoto || null);
          
          // Загружаем третье фото
          console.log('Loading data, thirdPhoto:', data.thirdPhoto ? `exists (${data.thirdPhoto.length} chars)` : 'null');
          updateThirdPhoto(data.thirdPhoto || null);
          
          updateOrderPrice();
          renderQueue();
          
        // После загрузки синхронизируем карусель с состоянием очереди
        setTimeout(() => {
          syncPriceCarouselWithQueueState();
        }, 100);
        } else {
          throw new Error(data.error || 'Ошибка загрузки данных');
        }
      } catch (err) {
        console.error('Error loading data:', err);
        // Показываем пустое состояние при ошибке
        if (tankList) {
          tankList.innerHTML = `
            <li class="empty-queue">
              <div class="empty-queue-icon">🚗</div>
              <div>Ошибка загрузки данных</div>
            </li>
          `;
        }
      }
    }

    function updateOrderPrice() {
      // Устаревшая функция, оставлена для совместимости
      // Карусель обновляется через startPriceCarousel()
    }

    // Функция для извлечения цены из текста
    function extractPrice(text) {
      if (!text) return null;
      // Ищем цену в форматах: "150₽", "200 руб", "300 рублей", "150 р."
      const priceMatch = text.match(/(\d+)\s*(₽|руб|рублей|р\.|р)/i);
      if (priceMatch) {
        return parseInt(priceMatch[1]);
      }
      return null;
    }

    // Функция для извлечения текста без цены
    function extractTextWithoutPrice(text) {
      if (!text) return '';
      // Удаляем цену из текста
      return text.replace(/\s*\d+\s*(₽|руб|рублей|р\.|р)/gi, '').trim();
    }

    // Функция для обновления карусели
    function updatePriceCarousel() {
      if (!priceCarouselItem || !priceCarouselLabel || !priceCarouselValue) {
        console.error('❌ Элементы карусели не найдены');
        return;
      }
      
      console.log('🔄 Обновление карусели, данные:', priceCarousel);
      
      // Фильтруем только включенные элементы
      const enabledItems = priceCarousel.filter(item => item.enabled && item.text && item.text.trim() !== '');
      
      console.log('✅ Включенные элементы карусели:', enabledItems);
      
      if (enabledItems.length === 0) {
        // Если нет включенных элементов, скрываем карусель или показываем пустое состояние
        console.log('⚠️ Нет включенных элементов карусели');
        priceCarouselItem.className = 'price-carousel-item active has-price';
        priceCarouselLabel.textContent = '';
        priceCarouselValue.textContent = '';
        priceCarouselValue.style.display = 'none';
        return;
      }

      // Получаем текущий элемент
      const currentItem = enabledItems[currentCarouselIndex % enabledItems.length];
      console.log('📌 Текущий элемент карусели:', currentItem);
      const price = extractPrice(currentItem.text);
      const textWithoutPrice = extractTextWithoutPrice(currentItem.text);
      console.log('💰 Извлеченная цена:', price, 'Текст без цены:', textWithoutPrice);

      // Удаляем старые классы для плавной анимации исчезновения
      priceCarouselItem.classList.remove('active');
      
      // Ждем завершения анимации исчезновения перед показом нового элемента
      setTimeout(() => {
        // Удаляем все классы формата
        priceCarouselItem.classList.remove('has-price', 'text-only');
        
        // Обновляем содержимое
        if (price !== null) {
          // Формат с ценой: текст сверху, цена снизу
          priceCarouselLabel.textContent = textWithoutPrice || '💰 Цена за заказ';
          priceCarouselValue.textContent = `${price}₽`;
          priceCarouselValue.style.display = 'block';
          priceCarouselItem.classList.add('has-price');
        } else {
          // Формат только текст: крупный текст по центру
          priceCarouselLabel.textContent = currentItem.text;
          priceCarouselValue.style.display = 'none';
          priceCarouselItem.classList.add('text-only');
        }
        
        // Добавляем класс active для анимации появления
        setTimeout(() => {
          priceCarouselItem.classList.add('active');
        }, 10);
      }, 300); // Время анимации исчезновения
    }

    // Функция для запуска карусели
    function startPriceCarousel() {
      console.log('🚀 Запуск карусели, данные:', priceCarousel);
      
      // Останавливаем предыдущий интервал если есть
      if (carouselInterval) {
        clearInterval(carouselInterval);
        carouselInterval = null;
      }

      // Обновляем сразу
      updatePriceCarousel();

      // Запускаем карусель с настраиваемым интервалом
      const enabledItems = priceCarousel.filter(item => item.enabled && item.text && item.text.trim() !== '');
      if (enabledItems.length > 0) {
        const intervalMs = priceCarouselInterval * 1000; // Конвертируем секунды в миллисекунды
        carouselInterval = setInterval(() => {
          const currentEnabledItems = priceCarousel.filter(item => item.enabled && item.text && item.text.trim() !== '');
          if (currentEnabledItems.length > 1) {
            currentCarouselIndex = (currentCarouselIndex + 1) % currentEnabledItems.length;
            updatePriceCarousel();
          }
        }, intervalMs);
        console.log('✅ Карусель запущена, элементов:', enabledItems.length, 'Интервал:', priceCarouselInterval, 'сек');
      } else {
        console.log('⚠️ Карусель не запущена, нет включенных элементов');
      }
    }

    // Функция для остановки карусели
    function stopPriceCarousel() {
      if (carouselInterval) {
        clearInterval(carouselInterval);
        carouselInterval = null;
      }
    }

    // Фиксируем карусель, когда очередь пуста: всегда показываем 1-й включенный текст
    function syncPriceCarouselWithQueueState() {
      const queueEmpty = !Array.isArray(tanks) || tanks.length === 0;
      const isNotification = priceCarouselItem && priceCarouselItem.classList.contains('notification');
      const priceCarouselSignature = JSON.stringify(priceCarousel || []);

      if (queueEmpty) {
        stopPriceCarousel();
        // Обновляем карусель только при переходе в пустую очередь или при изменении самих текстов.
        if (lastQueueEmptyState !== true || lastPriceCarouselSignature !== priceCarouselSignature) {
          currentCarouselIndex = 0; // гарантируем "первый вариант по счету"
          updatePriceCarousel();
          lastPriceCarouselSignature = priceCarouselSignature;
        }
        lastQueueEmptyState = true;
        return;
      }

      // Во время уведомления не трогаем карусель (иначе собьём анимацию/тайминг уведомления)
      if (isNotification) return;

      // Если очередь стала непустой — запускаем вращение
      if (lastQueueEmptyState === true || carouselInterval === null) {
        startPriceCarousel();
      }
      lastQueueEmptyState = false;
    }

    // Функция для показа уведомления о добавлении танка
    function showTankAddedNotification(tankName, price, priority) {
      console.log('📢 showTankAddedNotification вызвана:', { tankName, price, priority });
      
      if (!priceCarouselItem || !priceCarouselLabel || !priceCarouselValue) {
        console.error('❌ Элементы карусели не найдены');
        return;
      }

      // Останавливаем карусель на время показа уведомления
      const wasCarouselRunning = carouselInterval !== null;
      if (wasCarouselRunning) {
        stopPriceCarousel();
      }

      // Удаляем старые классы
      priceCarouselItem.classList.remove('active', 'has-price', 'text-only');
      priceCarouselItem.classList.add('notification', 'has-price');

      // Устанавливаем уведомление: сверху "Добавлен в очередь", снизу название танка крупным шрифтом
      priceCarouselLabel.textContent = 'Добавлен в очередь';
      priceCarouselValue.textContent = tankName;
      priceCarouselValue.style.display = 'block';

      // Показываем сразу без анимации
      priceCarouselItem.classList.add('active');
      
      // Убираем рамку у price-info
      if (priceInfo) {
        priceInfo.classList.add('has-notification');
      }

      // Возвращаем карусель через 3 секунды
      setTimeout(() => {
        priceCarouselItem.classList.remove('active', 'notification');
        // Возвращаем рамку у price-info
        if (priceInfo) {
          priceInfo.classList.remove('has-notification');
        }
        if (wasCarouselRunning) {
          startPriceCarousel();
        } else {
          updatePriceCarousel();
        }
      }, 3000);
    }

    function sortTanks() {
      // Сортируем сначала по приоритету (2 > 1 > 0), затем по времени добавления (старые выше, новые ниже)
      tanks.sort((a, b) => {
        const priorityA = a.priority || 0;
        const priorityB = b.priority || 0;
        
        // Сначала по приоритету
        if (priorityA !== priorityB) {
          return priorityB - priorityA; // Мегаприоритет (2) > Приоритетный (1) > Базовый (0)
        }
        
        // Если приоритет одинаковый, то по времени добавления (старые выше, новые ниже)
        const timeA = a.addedAt || 0;
        const timeB = b.addedAt || 0;
        if (timeA !== timeB) {
          return timeA - timeB; // Старые выше (меньшее время = выше в очереди)
        }
        
        // Если время одинаковое, то по цене (выше цена = выше в очереди)
        return b.price - a.price;
      });
    }

    function getPriceClass(price) {
      if (price >= 200) return 'high-price';
      if (price >= 101) return 'medium-price';
      if (price >= 75) return 'low-price';
      return '';
    }

    function renderQueue() {
      sortTanks();
      
      // Рендерим очередь (исключая текущий танк)
      const queueTanks = tanks.filter((_, index) => index !== currentTankIndex);
      const queueLength = queueTanks.length;
      
      // НЕ очищаем список сразу - используем анимации для плавного перехода
      // Удаляем только элементы, которых больше нет в очереди

      if (tanks.length === 0) {
        // Если очередь пуста, очищаем список и скрываем секцию
        const existingItems = Array.from(tankList.children);
        existingItems.forEach(item => {
          item.classList.remove('slide-in');
          item.classList.add('slide-out');
          setTimeout(() => {
            if (item.parentNode) {
              item.remove();
            }
          }, 500);
        });
        queueSection.classList.remove('visible');
        currentBattle.style.display = 'none';
        // Скрываем старое окно пустой очереди
        emptyQueueSection.classList.remove('visible');
        // Показываем третье фото если оно есть, иначе показываем старое окно
        console.log('Empty queue - checking third photo:', {
          hasThirdPhoto: !!thirdPhoto,
          hasThirdPhotoEl: !!thirdPhotoEl,

    // Храним предыдущее состояние очереди для сравнения
    let previousTankIds = new Set();

    function showQueueWithAnimation() {
      // Показываем очередь только если больше 5 танков в очереди (исключая текущий)
      const queueTanks = tanks.filter((_, index) => index !== currentTankIndex);
      const queueLength = queueTanks.length;
      
      // Удаляем элемент "Очередь пуста", если он есть
      const emptyQueueItems = Array.from(tankList.children).filter(item => item.classList.contains('empty-queue'));
      emptyQueueItems.forEach(item => {
        item.remove();
      });
      
      // Получаем текущие ID танков для сравнения
      const currentTankIds = new Set();
      const getTankId = (tank, index) => {
        // Используем уникальный ID если есть
        if (tank.id) {
          return tank.id;
        }
        // Используем комбинацию имени, цены и времени добавления
        // ВАЖНО: не используем индекс, так как он меняется при добавлении/удалении танков
        // Используем только стабильные свойства танка
        const uniqueKey = tank.addedAt || `manual-${tank.name}-${tank.price}-${index}`;
        return `tank-${tank.name}-${tank.price}-${uniqueKey}`;
      };
      
      // Собираем ID всех танков, которые должны быть отображены
      const tanksToShow = queueLength > 5 ? queueTanks.slice(0, 5) : queueTanks;
      tanksToShow.forEach((tank, idx) => {
        currentTankIds.add(getTankId(tank, idx));
      });
      
      // Собираем ID всех танков в очереди (включая те, что за пределами видимости)
      const allTankIds = new Set();
      queueTanks.forEach((tank, idx) => {
        allTankIds.add(getTankId(tank, idx));
      });
      
      // Удаляем элементы, которых больше нет в текущей очереди
      const existingItems = Array.from(tankList.children);
      const itemsToRemove = [];
      const itemsToHide = []; // Элементы, которые просто вышли за пределы видимости
      
      existingItems.forEach(item => {
        // Пропускаем элементы "Очередь пуста"
        if (item.classList.contains('empty-queue')) {
          return;
        }
        
        const itemTankId = item.dataset.tankId;
        if (itemTankId && !currentTankIds.has(itemTankId)) {
          // Элемент не в видимой области
          if (allTankIds.has(itemTankId)) {
            // Танк все еще в очереди, просто вышел за пределы видимости - удаляем без анимации
            itemsToHide.push(item);
          } else {
            // Танк действительно удален из очереди - анимируем удаление
            item.classList.remove('slide-in');
            item.classList.add('slide-out');
            itemsToRemove.push(item);
          }
        }
      });
      
      // Удаляем элементы, которые просто вышли за пределы видимости (без анимации)
      itemsToHide.forEach(item => {
        if (item.parentNode) {
          item.remove();
        }
      });
      
      // Удаляем элементы после завершения анимации
      if (itemsToRemove.length > 0) {
        setTimeout(() => {
          itemsToRemove.forEach(item => {
            if (item.parentNode) {
              item.remove();
            }
          });
        }, 500);
      }
      
      if (queueLength > 5) {
        queueSection.classList.add('visible');
        const tankWord = getTankWord(queueLength);
        queueCount.innerHTML = `

        queueCount.classList.add('visible'); // Показываем маленькое окно с количеством
        
        // Рендерим первые 5 танков из очереди с позициями

        const existingItemsMap = new Map();
        
        // Сначала собираем все существующие элементы
        Array.from(tankList.children).forEach(item => {
          if (item.dataset.tankId && !item.classList.contains('empty-queue')) {
            existingItemsMap.set(item.dataset.tankId, item);

        tanksToShow.forEach((tank, queueIndex) => {
          const position = queueIndex; // 0, 1, 2, 3, 4 для позиций 1, 2, 3, 4, 5

          // Проверяем, есть ли уже этот элемент в DOM

            itemsMap.set(position, { item, isNew: true });
          } else {
            // Танк уже есть - обновляем позицию и классы без анимации
            // Убираем анимации удаления, если они были применены
            existingItem.classList.remove('slide-out');
            existingItem.classList.remove('slide-in');
            const priorityClass = tank.priority === 1 ? 'priority-1' : (tank.priority === 2 ? 'priority-2' : '');
            existingItem.className = `tank-item position-${position + 1} ${getPriceClass(tank.price)} ${priorityClass}`.trim();
            const numberSpan = existingItem.querySelector('.tank-number');

            // Обновляем цвет градиента на основе цвета цены
            const priceElement = existingItem.querySelector('.tank-price');
            if (priceElement) {
              updateGradientColor(existingItem, priceElement);
            }
            
            itemsMap.set(position, { item: existingItem, isNew: false });
          }
        });
        
        // Вставляем элементы в правильном порядке (позиция 1 сверху, позиция 5 снизу)
        const sortedPositions = Array.from(itemsMap.keys()).sort((a, b) => a - b);
        sortedPositions.forEach((position) => {
          const { item, isNew } = itemsMap.get(position);
          if (item) {
            if (isNew) {
              // Новый элемент - вставляем в правильную позицию сразу
              // Находим элемент, который должен быть после этого (следующая позиция)
              let insertBefore = null;
              for (let i = position + 1; i < sortedPositions.length; i++) {
                const nextItem = itemsMap.get(sortedPositions[i])?.item;
                if (nextItem && nextItem.parentNode === tankList) {
                  insertBefore = nextItem;
                  break;
                }
              }
              
              // Если не нашли следующий элемент, ищем первый существующий элемент с большей позицией
              if (!insertBefore) {
                const allChildren = Array.from(tankList.children);
                for (const child of allChildren) {
                  if (child !== item && !child.classList.contains('empty-queue')) {
                    const childPosition = parseInt(child.className.match(/position-(\d+)/)?.[1] || '0');
                    if (childPosition > position + 1) {
                      insertBefore = child;
                      break;
                    }
                  }
                }
              }
              
              if (insertBefore) {
                tankList.insertBefore(item, insertBefore);
              } else {
                tankList.appendChild(item);
              }
            } else {
              // Существующий элемент - перемещаем только если нужно
              const currentIndex = Array.from(tankList.children).indexOf(item);
              const targetIndex = sortedPositions.indexOf(position);
              
              if (currentIndex !== targetIndex && currentIndex >= 0) {
                // Находим элемент, который должен быть после этого
                let insertBefore = null;
                for (let i = position + 1; i < sortedPositions.length; i++) {
                  const nextItem = itemsMap.get(sortedPositions[i])?.item;
                  if (nextItem && nextItem.parentNode === tankList && nextItem !== item) {
                    insertBefore = nextItem;
                    break;
                  }
                }
                
                if (insertBefore) {
                  tankList.insertBefore(item, insertBefore);
                } else if (targetIndex >= tankList.children.length) {
                  tankList.appendChild(item);
                }
              }
            }
          }
        });
      } else if (queueLength > 0) {
        // Если танков меньше или равно 5, но больше 0, показываем все
        queueSection.classList.add('visible');
        queueCount.classList.remove('visible'); // Скрываем маленькое окно с количеством
        
        const itemsMap = new Map();
        const existingItemsMap = new Map();
        
        // Сначала собираем все существующие элементы
        Array.from(tankList.children).forEach(item => {
          if (item.dataset.tankId && !item.classList.contains('empty-queue')) {
            existingItemsMap.set(item.dataset.tankId, item);
          }
        });
        
        queueTanks.forEach((tank, queueIndex) => {
          const position = queueIndex;
          const tankId = getTankId(tank, queueIndex);
          
          // Проверяем, есть ли уже этот элемент в DOM
          const existingItem = existingItemsMap.get(tankId);
          
          if (!existingItem) {
            // Новый танк - создаем элемент
            const item = createTankItem(tank, position);
            item.dataset.tankId = tankId;
            item.classList.add('slide-in');
            // Удаляем класс slide-in после завершения анимации
            item.addEventListener('animationend', function() {
              item.classList.remove('slide-in');
            }, { once: true });
            itemsMap.set(position, { item, isNew: true });
          } else {
            // Танк уже есть - обновляем позицию и классы без анимации
            // Убираем анимации удаления, если они были применены
            existingItem.classList.remove('slide-out');
            existingItem.classList.remove('slide-in');
            const priorityClass = tank.priority === 1 ? 'priority-1' : (tank.priority === 2 ? 'priority-2' : '');
            existingItem.className = `tank-item position-${position + 1} ${getPriceClass(tank.price)} ${priorityClass}`.trim();
            const numberSpan = existingItem.querySelector('.tank-number');
            if (numberSpan) numberSpan.textContent = position + 1;
            const nameDiv = existingItem.querySelector('.tank-name');
            if (nameDiv) nameDiv.textContent = tank.name;
            const priceSpan = existingItem.querySelector('.tank-price span:last-child');
            if (priceSpan) priceSpan.textContent = `${tank.price}₽`;
            
            // Обновляем цвет градиента на основе цвета цены
            const priceElement = existingItem.querySelector('.tank-price');
            if (priceElement) {
              updateGradientColor(existingItem, priceElement);
            }
            
            itemsMap.set(position, { item: existingItem, isNew: false });
          }
        });
        
        // Вставляем элементы в правильном порядке (позиция 1 сверху, позиция 5 снизу)
        const sortedPositions = Array.from(itemsMap.keys()).sort((a, b) => a - b);
        sortedPositions.forEach((position) => {
          const { item, isNew } = itemsMap.get(position);
          if (item) {
            if (isNew) {
              // Новый элемент - вставляем в правильную позицию сразу
              // Находим элемент, который должен быть после этого (следующая позиция)
              let insertBefore = null;
              for (let i = position + 1; i < sortedPositions.length; i++) {
                const nextItem = itemsMap.get(sortedPositions[i])?.item;
                if (nextItem && nextItem.parentNode === tankList) {
                  insertBefore = nextItem;
                  break;
                }
              }
              
              // Если не нашли следующий элемент, ищем первый существующий элемент с большей позицией
              if (!insertBefore) {
                const allChildren = Array.from(tankList.children);
                for (const child of allChildren) {
                  if (child !== item && !child.classList.contains('empty-queue')) {
                    const childPosition = parseInt(child.className.match(/position-(\d+)/)?.[1] || '0');
                    if (childPosition > position + 1) {
                      insertBefore = child;
                      break;
                    }
                  }
                }
              }
              
              if (insertBefore) {
                tankList.insertBefore(item, insertBefore);
              } else {
                tankList.appendChild(item);
              }
            } else {
              // Существующий элемент - перемещаем только если нужно
              const currentIndex = Array.from(tankList.children).indexOf(item);
              const targetIndex = sortedPositions.indexOf(position);
              
              if (currentIndex !== targetIndex && currentIndex >= 0) {
                // Находим элемент, который должен быть после этого
                let insertBefore = null;
                for (let i = position + 1; i < sortedPositions.length; i++) {
                  const nextItem = itemsMap.get(sortedPositions[i])?.item;
                  if (nextItem && nextItem.parentNode === tankList && nextItem !== item) {
                    insertBefore = nextItem;
                    break;
                  }
                }
                
                if (insertBefore) {
                  tankList.insertBefore(item, insertBefore);
                } else if (targetIndex >= tankList.children.length) {
                  tankList.appendChild(item);
                }
              }
            }
          }
        });
      } else {
        // Очередь пуста (но есть текущий бой)
        queueSection.classList.remove('visible');
        queueCount.classList.remove('visible'); // Скрываем маленькое окно с количеством
      }
      
      // Обновляем предыдущее состояние
      previousTankIds = currentTankIds;
    }
    
    // Функция для плавного обновления позиций оставшихся элементов
    function updateRemainingItemsPositions() {
      const queueTanks = tanks.filter((_, index) => index !== currentTankIndex);
      const queueLength = queueTanks.length;
      const itemsToShow = queueLength > 5 ? queueTanks.slice(0, 5) : queueTanks;
      
      const existingItems = Array.from(tankList.children).filter(item => 
        !item.classList.contains('empty-queue') && item.dataset.tankId
      );
      
      // Создаем карту существующих элементов по их ID
      const itemsMap = new Map();
      existingItems.forEach(item => {
        const tankId = item.dataset.tankId;
        if (tankId) {
          itemsMap.set(tankId, item);
        }
      });
      
      // Обновляем позиции только для тех элементов, которые остались
      const getTankId = (tank, index) => {
        if (tank.id) {
          return tank.id;
        }
        const originalIndex = tanks.findIndex(t => t === tank);
        const uniqueKey = tank.addedAt || originalIndex || `idx-${index}`;
        return `tank-${tank.name}-${tank.price}-${uniqueKey}`;
      };
      
      itemsToShow.forEach((tank, index) => {
        const tankId = getTankId(tank, index);
        const item = itemsMap.get(tankId);
        
        if (item) {
          const newPosition = index;
          const priorityClass = tank.priority === 1 ? 'priority-1' : (tank.priority === 2 ? 'priority-2' : '');
          
          // Плавно обновляем классы и содержимое с использованием transition
          item.style.transition = 'transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
          item.className = `tank-item position-${newPosition + 1} ${getPriceClass(tank.price)} ${priorityClass}`.trim();
          
          const numberSpan = item.querySelector('.tank-number');
          if (numberSpan) numberSpan.textContent = newPosition + 1;
          const nameDiv = item.querySelector('.tank-name');
          if (nameDiv && nameDiv.textContent !== tank.name) {
            nameDiv.textContent = tank.name;
          }
          const priceSpan = item.querySelector('.tank-price span:last-child');
          if (priceSpan) {
            const newPrice = `${tank.price}₽`;
            if (priceSpan.textContent !== newPrice) {
              priceSpan.textContent = newPrice;
            }
          }
          
          // Обновляем цвет градиента на основе цвета цены
          const priceElement = item.querySelector('.tank-price');
          if (priceElement) {
            updateGradientColor(item, priceElement);
          }
        }
      });
    }

    function createTankItem(tank, position) {
      const li = document.createElement('li');
      // Добавляем класс позиции (0 = position-1, 1 = position-2, и т.д.)
      // Добавляем класс приоритета если есть
      const priorityClass = tank.priority === 1 ? 'priority-1' : (tank.priority === 2 ? 'priority-2' : '');
      li.className = `tank-item position-${position + 1} ${getPriceClass(tank.price)} ${priorityClass}`.trim();

      const numberSpan = document.createElement('span');
      numberSpan.className = 'tank-number';
      numberSpan.textContent = position + 1; // 1, 2, 3, 4, 5
      li.appendChild(numberSpan);

      const infoDiv = document.createElement('div');
      infoDiv.className = 'tank-info';

      const nameDiv = document.createElement('div');
      nameDiv.className = 'tank-name';
      nameDiv.textContent = tank.name;
      infoDiv.appendChild(nameDiv);

      if (tank.conditions) {
        const conditionsDiv = document.createElement('div');
        conditionsDiv.className = 'tank-conditions';
        conditionsDiv.textContent = tank.conditions;
        infoDiv.appendChild(conditionsDiv);
      }

      li.appendChild(infoDiv);

      const priceSpan = document.createElement('span');
      priceSpan.className = 'tank-price';
      
      const prefixSpan = document.createElement('span');
      prefixSpan.className = 'tank-price-prefix';
      prefixSpan.textContent = 'За';
      
      const priceValueSpan = document.createElement('span');
      priceValueSpan.textContent = `${tank.price}₽`;
      
      priceSpan.appendChild(prefixSpan);
      priceSpan.appendChild(priceValueSpan);
      li.appendChild(priceSpan);

      // Устанавливаем цвет градиента на основе цвета цены
      setTimeout(() => {
        updateGradientColor(li, priceSpan);
      }, 0);

      return li;
    }

    // Функция для установки цвета градиента на основе цвета цены
    function updateGradientColor(tankItem, priceElement) {
      if (!tankItem || !priceElement) return;
      
      // Получаем computed style цены
      const priceColor = window.getComputedStyle(priceElement).color;
      
      // Преобразуем цвет в rgba
      const rgbMatch = priceColor.match(/\d+/g);
      if (!rgbMatch || rgbMatch.length < 3) return;
      
      const r = parseInt(rgbMatch[0]);
      const g = parseInt(rgbMatch[1]);
      const b = parseInt(rgbMatch[2]);
      
      // Устанавливаем CSS переменные для градиента
      tankItem.style.setProperty('--price-color', `rgba(${r}, ${g}, ${b}, 0.25)`);
      tankItem.style.setProperty('--price-color-fade-1', `rgba(${r}, ${g}, ${b}, 0.15)`);
      tankItem.style.setProperty('--price-color-fade-2', `rgba(${r}, ${g}, ${b}, 0.08)`);
      tankItem.style.setProperty('--price-color-fade-3', `rgba(${r}, ${g}, ${b}, 0.04)`);
      tankItem.style.setProperty('--price-color-fade-4', `rgba(${r}, ${g}, ${b}, 0)`);
    }

    async function updateData() {
      try {
        // Загружаем данные с сервера (как в OBS виджете)
        const res = await fetch(`/api/tank-queue?lite=1&t=${Date.now()}`);
        const data = await res.json();
        
        if (data.success) {
          let changed = false;
          
          // Проверяем изменения в очереди
          const newTanks = Array.isArray(data.tanks) ? data.tanks : [];
          const oldTanksLength = tanks.length;
          const newTanksLength = newTanks.length;
          
          if (JSON.stringify(newTanks) !== JSON.stringify(tanks)) {
            // Проверяем, был ли добавлен новый танк
            if (newTanksLength > oldTanksLength) {
              // Находим последний добавленный танк (самый новый по addedAt)
              const sortedNewTanks = [...newTanks].sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));
              const lastAddedTank = sortedNewTanks[0];
              
              if (lastAddedTank && lastAddedTank.addedAt) {
                // Создаем уникальный ID для танка (name + price + addedAt)
                const tankId = `${lastAddedTank.name}-${lastAddedTank.price}-${lastAddedTank.addedAt}`;
                
                // Проверяем, что танк был добавлен недавно (в последние 5 секунд) и еще не показывали уведомление
                const timeSinceAdded = Date.now() - lastAddedTank.addedAt;
                console.log('🔍 Проверка нового танка:', {
                  name: lastAddedTank.name,
                  timeSinceAdded,
                  tankId,
                  lastNotifiedTankId
                });
                
                if (timeSinceAdded < 5000 && timeSinceAdded > 0 && tankId !== lastNotifiedTankId) {
                  console.log('✅ Показываем уведомление для танка:', lastAddedTank.name);
                  // Показываем уведомление
                  showTankAddedNotification(
                    lastAddedTank.name,
                    lastAddedTank.price,
                    lastAddedTank.priority || 0
                  );
                  lastNotifiedTankId = tankId;
                }
              }
            }
            
            tanks = newTanks;
            changed = true;
          }
          
          // Проверяем изменения в текущем танке
          const newIndex = data.currentTankIndex !== undefined ? data.currentTankIndex : -1;
          if (newIndex !== currentTankIndex) {
            currentTankIndex = newIndex;
            changed = true;
          }
          
          // Проверяем изменения в цене
          const newPrice = data.orderPrice !== undefined ? data.orderPrice : 0;
          if (newPrice !== orderPrice) {
            orderPrice = newPrice;
            updateOrderPrice();
            changed = true;
          }
          
          // Проверяем изменения в карусели
          if (data.priceCarousel && Array.isArray(data.priceCarousel)) {
            if (JSON.stringify(data.priceCarousel) !== JSON.stringify(priceCarousel)) {
              priceCarousel = data.priceCarousel;
              updatePriceCarousel(); // Обновляем отображение
              syncPriceCarouselWithQueueState();
              changed = true;
            }
          }
          
          // Проверяем изменения в интервале карусели
          if (data.priceCarouselInterval !== undefined) {
            const newInterval = parseInt(data.priceCarouselInterval) || 15;
            if (newInterval !== priceCarouselInterval) {
              console.log('⏱️ Изменение интервала карусели:', priceCarouselInterval, '->', newInterval);
              priceCarouselInterval = newInterval;
              if (tanks.length > 0) {
                // Не перезапускаем, если сейчас идёт уведомление
                const isNotification = priceCarouselItem && priceCarouselItem.classList.contains('notification');
                if (!isNotification) startPriceCarousel();
              } else {
                syncPriceCarouselWithQueueState();
              }
              changed = true;
            }
          }
          
          // Проверяем изменения в фото стримера
          if (data.streamerPhoto !== undefined) {
            const newPhoto = data.streamerPhoto || null;
            if (newPhoto !== streamerPhoto) {
              updateStreamerPhoto(newPhoto);
              changed = true;
            }
          }
          
          // Проверяем изменения во втором фото
          if (data.secondPhoto !== undefined) {
            const newSecondPhoto = data.secondPhoto || null;
            if (newSecondPhoto !== secondPhoto) {
              updateSecondPhoto(newSecondPhoto);
              changed = true;
            }
          }
          
          // Проверяем изменения в третьем фото
          if (data.thirdPhoto !== undefined) {
            const newThirdPhoto = data.thirdPhoto || null;
            if (newThirdPhoto !== thirdPhoto) {
              updateThirdPhoto(newThirdPhoto);
              changed = true;
            }
          }
          
          // Обновляем очередь только если она изменилась
          if (changed) {
            renderQueue();
          }
        }
      } catch (err) {
        console.error('Error updating data:', err);
      }
    }

    // Периодическая проверка обновлений (как в OBS виджете)
    setInterval(updateData, 2000);
    
    // Инициализация при загрузке страницы
    loadData();

    // Инициализация
    loadData();
  </script>
</body>
</html>
