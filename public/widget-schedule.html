<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
/* Единый стиль с widget-tank-queue-obs / widget-boss-orders: нейтральный графит, золотой акцент. */
:root{
    --bg:#131417;--bg-2:#1a1b1f;--line:rgba(255,255,255,.09);--line-gold:rgba(217,180,101,.35);
    --gold:#d9b465;--gold-soft:rgba(217,180,101,.4);
    --text:#f5f6f8;--text-dim:#9a9ea8;--text-mut:#686c76;
    --green:#5fe3a3;--green-soft:rgba(95,227,163,.35);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;min-height:100vh;overflow:hidden;}
body{font-family:'Manrope',sans-serif;background:transparent;color:var(--text);
    display:flex;align-items:flex-start;justify-content:center;-webkit-font-smoothing:antialiased;}

.scale{width:100%;transform-origin:top center;transform:scale(var(--s,1));padding-top:6px;}
.stage{width:100%;max-width:460px;padding:0 12px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:9px;}

.title-pill{display:inline-flex;align-items:center;gap:12px;
    padding:13px 28px;border-radius:999px;max-width:100%;
    background:rgba(19,20,23,0.92);border:1px solid var(--line-gold);
    box-shadow:0 10px 26px rgba(0,0,0,0.45),0 0 26px rgba(217,180,101,.1);}
.title-pill .tx{font-size:1.1rem;font-weight:800;letter-spacing:.04em;color:var(--text);white-space:normal;text-align:center;text-shadow:2px 2px 0 rgba(0,0,0,.7);}

.board{position:relative;width:100%;display:flex;flex-direction:column;gap:8px;}

.s-item{position:relative;z-index:1;border-radius:13px;overflow:hidden;
    background:linear-gradient(150deg,var(--bg),var(--bg-2));border:1px solid var(--line);
    box-shadow:0 10px 26px rgba(0,0,0,0.4);}
.s-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--text-mut);z-index:2;}

.s-item.current{border-color:rgba(95,227,163,.35);}
.s-item.current::before{background:var(--green);}
.s-item.current::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
    background:linear-gradient(120deg,rgba(95,227,163,.12) 0%,rgba(95,227,163,.03) 65%);}
.s-item.current .s-time{color:var(--green);}

.s-item.done{opacity:.55;}
.s-item.done .s-time,.s-item.done .s-text{color:var(--text-mut);text-decoration:line-through;}

.s-row{position:relative;z-index:1;display:flex;flex-wrap:wrap;align-items:baseline;row-gap:4px;column-gap:12px;
    padding:11px 14px 11px 16px;}
.s-time{flex:none;min-width:104px;font-weight:800;font-size:.98rem;color:var(--text);
    font-variant-numeric:tabular-nums;white-space:nowrap;text-shadow:2px 2px 0 rgba(0,0,0,.7);}
.s-text{flex:1 1 150px;min-width:150px;font-weight:700;font-size:1rem;color:var(--text);
    text-shadow:2px 2px 0 rgba(0,0,0,.7);}

.waiting{position:relative;width:100%;border-radius:16px;overflow:hidden;padding:20px 22px;text-align:center;
    background:linear-gradient(150deg,var(--bg),var(--bg-2));border:1px solid var(--line-gold);
    box-shadow:0 12px 30px rgba(0,0,0,0.4),0 0 0 1px rgba(217,180,101,.05) inset;}
.waiting .wtitle{font-size:.92rem;font-weight:800;letter-spacing:.02em;color:var(--text);text-shadow:2px 2px 0 rgba(0,0,0,.7);}
</style>
</head>
<body>
<div class="scale" id="scale">
    <div class="stage">
        <div class="title-pill"><span class="tx" id="scheduleTitle">РАСПИСАНИЕ</span></div>
        <div class="board" id="scheduleList"></div>
    </div>
</div>

<script>
const DESIGN_W = 460;
const titleEl = document.getElementById('scheduleTitle');
const listEl = document.getElementById('scheduleList');

let slots = [];

document.addEventListener('DOMContentLoaded', () => { scale(); addEventListener('resize', scale); });
function scale(){
    const s = innerWidth > DESIGN_W ? Math.min(innerWidth / DESIGN_W, 1.3) : 1;
    document.getElementById('scale').style.setProperty('--s', s);
}
function esc(s){ const d = document.createElement('div'); d.textContent = String(s == null ? '' : s); return d.innerHTML; }

function timeToMinutes(timeStr) {
    if (!timeStr) return null;
    const m = timeStr.match(/^(\d{1,2}):(\d{2})$/);
    if (!m) return null;
    const h = Math.min(23, Math.max(0, parseInt(m[1], 10) || 0));
    const min = Math.min(59, Math.max(0, parseInt(m[2], 10) || 0));
    return h * 60 + min;
}

function updateView() {
    if (!slots || slots.length === 0) {
        listEl.innerHTML = '<div class="waiting"><div class="wtitle">Расписание на сегодня не настроено</div></div>';
        return;
    }

    const now = new Date();
    const nowMinutes = now.getHours() * 60 + now.getMinutes();

    listEl.innerHTML = '';
    slots.forEach(slot => {
        const startMinutes = timeToMinutes(slot.start);
        const hasOpenEnd = !!(slot.end && slot.end.includes('+'));
        const endMinutes = hasOpenEnd ? null : timeToMinutes(slot.end);

        let isDone = false;
        let isCurrent = false;

        if (startMinutes !== null) {
            if (hasOpenEnd || endMinutes === null) {
                if (nowMinutes >= startMinutes) isCurrent = true;
            } else if (startMinutes <= endMinutes) {
                if (nowMinutes >= endMinutes) isDone = true;
                else if (nowMinutes >= startMinutes && nowMinutes < endMinutes) isCurrent = true;
            } else {
                if (nowMinutes >= startMinutes || nowMinutes < endMinutes) isCurrent = true;
                else if (nowMinutes >= endMinutes && nowMinutes < startMinutes) isDone = true;
            }
        }

        const item = document.createElement('div');
        item.className = 's-item' + (isDone ? ' done' : isCurrent ? ' current' : '');
        item.innerHTML = `<div class="s-row">
            <span class="s-time">${esc(slot.start || '')} – ${esc(slot.end || '')}</span>
            <span class="s-text">${esc(slot.text || '')}</span>
        </div>`;
        listEl.appendChild(item);
    });
}

async function loadSchedule() {
    try {
        const res = await fetch(`/api/schedule?t=${Date.now()}`);
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Ошибка загрузки расписания');
        titleEl.textContent = (data.title || 'Расписание').toUpperCase();
        slots = Array.isArray(data.slots) ? data.slots : [];
        updateView();
    } catch (err) {
        console.error(err);
        titleEl.textContent = 'РАСПИСАНИЕ';
        listEl.innerHTML = '<div class="waiting"><div class="wtitle">Ошибка загрузки расписания</div></div>';
    }
}

loadSchedule();
setInterval(updateView, 60000);
setInterval(loadSchedule, 5000);
</script>
</body>
</html>
