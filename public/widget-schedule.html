<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Schedule</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-yellow: #ffff00;
            --neon-blue: #00f0ff;
            --neon-purple: #b300ff;
            --neon-green: #00ff5c;
            --widget-bg-opacity: 0.95;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: transparent;
            color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .schedule-widget {
            background: linear-gradient(135deg,
                rgba(5, 5, 15, var(--widget-bg-opacity)) 0%,
                rgba(8, 8, 20, var(--widget-bg-opacity)) 50%,
                rgba(12, 12, 25, var(--widget-bg-opacity)) 100%
            );
            border-radius: 14px;
            padding: 12px 18px;
            min-width: 380px;
            max-width: 580px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.16);
            position: relative;
            overflow: hidden;
        }

        .schedule-title {
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-yellow);
            text-align: center;
            margin-bottom: 10px;
            text-shadow:
                0 0 15px rgba(255, 255, 0, 0.8),
                0 2px 4px rgba(0, 0, 0, 0.8);
        }

        .schedule-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 1rem;
        }

        .schedule-item {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 2px 0;
            position: relative;
        }

        .schedule-time {
            min-width: 115px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.18rem;
            font-weight: 700;
            color: #e6fbff;
            /* без свечения и без декоративных палочек внутри нулей */
            text-shadow: none;
        }

        .schedule-text {
            flex: 1;
            font-size: 1.05rem;
            font-weight: 600;
            text-shadow:
                0 0 4px rgba(0, 0, 0, 0.8),
                0 1px 2px rgba(0, 0, 0, 1);
        }

        /* Яркое выделение активного времени */
        .schedule-item.current::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: -1px;
            height: 2px;
            background: linear-gradient(90deg, rgba(0, 255, 120, 0.1), var(--neon-green), rgba(0, 255, 120, 0.1));
            box-shadow: 0 0 14px rgba(0, 255, 120, 0.9);
        }

        .schedule-item.current .schedule-time,
        .schedule-item.current .schedule-text {
            color: #ffffff;
            text-shadow:
                0 0 10px rgba(0, 255, 120, 0.9),
                0 2px 4px rgba(0, 0, 0, 0.9);
            font-weight: 700;
        }

        .schedule-item.done .schedule-time,
        .schedule-item.done .schedule-text {
            color: rgba(200, 200, 200, 0.6);
            text-decoration: line-through;
            text-shadow: none;
        }

        .schedule-empty {
            font-size: 0.9rem;
            text-align: center;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="schedule-widget" id="scheduleWidget">
        <div class="schedule-title" id="scheduleTitle">РАСПИСАНИЕ</div>
        <div class="schedule-list" id="scheduleList">
            <div class="schedule-empty">Расписание на сегодня не настроено.</div>
        </div>
    </div>

    <script>
        const titleEl = document.getElementById('scheduleTitle');
        const listEl = document.getElementById('scheduleList');

        let slots = [];

        function timeToMinutes(timeStr) {
            if (!timeStr) return null;
            const m = timeStr.match(/^(\d{1,2}):(\d{2})$/);
            if (!m) return null;
            const h = Math.min(23, Math.max(0, parseInt(m[1], 10) || 0));
            const min = Math.min(59, Math.max(0, parseInt(m[2], 10) || 0));
            return h * 60 + min;
        }

        function parseTimeToDate(timeStr, baseDate, addDay = false) {
            if (!timeStr) return null;
            const m = timeStr.match(/^(\d{1,2}):(\d{2})$/);
            if (!m) return null;
            const h = Math.min(23, Math.max(0, parseInt(m[1], 10) || 0));
            const min = Math.min(59, Math.max(0, parseInt(m[2], 10) || 0));
            const d = new Date(baseDate);
            d.setHours(h, min, 0, 0);
            if (addDay) {
                d.setDate(d.getDate() + 1);
            }
            return d;
        }

        function updateView() {
            if (!slots || slots.length === 0) {
                listEl.innerHTML = '<div class="schedule-empty">Расписание на сегодня не настроено.</div>';
                return;
            }

            const now = new Date();
            const nowMinutes = now.getHours() * 60 + now.getMinutes();

            listEl.innerHTML = '';
            slots.forEach(slot => {
                const startMinutes = timeToMinutes(slot.start);
                const hasOpenEnd = !!(slot.end && slot.end.includes('+'));
                const endMinutes = hasOpenEnd ? null : timeToMinutes(slot.end);

                const item = document.createElement('div');
                item.className = 'schedule-item';
                const timeSpan = document.createElement('div');
                timeSpan.className = 'schedule-time';
                timeSpan.textContent = `${slot.start || ''} – ${slot.end || ''}`;
                const textSpan = document.createElement('div');
                textSpan.className = 'schedule-text';
                textSpan.textContent = slot.text || '';

                let isDone = false;
                let isCurrent = false;

                if (startMinutes !== null) {
                    if (hasOpenEnd || endMinutes === null) {
                        // Открытый слот (например, 23:00–24 00+): считаем активным с момента старта и не зачеркиваем автоматически
                        if (nowMinutes >= startMinutes) {
                            isCurrent = true;
                        }
                    } else if (endMinutes !== null) {
                        if (startMinutes <= endMinutes) {
                            // Обычный случай в пределах одного дня, например 14:00–16:00
                            if (nowMinutes >= endMinutes) {
                                isDone = true;
                            } else if (nowMinutes >= startMinutes && nowMinutes < endMinutes) {
                                isCurrent = true;
                            }
                        } else {
                            // Переход через полночь, например 23:00–02:00
                            // Слот активен, если сейчас после старта ИЛИ до окончания
                            if (nowMinutes >= startMinutes || nowMinutes < endMinutes) {
                                isCurrent = true;
                            } else if (nowMinutes >= endMinutes && nowMinutes < startMinutes) {
                                // Время между окончанием и следующим стартом считаем выполненным
                                isDone = true;
                            }
                        }
                    }
                }

                if (isDone) {
                    item.classList.add('done');
                } else if (isCurrent) {
                    item.classList.add('current');
                }

                item.appendChild(timeSpan);
                item.appendChild(textSpan);
                listEl.appendChild(item);
            });
        }

        async function loadSchedule() {
            try {
                // Добавляем метку времени к запросу, чтобы обойти кэш
                const res = await fetch(`/api/schedule?t=${Date.now()}`);
                const data = await res.json();
                if (!data.success) throw new Error(data.error || 'Ошибка загрузки расписания');
                titleEl.textContent = (data.title || 'Расписание').toUpperCase();
                slots = Array.isArray(data.slots) ? data.slots : [];
                updateView();
            } catch (err) {
                console.error(err);
                titleEl.textContent = 'РАСПИСАНИЕ';
                listEl.innerHTML = '<div class="schedule-empty">Ошибка загрузки расписания.</div>';
            }
        }

        loadSchedule();
        // Обновляем состояние подсветки каждую минуту
        setInterval(updateView, 60000);
        // Чаще подтягиваем изменения расписания с сервера, чтобы реагировать на добавление пунктов
        setInterval(loadSchedule, 5000);
    </script>
</body>
</html>
