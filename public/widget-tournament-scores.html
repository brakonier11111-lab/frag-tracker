<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Scores Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-yellow: #ffff00;
            --neon-blue: #00f0ff;
            --neon-purple: #b300ff;
            --neon-green: #00ff47;
            --widget-bg-opacity: 0.95;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: transparent;
            color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .scores-widget {
            background: linear-gradient(135deg,
                rgba(5, 5, 15, var(--widget-bg-opacity)) 0%,
                rgba(8, 8, 20, var(--widget-bg-opacity)) 50%,
                rgba(12, 12, 25, var(--widget-bg-opacity)) 100%
            );
            border-radius: 14px;
            padding: 16px 20px;
            min-width: 320px;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.16);
        }

        .scores-title {
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-yellow);
            text-align: center;
            margin-bottom: 16px;
            text-shadow:
                0 0 15px rgba(255, 255, 0, 0.8),
                0 2px 4px rgba(0, 0, 0, 0.8);
        }

        .scores-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .score-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .score-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .score-item-rank {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--neon-yellow);
            min-width: 35px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.6);
        }

        .score-item-name {
            flex: 1;
            font-weight: 600;
            font-size: 1rem;
            color: var(--neon-blue);
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.5);
            margin-left: 12px;
        }

        .score-item-wins {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(0, 255, 71, 0.6);
            min-width: 60px;
            text-align: right;
        }

        .scores-empty {
            text-align: center;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="scores-widget" id="scoresWidget">
        <div class="scores-title" id="scoresTitle">ТАБЛИЦА ОЧКОВ</div>
        <div class="scores-list" id="scoresList">
            <div class="scores-empty">Турнир не создан</div>
        </div>
    </div>

    <script>
        const titleEl = document.getElementById('scoresTitle');
        const scoresListEl = document.getElementById('scoresList');

        let tournament = {
            title: 'Турнир',
            teams: [],
            bracket: [],
            currentRound: 0,
            status: 'inactive'
        };

        function renderScores() {
            if (!tournament.teams || tournament.teams.length === 0) {
                scoresListEl.innerHTML = '<div class="scores-empty">Турнир не создан</div>';
                return;
            }

            scoresListEl.innerHTML = '';
            const sortedTeams = [...tournament.teams].sort((a, b) => (b.wins || 0) - (a.wins || 0));
            
            sortedTeams.forEach((team, index) => {
                const item = document.createElement('div');
                item.className = 'score-item';
                item.innerHTML = `
                    <span class="score-item-rank">${index + 1}</span>
                    <span class="score-item-name">${team.name}</span>
                    <span class="score-item-wins">${team.wins || 0} очков</span>
                `;
                scoresListEl.appendChild(item);
            });
        }

        async function loadTournament() {
            try {
                const res = await fetch(`/api/tournament?t=${Date.now()}`);
                const data = await res.json();
                if (!data.success) throw new Error(data.error || 'Ошибка загрузки турнира');
                
                tournament = data.tournament || tournament;
                titleEl.textContent = (tournament.title || 'Турнир').toUpperCase();
                renderScores();
            } catch (err) {
                console.error(err);
                titleEl.textContent = 'ТАБЛИЦА ОЧКОВ';
                scoresListEl.innerHTML = '<div class="scores-empty">Ошибка загрузки</div>';
            }
        }

        // WebSocket для обновлений в реальном времени
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws?type=widget`;
        let ws = null;

        function connectWebSocket() {
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    console.log('✅ WebSocket подключен для виджета очков');
                    ws.send(JSON.stringify({ type: 'CLIENT_TYPE', clientType: 'WIDGET' }));
                };

                ws.onmessage = (event) => {
                    try {
                        const message = JSON.parse(event.data);
                        if (message.type === 'TOURNAMENT_UPDATE') {
                            tournament = message.tournament || tournament;
                            titleEl.textContent = (tournament.title || 'Турнир').toUpperCase();
                            renderScores();
                        }
                    } catch (e) {
                        console.error('Ошибка парсинга сообщения:', e);
                    }
                };

                ws.onerror = (error) => {
                    console.error('❌ WebSocket ошибка:', error);
                };

                ws.onclose = () => {
                    console.log('⚠️ WebSocket отключен, переподключение через 3 секунды...');
                    setTimeout(connectWebSocket, 3000);
                };
            } catch (error) {
                console.error('❌ Ошибка подключения WebSocket:', error);
                setTimeout(connectWebSocket, 3000);
            }
        }

        loadTournament();
        connectWebSocket();
        
        // Обновляем каждые 5 секунд на случай проблем с WebSocket
        setInterval(loadTournament, 5000);
    </script>
</body>
</html>
