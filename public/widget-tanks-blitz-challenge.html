<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Challenge Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@500;700;800;900&family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#ffce46;--gold-deep:#ff9d00;--crimson:#ff2a45;--electric:#37d6ff;--purple:#d066ff;--green:#36f5a0;--steel:#9fb4d8;--text-shadow:0 2px 0 rgba(0,0,0,.5);--text-glow:0 0 10px rgba(255,255,255,.2);}
*{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-font-smoothing:antialiased;text-rendering:geometricPrecision;}
html,body{width:100%;height:100%;min-height:100vh;overflow:hidden;}
body{font-family:'Exo 2',sans-serif;background:transparent;color:#fff;display:flex;align-items:center;justify-content:center;}

#flash{position:fixed;inset:0;pointer-events:none;opacity:0;z-index:30;background:radial-gradient(circle at 50% 42%,rgba(255,200,80,.5),transparent 58%);}
#flash.go{animation:flash .65s ease;}
@keyframes flash{0%{opacity:0}18%{opacity:1}100%{opacity:0}}
#fx{position:fixed;inset:0;pointer-events:none;z-index:31;}

.scale{transform-origin:center;transform:scale(var(--s,1));contain:layout style paint;backface-visibility:hidden;}
.card{position:relative;width:560px;padding:26px 34px 0;
    --accent:var(--electric);--accent-rgb:55,214,255;
    background:linear-gradient(165deg,rgba(13,16,28,0.86),rgba(8,10,19,0.87));
    border-radius:18px;overflow:hidden;
    box-shadow:0 30px 70px rgba(0,0,0,0.62),inset 0 1px 0 rgba(255,255,255,0.05),0 0 60px rgba(var(--accent-rgb),0.10);}
.card.hidden{display:none;}
.card.wr{--accent:var(--electric);--accent-rgb:55,214,255;}
.card.dmg{--accent:var(--crimson);--accent-rgb:255,42,69;}
.card.med{--accent:var(--gold);--accent-rgb:255,206,70;}
/* металлическая рамка */
.card::before{content:'';position:absolute;inset:0;border-radius:18px;padding:1.5px;pointer-events:none;z-index:2;
    background:linear-gradient(150deg,rgba(var(--accent-rgb),.85),rgba(255,255,255,.18) 28%,transparent 52%,rgba(var(--accent-rgb),.5));
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;}
/* верхняя световая полоса */
.card::after{content:'';position:absolute;top:0;left:8%;right:8%;height:2px;z-index:3;
    background:linear-gradient(90deg,transparent,rgba(var(--accent-rgb),.95),transparent);filter:drop-shadow(0 0 8px rgba(var(--accent-rgb),.8));}
/* бегущий блик — раз в 30 сек */
.sheen{position:absolute;top:0;left:-60%;width:42%;height:100%;z-index:1;pointer-events:none;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,0.07),transparent);transform:skewX(-18deg);animation:sheen 30s ease-in-out infinite;}
@keyframes sheen{0%,96.5%{left:-60%}100%{left:150%}}
.inner{position:relative;z-index:4;}

.header{text-align:center;font-family:'Exo 2';font-weight:900;text-transform:uppercase;letter-spacing:.12em;line-height:1.22;
    font-size:1.62rem;margin-bottom:14px;
    background:linear-gradient(92deg,#fff6da,var(--gold) 55%,var(--gold-deep));-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 2px 0 rgba(0,0,0,.5));}

/* TIMERS */
.timers{display:none;justify-content:center;gap:12px;margin:-2px 0 16px;}
.tchip{display:flex;align-items:center;gap:10px;padding:8px 16px;border-radius:12px;
    background:rgba(0,0,0,0.4);border:1.5px solid rgba(255,255,255,0.14);
    box-shadow:inset 0 1px 6px rgba(0,0,0,.5);transition:border-color .3s,box-shadow .3s;}
.tchip .ic{font-size:1.25rem;line-height:1;filter:drop-shadow(0 0 6px rgba(var(--accent-rgb),.4));}
.tchip .tl{font-size:.56rem;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.55);text-shadow:var(--text-shadow);}
.tchip .tv{font-family:'Orbitron';font-weight:800;font-size:1.22rem;line-height:1.1;color:#fff;white-space:nowrap;text-shadow:var(--text-shadow);}
/* фиксированная ширина знаков, чтобы таймер не прыгал */
.tchip .tv .d{display:inline-block;width:.72em;text-align:center;}
.tchip .tv .c{display:inline-block;width:.36em;text-align:center;}
.tchip.cd{border-color:rgba(255,206,70,.45);}
.tchip.cd .tv{color:var(--gold);text-shadow:var(--text-shadow),0 0 14px rgba(255,170,0,.35);}
.tchip.el{border-color:rgba(55,214,255,.4);}
.tchip.el .tv{color:var(--electric);text-shadow:var(--text-shadow),0 0 14px rgba(55,214,255,.3);}
.tchip.idle{opacity:.55;}
.tchip.urgent{border-color:rgba(255,42,69,.75);animation:urgpulse 1s ease-in-out infinite;}
.tchip.urgent .tv{color:var(--crimson);text-shadow:var(--text-shadow),0 0 16px rgba(255,42,69,.55);}
@keyframes urgpulse{0%,100%{box-shadow:inset 0 1px 6px rgba(0,0,0,.5)}50%{box-shadow:inset 0 1px 6px rgba(0,0,0,.5),0 0 22px rgba(255,42,69,.5)}}
.tchip.over{border-color:var(--crimson);background:rgba(255,42,69,.12);}
.tchip.over .tv{color:var(--crimson);font-family:'Exo 2';font-weight:900;font-size:.86rem;letter-spacing:.1em;text-transform:uppercase;animation:overblink 1.2s steps(2) infinite;text-shadow:var(--text-shadow);}
@keyframes overblink{50%{opacity:.45}}

/* VALUE BOX */
.vbox{position:relative;background:rgba(0,0,0,0.45);border:1.5px solid rgba(255,255,255,0.12);border-radius:12px;
    padding:16px 20px 12px;box-shadow:inset 0 2px 14px rgba(0,0,0,0.6),inset 0 0 0 1px rgba(var(--accent-rgb),0.08);
    display:flex;flex-direction:column;align-items:center;}
.vbox.cap-pulse{animation:capPulse .6s ease-out;}
@keyframes capPulse{0%{transform:scale(1)}28%{transform:scale(1.06);box-shadow:inset 0 2px 14px rgba(0,0,0,.6),0 0 40px 6px rgba(var(--accent-rgb),.6)}100%{transform:scale(1)}}
.val{font-family:'Orbitron',sans-serif;font-weight:900;line-height:1.05;font-size:3.4rem;white-space:nowrap;display:flex;align-items:baseline;gap:.06em;font-variant-numeric:tabular-nums;}
.val .live{color:var(--accent);text-shadow:var(--text-shadow),0 0 18px rgba(var(--accent-rgb),.6),0 0 38px rgba(var(--accent-rgb),.28);transition:color .25s;}
.val .live.good{color:var(--green);text-shadow:var(--text-shadow),0 0 18px rgba(54,245,160,.6),0 0 38px rgba(54,245,160,.28);}
.val .live.wr-low{color:var(--crimson);text-shadow:var(--text-shadow),0 0 18px rgba(255,42,69,.6),0 0 38px rgba(255,42,69,.28);}
.val .live.wr-mid{color:var(--green);text-shadow:var(--text-shadow),0 0 18px rgba(54,245,160,.6),0 0 38px rgba(54,245,160,.28);}
.val .live.wr-high{color:var(--purple);text-shadow:var(--text-shadow),0 0 18px rgba(208,102,255,.6),0 0 38px rgba(208,102,255,.28);}
.val .slash{color:rgba(255,255,255,.55);font-size:.8em;text-shadow:var(--text-shadow);}
.val #targetVal{background:linear-gradient(180deg,#fff,var(--gold) 65%,var(--gold-deep));-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 2px 0 rgba(0,0,0,.5));}
.val .u{font-size:.62em;font-weight:900;text-shadow:none;}
.val .u.target{background:linear-gradient(180deg,#fff,var(--gold) 65%,var(--gold-deep));-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 0 8px rgba(255,206,70,.22));}
.val .u.live{text-shadow:0 0 12px rgba(var(--accent-rgb),.3);}
.tlabel{margin-top:6px;font-size:.66rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.7);text-shadow:var(--text-shadow);}
.tlabel .ok{display:none;color:#04130b;background:var(--green);padding:2px 8px;border-radius:6px;}
.vbox.done .tlabel .normal{display:none;}
.vbox.done .tlabel .ok{display:inline-block;}

/* анимация изменения числа: вверх — зелёная вспышка, вниз — красная */
.bump-up{animation:bumpUp .7s cubic-bezier(.16,1,.3,1);}
@keyframes bumpUp{0%{transform:translateY(0)}22%{transform:translateY(-7px) scale(1.09);filter:drop-shadow(0 0 18px rgba(54,245,160,.85)) brightness(1.35)}100%{transform:none;filter:none}}
.bump-down{animation:bumpDown .7s cubic-bezier(.16,1,.3,1);}
@keyframes bumpDown{0%{transform:translateY(0)}22%{transform:translateY(7px) scale(.94);filter:drop-shadow(0 0 18px rgba(255,42,69,.85)) brightness(1.2)}100%{transform:none;filter:none}}

/* STEP + LIMIT */
.step{margin:16px auto 0;width:fit-content;display:flex;align-items:center;gap:.55em;
    background:rgba(0,0,0,0.4);border:1.5px solid rgba(var(--accent-rgb),0.5);border-radius:12px;padding:11px 24px;
    font-family:'Exo 2';font-weight:800;font-size:1.28rem;box-shadow:inset 0 1px 6px rgba(0,0,0,.5),0 0 16px rgba(var(--accent-rgb),.12);text-shadow:var(--text-shadow);}
.step .a{color:#fff;}.step .arr{color:var(--accent);font-size:1.1em;}.step .p{color:var(--gold);}
.step .num{font-family:'Orbitron';font-size:1.06em;text-shadow:var(--text-shadow);}
.limit{text-align:center;margin-top:14px;font-size:1.18rem;font-weight:700;letter-spacing:.05em;color:rgba(255,255,255,.68);text-shadow:var(--text-shadow);}
.limit b{font-family:'Orbitron';color:#fff;font-weight:900;font-size:1.06em;text-shadow:var(--text-shadow),var(--text-glow);}

/* MEDALS */
.mlist{display:flex;flex-direction:column;gap:10px;}
.mrow{display:flex;align-items:center;gap:13px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,206,70,0.28);border-radius:11px;padding:9px 12px;transition:border-color .3s,background .3s,box-shadow .3s;}
.mrow.enter{animation:rowIn .5s cubic-bezier(.16,1,.3,1);}
@keyframes rowIn{from{opacity:0;transform:translateX(-30px) scale(.95)}to{opacity:1;transform:none}}
.mrow.exit{animation:rowOut .35s ease forwards;pointer-events:none;}
@keyframes rowOut{to{opacity:0;transform:translateX(30px) scale(.92)}}
.mrow.done{border-color:rgba(54,245,160,.6);background:rgba(54,245,160,.07);box-shadow:0 0 20px rgba(54,245,160,.18);}
.mrow .mi{width:46px;height:46px;border-radius:11px;flex:none;display:grid;place-items:center;font-size:1.5rem;overflow:hidden;background:rgba(255,255,255,0.05);border:1px solid rgba(255,206,70,0.32);}
.mrow .mi img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 5px rgba(255,170,0,.35));}
.mrow .mb{flex:1;min-width:0;}
.mrow .mn{display:flex;justify-content:space-between;align-items:baseline;font-weight:800;font-size:.96rem;color:#fff;text-shadow:var(--text-shadow);}
.mrow .mn .q{font-family:'Orbitron';color:var(--gold);font-size:1.05rem;font-variant-numeric:tabular-nums;text-shadow:var(--text-shadow);}
.mrow.done .mn .q{color:var(--green);}
.mrow .mp{height:7px;border-radius:6px;background:rgba(255,255,255,0.08);overflow:hidden;margin-top:7px;}
.mrow .mp>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold-deep),#ffe08a);box-shadow:0 0 10px var(--gold);transition:width .7s cubic-bezier(.16,1,.3,1);}
.mrow.done .mp>i{background:linear-gradient(90deg,#11c977,var(--green));}

/* одна медаль — по центру */
.medsolo{display:none;text-align:center;padding:10px 0 6px;}
.medsolo.show{display:block;}
.medsolo .mi{width:120px;height:120px;margin:0 auto 16px;border-radius:20px;display:grid;place-items:center;font-size:3.2rem;overflow:hidden;
    background:rgba(255,255,255,0.05);border:2px solid rgba(255,206,70,0.45);box-shadow:0 0 32px rgba(255,170,0,.22);}
.medsolo .mi img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 10px rgba(255,170,0,.4));}
.medsolo.done .mi{border-color:rgba(54,245,160,.7);box-shadow:0 0 36px rgba(54,245,160,.35);}
.medsolo .mn{font-family:'Exo 2';font-weight:900;font-size:1.25rem;letter-spacing:.06em;text-transform:uppercase;color:#fff;text-shadow:var(--text-shadow);}
.medsolo .mc{font-family:'Orbitron';font-weight:900;font-size:2.6rem;margin-top:10px;line-height:1;font-variant-numeric:tabular-nums;
    background:linear-gradient(180deg,#fff,#ffd86b 55%,var(--gold-deep));-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 2px 0 rgba(0,0,0,.5));}
.medsolo.done .mc{background:linear-gradient(180deg,#fff,var(--green));-webkit-background-clip:text;background-clip:text;color:transparent;}
.medsolo .mc small{font-size:.45em;color:var(--steel);font-weight:700;}
.medsolo .mdone{display:none;margin-top:10px;font-size:.62rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:#04130b;background:var(--green);padding:4px 12px;border-radius:8px;}
.medsolo.done .mdone{display:inline-block;}

/* CONSEQUENCE */
.cons{position:relative;margin-top:16px;border-radius:13px;overflow:hidden;padding:15px 20px;text-align:center;
    background:linear-gradient(160deg,rgba(28,12,16,0.82),rgba(16,10,18,0.82));
    border:1.5px solid rgba(255,42,69,0.45);box-shadow:0 0 22px rgba(255,42,69,0.14),inset 0 0 26px rgba(0,0,0,0.4);}
.cons::before{content:'';position:absolute;top:0;left:12%;right:12%;height:2px;background:linear-gradient(90deg,transparent,rgba(255,42,69,.85),transparent);}
.cons .ct{font-family:'Exo 2';font-weight:900;font-size:1.15rem;letter-spacing:.08em;text-transform:uppercase;color:#fff;
    text-shadow:var(--text-shadow),0 0 14px rgba(255,60,80,.5);margin-bottom:5px;}
.cons .cx{font-weight:800;font-size:1.18rem;letter-spacing:.04em;line-height:1.3;
    background:linear-gradient(92deg,#fff,#ffd0d6);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 2px 0 rgba(0,0,0,.5));}
.cons.hide{display:none;}

/* FOOT: название челленджа + сумма */
.foot{position:relative;display:flex;align-items:center;justify-content:space-between;gap:14px;
    margin:18px -34px 0;padding:13px 34px 15px;
    background:rgba(0,0,0,0.25);border-top:1px solid rgba(255,255,255,0.1);}
.foot .fl{display:flex;align-items:center;gap:8px;font-size:.64rem;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.6);text-shadow:var(--text-shadow);}
.foot .fl .dot{width:7px;height:7px;border-radius:50%;background:var(--crimson);box-shadow:0 0 9px var(--crimson);animation:liv 1.4s infinite;}
@keyframes liv{0%,100%{opacity:1}50%{opacity:.3}}
.foot .fv{font-family:'Orbitron';font-weight:900;font-size:1.55rem;line-height:1;font-variant-numeric:tabular-nums;
    background:linear-gradient(180deg,#fff,#ffd86b 60%,var(--gold-deep));-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 2px 0 rgba(0,0,0,.5)),drop-shadow(0 0 12px rgba(255,170,0,.25));}
.rub{font-family:'Exo 2',Arial,sans-serif;margin-left:-3px;filter:drop-shadow(0 2px 0 rgba(0,0,0,.5));}
.fplus{position:absolute;right:34px;bottom:44px;font-family:'Orbitron';font-weight:900;font-size:1.15rem;color:var(--green);
    text-shadow:var(--text-shadow),0 0 14px rgba(54,245,160,.6);pointer-events:none;animation:fplus 1.4s ease forwards;}
@keyframes fplus{0%{opacity:0;transform:translateY(6px)}15%{opacity:1}100%{opacity:0;transform:translateY(-34px)}}

/* BOTTOM WINDOW: донат-алерт + ротация топ-5 донатеров */
.bwin{position:relative;width:560px;margin-top:14px;padding:16px 26px;border-radius:14px;overflow:hidden;
    background:linear-gradient(165deg,rgba(13,16,28,0.86),rgba(8,10,19,0.87));
    box-shadow:0 18px 44px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);
    display:none;align-items:center;gap:18px;min-height:76px;}
.bwin.show{display:flex;}
.bwin::before{content:'';position:absolute;inset:0;border-radius:14px;padding:1.5px;pointer-events:none;z-index:2;
    background:linear-gradient(150deg,rgba(255,206,70,.55),rgba(255,255,255,.14) 30%,transparent 55%,rgba(255,206,70,.3));
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;}
.bwin.alert::before{background:linear-gradient(150deg,rgba(54,245,160,.75),rgba(255,255,255,.16) 30%,transparent 55%,rgba(54,245,160,.4));}
.bwin.alert{box-shadow:0 18px 44px rgba(0,0,0,.5),0 0 30px rgba(54,245,160,.22),inset 0 1px 0 rgba(255,255,255,.05);}
.bw-tag{position:relative;z-index:3;flex:none;font-size:.64rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);
    display:flex;flex-direction:column;align-items:center;gap:4px;min-width:88px;text-align:center;text-shadow:var(--text-shadow);}
.bwin.alert .bw-tag{color:var(--green);}
.bw-tag .ic{font-size:1.35rem;letter-spacing:0;}
.bw-body{position:relative;z-index:3;flex:1;min-width:0;}
.bw-item{display:flex;align-items:center;gap:14px;animation:bwIn .45s cubic-bezier(.16,1,.3,1);}
@keyframes bwIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.bw-item .rank{font-family:'Orbitron';font-weight:900;font-size:1.22rem;color:var(--gold);flex:none;text-shadow:var(--text-shadow);}
.bw-item .nick{position:relative;overflow:hidden;white-space:nowrap;max-width:200px;}
.bw-item .nick .nt{display:inline-block;white-space:nowrap;font-weight:800;font-size:1.22rem;color:#fff;text-shadow:var(--text-shadow),var(--text-glow);}
.bw-item .nick.scroll .nt{animation:nickScroll linear infinite;animation-duration:var(--sdur,6s);}
@keyframes nickScroll{0%,8%{transform:translateX(0)}92%,100%{transform:translateX(var(--sdist,-40px))}}
.bw-item .amt{font-family:'Orbitron';font-weight:900;font-size:1.22rem;color:#fff;flex:none;text-shadow:var(--text-shadow),var(--text-glow);}
.bw-item .add{font-weight:800;font-size:1.08rem;color:var(--green);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-left:auto;text-shadow:var(--text-shadow);}

.shake{animation:shake .5s;}
@keyframes shake{0%,100%{transform:scale(var(--s,1)) translate(0,0)}25%{transform:scale(var(--s,1)) translate(-7px,4px)}50%{transform:scale(var(--s,1)) translate(6px,-4px)}75%{transform:scale(var(--s,1)) translate(-4px,3px)}}
</style>
</head>
<body>
<div id="flash"></div>
<canvas id="fx"></canvas>

<div class="scale" id="scale">
    <div class="card wr" id="card">
        <div class="sheen"></div>
        <div class="inner">
            <div class="header" id="header">УДЕРЖАТЬ % ПОБЕД ЗА СТРИМ</div>

            <div class="timers" id="timers">
                <div class="tchip el" id="elChip" style="display:none"><span class="ic">⏱</span><div><div class="tl">Выполняю</div><div class="tv" id="elVal">--:--</div></div></div>
                <div class="tchip cd" id="cdChip" style="display:none"><span class="ic">⏳</span><div><div class="tl">Осталось</div><div class="tv" id="cdVal">--:--</div></div></div>
            </div>

            <!-- gauge/value view -->
            <div id="valueView">
                <div class="vbox" id="vbox">
                    <div class="val"><span class="live" id="liveVal">—</span><span class="u live" id="liveUnit" style="display:none">%</span><span class="slash">/</span><span class="target" id="targetVal">88</span><span class="u target" id="unit">%</span></div>
                    <div class="tlabel"><span class="normal">Цель</span><span class="ok">Цель взята</span></div>
                </div>
                <div class="step"><span class="a">Каждые <span class="num" id="perAmt">100</span> р</span><span class="arr">→</span><span class="p">+<span class="num" id="stepAmt">1</span><span id="stepUnit">%</span> <span id="stepName">к винрейту</span></span></div>
                <div class="limit">Лимит: <b id="limitVal">88 %</b></div>
            </div>

            <!-- medals view -->
            <div id="medalsView" style="display:none">
                <div class="medsolo" id="medsolo">
                    <div class="mi" id="soloImg">🏅</div>
                    <div class="mn" id="soloName">Медаль</div>
                    <div class="mc"><span id="soloEarned">0</span><small> / </small><span id="soloReq">1</span></div>
                    <div class="mdone">ВЗЯТО</div>
                </div>
                <div class="mlist" id="mlist"></div>
                <div class="step" style="margin-top:14px"><span class="a">Каждые <span class="num" id="perAmtM">200</span> р</span><span class="arr">→</span><span class="p">+<span class="num" id="stepAmtM">1</span> <span id="stepWordM">медаль</span></span></div>
            </div>

            <div class="cons" id="cons">
                <div class="ct" id="consTitle">ЕСЛИ НЕ УДЕРЖУ</div>
                <div class="cx" id="consText">КРУЧУ ВСЮ МЕГАРАСПАКОВКУ</div>
            </div>

            <div class="foot">
                <span class="fl"><span class="dot"></span> <span id="footLabel">Челлендж</span></span>
                <span class="fv"><span id="balK">0</span><span class="rub"> р</span></span>
            </div>
        </div>
    </div>

    <!-- нижнее окно: донат-алерт / ротация топ-донатеров -->
    <div class="bwin" id="bwin">
        <div class="bw-tag" id="bwTag"><span class="ic">🏆</span><span id="bwTagText">Топ донатеров</span></div>
        <div class="bw-body" id="bwBody"></div>
    </div>
</div>


<script>
let CH=null, prog=null, serverOffset=0;
const META={
    winrate:{cls:'wr',def:'УДЕРЖАТЬ % ПОБЕД ЗА СТРИМ',unit:'%',name:'Win Rate',stepName:'к винрейту'},
    damage:{cls:'dmg',def:'УДЕРЖАТЬ СРЕДНИЙ УРОН ЗА СТРИМ',unit:'',name:'Урон',stepName:'урона'},
    medals:{cls:'med',def:'ВЗЯТЬ МЕДАЛИ ЗА СТРИМ',unit:'',name:'Медали'}
};
const DESIGN_W=640, DESIGN_H=790;
/* ?scale=2 — как в widget-replay-live: фиксируем пиксельный буфер страницы под DESIGN*scale
   и растягиваем контент трансформом, чтобы OBS не апскейлил уже отрендеренную картинку (иначе мыло).
   Source в OBS нужно выставить Custom Width/Height = DESIGN_W*scale x DESIGN_H*scale. */
const renderScale=Math.max(1,Math.min(3,Number(new URLSearchParams(location.search).get('scale'))||0));
if(renderScale>1){
    const vw=Math.ceil(DESIGN_W*renderScale), vh=Math.ceil(DESIGN_H*renderScale);
    document.documentElement.style.width=vw+'px'; document.documentElement.style.height=vh+'px'; document.documentElement.style.minWidth=vw+'px';
    document.body.style.width=vw+'px'; document.body.style.height=vh+'px'; document.body.style.minWidth=vw+'px';
}

document.addEventListener('DOMContentLoaded',()=>{ scale(); addEventListener('resize',scale); initFx(); load(); loadProg(); loadTop(); connectWS(); setInterval(loadProg,15000); setInterval(tickTimers,500); setInterval(rotateTop,15000); });
function scale(){
    if(renderScale>1){ document.getElementById('scale').style.setProperty('--s',renderScale); return; }
    const s=Math.min(innerWidth/DESIGN_W,innerHeight/DESIGN_H); document.getElementById('scale').style.setProperty('--s',s);
}
function load(){ fetch('/api/blitz-challenge').then(r=>r.json()).then(d=>{if(d.success){applyChallenge(d.challenge);render();}}); }
function loadProg(){ fetch('/api/blitz-challenge/progress').then(r=>r.json()).then(d=>{prog=d;render();}); }
function loadTop(){ fetch('/api/blitz-challenge/feed').then(r=>r.json()).then(d=>{ if(d.success){TOP=d.top||[]; renderBwin();} }).catch(()=>{}); }
function applyChallenge(ch){ CH=ch; if(ch&&ch.serverNow){ serverOffset=ch.serverNow-Math.floor(Date.now()/1000); } }
function fmt(n){ return Math.round(Number(n)||0).toLocaleString('ru-RU'); }
function trim(n){ const x=Number(n); return (Math.round(x*100)/100).toString(); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function pluralMedal(n){ n=Math.abs(Math.round(Number(n)||0)); const m10=n%10,m100=n%100;
    if(m10===1&&m100!==11) return 'медаль'; if(m10>=2&&m10<=4&&(m100<10||m100>=20)) return 'медали'; return 'медалей'; }

/* ===== АНИМИРОВАННЫЕ ЧИСЛА =====
   Плавный подсчёт + вспышка: зелёная при росте, красная при падении.
   Первое появление значения — без анимации. */
const numAnim={};
function setNumber(key,el,value,opts){
    opts=opts||{};
    const decimals=opts.decimals||0, group=!!opts.group, dur=opts.dur||800, bumpEl=opts.bumpEl||el;
    if(!el) return;
    const target=Number(value)||0;
    const fmtv=v=>{
        if(decimals>0) return parseFloat(v.toFixed(decimals)).toLocaleString('ru-RU',{maximumFractionDigits:decimals});
        return group?Math.round(v).toLocaleString('ru-RU'):String(Math.round(v));
    };
    const st=numAnim[key];
    if(!st){ numAnim[key]={val:target,raf:0}; el.textContent=fmtv(target); return; }
    if(Math.abs(st.val-target)<1e-9){ el.textContent=fmtv(target); return; }
    const from=st.val; st.val=target;
    bumpEl.classList.remove('bump-up','bump-down'); void bumpEl.offsetWidth;
    bumpEl.classList.add(target>from?'bump-up':'bump-down');
    if(st.raf) cancelAnimationFrame(st.raf);
    const start=performance.now();
    (function step(t){ const k=Math.min(1,(t-start)/dur), v=from+(target-from)*(1-Math.pow(1-k,3));
        el.textContent=fmtv(v);
        if(k<1) st.raf=requestAnimationFrame(step); else st.raf=0; })(start);
}
function setStatic(key,el,text){ delete numAnim[key]; if(el) el.textContent=text; }

function render(){
    if(!CH) return;
    const card=document.getElementById('card');
    if(!CH.enabled){ card.classList.add('hidden'); document.getElementById('bwin').classList.remove('show'); return; }
    card.classList.remove('hidden');
    const t=CH.activeType||'winrate', meta=META[t];
    card.className='card '+meta.cls;
    setNumber('bal',document.getElementById('balK'),CH.sessionBalance,{group:true});
    const ht=(CH.headerTexts&&CH.headerTexts[t])||CH.headerText||meta.def;
    document.getElementById('header').textContent=ht;
    document.getElementById('footLabel').textContent='Челлендж: '+meta.name;

    // consequence
    const cons=document.getElementById('cons');
    const raw=CH.consequenceText||'';
    if(raw.trim()){
        const sep=raw.indexOf('|||');
        const title=sep>=0?raw.slice(0,sep).trim():'';
        const body=sep>=0?raw.slice(sep+3).trim():raw.trim();
        document.getElementById('consTitle').textContent=title; document.getElementById('consTitle').style.display=title?'block':'none';
        document.getElementById('consText').textContent=body; cons.classList.remove('hide');
    } else cons.classList.add('hide');

    const liveWr=prog&&prog.hasSession?Number(prog.winRate)||0:null;
    const liveDmg=prog&&prog.hasSession?Number(prog.avgDamage)||0:null;

    if(t==='medals'){
        document.getElementById('valueView').style.display='none';
        document.getElementById('medalsView').style.display='block';
        document.getElementById('perAmtM').textContent=fmt(CH.medals.perAmount);
        document.getElementById('stepAmtM').textContent=trim(CH.medals.step);
        document.getElementById('stepWordM').textContent=pluralMedal(CH.medals.step);
        renderMedals();
    } else {
        document.getElementById('valueView').style.display='block';
        document.getElementById('medalsView').style.display='none';
        const o=t==='winrate'?CH.winrate:CH.damage; const isWr=t==='winrate'; const live=isWr?liveWr:liveDmg;
        const liveEl=document.getElementById('liveVal');
        if(live!=null) setNumber('live-'+t,liveEl,live,{decimals:isWr?2:0,group:!isWr});
        else setStatic('live-'+t,liveEl,'—');
        const liveUnitEl=document.getElementById('liveUnit');
        liveEl.classList.remove('good','wr-low','wr-mid','wr-high');
        liveUnitEl.classList.remove('good','wr-low','wr-mid','wr-high');
        if(live!=null){
            if(isWr){ const cls=live<50?'wr-low':live<60?'wr-mid':'wr-high'; liveEl.classList.add(cls); liveUnitEl.classList.add(cls); }
            else if(live>=o.current){ liveEl.classList.add('good'); liveUnitEl.classList.add('good'); }
        }
        liveUnitEl.style.display=(live!=null&&isWr)?'':'none';
        setNumber('target-'+t,document.getElementById('targetVal'),o.current,{decimals:isWr?2:0,group:!isWr});
        document.getElementById('unit').textContent=isWr?'%':'';
        document.getElementById('perAmt').textContent=fmt(o.perAmount);
        document.getElementById('stepAmt').textContent=trim(o.step);
        document.getElementById('stepUnit').textContent=isWr?'%':'';
        document.getElementById('stepName').textContent=meta.stepName;
        document.getElementById('limitVal').textContent=isWr?(trim(o.cap)+' %'):fmt(o.cap);
        const done=live!=null&&live>=o.current;
        document.getElementById('vbox').classList.toggle('done',done);
        markDone(done);
    }
    tickTimers();
}

function rewardPreviewText(a){
    if(!a) return '—';
    if(a.rewardType==='winrate') return '+'+trim(a.rewardAmount)+'% к винрейту';
    if(a.rewardType==='damage') return '+'+fmt(a.rewardAmount)+' урона';
    return '+'+Math.round(a.rewardAmount)+' '+pluralMedal(a.rewardAmount);
}

/* ===== МЕДАЛИ: diff-рендер, чтобы работали анимации входа/выхода и подсчёта ===== */
function medalRowHtml(m){
    const img=m.image?`<img src="${m.image}">`:(m.icon||'🏅');
    return `<div class="mi">${img}</div><div class="mb"><div class="mn"><span class="lbl"></span><span class="q"><span class="qe">0</span>/<span class="qr">0</span></span></div><div class="mp"><i></i></div></div>`;
}
function renderMedals(){
    const list=CH.medals.list||[];
    const box=document.getElementById('mlist');
    const solo=document.getElementById('medsolo');
    if(!list.length){
        solo.classList.remove('show','done');
        box.style.display='flex';
        box.innerHTML='<div class="mrow" style="justify-content:center;opacity:.55">Нет медалей</div>';
        markDone(false);
        return;
    }
    if(list.length===1){
        const m=list[0];
        const done=m.earned>=m.required&&m.required>0;
        box.style.display='none'; box.innerHTML='';
        solo.classList.add('show');
        solo.classList.toggle('done',done);
        const imgEl=document.getElementById('soloImg');
        const want=m.image?`<img src="${m.image}" alt="">`:(m.icon||'🏅');
        if(imgEl.dataset.want!==want){ imgEl.innerHTML=want; imgEl.dataset.want=want; }
        document.getElementById('soloName').textContent=m.label||'Медаль';
        setNumber('solo-e',document.getElementById('soloEarned'),m.earned,{bumpEl:solo.querySelector('.mc')});
        setNumber('solo-r',document.getElementById('soloReq'),m.required,{bumpEl:solo.querySelector('.mc')});
        markDone(done);
        return;
    }
    solo.classList.remove('show','done');
    box.style.display='flex';
    if(box.firstElementChild&&!box.firstElementChild.dataset.id) box.innerHTML='';
    const seen=new Set();
    list.slice(0,5).forEach(m=>{
        const id=String(m.id); seen.add(id);
        let el=box.querySelector(`.mrow[data-id="${CSS.escape(id)}"]`);
        if(!el){
            el=document.createElement('div'); el.className='mrow enter'; el.dataset.id=id;
            el.innerHTML=medalRowHtml(m);
            box.appendChild(el);
            setTimeout(()=>el.classList.remove('enter'),550);
        }
        const done=m.earned>=m.required&&m.required>0; const frac=m.required>0?Math.min(1,m.earned/m.required):0;
        el.classList.toggle('done',done);
        const want=m.image?`<img src="${m.image}">`:(m.icon||'🏅');
        const mi=el.querySelector('.mi');
        if(mi.dataset.want!==want){ mi.innerHTML=want; mi.dataset.want=want; }
        el.querySelector('.lbl').textContent=m.label||'Медаль';
        setNumber('med-'+id+'-e',el.querySelector('.qe'),m.earned,{bumpEl:el.querySelector('.q')});
        setNumber('med-'+id+'-r',el.querySelector('.qr'),m.required,{bumpEl:el.querySelector('.q')});
        el.querySelector('.mp>i').style.width=(frac*100)+'%';
        box.appendChild(el); // сохраняем порядок как в списке
    });
    [...box.querySelectorAll('.mrow[data-id]')].forEach(el=>{
        if(!seen.has(el.dataset.id)&&!el.classList.contains('exit')){
            el.classList.add('exit'); setTimeout(()=>el.remove(),380);
        }
    });
    const md=CH.medals; const allDone=md.totalRequired>0&&md.totalEarned>=md.totalRequired;
    markDone(allDone);
}

/* ===== ТАЙМЕРЫ ===== */
let cdWasOver=false;
function fmtDur(s){ s=Math.max(0,Math.floor(s)); const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
    const p=n=>String(n).padStart(2,'0'); return h>0?h+':'+p(m)+':'+p(sec):m+':'+p(sec); }
/* цифры фиксированной ширины, чтобы чип не дёргался каждую секунду */
function setTimerVal(el,txt){
    if(el.dataset.txt===txt) return; el.dataset.txt=txt;
    if(!/^[\d:]+$/.test(txt)){ el.textContent=txt; return; }
    el.innerHTML=[...txt].map(ch=>ch===':'?'<span class="c">:</span>':'<span class="d">'+ch+'</span>').join('');
}
function tickTimers(){
    if(!CH||!CH.timers){ document.getElementById('timers').style.display='none'; return; }
    const now=Math.floor(Date.now()/1000)+serverOffset;
    const tc=CH.timers.countdown||{}, te=CH.timers.elapsed||{};
    const cdChip=document.getElementById('cdChip'), elChip=document.getElementById('elChip');
    let any=false;
    if(tc.enabled){
        any=true; cdChip.style.display='flex';
        const v=document.getElementById('cdVal');
        if(tc.startedAt>0){
            const rem=tc.durationSec-(now-tc.startedAt);
            cdChip.classList.remove('idle');
            if(rem<=0){
                setTimerVal(v,'ВРЕМЯ ВЫШЛО');
                cdChip.classList.add('over'); cdChip.classList.remove('urgent');
                if(!cdWasOver){ cdWasOver=true; flash(true); }
            } else {
                cdWasOver=false;
                setTimerVal(v,fmtDur(rem));
                cdChip.classList.remove('over');
                cdChip.classList.toggle('urgent',rem<=60);
            }
        } else {
            cdWasOver=false;
            setTimerVal(v,fmtDur(tc.durationSec));
            cdChip.classList.add('idle'); cdChip.classList.remove('over','urgent');
        }
    } else cdChip.style.display='none';
    if(te.enabled){
        any=true; elChip.style.display='flex';
        const v=document.getElementById('elVal');
        if(te.startedAt>0){ elChip.classList.remove('idle'); setTimerVal(v,fmtDur(now-te.startedAt)); }
        else { elChip.classList.add('idle'); setTimerVal(v,'0:00'); }
    } else elChip.style.display='none';
    document.getElementById('timers').style.display=any?'flex':'none';
}

/* ===== НИЖНЕЕ ОКНО: донат-алерт + ротация топ-5 ===== */
let TOP=[], topIdx=-1, alertUntil=0;
function contribText(c){
    c=c||{}; const p=[];
    if(c.winrate>0)p.push('+'+trim(c.winrate)+'% к винрейту');
    if(c.damage>0)p.push('+'+fmt(c.damage)+' урона');
    if(c.medals>0)p.push('+'+Math.round(c.medals)+' '+pluralMedal(c.medals));
    return p.join(' · ');
}
/* подгоняем ник донатера под блок: сначала уменьшаем шрифт, если всё равно не влезает — прокрутка */
function fitNick(el,text){
    let inner=el.querySelector('.nt');
    if(!inner){ el.innerHTML='<span class="nt"></span>'; inner=el.querySelector('.nt'); }
    inner.style.animation='none'; inner.style.transform='none'; inner.style.fontSize='';
    el.classList.remove('scroll'); inner.style.removeProperty('--sdist'); inner.style.removeProperty('--sdur');
    inner.textContent=text;
    const avail=el.clientWidth;
    if(avail<=0) return;
    let size=1.22;
    while(inner.scrollWidth>avail && size>0.82){ size-=0.06; inner.style.fontSize=size.toFixed(2)+'rem'; }
    const over=inner.scrollWidth-avail;
    if(over>2){
        el.classList.add('scroll');
        inner.style.setProperty('--sdist',(-(over+16))+'px');
        inner.style.setProperty('--sdur',Math.max(3,over/18)+'s');
        void inner.offsetWidth; inner.style.animation='';
    }
}
function renderBwin(){
    if(Date.now()<alertUntil) return;
    const bw=document.getElementById('bwin');
    if(!TOP.length||!CH||!CH.enabled){ bw.classList.remove('show'); return; }
    bw.classList.add('show'); bw.classList.remove('alert');
    document.getElementById('bwTag').querySelector('.ic').textContent='🏆';
    document.getElementById('bwTagText').textContent='Топ донатеров';
    if(topIdx<0||topIdx>=TOP.length) topIdx=0;
    const t=TOP[topIdx];
    const body=document.getElementById('bwBody');
    body.innerHTML=
        `<div class="bw-item"><span class="rank">#${topIdx+1}</span><span class="nick"></span><span class="amt">${fmt(t.amount)}<span class="rub"> р</span></span><span class="add">${contribText(t)||'поддержка'}</span></div>`;
    fitNick(body.querySelector('.nick'),t.username||'Аноним');
}
function rotateTop(){
    if(Date.now()<alertUntil||TOP.length<2) { renderBwin(); return; }
    topIdx=(topIdx+1)%TOP.length;
    renderBwin();
}
function showDonAlert(ld){
    const bw=document.getElementById('bwin');
    alertUntil=Date.now()+6000;
    bw.classList.add('show','alert');
    document.getElementById('bwTag').querySelector('.ic').textContent='💰';
    document.getElementById('bwTagText').textContent='Новый донат';
    const body=document.getElementById('bwBody');
    body.innerHTML=
        `<div class="bw-item"><span class="nick"></span><span class="amt">${fmt(ld.amount)}<span class="rub"> р</span></span><span class="add">${contribText(ld.contribution)||'поддержка'}</span></div>`;
    fitNick(body.querySelector('.nick'),ld.username||'Аноним');
    setTimeout(()=>{ if(Date.now()>=alertUntil) renderBwin(); },6100);
}

function markDone(){ /* цель отмечается цветом чисел/бейджами, без анимации на весь виджет */ }

function connectWS(){ try{ const ws=new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+location.host+'/ws');
    ws.onmessage=ev=>{ let m; try{m=JSON.parse(ev.data);}catch{return;}
        if(m.type==='BLITZ_CHALLENGE_UPDATE'&&m.challenge){
            applyChallenge(m.challenge); render();
            if(m.topDonors) TOP=m.topDonors;
            if(m.lastDonation) onDonation(m.lastDonation);
            if(m.activityMilestone) onActivityMilestone(m.activityMilestone);
        } };
    ws.onclose=()=>setTimeout(connectWS,3000); }catch(e){ setTimeout(connectWS,4000); } }
function onDonation(ld){
    const big=ld.amount>=500; flash(big);
    const vb=document.getElementById('vbox'); if(vb){ vb.classList.remove('cap-pulse'); void vb.offsetWidth; vb.classList.add('cap-pulse'); }
    floatPlus(ld.amount);
    showDonAlert(ld);
}
function onActivityMilestone(am){
    flash(true);
    const bw=document.getElementById('bwin');
    alertUntil=Date.now()+6000;
    bw.classList.add('show','alert');
    document.getElementById('bwTag').querySelector('.ic').textContent=am.metric==='chat'?'💬':'👍';
    document.getElementById('bwTagText').textContent=am.metric==='chat'?'Чат-цель':'Цель по лайкам';
    const rewardText=rewardPreviewText({rewardType:am.rewardType,rewardAmount:am.rewardAmount});
    const body=document.getElementById('bwBody');
    body.innerHTML=`<div class="bw-item"><span class="nick"></span><span class="add">${rewardText}</span></div>`;
    fitNick(body.querySelector('.nick'),'Цель выполнена!');
    setTimeout(()=>{ if(Date.now()>=alertUntil) renderBwin(); },6100);
}
function floatPlus(amount){
    const foot=document.querySelector('.foot'); if(!foot) return;
    const el=document.createElement('span'); el.className='fplus'; el.textContent='+'+fmt(amount)+' р';
    foot.appendChild(el); setTimeout(()=>el.remove(),1500);
}
function flash(big){ const f=document.getElementById('flash'); f.classList.remove('go'); void f.offsetWidth; f.classList.add('go');
    if(big){ const c=document.getElementById('card'); c.classList.add('shake'); setTimeout(()=>c.classList.remove('shake'),520);} }

let ctx,parts=[],cv;
function initFx(){ cv=document.getElementById('fx'); const rz=()=>{cv.width=innerWidth;cv.height=innerHeight;}; rz(); addEventListener('resize',rz); ctx=cv.getContext('2d');
    (function loop(){ ctx.clearRect(0,0,cv.width,cv.height); parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.g||0;p.life-=p.decay;
        ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();});
        parts=parts.filter(p=>p.life>0&&p.y<cv.height+40); requestAnimationFrame(loop); })(); }
</script>
</body>
</html>
