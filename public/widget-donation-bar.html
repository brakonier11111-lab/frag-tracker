<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Полоска сбора донатов</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-red: #ff003c;
            --neon-blue: #00f0ff;
            --neon-purple: #b300ff;
            --neon-green: #00ff47;
            --neon-yellow: #ffff00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: transparent;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .donation-bar-container {
            width: 100%;
            max-width: 800px;
            position: relative;
        }

        .donation-bar-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--neon-yellow);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 
                0 0 10px rgba(255, 255, 0, 0.8),
                0 0 20px rgba(255, 255, 0, 0.6);
            margin-bottom: 15px;
            text-align: center;
        }

        .donation-bar-progress-container {
            position: relative;
            width: 100%;
            height: 70px;
            background: linear-gradient(135deg, 
                rgba(5, 5, 15, 0.95) 0%,
                rgba(8, 8, 20, 0.95) 50%,
                rgba(12, 12, 25, 0.95) 100%
            );
            border: 2px solid var(--neon-yellow);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 
                0 0 15px rgba(255, 255, 0, 0.3),
                inset 0 0 10px rgba(255, 255, 0, 0.1),
                inset 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .donation-bar-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, 
                rgba(255, 255, 0, 0.4) 0%,
                rgba(255, 255, 0, 0.6) 50%,
                rgba(255, 255, 0, 0.4) 100%
            );
            width: 0%;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            position: relative;
            box-shadow: 
                0 0 20px rgba(255, 255, 0, 0.5),
                0 0 40px rgba(255, 255, 0, 0.3),
                inset 0 0 15px rgba(255, 255, 0, 0.2);
        }

        .donation-bar-progress-bar::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: -10px;
            height: 20px;
            background: linear-gradient(to bottom,
                rgba(255, 255, 0, 0.3) 0%,
                rgba(255, 255, 0, 0.15) 50%,
                transparent 100%
            );
            box-shadow: 
                0 5px 20px rgba(255, 255, 0, 0.3),
                0 10px 40px rgba(255, 255, 0, 0.2),
                0 15px 60px rgba(255, 255, 0, 0.1);
            pointer-events: none;
            border-radius: 0 0 10px 10px;
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                opacity: 0.6;
                box-shadow: 
                    0 5px 20px rgba(255, 255, 0, 0.3),
                    0 10px 40px rgba(255, 255, 0, 0.2),
                    0 15px 60px rgba(255, 255, 0, 0.1);
            }
            50% {
                opacity: 1;
                box-shadow: 
                    0 5px 30px rgba(255, 255, 0, 0.5),
                    0 10px 50px rgba(255, 255, 0, 0.4),
                    0 15px 70px rgba(255, 255, 0, 0.3);
            }
        }

        .donation-bar-current-amount {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            font-weight: 700;
            font-family: 'Rajdhani', sans-serif;
            color: #ffffff;
            z-index: 2;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            white-space: nowrap;
            letter-spacing: 1px;
        }

        .donation-bar-current-amount .amount-number {
            font-size: 2rem;
            font-weight: 800;
        }

        .donation-bar-target-amount {
            margin-top: 8px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--neon-yellow);
            text-shadow: 
                0 0 15px rgba(255, 255, 0, 0.9),
                0 2px 4px rgba(0, 0, 0, 0.8);
            white-space: nowrap;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="donation-bar-container">
        <div class="donation-bar-title" id="donationBarTitle">Сбор донатов</div>
        <div class="donation-bar-progress-container">
            <div class="donation-bar-progress-bar" id="donationBarProgressBar">
                <div class="donation-bar-current-amount" id="donationBarCurrentAmount">0₽</div>
            </div>
        </div>
        <div class="donation-bar-target-amount" id="donationBarTargetAmount">1000₽</div>
    </div>

    <script>
        let donationBarState = {
            title: 'Сбор донатов',
            target_amount: 1000,
            current_amount: 0,
            settings: null
        };

        const progressBar = document.getElementById('donationBarProgressBar');
        const currentAmountEl = document.getElementById('donationBarCurrentAmount');
        const targetAmountEl = document.getElementById('donationBarTargetAmount');
        const titleEl = document.getElementById('donationBarTitle');

        function updateUI() {
            const current = parseFloat(donationBarState.current_amount || 0);
            const target = parseFloat(donationBarState.target_amount || 1000);
            const title = donationBarState.title || 'Сбор донатов';
            
            const percent = target > 0 ? Math.min(100, (current / target) * 100) : 0;
            progressBar.style.width = percent + '%';
            
            currentAmountEl.innerHTML = '<span class="amount-number">' + Math.round(current) + '</span>₽';
            targetAmountEl.textContent = Math.round(target) + '₽';
            titleEl.textContent = title;
            applyDesignFromSettings(donationBarState.settings);
        }

        function applyDesignFromSettings(settings) {
            if (!settings || typeof settings !== 'object') return;
            const progressContainer = document.querySelector('.donation-bar-progress-container');
            if (!progressContainer) return;
            const custom = settings.customDesign || null;
            if (custom) {
                progressContainer.style.height = `${Number(custom.barHeight) || 50}px`;
                progressContainer.style.borderRadius = `${Number(custom.barRadius) || 25}px`;
                progressBar.style.borderRadius = `${Number(custom.barRadius) || 25}px`;
                if (custom.fillType === 'solid') {
                    progressBar.style.background = custom.color1 || '#667eea';
                } else {
                    progressBar.style.background = `linear-gradient(90deg, ${custom.color1 || '#667eea'} 0%, ${custom.color2 || '#764ba2'} 100%)`;
                }
            }
            if (settings.media && settings.media.enabled && settings.media.url && settings.media.type === 'image') {
                document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,${settings.media.overlayOpacity || 0.2}), rgba(0,0,0,${settings.media.overlayOpacity || 0.2})), url("${settings.media.url}")`;
                document.body.style.backgroundSize = 'cover';
            }
        }

        // WebSocket подключение
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws`;
        let ws = null;

        function connectWebSocket() {
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    console.log('✅ WebSocket подключен для полоски сбора');
                    ws.send(JSON.stringify({ type: 'CLIENT_TYPE', clientType: 'WIDGET' }));
                };

                ws.onmessage = (event) => {
                    try {
                        const message = JSON.parse(event.data);
                        if (message.type === 'DONATION_BAR_UPDATE') {
                            donationBarState = message.state;
                            updateUI();
                        } else if (message.type === 'WIDGET_SETTINGS_UPDATE' && (message.scope === 'donation-bar' || message.scope === 'donation-goal')) {
                            donationBarState.settings = typeof message.settings === 'string' ? JSON.parse(message.settings) : message.settings;
                            updateUI();
                        }
                    } catch (e) {
                        console.error('Ошибка парсинга сообщения:', e);
                    }
                };

                ws.onerror = (error) => {
                    console.error('❌ WebSocket ошибка:', error);
                };

                ws.onclose = () => {
                    console.log('⚠️ WebSocket отключен, переподключение через 3 секунды...');
                    setTimeout(connectWebSocket, 3000);
                };
            } catch (error) {
                console.error('❌ Ошибка подключения WebSocket:', error);
                setTimeout(connectWebSocket, 3000);
            }
        }

        // Загрузка начального состояния
        async function loadState() {
            try {
                const response = await fetch('/api/donation-bar/state');
                const data = await response.json();
                if (data.success && data.state) {
                    donationBarState = data.state;
                    updateUI();
                }
            } catch (error) {
                console.error('❌ Ошибка загрузки состояния полоски:', error);
            }
        }

        // Инициализация
        loadState();
        connectWebSocket();
        
        // Обновление каждые 2 секунды (fallback)
        setInterval(loadState, 2000);
    </script>
</body>
</html>
