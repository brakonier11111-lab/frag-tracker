<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Онлайн — OBS</title>
<style>
:root {
  --bg: rgba(8, 8, 12, 0.62);
  --line: rgba(255, 255, 255, 0.1);
  --yt: #ff0000;
  --vk: #6a76e8;
  --h: 68px;
  --text-hard-shadow: 1px 1px 0 rgba(0, 0, 0, 0.85);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
}
body {
  font-family: system-ui, Segoe UI, sans-serif;
  color: #fff;
  display: flex;
  align-items: flex-start;
  justify-content: flex-start;
}
.scale {
  transform-origin: top left;
  transform: scale(var(--s, 1));
}
.widget {
  display: flex;
  align-items: center;
  gap: calc(var(--h) * 0.32);
  height: var(--h);
  padding: 0 calc(var(--h) * 0.28);
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: calc(var(--h) * 0.18);
}
.platform {
  display: flex;
  align-items: center;
  gap: calc(var(--h) * 0.12);
  opacity: 0.45;
  transition: opacity 0.3s ease;
}
.platform.connected { opacity: 1; }
.dot {
  width: calc(var(--h) * 0.16);
  height: calc(var(--h) * 0.16);
  border-radius: 50%;
  flex: 0 0 auto;
}
.platform.yt .dot { background: var(--yt); }
.platform.vk .dot { background: var(--vk); }
.count {
  font-size: calc(var(--h) * 0.34);
  font-weight: 700;
  text-shadow: var(--text-hard-shadow);
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.sep {
  width: 1px;
  height: calc(var(--h) * 0.5);
  background: var(--line);
  flex: 0 0 auto;
}
.total {
  display: flex;
  align-items: baseline;
  gap: calc(var(--h) * 0.12);
}
.total .label {
  font-size: calc(var(--h) * 0.2);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: rgba(255, 255, 255, 0.6);
}
.total .count {
  font-size: calc(var(--h) * 0.42);
  color: #fff;
}
</style>
</head>
<body>
  <div class="scale" id="scale">
    <div class="widget">
      <div class="platform yt" id="ytRow">
        <span class="dot"></span>
        <span class="count" id="ytCount">0</span>
      </div>
      <div class="platform vk" id="vkRow">
        <span class="dot"></span>
        <span class="count" id="vkCount">0</span>
      </div>
      <div class="sep"></div>
      <div class="total">
        <span class="label">Всего</span>
        <span class="count" id="totalCount">0</span>
      </div>
    </div>
  </div>
<script>
const params = new URLSearchParams(location.search);
const h = Math.max(40, Math.min(160, Number(params.get('h')) || 68));
document.documentElement.style.setProperty('--h', h + 'px');

const renderScale = Math.max(1, Math.min(3, Number(params.get('scale')) || 0));
if (renderScale > 1) {
  document.getElementById('scale').style.setProperty('--s', renderScale);
}

const ytRow = document.getElementById('ytRow');
const vkRow = document.getElementById('vkRow');
const ytCount = document.getElementById('ytCount');
const vkCount = document.getElementById('vkCount');
const totalCount = document.getElementById('totalCount');

function render(data) {
  ytRow.classList.toggle('connected', !!data.youtube.connected);
  vkRow.classList.toggle('connected', !!data.vkplay.connected);
  ytCount.textContent = data.youtube.viewers;
  vkCount.textContent = data.vkplay.viewers;
  totalCount.textContent = data.total;
}

async function poll() {
  try {
    const r = await fetch('/api/online-viewers', { cache: 'no-store' });
    const j = await r.json();
    render(j);
  } catch (_) { /* noop */ }
}

poll();
setInterval(poll, 5000);
</script>
</body>
</html>
