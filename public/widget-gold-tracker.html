<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Tracker OBS Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
    --bg:#131417;--bg-2:#1a1b1f;--line:rgba(255,255,255,.09);--line-gold:rgba(217,180,101,.35);
    --gold:#d9b465;--gold-soft:rgba(217,180,101,.4);
    --text:#f5f6f8;--text-dim:#9a9ea8;--text-mut:#686c76;
    --green:#5fe3a3;--green-soft:rgba(95,227,163,.35);--red:#ff6b6b;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;min-height:100vh;overflow:hidden;}
body{font-family:'Manrope',sans-serif;background:transparent;color:var(--text);
    display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;}

.scale{transform-origin:center;transform:scale(var(--s,1));}
.stage{display:flex;flex-direction:column;align-items:center;gap:9px;}
.title-pill{display:inline-flex;align-items:center;gap:8px;
    padding:13px 28px;border-radius:999px;max-width:100%;
    background:rgba(19,20,23,0.92);border:1px solid var(--line-gold);
    box-shadow:0 10px 26px rgba(0,0,0,0.45),0 0 26px rgba(217,180,101,.1);}
.title-pill .tx{font-size:1.05rem;font-weight:800;letter-spacing:.03em;color:var(--text);text-shadow:2px 2px 0 rgba(0,0,0,.7);}
.balance-pill{display:inline-flex;align-items:center;justify-content:center;
    padding:14px 32px;border-radius:999px;max-width:100%;
    background:rgba(19,20,23,0.92);border:1px solid var(--line-gold);
    box-shadow:0 10px 26px rgba(0,0,0,0.45),0 0 26px rgba(217,180,101,.1);}
.balance{font-size:1.9rem;font-weight:900;color:var(--text);
    font-variant-numeric:tabular-nums;text-shadow:2px 2px 0 rgba(0,0,0,.7),0 0 12px rgba(217,180,101,.35);}
.balance.pos{color:var(--green);text-shadow:2px 2px 0 rgba(0,0,0,.7),0 0 12px var(--green-soft, rgba(95,227,163,.35));}
.balance.neg{color:var(--red);text-shadow:2px 2px 0 rgba(0,0,0,.7),0 0 12px rgba(255,107,107,.35);}
.coin{margin-left:10px;width:24px;height:auto;vertical-align:middle;filter:drop-shadow(1px 2px 1px rgba(0,0,0,.5));}
.idle{padding:14px 28px;border-radius:999px;text-align:center;
    background:rgba(19,20,23,0.85);border:1px solid var(--line);color:var(--text-dim);
    font-size:.9rem;font-weight:600;text-shadow:1px 1px 0 rgba(0,0,0,.7);}
</style>
</head>
<body>
<div class="scale" id="scale">
    <div class="stage" id="panel" style="display:none">
        <div class="title-pill"><span class="tx">💰 БАЛАНС</span></div>
        <div class="balance-pill"><span class="balance" id="balance">0</span><svg class="coin" viewBox="0 0 40 30" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="coinTop" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#fff3cf"/>
                    <stop offset="45%" stop-color="#f6d375"/>
                    <stop offset="100%" stop-color="#d9a637"/>
                </linearGradient>
                <linearGradient id="coinSide" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#e8b445"/>
                    <stop offset="100%" stop-color="#b8801f"/>
                </linearGradient>
            </defs>
            <ellipse cx="20" cy="24" rx="17" ry="5.5" fill="url(#coinSide)"/>
            <rect x="3" y="18" width="34" height="6" fill="url(#coinSide)"/>
            <ellipse cx="20" cy="18" rx="17" ry="5.5" fill="url(#coinTop)"/>
            <ellipse cx="20" cy="16" rx="12" ry="3.2" fill="none" stroke="#fff8e0" stroke-width="1" opacity=".55"/>
            <ellipse cx="20" cy="15" rx="17" ry="5.5" fill="url(#coinSide)" opacity=".0"/>
            <ellipse cx="20" cy="13" rx="17" ry="5.5" fill="url(#coinSide)"/>
            <rect x="3" y="7" width="34" height="6" fill="url(#coinSide)"/>
            <ellipse cx="20" cy="7" rx="17" ry="5.5" fill="url(#coinTop)"/>
            <ellipse cx="20" cy="5" rx="12" ry="3.2" fill="none" stroke="#fff8e0" stroke-width="1" opacity=".65"/>
        </svg></div>
    </div>
    <div class="idle" id="idle">Отслеживание золота не запущено</div>
</div>

<script>
const DESIGN_W = 340;
document.addEventListener('DOMContentLoaded', () => { scale(); addEventListener('resize', scale); loadData(); });
function scale(){
    const s = innerWidth > DESIGN_W ? Math.min(innerWidth / DESIGN_W, 1.6) : 1;
    document.getElementById('scale').style.setProperty('--s', s);
}
function fmt(n){ return (n || 0).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' '); }

const DISPLAY_DELAY_MS = 4500;
let displayedNet = 0;
let pendingNet = null;
let pendingTimer = null;

function renderNet(net){
    const balanceEl = document.getElementById('balance');
    balanceEl.textContent = (net > 0 ? '+' : '') + fmt(net);
    balanceEl.className = 'balance ' + (net > 0 ? 'pos' : (net < 0 ? 'neg' : ''));
    displayedNet = net;
}

// Трата золота (открыл контейнер — цена списывается сразу) показываем
// мгновенно. А вот приход из контейнера в игре виден только спустя ~11 сек
// анимации открытия, поэтому рост net (отбили голду) задерживаем, чтобы
// цифра не обгоняла картинку на экране. Если за время задержки прилетает
// более свежее изменение, таймер перезапускается на него.
function scheduleNet(net){
    if (net === displayedNet) {
        if (pendingTimer && pendingNet === net) {
            clearTimeout(pendingTimer);
            pendingTimer = null;
            pendingNet = null;
        }
        return;
    }
    if (net < displayedNet) {
        if (pendingTimer) { clearTimeout(pendingTimer); pendingTimer = null; pendingNet = null; }
        renderNet(net);
        return;
    }
    if (pendingNet === net) return;
    if (pendingTimer) clearTimeout(pendingTimer);
    pendingNet = net;
    pendingTimer = setTimeout(() => {
        renderNet(net);
        pendingNet = null;
        pendingTimer = null;
    }, DISPLAY_DELAY_MS);
}

async function loadData(){
    try {
        const res = await fetch(`/api/gold-tracker/status?t=${Date.now()}`);
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Ошибка загрузки данных');

        const panel = document.getElementById('panel');
        const idle = document.getElementById('idle');

        if (!data.active) {
            panel.style.display = 'none';
            idle.style.display = 'block';
            if (pendingTimer) { clearTimeout(pendingTimer); pendingTimer = null; pendingNet = null; }
            displayedNet = 0;
            return;
        }
        idle.style.display = 'none';
        panel.style.display = 'flex';

        scheduleNet(data.net || 0);
    } catch (err) {
        console.error('Error loading gold tracker data:', err);
    }
}

setInterval(loadData, 1000);
</script>
</body>
</html>
