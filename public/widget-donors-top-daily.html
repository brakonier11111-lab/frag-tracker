<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Donors — Суточный</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: rgba(3, 3, 10, 0.95);
            --bg-end: rgba(12, 12, 24, 0.95);
            --accent-yellow: #ffd04e;
            --accent-cyan: #6bffde;
            --accent-text: #fff4b0;
            --panel-radius: 20px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: transparent;
            min-height: 100vh;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .top-widget {
            width: 100%;
            max-width: 520px;
            background: linear-gradient(140deg, #050509, #0d1030);
            border-radius: var(--panel-radius);
            padding: 14px 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
        }

        .top-widget::after {
            content: '';
            position: absolute;
            inset: 10px;
            border-radius: calc(var(--panel-radius) - 10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
        }

        .top-row {
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            overflow: hidden;
        }

        .achievement-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .donor-name {
            flex: 1;
            min-width: 0;
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: #fff0a5;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
        }

        .donor-metrics {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            font-size: 1.1rem;
        }

        .donor-amount {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-yellow);
        }

        .donor-time {
            font-size: 0.88rem;
            letter-spacing: 0.25em;
            color: var(--accent-cyan);
        }

        .no-data {
            margin-top: 8px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.65);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="top-widget" data-context="daily">
        <div class="top-row" id="topEntry">
            <div class="achievement-icon" id="achievementIcon">🏅</div>
            <div class="donor-name" id="donorName">
                <span id="donorNameInner">—</span>
            </div>
            <div class="donor-metrics">
                <span class="donor-amount" id="donorAmount">0 ₽</span>
                <span class="donor-time" id="donorTime">+0с</span>
            </div>
        </div>
        <div class="no-data" id="noDonors">Нет доноров за сутки.</div>
    </div>
    <script>
        window.__donorTopConfig = { daily: true, limit: 5, interval: 5 };
    </script>
    <!-- v2: добавили версионирование скрипта, чтобы в OBS точно подтянулась свежая логика -->
    <script src="/widget-donors-top.js?v=2" defer></script>
</body>
</html>
