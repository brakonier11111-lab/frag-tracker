<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гравитационная Волна</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-green: #00ff47;
            --neon-purple: #b300ff;
            --neon-red: #ff003c;
            --neon-yellow: #ffff00;
            --neon-orange: #ff6600;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', monospace;
            background: transparent;
            color: white;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gravity-widget {
            width: 400px;
            height: 400px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gravity-container {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, 
                rgba(0, 0, 0, 0.9) 0%,
                rgba(0, 0, 0, 0.95) 100%
            );
            border: 3px solid var(--neon-blue);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 50px var(--neon-blue),
                inset 0 0 50px rgba(0, 240, 255, 0.1);
        }

        .gravity-container.discount-active {
            border-color: var(--neon-orange);
            box-shadow: 
                0 0 50px var(--neon-orange),
                inset 0 0 50px rgba(255, 102, 0, 0.1);
        }

        .gravity-container.slowdown-active {
            border-color: var(--neon-red);
            box-shadow: 
                0 0 50px var(--neon-red),
                inset 0 0 50px rgba(255, 0, 60, 0.1);
        }

        .gravity-waves {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .wave {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid var(--neon-blue);
            border-radius: 50%;
            animation: waveExpand 6s ease-out infinite;
        }

        .wave.wave-1 {
            width: 50px;
            height: 50px;
            animation-delay: 0s;
        }

        .wave.wave-2 {
            width: 100px;
            height: 100px;
            animation-delay: 1s;
        }

        .wave.wave-3 {
            width: 150px;
            height: 150px;
            animation-delay: 2s;
        }

        .wave.wave-4 {
            width: 200px;
            height: 200px;
            animation-delay: 3s;
        }

        .wave.wave-5 {
            width: 250px;
            height: 250px;
            animation-delay: 4s;
        }

        .wave.wave-6 {
            width: 300px;
            height: 300px;
            animation-delay: 5s;
        }

        @keyframes waveExpand {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        .gravity-container.discount-active .wave {
            border-color: var(--neon-orange);
        }

        .gravity-container.slowdown-active .wave {
            border-color: var(--neon-red);
        }

        .gravity-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--neon-blue);
            animation: centerPulse 2s ease-in-out infinite;
        }

        .gravity-container.discount-active .gravity-center {
            background: var(--neon-orange);
            box-shadow: 0 0 20px var(--neon-orange);
        }

        .gravity-container.slowdown-active .gravity-center {
            background: var(--neon-red);
            box-shadow: 0 0 20px var(--neon-red);
        }

        @keyframes centerPulse {
            0%, 100% { 
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.8;
            }
            50% { 
                transform: translate(-50%, -50%) scale(1.3);
                opacity: 1;
            }
        }

        .timer-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid var(--neon-blue);
        }

        .timer-numbers {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--neon-blue);
            text-shadow: 0 0 15px var(--neon-blue);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .timer-label {
            font-size: 0.8rem;
            color: #ffffff;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cost-display {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
            font-weight: 600;
        }

        .gravity-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--neon-blue);
            border-radius: 50%;
            animation: particleOrbit 8s linear infinite;
        }

        @keyframes particleOrbit {
            0% {
                transform: rotate(0deg) translateX(150px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: rotate(360deg) translateX(150px) rotate(-360deg);
                opacity: 0;
            }
        }

        .gravity-container.discount-active .particle {
            background: var(--neon-orange);
        }

        .gravity-container.slowdown-active .particle {
            background: var(--neon-red);
        }

        @keyframes timeAddedGlow {
            0% {
                text-shadow: 0 0 15px var(--neon-blue);
                transform: scale(1);
            }
            50% {
                text-shadow: 0 0 30px var(--neon-green);
                transform: scale(1.1);
                color: var(--neon-green);
            }
            100% {
                text-shadow: 0 0 15px var(--neon-blue);
                transform: scale(1);
            }
        }

        .timer-numbers.time-added {
            animation: timeAddedGlow 2s ease-out;
        }

        .gravity-center.time-added {
            animation: centerPulse 2s ease-in-out infinite, gravityExplosion 2s ease-out;
        }

        @keyframes gravityExplosion {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(2); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div class="gravity-widget" id="gravityWidget">
        <div class="gravity-container" id="gravityContainer">
            <div class="gravity-waves">
                <div class="wave wave-1"></div>
                <div class="wave wave-2"></div>
                <div class="wave wave-3"></div>
                <div class="wave wave-4"></div>
                <div class="wave wave-5"></div>
                <div class="wave wave-6"></div>
            </div>
            
            <div class="gravity-center" id="gravityCenter"></div>
            
            <div class="gravity-particles" id="gravityParticles"></div>
            
            <div class="timer-display">
                <div class="timer-numbers" id="timerNumbers">01:00:00</div>
                <div class="timer-label" id="timerLabel">ДО КОНЦА СТРИМА</div>
            </div>
            
            <div class="cost-display" id="costText">1 минута = 50₽</div>
        </div>
    </div>

    <script>
        // Состояние виджета
        let currentState = {
            timer_seconds: 3600,
            cost_per_minute: 50,
            timer_discount: 0,
            timer_discount_until_ts: 0,
            timer_slowdown_active: false,
            timer_slowdown_factor: 1.0,
            timer_slowdown_until_ts: 0
        };

        let timerInterval = null;
        let lastUpdateTime = Date.now();

        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🎨 Виджет "Гравитационная Волна" загружен');
            createParticles();
            updateDisplay();
            startTimer();
            
            // Уведомляем родительскую страницу о загрузке
            if (window.parent !== window) {
                window.parent.postMessage({ type: 'WIDGET_LOADED' }, '*');
            }
        });

        // Обработка сообщений от родительской страницы
        window.addEventListener('message', function(event) {
            switch(event.data.type) {
                case 'UPDATE_STATE':
                    updateState(event.data);
                    break;
                case 'SET_MODE':
                    setMode(event.data.mode, event.data);
                    break;
                case 'TEST_DONATION':
                    triggerTimeAddedAnimation(60);
                    break;
            }
        });

        function updateState(newState) {
            Object.assign(currentState, newState);
            updateDisplay();
        }

        function setMode(mode, data) {
            const container = document.getElementById('gravityContainer');
            container.classList.remove('discount-active', 'slowdown-active');
            
            switch(mode) {
                case 'discount':
                    container.classList.add('discount-active');
                    currentState.timer_discount = parseInt(data.discount) || 20;
                    currentState.timer_discount_until_ts = Date.now() + 300000;
                    break;
                case 'slowdown':
                    container.classList.add('slowdown-active');
                    currentState.timer_slowdown_active = true;
                    currentState.timer_slowdown_factor = parseFloat(data.slowdown) || 0.5;
                    currentState.timer_slowdown_until_ts = Date.now() + 300000;
                    break;
                default:
                    currentState.timer_discount = 0;
                    currentState.timer_slowdown_active = false;
                    currentState.timer_slowdown_factor = 1.0;
            }
            
            updateDisplay();
        }

        function createParticles() {
            const particlesContainer = document.getElementById('gravityParticles');
            
            setInterval(() => {
                if (Math.random() < 0.3) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.top = '50%';
                    particle.style.left = '50%';
                    particle.style.animationDelay = Math.random() * 2 + 's';
                    particle.style.animationDuration = (6 + Math.random() * 4) + 's';
                    
                    particlesContainer.appendChild(particle);
                    
                    setTimeout(() => {
                        if (particle.parentNode) {
                            particle.parentNode.removeChild(particle);
                        }
                    }, 10000);
                }
            }, 200);
        }

        function updateDisplay() {
            updateTimerDisplay();
            updateCostDisplay();
        }

        function updateTimerDisplay() {
            const totalSeconds = currentState.timer_seconds;
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            
            const timeString = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('timerNumbers').textContent = timeString;
        }

        function updateCostDisplay() {
            const baseCost = currentState.cost_per_minute;
            const discount = currentState.timer_discount || 0;
            const actualCost = Math.max(1, baseCost - discount);
            
            if (discount > 0) {
                document.getElementById('costText').innerHTML = `
                    <span style="text-decoration: line-through; opacity: 0.6;">${baseCost}₽</span> 
                    <span style="color: var(--neon-orange);">${actualCost}₽</span>
                `;
            } else {
                document.getElementById('costText').textContent = `1 минута = ${actualCost}₽`;
            }
        }

        function startTimer() {
            if (timerInterval) return;
            
            timerInterval = setInterval(() => {
                if (currentState.timer_seconds > 0) {
                    const factor = currentState.timer_slowdown_active ? 
                        Math.max(0.1, currentState.timer_slowdown_factor) : 1.0;
                    const currentTime = Date.now();
                    const elapsedMs = currentTime - lastUpdateTime;
                    const msPerLogicalSecond = 1000 * factor;
                    
                    if (elapsedMs >= msPerLogicalSecond) {
                        currentState.timer_seconds--;
                        lastUpdateTime = currentTime;
                        updateDisplay();
                    }
                }
            }, 100);
        }

        function triggerTimeAddedAnimation(timeEarned) {
            console.log(`🎬 Анимация добавления времени: ${timeEarned} секунд`);
            
            const timerNumbers = document.getElementById('timerNumbers');
            const gravityCenter = document.getElementById('gravityCenter');
            
            timerNumbers.classList.add('time-added');
            gravityCenter.classList.add('time-added');
            
            setTimeout(() => {
                timerNumbers.classList.remove('time-added');
                gravityCenter.classList.remove('time-added');
            }, 2000);
        }
    </script>
</body>
</html>
