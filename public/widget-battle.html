<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@500;700;800;900&family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{--blue:#4be0ff;--blue-rgb:75,224,255;--red:#ff2a45;--red-rgb:255,42,69;--red-light:#ff8a9c;--gold:#ffce46;--green:#36f5a0;--text-shadow:0 2px 3px rgba(0,0,0,.9),0 0 3px rgba(0,0,0,.8);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;min-height:100vh;overflow:hidden;background:transparent;}
body{font-family:'Exo 2',sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;text-shadow:var(--text-shadow);}

#fx{position:fixed;inset:0;pointer-events:none;z-index:40;}
#flash{position:fixed;inset:0;pointer-events:none;opacity:0;z-index:35;background:radial-gradient(circle at 50% 42%,rgba(255,206,70,.5),transparent 58%);}
#flash.go{animation:flash .7s ease;}
@keyframes flash{0%{opacity:0}18%{opacity:1}100%{opacity:0}}

/* Без contain:paint — та версия (скопированная из tanks-blitz-challenge, у
   которого нет элементов, специально вылезающих за свой бокс) обрезала огонь
   и свечение вокруг карточек-лидеров прямо по границе .scale. */
.scale{transform-origin:center;transform:scale(var(--s,1));contain:layout style;backface-visibility:hidden;}
.wrap{width:57.5rem;position:relative;}
.idle{text-align:center;padding:40px;font-size:1.4rem;font-weight:800;color:rgba(255,255,255,.65);text-shadow:var(--text-shadow);
    background:rgba(8,10,19,.7);border-radius:18px;border:1.5px solid rgba(255,255,255,.12);}
.idle.hidden{display:none;}

.arena{display:none;}
.arena.show{display:block;}

.vs-row{display:flex;align-items:center;justify-content:center;gap:.7rem;}

/* .card-holder держит габарит/позицию (flex:none, прямоугольник шире чем выше —
   квадрат оставлял пустое место снизу-сверху при контенте, которому нужно
   больше ширины) и НЕ обрезает содержимое — иначе языки пламени (.fire-deco),
   которые торчат над карточкой, срезались бы. .card внутри — обычный
   overflow:hidden, чтобы контент карточки (статы/очки) никогда не вылезал
   наружу, чем бы это ни было вызвано. */
.card-holder{flex:none;width:15rem;height:10rem;position:relative;}

.card{width:100%;height:100%;position:relative;overflow:hidden;padding:.6875rem;border-radius:1rem;
    display:flex;flex-direction:column;justify-content:center;gap:.4375rem;
    background:linear-gradient(165deg,rgba(13,16,28,0.9),rgba(8,10,19,0.9));
    box-shadow:0 16px 40px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.05);
    transition:box-shadow .3s;}
.card.me{--accent:var(--blue);--accent-rgb:var(--blue-rgb);}
.card.opp{--accent:var(--red);--accent-rgb:var(--red-rgb);}
.card::before{content:'';position:absolute;inset:0;border-radius:1rem;padding:.09rem;pointer-events:none;z-index:2;
    background:linear-gradient(150deg,rgba(var(--accent-rgb),.85),rgba(255,255,255,.15) 30%,transparent 55%,rgba(var(--accent-rgb),.5));
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;}
.card.opp::before{transform:scaleX(-1);}
.card.pulse{animation:cardPulse .8s cubic-bezier(.16,1,.3,1);}
@keyframes cardPulse{0%{box-shadow:0 16px 40px rgba(0,0,0,.55)}25%{box-shadow:0 16px 40px rgba(0,0,0,.55),0 0 50px 10px rgba(var(--accent-rgb),.55)}100%{box-shadow:0 16px 40px rgba(0,0,0,.55)}}
/* Мягкое переливающееся свечение снаружи у того, кто ведёт — filter (не
   box-shadow, тот теперь бы резался overflow:hidden карточки, да и конфликтовал
   бы с .pulse). Узкий диапазон интенсивности и плавные ease-in-out шаги — вместо
   резкой пульсации ровное "дышащее" сияние. Класс .leading теперь на
   .card-holder (карточка сама снова overflow:hidden), поэтому и селектор через
   потомка. */
@keyframes fireFlicker{
    0%,100%{filter:drop-shadow(0 0 12px rgba(255,150,20,.42)) drop-shadow(0 0 24px rgba(255,90,10,.26));}
    50%{filter:drop-shadow(0 0 17px rgba(255,175,40,.54)) drop-shadow(0 0 30px rgba(255,110,10,.34));}
}
.card-holder.leading .card{animation:fireFlicker 3.6s ease-in-out infinite;}

.fire-deco{position:absolute;top:-.8125rem;left:.375rem;right:.375rem;z-index:5;display:flex;justify-content:space-around;
    pointer-events:none;opacity:0;transition:opacity .3s;}
.card-holder.leading .fire-deco{opacity:1;}
.fire-deco .flame{font-size:1rem;filter:drop-shadow(0 0 7px rgba(255,140,0,.85));animation:flameLick 2.1s ease-in-out infinite;}
.fire-deco .flame.f2{font-size:1.25rem;animation-duration:1.8s;animation-delay:.4s;}
.fire-deco .flame.f3{font-size:.95rem;animation-duration:2.3s;animation-delay:.9s;}
@keyframes flameLick{
    0%,100%{transform:scale(1) rotate(-3deg);opacity:.8;filter:drop-shadow(0 0 7px rgba(255,140,0,.85));}
    28%{transform:scale(1.12) rotate(2deg);opacity:1;filter:drop-shadow(0 0 10px rgba(255,170,20,.95));}
    52%{transform:scale(.92) rotate(-4deg);opacity:.78;filter:drop-shadow(0 0 6px rgba(255,120,0,.75));}
    77%{transform:scale(1.08) rotate(3deg);opacity:.95;filter:drop-shadow(0 0 9px rgba(255,160,10,.9));}
}

.nickname{position:relative;z-index:3;font-family:'Exo 2';font-weight:900;font-size:.98rem;text-transform:uppercase;letter-spacing:.03em;
    color:#fff;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* Третья колонка ("Выжив.") — самый длинный лейбл из трёх, даём ей больше доли
   явно (было равное 1fr 1fr 1fr — grid раздувал её за счёт min-content и она
   упиралась в правый край карточки). */
.stats{position:relative;z-index:3;display:grid;grid-template-columns:.9fr .9fr 1.2fr;gap:.25rem;}
.stat{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.14);border-radius:.5625rem;padding:.4375rem .15rem;text-align:center;min-width:0;overflow:hidden;}
.stat .lbl{display:block;font-size:.44rem;font-weight:800;letter-spacing:.02em;text-transform:uppercase;color:rgba(255,255,255,.82);margin-bottom:2px;
    white-space:nowrap;overflow:hidden;text-overflow:clip;}
.stat .val{display:block;font-family:'Orbitron';font-weight:800;font-size:.86rem;color:#fff;font-variant-numeric:tabular-nums;
    white-space:nowrap;overflow:hidden;text-overflow:clip;}
.stat .val.bump-up{animation:bumpUp .7s cubic-bezier(.16,1,.3,1);}
@keyframes bumpUp{0%{transform:translateY(0)}22%{transform:translateY(-6px) scale(1.1);filter:drop-shadow(0 0 16px rgba(54,245,160,.85)) brightness(1.35)}100%{transform:none;filter:none}}

.score-box{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.0625rem;
    background:rgba(0,0,0,.55);border-radius:.625rem;padding:.375rem .625rem;
    border:1.5px solid rgba(var(--accent-rgb),.45);box-shadow:inset 0 2px 10px rgba(0,0,0,.55);}
.score-box .lbl{font-size:.48rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.8);}
.score-box .val{font-family:'Orbitron';font-weight:900;font-size:1.3rem;color:var(--accent);text-shadow:var(--text-shadow),0 0 18px rgba(var(--accent-rgb),.5);
    font-variant-numeric:tabular-nums;}
.score-box .val.bump-up{animation:scoreBump .8s cubic-bezier(.16,1,.3,1);}
@keyframes scoreBump{0%{transform:scale(1)}25%{transform:scale(1.18);filter:drop-shadow(0 0 22px rgba(var(--accent-rgb),.9))}100%{transform:scale(1);filter:none}}

.vs-center{flex:none;width:26rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.35rem;}
.vs-title{font-family:'Orbitron';font-weight:900;font-size:1.4rem;color:var(--gold);text-shadow:var(--text-shadow),0 0 16px rgba(255,206,70,.4);letter-spacing:.06em;}
.price-line{font-size:.72rem;font-weight:700;color:rgba(255,255,255,.85);text-align:center;min-height:1em;}
.price-line b{color:var(--gold);}

.battles-row{display:flex;align-items:center;gap:.6rem;font-family:'Orbitron';font-size:1.05rem;font-weight:800;font-variant-numeric:tabular-nums;
    margin-top:.2rem;margin-bottom:-.2rem;}
.battles-row .b-me,.battles-row .b-opp{background:rgba(4,5,10,.8);border:1px solid rgba(255,255,255,.16);
    padding:.15rem .55rem;border-radius:.4rem;box-shadow:0 2px 6px rgba(0,0,0,.5);}
.battles-row .b-me{color:var(--blue);}
.battles-row .b-opp{color:var(--red-light);}
.battles-row .b-sep{font-family:'Exo 2';font-size:.56rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.85);}

.bar-wrap{width:100%;display:flex;flex-direction:column;align-items:center;gap:.35rem;}
.bar{position:relative;width:100%;height:1.375rem;border-radius:.6875rem;overflow:hidden;background:rgba(0,0,0,.65);
    border:1.5px solid rgba(255,255,255,.15);box-shadow:inset 0 2px 8px rgba(0,0,0,.65);}
.bar-fill{position:absolute;top:0;bottom:0;isolation:isolate;transition:width .9s cubic-bezier(.4,0,.2,1);}
.bar-fill.me{left:0;background:linear-gradient(90deg,rgba(var(--blue-rgb),.55),var(--blue));width:50%;}
.bar-fill.opp{right:0;background:linear-gradient(270deg,rgba(var(--red-rgb),.55),var(--red));width:50%;}
.bar-marker{position:absolute;top:-.25rem;bottom:-.25rem;width:.1875rem;left:50%;background:#fff;box-shadow:0 0 10px rgba(255,255,255,.8);
    transform:translateX(-50%);transition:left .9s cubic-bezier(.4,0,.2,1);z-index:2;}
.pct-line{display:flex;justify-content:space-between;width:100%;font-family:'Orbitron';font-size:1.15rem;font-weight:800;}
.pct-line span{background:rgba(4,5,10,.88);border:1px solid rgba(255,255,255,.16);padding:.25rem .8rem;border-radius:.5rem;
    box-shadow:0 2px 6px rgba(0,0,0,.5);}
.pct-line .me-pct{color:var(--blue);}
.pct-line .opp-pct{color:var(--red-light);}

.formula-hint{font-size:.66rem;font-weight:700;color:rgba(255,255,255,.82);text-align:center;letter-spacing:.02em;max-width:100%;
    margin-top:-.15rem;}

.winner-banner{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:50;background:rgba(4,5,10,.72);}
.winner-banner.show{display:flex;animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.winner-card{text-align:center;padding:40px 60px;border-radius:24px;background:linear-gradient(165deg,rgba(13,16,28,.95),rgba(8,10,19,.95));
    border:2px solid var(--gold);box-shadow:0 0 80px rgba(255,206,70,.4);animation:winnerPop .6s cubic-bezier(.16,1,.3,1);}
@keyframes winnerPop{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
.winner-card .wt{font-size:.9rem;font-weight:800;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:10px;}
.winner-card .wn{font-family:'Orbitron';font-weight:900;font-size:3rem;background:linear-gradient(180deg,#fff,var(--gold) 60%,#ff9d00);
    -webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 3px 0 rgba(0,0,0,.5));}
</style>
</head>
<body>
<div id="flash"></div>
<canvas id="fx"></canvas>

<div class="scale" id="scale">
<div class="wrap">
    <div class="idle" id="idleState">⚔️ Ожидание начала баттла...</div>
    <div class="arena" id="arena">
        <div class="vs-row">
            <div class="card-holder me" id="cardMeHolder">
                <div class="fire-deco" aria-hidden="true"><span class="flame f1">🔥</span><span class="flame f2">🔥</span><span class="flame f3">🔥</span></div>
                <div class="card me" id="cardMe">
                    <div class="nickname" id="myNick">Стример</div>
                    <div class="stats">
                        <div class="stat"><span class="lbl">Урон</span><span class="val" id="myDmg">0</span></div>
                        <div class="stat"><span class="lbl">Фраги</span><span class="val" id="myFrags">0</span></div>
                        <div class="stat"><span class="lbl">Выжив.</span><span class="val" id="mySurv">0%</span></div>
                    </div>
                    <div class="score-box">
                        <span class="lbl">Очки</span>
                        <span class="val" id="myScore">0</span>
                    </div>
                </div>
            </div>

            <div class="vs-center">
                <div class="price-line" id="priceLine"></div>
                <div class="vs-title">VS</div>
                <div class="battles-row">
                    <span class="b-me" id="battlesMe">0</span>
                    <span class="b-sep">боёв</span>
                    <span class="b-opp" id="battlesOpp">0</span>
                </div>
                <div class="bar-wrap">
                    <div class="bar">
                        <div class="bar-fill me" id="barMe"></div>
                        <div class="bar-fill opp" id="barOpp"></div>
                        <div class="bar-marker" id="barMarker"></div>
                    </div>
                    <div class="formula-hint">1 урон = 1 очко · 1 фраг = 500 · выживание = 300</div>
                    <div class="pct-line"><span class="me-pct" id="myPct">50%</span><span class="opp-pct" id="oppPct">50%</span></div>
                </div>
            </div>

            <div class="card-holder opp" id="cardOppHolder">
                <div class="fire-deco" aria-hidden="true"><span class="flame f1">🔥</span><span class="flame f2">🔥</span><span class="flame f3">🔥</span></div>
                <div class="card opp" id="cardOpp">
                    <div class="nickname" id="oppNick">Зритель</div>
                    <div class="stats">
                        <div class="stat"><span class="lbl">Урон</span><span class="val" id="oppDmg">0</span></div>
                        <div class="stat"><span class="lbl">Фраги</span><span class="val" id="oppFrags">0</span></div>
                        <div class="stat"><span class="lbl">Выжив.</span><span class="val" id="oppSurv">0%</span></div>
                    </div>
                    <div class="score-box">
                        <span class="lbl">Очки</span>
                        <span class="val" id="oppScore">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</div>

<div class="winner-banner" id="winnerBanner">
    <div class="winner-card">
        <div class="wt">Победитель баттла</div>
        <div class="wn" id="winnerName">—</div>
    </div>
</div>

<script>
let lastState = null;
let cv, ctx, parts = [];

// ?scale=2 в URL источника OBS — как в widget-tanks-blitz-challenge: фиксируем
// пиксельный буфер страницы под DESIGN*scale и растягиваем контент трансформом,
// чтобы OBS не апскейлил уже отрендеренную картинку (иначе мыло). Единый
// transform:scale() на .scale масштабирует ВЕСЬ поддерево как один слой — в
// отличие от растягивания width/height контейнера, тут пропорции между
// фиксированными (карточки) и резиновыми (vs-center) частями не ломаются,
// потому что это чисто визуальный постпроцесс поверх уже готовой раскладки.
// Source в OBS нужно выставить Custom Width/Height = DESIGN_W*scale x DESIGN_H*scale.
// Без ?scale= (или =1) — контент просто вписывается (contain) в реальный размер
// источника, каким бы он ни был, поэтому ничего не обрезается и не вылезает.
// DESIGN_W/H с большим запасом вокруг реального контента (карточка сейчас
// 184px) — свечению/огню лидера и языкам пламени над карточкой нужно место со
// всех сторон, иначе они упираются в край видимой области источника OBS.
const DESIGN_W = 1040, DESIGN_H = 300;
const renderScale = Math.max(1, Math.min(3, Number(new URLSearchParams(location.search).get('scale')) || 0));
if (renderScale > 1) {
    const vw = Math.ceil(DESIGN_W * renderScale), vh = Math.ceil(DESIGN_H * renderScale);
    document.documentElement.style.width = vw + 'px'; document.documentElement.style.height = vh + 'px'; document.documentElement.style.minWidth = vw + 'px';
    document.body.style.width = vw + 'px'; document.body.style.height = vh + 'px'; document.body.style.minWidth = vw + 'px';
}
function applyRenderScale() {
    const el = document.getElementById('scale');
    if (!el) return;
    if (renderScale > 1) { el.style.setProperty('--s', renderScale); return; }
    const s = Math.min(window.innerWidth / DESIGN_W, window.innerHeight / DESIGN_H);
    el.style.setProperty('--s', s);
}

function initFx() {
    cv = document.getElementById('fx');
    cv.width = window.innerWidth; cv.height = window.innerHeight;
    ctx = cv.getContext('2d');
    window.addEventListener('resize', () => { cv.width = window.innerWidth; cv.height = window.innerHeight; });
    (function loop() {
        ctx.clearRect(0, 0, cv.width, cv.height);
        parts.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.vy += p.g || 0.15; p.life -= p.decay;
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
        });
        parts = parts.filter(p => p.life > 0 && p.y < cv.height + 40);
        requestAnimationFrame(loop);
    })();
}

function burst(color, count) {
    const cx = cv.width / 2, cy = cv.height * 0.35;
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 3 + Math.random() * 7;
        parts.push({
            x: cx, y: cy, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2,
            g: 0.18, color, r: 2 + Math.random() * 3, life: 1, decay: 0.012 + Math.random() * 0.012
        });
    }
}

function flash() {
    const f = document.getElementById('flash');
    f.classList.remove('go'); void f.offsetWidth; f.classList.add('go');
}

function fmt(n) { return Math.round(Number(n) || 0).toLocaleString('ru-RU'); }

function bump(el) {
    el.classList.remove('bump-up'); void el.offsetWidth; el.classList.add('bump-up');
}

function render(state, opts) {
    opts = opts || {};
    const idle = document.getElementById('idleState');
    const arena = document.getElementById('arena');

    if (!state || !state.active) {
        idle.classList.remove('hidden');
        arena.classList.remove('show');
        return;
    }
    idle.classList.add('hidden');
    arena.classList.add('show');

    document.getElementById('myNick').textContent = state.myNickname || 'Стример';
    document.getElementById('oppNick').textContent = state.opponentNickname || 'Зритель';
    document.getElementById('priceLine').innerHTML = state.price ? `Ставка: <b>${state.price}</b>` : '';

    const my = state.myTotals || {};
    const opp = state.opponentTotals || {};

    setStat('myDmg', fmt(my.avgDamage));
    setStat('myFrags', fmt(my.frags));
    setStat('mySurv', (my.survivalRate || 0) + '%');
    document.getElementById('battlesMe').textContent = my.battles || 0;

    setStat('oppDmg', fmt(opp.avgDamage));
    setStat('oppFrags', fmt(opp.frags));
    setStat('oppSurv', (opp.survivalRate || 0) + '%');
    document.getElementById('battlesOpp').textContent = opp.battles || 0;

    setScore('myScore', fmt(state.myScore));
    setScore('oppScore', fmt(state.opponentScore));

    const myLeading = (state.myScore || 0) > (state.opponentScore || 0);
    const oppLeading = (state.opponentScore || 0) > (state.myScore || 0);
    document.getElementById('cardMeHolder').classList.toggle('leading', myLeading);
    document.getElementById('cardOppHolder').classList.toggle('leading', oppLeading);

    const myPct = state.myPct != null ? state.myPct : 50;
    document.getElementById('barMe').style.width = myPct + '%';
    document.getElementById('barOpp').style.width = (100 - myPct) + '%';
    document.getElementById('barMarker').style.left = myPct + '%';
    document.getElementById('myPct').textContent = Math.round(myPct) + '%';
    document.getElementById('oppPct').textContent = Math.round(100 - myPct) + '%';

    const justPlayed = opts.justPlayed;
    if (justPlayed === 'me') {
        document.getElementById('cardMe').classList.remove('pulse'); void document.getElementById('cardMe').offsetWidth;
        document.getElementById('cardMe').classList.add('pulse');
        burst('rgba(75,224,255,0.9)', 40);
        flash();
    } else if (justPlayed === 'opponent') {
        document.getElementById('cardOpp').classList.remove('pulse'); void document.getElementById('cardOpp').offsetWidth;
        document.getElementById('cardOpp').classList.add('pulse');
        burst('rgba(255,42,69,0.9)', 40);
        flash();
    }

    lastState = state;
}

function setStat(id, text) {
    const el = document.getElementById(id);
    if (el.textContent !== text) { el.textContent = text; bump(el); }
}
function setScore(id, text) {
    const el = document.getElementById(id);
    if (el.textContent !== text) { el.textContent = text; bump(el); }
}

function showWinner(state) {
    if (!state || !state.winner) return;
    const name = state.winner === 'me' ? (state.myNickname || 'Стример') : (state.opponentNickname || 'Зритель');
    document.getElementById('winnerName').textContent = name;
    document.getElementById('winnerBanner').classList.add('show');
    burst(state.winner === 'me' ? 'rgba(75,224,255,0.95)' : 'rgba(255,42,69,0.95)', 90);
    setTimeout(() => burst('rgba(255,206,70,0.95)', 70), 250);
    setTimeout(() => {
        document.getElementById('winnerBanner').classList.remove('show');
    }, 6000);
}

async function loadState() {
    try {
        const r = await fetch('/api/battle/state');
        const d = await r.json();
        if (d.success) render(d.battle, {});
    } catch (e) { /* noop */ }
}

function connectWS() {
    const ws = new WebSocket((location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws');
    ws.onmessage = (ev) => {
        try {
            const m = JSON.parse(ev.data);
            if (m.type === 'BATTLE_UPDATE' && m.battle) {
                render(m.battle, { justPlayed: m.justPlayed });
            } else if (m.type === 'BATTLE_ENDED' && m.battle) {
                render(m.battle, {});
                showWinner(m.battle);
            }
        } catch (e) { /* noop */ }
    };
    ws.onclose = () => setTimeout(connectWS, 3000);
    ws.onerror = () => ws.close();
}

document.addEventListener('DOMContentLoaded', () => {
    initFx();
    applyRenderScale();
    window.addEventListener('resize', applyRenderScale);
    loadState();
    connectWS();
    setInterval(loadState, 5000);
});
</script>
</body>
</html>
