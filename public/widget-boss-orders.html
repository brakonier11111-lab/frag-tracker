<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boss Order Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;700;800;900&family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#ffce46;--gold-deep:#ff9d00;--crimson:#ff2a45;--green:#36f5a0;--steel:#9fb4d8;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;min-height:100vh;overflow:hidden;}
body{font-family:'Exo 2',sans-serif;background:transparent;color:#fff;display:flex;align-items:center;justify-content:center;}

#fx{position:fixed;inset:0;pointer-events:none;z-index:31;}

.scale{transform-origin:center;transform:scale(var(--s,1));}
.card{position:relative;width:560px;padding:26px 34px;
    --accent:var(--crimson);--accent-rgb:255,42,69;
    background:linear-gradient(165deg,rgba(20,10,12,0.96),rgba(10,6,10,0.97));
    border-radius:18px;overflow:hidden;
    box-shadow:0 30px 70px rgba(0,0,0,0.62),inset 0 1px 0 rgba(255,255,255,0.05),0 0 60px rgba(var(--accent-rgb),0.14);
    opacity:0;transform:translateY(30px) scale(.94);transition:opacity .5s ease,transform .5s cubic-bezier(.16,1,.3,1);}
.card.show{opacity:1;transform:translateY(0) scale(1);}
.card.done{--accent:var(--green);--accent-rgb:54,245,160;}
.card.failed{--accent:var(--crimson);--accent-rgb:255,42,69;}
.card::before{content:'';position:absolute;inset:0;border-radius:18px;padding:1.5px;pointer-events:none;z-index:2;
    background:linear-gradient(150deg,rgba(var(--accent-rgb),.85),rgba(255,255,255,.18) 28%,transparent 52%,rgba(var(--accent-rgb),.5));
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;}
.card::after{content:'';position:absolute;top:0;left:8%;right:8%;height:2px;z-index:3;
    background:linear-gradient(90deg,transparent,rgba(var(--accent-rgb),.95),transparent);filter:drop-shadow(0 0 8px rgba(var(--accent-rgb),.8));}
.inner{position:relative;z-index:4;text-align:center;}

.kick{display:flex;align-items:center;justify-content:center;gap:8px;font-size:.62rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
.kick .dot{width:7px;height:7px;border-radius:50%;background:var(--crimson);box-shadow:0 0 9px var(--crimson);animation:liv 1.4s infinite;}
@keyframes liv{0%,100%{opacity:1}50%{opacity:.3}}

.donor{font-family:'Orbitron';font-weight:900;font-size:1.5rem;line-height:1.2;margin-bottom:14px;
    background:linear-gradient(92deg,#fff6da,var(--gold) 55%,var(--gold-deep));-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 2px 0 rgba(0,0,0,.5));}
.donor .amt{font-size:.62em;color:var(--steel);-webkit-text-fill-color:var(--steel);}

.order-box{position:relative;background:rgba(0,0,0,0.55);border:1.5px solid rgba(255,255,255,0.12);border-radius:12px;
    padding:18px 22px;box-shadow:inset 0 2px 14px rgba(0,0,0,0.6),inset 0 0 0 1px rgba(var(--accent-rgb),0.08);}
.order-text{font-weight:800;font-size:1.15rem;line-height:1.4;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.6);}

.badge{display:none;margin-top:14px;font-size:.72rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:#04130b;
    background:var(--green);padding:5px 14px;border-radius:9px;}
.card.done .badge.done-badge{display:inline-block;}
.badge.failed-badge{background:var(--crimson);color:#fff;}
.card.failed .badge.failed-badge{display:inline-block;}

.shake{animation:shake .5s;}
@keyframes shake{0%,100%{transform:scale(var(--s,1)) translate(0,0)}25%{transform:scale(var(--s,1)) translate(-7px,4px)}50%{transform:scale(var(--s,1)) translate(6px,-4px)}75%{transform:scale(var(--s,1)) translate(-4px,3px)}}
</style>
</head>
<body>
<canvas id="fx"></canvas>

<div class="scale" id="scale">
    <div class="card" id="card">
        <div class="inner">
            <div class="kick"><span class="dot"></span> <span id="header">ПРИКАЗ ОТ ЗРИТЕЛЯ</span></div>
            <div class="donor"><span id="donorName">Аноним</span> <span class="amt">· <span id="donorAmt">0</span> ₽</span></div>
            <div class="order-box"><div class="order-text" id="orderText">—</div></div>
            <div class="badge done-badge">✅ Выполнено!</div>
            <div class="badge failed-badge">❌ Провалено</div>
        </div>
    </div>
</div>

<script>
let lastActiveId = null;
const DESIGN_W = 640, DESIGN_H = 320;

document.addEventListener('DOMContentLoaded', () => { scale(); addEventListener('resize', scale); initFx(); load(); connectWS(); });
function scale(){ const s = Math.min(innerWidth/DESIGN_W, innerHeight/DESIGN_H); document.getElementById('scale').style.setProperty('--s', s); }
function esc(s){ const d=document.createElement('div'); d.textContent=String(s==null?'':s); return d.innerHTML; }
function fmt(n){ return Math.round(Number(n)||0).toLocaleString('ru-RU'); }

function load(){ fetch('/api/boss-orders').then(r=>r.json()).then(d=>{ if(d.success) render(d); }); }

function render(data){
    const card = document.getElementById('card');
    document.getElementById('header').textContent = (data.config && data.config.headerText) || 'ПРИКАЗ ОТ ЗРИТЕЛЯ';

    const active = data.active;
    // Ищем недавно завершённый (done/failed) приказ, чтобы показать финальный статус на пару секунд
    const recentFinished = !active && data.orders ? data.orders.find(o => (o.status === 'done' || o.status === 'failed') && o.id === lastActiveId) : null;
    const shown = active || recentFinished;

    if (!shown) {
        card.classList.remove('show', 'done', 'failed');
        lastActiveId = null;
        return;
    }

    const isNew = shown.id !== lastActiveId;
    lastActiveId = shown.id;

    document.getElementById('donorName').textContent = shown.username || 'Аноним';
    document.getElementById('donorAmt').textContent = fmt(shown.amount);
    document.getElementById('orderText').textContent = shown.text || '';

    card.classList.remove('done', 'failed');
    if (shown.status === 'done') card.classList.add('done');
    else if (shown.status === 'failed') card.classList.add('failed');

    card.classList.add('show');

    if (isNew) {
        burst(shown.status === 'done' ? 60 : (shown.status === 'failed' ? 40 : 0));
        if (shown.status === 'failed') {
            card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
        }
    }
}

function connectWS(){
    try {
        const ws = new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+location.host+'/ws');
        ws.onmessage = ev => {
            let m; try { m = JSON.parse(ev.data); } catch { return; }
            if (m.type === 'BOSS_ORDER_UPDATE') render(m);
        };
        ws.onclose = () => setTimeout(connectWS, 3000);
    } catch (e) { setTimeout(connectWS, 4000); }
}

let ctx, parts = [], cv;
function initFx(){
    cv = document.getElementById('fx');
    const rz = () => { cv.width = innerWidth; cv.height = innerHeight; }; rz(); addEventListener('resize', rz);
    ctx = cv.getContext('2d');
    (function loop(){
        ctx.clearRect(0, 0, cv.width, cv.height);
        parts.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += p.g || 0; p.life -= p.decay;
            ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill(); });
        parts = parts.filter(p => p.life > 0 && p.y < cv.height + 40);
        requestAnimationFrame(loop);
    })();
}
function burst(n){
    if (!n) return;
    const cx = innerWidth / 2, cy = innerHeight * 0.5;
    const cols = ['#ffce46', '#ff9d00', '#fff', '#36f5a0'];
    for (let i = 0; i < n; i++) {
        const a = Math.random() * Math.PI * 2, sp = 5 * (0.4 + Math.random());
        parts.push({ x: cx, y: cy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1.5, g: 0.05, r: Math.random() * 3 + 1, life: 1, decay: 0.012 + Math.random() * 0.01, color: cols[Math.random() * cols.length | 0] });
    }
    if (parts.length > 500) parts.splice(0, parts.length - 500);
}
</script>
</body>
</html>
