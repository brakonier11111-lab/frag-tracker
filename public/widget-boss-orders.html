<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boss Order Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
/* Премиальный, спокойный дизайн: тёплый графит + шампань-золото, один акцент,
   мягкое свечение вместо неона, засечный шрифт для имён/сумм — читаемость и вес
   важнее эффектов. */
:root{
    --ink:#0c0b0a;--panel:#131110;--panel-2:#1a1613;
    --line:rgba(212,175,106,0.22);--line-soft:rgba(255,255,255,0.08);
    --gold:#d4af6a;--gold-soft:rgba(212,175,106,0.5);
    --text:#f3ede0;--text-dim:#b9ae9a;--text-mut:#847c6c;
    --green:#7fd9a8;--green-glow:rgba(127,217,168,0.35);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;min-height:100vh;overflow:hidden;}
body{font-family:'Inter',sans-serif;background:transparent;color:var(--text);
    display:flex;align-items:flex-start;justify-content:center;-webkit-font-smoothing:antialiased;}

.scale{transform-origin:top center;transform:scale(var(--s,1));padding-top:8px;}
.stage{width:600px;display:flex;flex-direction:column;align-items:center;gap:14px;}

/* верхняя плашка — всегда видна, показывает порог входа */
.threshold{display:inline-flex;align-items:center;gap:9px;padding:9px 20px;border-radius:999px;
    background:linear-gradient(165deg,rgba(19,17,16,0.92),rgba(10,9,8,0.92));
    border:1px solid var(--line);box-shadow:0 10px 26px rgba(0,0,0,0.45),0 0 22px rgba(212,175,106,0.08);}
.threshold .ic{font-size:.85rem;filter:drop-shadow(0 0 4px var(--gold-soft));}
.threshold .tx{font-size:.72rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);}
.threshold .tx b{color:var(--gold);font-weight:800;}

.board{width:100%;display:flex;flex-direction:column;gap:12px;}

/* ===== карточка приказа ===== */
.order{position:relative;width:100%;border-radius:16px;overflow:hidden;
    background:linear-gradient(160deg,var(--panel),var(--panel-2));
    border:1px solid var(--line-soft);
    box-shadow:0 20px 44px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.04);
    animation:cardIn .5s cubic-bezier(.16,1,.3,1);}
@keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
.order::before{content:'';position:absolute;inset:0;border-radius:16px;padding:1px;pointer-events:none;
    background:linear-gradient(160deg,rgba(212,175,106,0.38),transparent 40%,transparent 70%,rgba(212,175,106,0.14));
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;}
.order.done::before{background:linear-gradient(160deg,rgba(127,217,168,0.4),transparent 40%,transparent 70%,rgba(127,217,168,0.14));}

.order .rank{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 7px;margin-right:9px;
    font-family:'Playfair Display',serif;font-weight:800;font-size:.72rem;vertical-align:middle;
    color:var(--ink);background:linear-gradient(135deg,#f0d9a6,var(--gold));border-radius:7px;letter-spacing:.02em;}

.order-inner{padding:20px 24px 20px 24px;}

.status{position:absolute;top:16px;right:16px;display:flex;align-items:center;gap:7px;padding:5px 12px 5px 8px;border-radius:999px;
    background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.1);}
.status .spin{width:13px;height:13px;border-radius:50%;border:2px solid rgba(212,175,106,0.28);border-top-color:var(--gold);
    animation:spin 1.1s linear infinite;filter:drop-shadow(0 0 3px var(--gold-soft));}
@keyframes spin{to{transform:rotate(360deg)}}
.status .check{width:15px;height:15px;border-radius:50%;background:var(--green);display:none;place-items:center;
    box-shadow:0 0 10px var(--green-glow);}
.status .check svg{width:9px;height:9px;}
.status .label{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);}
.order.done .status{border-color:rgba(127,217,168,0.3);}
.order.done .status .spin{display:none;}
.order.done .status .check{display:grid;}
.order.done .status .label{color:var(--green);}

.row{display:flex;flex-direction:column;gap:3px;}
.row + .row{margin-top:12px;}
.row .lbl{font-size:.62rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--text-mut);}
.row .val{color:var(--text);}
.row.from .val{font-family:'Playfair Display',serif;font-weight:800;font-size:1.35rem;line-height:1.15;
    color:var(--text);text-shadow:0 2px 10px rgba(0,0,0,.5);}
.row.amount .val{font-family:'Playfair Display',serif;font-weight:900;font-size:1.55rem;line-height:1;
    background:linear-gradient(135deg,#f3e2b8,var(--gold) 60%,#b98d46);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 2px 8px rgba(0,0,0,.4));}
.row.task .val{font-size:1.05rem;font-weight:600;line-height:1.45;color:var(--text);}

/* компактный режим (когда приказов несколько) — те же поля, меньше воздуха */
.board.multi .order-inner{padding:14px 20px 14px 20px;}
.board.multi .row + .row{margin-top:8px;}
.board.multi .row.from .val{font-size:1.05rem;}
.board.multi .row.amount .val{font-size:1.2rem;}
.board.multi .row.task .val{font-size:.9rem;}
.board.multi .status{top:12px;right:12px;}

.empty-hint{display:none;}
</style>
</head>
<body>
<div class="scale" id="scale">
    <div class="stage">
        <div class="threshold"><span class="ic">⚜</span><span class="tx">Именной приказ · от <b id="thresholdVal">500</b> ₽</span></div>
        <div class="board" id="board"></div>
    </div>
</div>

<script>
const DESIGN_W = 620;
let lastKeys = '';

document.addEventListener('DOMContentLoaded', () => { scale(); addEventListener('resize', scale); load(); connectWS(); });
function scale(){
    const s = Math.min(innerWidth / DESIGN_W, 1.4);
    document.getElementById('scale').style.setProperty('--s', s);
}
function esc(s){ const d = document.createElement('div'); d.textContent = String(s == null ? '' : s); return d.innerHTML; }
function fmt(n){ return Math.round(Number(n) || 0).toLocaleString('ru-RU'); }

function load(){ fetch('/api/boss-orders').then(r => r.json()).then(d => { if (d.success) render(d); }); }

function orderCardHtml(o, ranked, index){
    const rank = ranked ? `<span class="rank">№${index + 1}</span>` : '';
    return `<div class="order ${o.status}" data-id="${o.id}">
        <div class="status">
            <span class="spin"></span>
            <span class="check"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6.2L4.6 9L10 3" stroke="#0c1b12" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
            <span class="label">${o.status === 'done' ? 'Выполнено' : 'В процессе'}</span>
        </div>
        <div class="order-inner">
            <div class="row from"><span class="lbl">От кого</span><span class="val">${rank}${esc(o.username || 'Аноним')}</span></div>
            <div class="row amount"><span class="lbl">Сумма</span><span class="val">${fmt(o.amount)} ₽</span></div>
            <div class="row task"><span class="lbl">Задание</span><span class="val">${esc(o.text)}</span></div>
        </div>
    </div>`;
}

function render(data){
    document.getElementById('thresholdVal').textContent = fmt((data.config && data.config.thresholdAmount) || 0);

    const list = data.boardOrders || [];
    const board = document.getElementById('board');
    const keys = list.map(o => o.id + ':' + o.status).join(',');
    if (keys === lastKeys) return; // не перерисовываем одинаковое состояние — анимации не дёргаются
    lastKeys = keys;

    const multi = list.length > 1;
    board.className = 'board' + (multi ? ' multi' : '');

    if (!list.length){ board.innerHTML = ''; return; }

    board.innerHTML = list.map((o, i) => orderCardHtml(o, multi, i)).join('');
}

function connectWS(){
    try {
        const ws = new WebSocket((location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws');
        ws.onmessage = ev => {
            let m; try { m = JSON.parse(ev.data); } catch { return; }
            if (m.type === 'BOSS_ORDER_UPDATE') render(m);
        };
        ws.onclose = () => setTimeout(connectWS, 3000);
    } catch (e) { setTimeout(connectWS, 4000); }
}
</script>
</body>
</html>
