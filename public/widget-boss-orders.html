<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boss Order Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
/* Современный, компактный HUD: нейтральный графит, один тёплый акцент,
   лёгкое свечение вместо неона. Табличные цифры, геометрический гротеск —
   читается с телефона в один взгляд, не спорит с игровой картинкой. */
:root{
    --bg:#131417;--bg-2:#1a1b1f;--line:rgba(255,255,255,.09);--line-gold:rgba(217,180,101,.35);
    --gold:#d9b465;--gold-soft:rgba(217,180,101,.4);
    --text:#f5f6f8;--text-dim:#9a9ea8;--text-mut:#686c76;
    --green:#5fe3a3;--green-soft:rgba(95,227,163,.35);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;min-height:100vh;overflow:hidden;}
body{font-family:'Manrope',sans-serif;background:transparent;color:var(--text);
    display:flex;align-items:flex-start;justify-content:center;-webkit-font-smoothing:antialiased;}

.scale{transform-origin:top center;transform:scale(var(--s,1));padding-top:6px;}
.stage{width:420px;display:flex;flex-direction:column;align-items:center;gap:9px;}

/* плашка порога — всегда видна, компактная */
.threshold{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:999px;
    background:rgba(19,20,23,0.92);border:1px solid var(--line-gold);box-shadow:0 8px 20px rgba(0,0,0,0.4);}
.threshold .ic{width:12px;height:12px;filter:drop-shadow(0 0 3px var(--gold-soft));}
.threshold .tx{font-size:.66rem;font-weight:700;letter-spacing:.06em;color:var(--text-dim);white-space:nowrap;}
.threshold .tx b{color:var(--gold);font-weight:800;}

.board{width:100%;display:flex;flex-direction:column;gap:8px;}

/* ===== строка приказа (базовый компактный вид) ===== */
.order{position:relative;border-radius:13px;overflow:hidden;
    background:linear-gradient(150deg,var(--bg),var(--bg-2));border:1px solid var(--line);
    box-shadow:0 10px 26px rgba(0,0,0,0.4);
    animation:cardIn .4s cubic-bezier(.16,1,.3,1);}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.order::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);}
.order.done::before{background:var(--green);}

.order-row{display:flex;align-items:center;gap:10px;padding:9px 13px 9px 15px;}
.rank{flex:none;width:20px;height:20px;border-radius:6px;display:grid;place-items:center;
    font-size:.68rem;font-weight:800;color:var(--bg);background:var(--gold);}
.who{flex:1;min-width:0;}
.who .name-line{display:flex;align-items:baseline;gap:7px;}
.who .name{font-weight:800;font-size:.92rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;}
.who .amt{font-weight:900;font-size:.86rem;color:var(--gold);font-variant-numeric:tabular-nums;flex:none;}
.who .task{margin-top:1px;font-size:.78rem;font-weight:600;color:var(--text-dim);line-height:1.3;
    display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}

.status{flex:none;display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;
    background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.08);}
.status .spin{width:11px;height:11px;border-radius:50%;border:2px solid rgba(217,180,101,.28);border-top-color:var(--gold);
    animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.status .check{display:none;width:12px;height:12px;}
.order.done .status{border-color:rgba(95,227,163,.3);background:rgba(95,227,163,.08);}
.order.done .status .spin{display:none;}
.order.done .status .check{display:block;}

/* ===== крупный режим — только когда приказ один ===== */
.board.solo .order-row{padding:16px 20px 16px 22px;gap:14px;}
.board.solo .rank{display:none;}
.board.solo .who .name{font-size:1.15rem;max-width:220px;}
.board.solo .who .amt{font-size:1.05rem;}
.board.solo .who .task{font-size:.9rem;-webkit-line-clamp:2;margin-top:3px;}
.board.solo .status{width:32px;height:32px;}
.board.solo .status .spin{width:14px;height:14px;}
.board.solo .status .check{width:15px;height:15px;}

.more{text-align:center;font-size:.66rem;font-weight:700;letter-spacing:.08em;color:var(--text-mut);padding-top:2px;}
</style>
</head>
<body>
<div class="scale" id="scale">
    <div class="stage">
        <div class="threshold">
            <svg class="ic" viewBox="0 0 24 24" fill="none"><path d="M12 2L14.5 9H21.5L15.5 13.5L18 21L12 16.5L6 21L8.5 13.5L2.5 9H9.5L12 2Z" fill="#d9b465"/></svg>
            <span class="tx">ПРИКАЗ · ОТ <b id="thresholdVal">500</b> Р</span>
        </div>
        <div class="board" id="board"></div>
    </div>
</div>

<script>
const DESIGN_W = 460;
const MAX_SHOWN = 4; // не даём виджету занять пол-экрана — остальное видно только в админке
let lastKeys = '';

document.addEventListener('DOMContentLoaded', () => { scale(); addEventListener('resize', scale); load(); connectWS(); });
function scale(){ document.getElementById('scale').style.setProperty('--s', Math.min(innerWidth / DESIGN_W, 1.3)); }
function esc(s){ const d = document.createElement('div'); d.textContent = String(s == null ? '' : s); return d.innerHTML; }
function fmt(n){ return Math.round(Number(n) || 0).toLocaleString('ru-RU'); }

function load(){ fetch('/api/boss-orders').then(r => r.json()).then(d => { if (d.success) render(d); }); }

function orderRowHtml(o, ranked, index){
    const rank = ranked ? `<div class="rank">${index + 1}</div>` : '';
    return `<div class="order ${o.status}">
        <div class="order-row">
            ${rank}
            <div class="who">
                <div class="name-line"><span class="name">${esc(o.username || 'Аноним')}</span><span class="amt">${fmt(o.amount)} р</span></div>
                <div class="task">${esc(o.text)}</div>
            </div>
            <div class="status">
                <span class="spin"></span>
                <svg class="check" viewBox="0 0 14 14" fill="none"><path d="M2.5 7.2L5.4 10L11.5 3.5" stroke="#5fe3a3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
        </div>
    </div>`;
}

function render(data){
    document.getElementById('thresholdVal').textContent = fmt((data.config && data.config.thresholdAmount) || 0);

    const all = data.boardOrders || [];
    const list = all.slice(0, MAX_SHOWN);
    const hiddenCount = all.length - list.length;

    const board = document.getElementById('board');
    const keys = list.map(o => o.id + ':' + o.status).join(',') + '|' + hiddenCount;
    if (keys === lastKeys) return; // не перерисовываем одинаковое состояние — анимации не дёргаются
    lastKeys = keys;

    const solo = list.length === 1;
    board.className = 'board' + (solo ? ' solo' : '');

    if (!list.length){ board.innerHTML = ''; return; }

    let html = list.map((o, i) => orderRowHtml(o, !solo, i)).join('');
    if (hiddenCount > 0) html += `<div class="more">ещё ${hiddenCount}</div>`;
    board.innerHTML = html;
}

function connectWS(){
    try {
        const ws = new WebSocket((location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws');
        ws.onmessage = ev => {
            let m; try { m = JSON.parse(ev.data); } catch { return; }
            if (m.type === 'BOSS_ORDER_UPDATE') render(m);
        };
        ws.onclose = () => setTimeout(connectWS, 3000);
    } catch (e) { setTimeout(connectWS, 4000); }
}
</script>
</body>
</html>
