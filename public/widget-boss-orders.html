<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boss Order Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
/* Современный, компактный HUD: нейтральный графит, один тёплый акцент,
   лёгкое свечение вместо неона. Табличные цифры, геометрический гротеск —
   читается с телефона в один взгляд, не спорит с игровой картинкой. */
:root{
    --bg:#131417;--bg-2:#1a1b1f;--line:rgba(255,255,255,.09);--line-gold:rgba(217,180,101,.35);
    --gold:#d9b465;--gold-soft:rgba(217,180,101,.4);
    --text:#f5f6f8;--text-dim:#9a9ea8;--text-mut:#686c76;
    --green:#5fe3a3;--green-soft:rgba(95,227,163,.35);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;min-height:100vh;overflow:hidden;}
body{font-family:'Manrope',sans-serif;background:transparent;color:var(--text);
    display:flex;align-items:flex-end;justify-content:center;-webkit-font-smoothing:antialiased;}

/* якорь снизу — при добавлении новых челленджей доска растёт вверх, а не съезжает за экран */
.scale{transform-origin:bottom center;transform:scale(var(--s,1));padding-bottom:6px;}
.stage{width:420px;display:flex;flex-direction:column;align-items:center;gap:9px;}

/* плашка цены — всегда видна над доской (призыв «кинуть челлендж») */
.threshold{display:inline-flex;align-items:center;gap:12px;padding:13px 28px;border-radius:999px;
    background:rgba(19,20,23,0.92);border:1px solid var(--line-gold);
    box-shadow:0 10px 26px rgba(0,0,0,0.45),0 0 26px rgba(217,180,101,.1);}
.threshold .ic{width:24px;height:24px;filter:drop-shadow(0 0 5px var(--gold-soft));}
.threshold .tx{font-size:1.28rem;font-weight:800;letter-spacing:.04em;color:var(--text);white-space:nowrap;}
.threshold .tx b{color:var(--gold);font-weight:900;}
/* дополнительная плашка — компактнее основной с ценой */
.threshold-sm{padding:8px 18px;gap:0;box-shadow:0 6px 18px rgba(0,0,0,0.38),0 0 16px rgba(217,180,101,.08);}
.threshold-sm .tx{font-size:.92rem;font-weight:700;letter-spacing:.03em;}

.board{width:100%;display:flex;flex-direction:column;gap:8px;}

/* ===== строка приказа (базовый компактный вид) ===== */
.order{position:relative;border-radius:13px;overflow:hidden;
    background:linear-gradient(150deg,var(--bg),var(--bg-2));border:1px solid var(--line);
    box-shadow:0 10px 26px rgba(0,0,0,0.4);
    animation:cardIn .4s cubic-bezier(.16,1,.3,1);}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.order::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);z-index:2;}
.order.done::before{background:var(--green);}
.order.failed::before{background:#ff5a5a;}

/* выполнено — сплошная тёмно-зелёная заливка карточки с едва заметным переливом слева
   направо (не отдельное пятно). animation-direction:alternate + ease-in-out — скорость на
   обоих концах хода нулевая, разворот незаметен, цикл бесшовный. Заливка тёмная и плотная,
   чтобы не перебивать читаемость текста поверх неё. */
.order.done{border-color:rgba(95,227,163,.32);}
.order.done::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
    background:linear-gradient(120deg,
        rgba(14,42,32,.5) 0%,
        rgba(32,100,74,.34) 50%,
        rgba(14,42,32,.5) 100%);
    background-size:220% 220%;
    animation:lavaFlow 6s ease-in-out infinite alternate;}
@keyframes lavaFlow{
    0%   {background-position:0% 50%;}
    100% {background-position:100% 50%;}
}
/* провалено — на 20% темнее */
.order.failed{filter:brightness(.8);}

.order-row{position:relative;z-index:1;display:flex;align-items:center;gap:10px;padding:11px 14px 11px 16px;}
.rank{flex:none;width:20px;height:20px;border-radius:6px;display:grid;place-items:center;
    font-size:.68rem;font-weight:800;color:var(--bg);background:var(--gold);}
.who{flex:1;min-width:0;}
.who .name-line{display:flex;align-items:baseline;gap:7px;}
.who .name{font-weight:800;font-size:1.1rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;}
.who .amt{font-weight:900;font-size:1.02rem;color:var(--gold);font-variant-numeric:tabular-nums;flex:none;}
.who .task{margin-top:2px;font-size:.92rem;font-weight:600;color:var(--text-dim);line-height:1.3;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* статус-бейдж с текстом */
.badge{flex:none;display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;
    font-size:.64rem;font-weight:800;letter-spacing:.05em;white-space:nowrap;}
.badge .spin{width:11px;height:11px;border-radius:50%;border:2px solid rgba(217,180,101,.3);border-top-color:var(--gold);
    animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.badge svg{width:12px;height:12px;flex:none;}
.b-active{color:var(--gold);background:rgba(217,180,101,.1);border:1px solid rgba(217,180,101,.28);}
.b-done{color:var(--green);background:rgba(95,227,163,.14);border:1px solid rgba(95,227,163,.4);}
.b-failed{color:#ff6b6b;background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.38);animation:failGlow 1.7s ease-in-out infinite;}
@keyframes failGlow{0%,100%{box-shadow:0 0 0 rgba(255,80,80,0)}50%{box-shadow:0 0 14px rgba(255,80,80,.55)}}

/* ===== крупный режим — только когда челлендж один ===== */
.board.solo .order-row{padding:18px 22px 18px 24px;gap:14px;}
.board.solo .rank{display:none;}
.board.solo .who .name{font-size:1.34rem;max-width:220px;}
.board.solo .who .amt{font-size:1.22rem;}
.board.solo .who .task{font-size:1.04rem;-webkit-line-clamp:2;margin-top:4px;}
.board.solo .badge{font-size:.72rem;padding:7px 14px;}
.board.solo .badge .spin{width:13px;height:13px;}
.board.solo .badge svg{width:14px;height:14px;}

/* ===== заглушка ожидания — когда челленджей ещё нет ===== */
.waiting{position:relative;width:100%;border-radius:16px;overflow:hidden;padding:20px 22px;text-align:center;
    background:linear-gradient(150deg,var(--bg),var(--bg-2));border:1px solid var(--line-gold);
    box-shadow:0 12px 30px rgba(0,0,0,0.4),0 0 0 1px rgba(217,180,101,.05) inset;
    animation:cardIn .5s cubic-bezier(.16,1,.3,1);}
.waiting::before{content:'';position:absolute;inset:-40%;background:radial-gradient(circle at 50% 30%,rgba(217,180,101,.16),transparent 60%);
    animation:waitGlow 3.2s ease-in-out infinite;}
@keyframes waitGlow{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
.waiting-inner{position:relative;z-index:1;}
.waiting .wicon{width:30px;height:30px;margin:0 auto 9px;animation:waitBreathe 2.4s ease-in-out infinite;}
@keyframes waitBreathe{0%,100%{transform:scale(1);filter:drop-shadow(0 0 4px var(--gold-soft))}50%{transform:scale(1.14);filter:drop-shadow(0 0 12px var(--gold-soft))}}
.waiting .wtitle{font-size:.92rem;font-weight:800;letter-spacing:.02em;color:var(--text);}
.waiting .wsub{margin-top:3px;font-size:.74rem;font-weight:600;color:var(--text-dim);}
.waiting .wdots{display:inline-flex;gap:3px;margin-left:2px;vertical-align:middle;}
.waiting .wdots span{width:3px;height:3px;border-radius:50%;background:var(--gold);animation:waitDot 1.4s ease-in-out infinite;}
.waiting .wdots span:nth-child(2){animation-delay:.2s;}
.waiting .wdots span:nth-child(3){animation-delay:.4s;}
@keyframes waitDot{0%,80%,100%{opacity:.25;transform:translateY(0)}40%{opacity:1;transform:translateY(-2px)}}
</style>
</head>
<body>
<div class="scale" id="scale">
    <div class="stage">
        <div class="threshold">
            <svg class="ic" viewBox="0 0 24 24" fill="none"><path d="M12 2L14.5 9H21.5L15.5 13.5L18 21L12 16.5L6 21L8.5 13.5L2.5 9H9.5L12 2Z" fill="#d9b465"/></svg>
            <span class="tx">КИНУТЬ ЧЕЛЛЕНДЖ · ОТ <b id="thresholdVal">500</b> Р</span>
        </div>
        <div class="threshold threshold-sm" id="customBanner" style="display:none">
            <span class="tx" id="customBannerText"></span>
        </div>
        <div class="board" id="board"></div>
    </div>
</div>

<script>
const DESIGN_W = 460;
let lastKeys = null; // null никогда не совпадёт с реальным ключом (в т.ч. пустым '' при отсутствии заказов)

document.addEventListener('DOMContentLoaded', () => { scale(); addEventListener('resize', scale); load(); connectWS(); });
function scale(){ document.getElementById('scale').style.setProperty('--s', Math.min(innerWidth / DESIGN_W, 1.3)); }
function esc(s){ const d = document.createElement('div'); d.textContent = String(s == null ? '' : s); return d.innerHTML; }
function fmt(n){ return Math.round(Number(n) || 0).toLocaleString('ru-RU'); }

function load(){ fetch('/api/boss-orders').then(r => r.json()).then(d => { if (d.success) render(d); }); }

function statusBadgeHtml(status){
    if (status === 'done') {
        return `<span class="badge b-done"><svg viewBox="0 0 14 14" fill="none"><path d="M2.5 7.2L5.4 10L11.5 3.5" stroke="#5fe3a3" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>ВЫПОЛНЕНО</span>`;
    }
    if (status === 'failed') {
        return `<span class="badge b-failed"><svg viewBox="0 0 14 14" fill="none"><path d="M3.5 3.5L10.5 10.5M10.5 3.5L3.5 10.5" stroke="#ff6b6b" stroke-width="2.2" stroke-linecap="round"/></svg>НЕ СМОГ ВЫПОЛНИТЬ</span>`;
    }
    return `<span class="badge b-active"><span class="spin"></span>ВЫПОЛНЯЕТСЯ</span>`;
}

function orderRowHtml(o, ranked, index){
    const rank = ranked ? `<div class="rank">${index + 1}</div>` : '';
    return `<div class="order ${o.status}">
        <div class="order-row">
            ${rank}
            <div class="who">
                <div class="name-line"><span class="name">${esc(o.username || 'Аноним')}</span><span class="amt">${fmt(o.amount)} р</span></div>
                <div class="task">${esc(o.text)}</div>
            </div>
            ${statusBadgeHtml(o.status)}
        </div>
    </div>`;
}

function render(data){
    const cfg = data.config || {};
    document.getElementById('thresholdVal').textContent = fmt(cfg.thresholdAmount || 0);
    const banner = document.getElementById('customBanner');
    const bannerText = String(cfg.bannerText || '').trim();
    if (cfg.bannerEnabled && bannerText) {
        document.getElementById('customBannerText').textContent = bannerText;
        banner.style.display = 'inline-flex';
    } else {
        banner.style.display = 'none';
    }

    const list = data.boardOrders || [];

    const board = document.getElementById('board');
    const keys = list.map(o => o.id + ':' + o.status).join(',');
    if (keys === lastKeys) return; // не перерисовываем одинаковое состояние — анимации не дёргаются
    lastKeys = keys;

    if (!list.length){
        board.className = 'board';
        board.innerHTML = `<div class="waiting"><div class="waiting-inner">
            <svg class="wicon" viewBox="0 0 24 24" fill="none"><path d="M12 2L14.5 9H21.5L15.5 13.5L18 21L12 16.5L6 21L8.5 13.5L2.5 9H9.5L12 2Z" fill="#d9b465"/></svg>
            <div class="wtitle">Ждём первый челлендж</div>
            <div class="wsub">Стань первым, кто бросит вызов<span class="wdots"><span></span><span></span><span></span></span></div>
        </div></div>`;
        return;
    }

    const solo = list.length === 1;
    board.className = 'board' + (solo ? ' solo' : '');

    board.innerHTML = list.map((o, i) => orderRowHtml(o, !solo, i)).join('');
}

function connectWS(){
    try {
        const ws = new WebSocket((location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws');
        ws.onmessage = ev => {
            let m; try { m = JSON.parse(ev.data); } catch { return; }
            if (m.type === 'BOSS_ORDER_UPDATE') render(m);
        };
        ws.onclose = () => setTimeout(connectWS, 3000);
    } catch (e) { setTimeout(connectWS, 4000); }
}
</script>
</body>
</html>
